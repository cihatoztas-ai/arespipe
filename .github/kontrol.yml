name: AresPipe Kod Kalite Kontrolü

on:
  push:
    branches: ["main"]
    paths-ignore:
      # CI kendi yazdığı rapor commit'iyle tekrar tetiklenmesin.
      # GITHUB_TOKEN zaten workflow tetiklemez ama çift emniyet.
      - ".github/ci-son-rapor.json"
  pull_request:
    branches: ["main"]

# ci-son-rapor.json commit'leyebilmek için write yetkisi
permissions:
  contents: write

jobs:
  kalite-kontrol:
    name: Kural Kontrolü
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Kontrol scriptini çalıştır (JSON rapor üretir)
        id: kontrol
        continue-on-error: true  # hata olsa bile sonraki step'ler çalışsın (rapor commit'lenebilmeli)
        run: |
          set +e
          node .github/kontrol.js --json 2>&1 | tee /tmp/ci-cikti.txt
          exit ${PIPESTATUS[0]}

      - name: CI raporunu commit'le (sadece main'e push'ta)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ ! -f .github/ci-son-rapor.json ]; then
            echo "⚠  Rapor dosyası oluşmamış — kontrol.js --json desteklemiyor olabilir."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ci-son-rapor.json

          if git diff --cached --quiet; then
            echo "✓ Rapor değişmedi, commit yapılmadı."
          else
            git commit -m "chore(ci): ci-son-rapor.json güncelle [skip ci]"
            git push
            echo "✓ Rapor commit'lendi."
          fi

      - name: Özet kartı (GitHub Actions run sayfası)
        if: always()
        run: |
          echo "## AresPipe Kod Kalite Raporu" >> $GITHUB_STEP_SUMMARY
          echo "Tarih: $(date '+%d/%m/%Y %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/ci-cikti.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(çıktı yakalanamadı)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Kontrol başarısızsa workflow'u kırmızı yap
        if: steps.kontrol.outcome == 'failure'
        run: |
          echo "::error::Kalite kontrolü başarısız — yukarıdaki hataları düzeltin."
          exit 1
