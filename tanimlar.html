<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanımlar | AresPipe</title>
<!-- ✅ A3: Flash prevention — ares_theme + ares_lang + visibility -->
<script>(function(){
  var t=localStorage.getItem('ares_theme')||'light-anthracite';
  var l=localStorage.getItem('ares_lang')||'tr';
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.setAttribute('lang',l);
  document.documentElement.style.visibility='hidden';
})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ✅ Renk değişkenleri */
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txd:#6b7a90;--txm:#94a3b8;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}

.page{padding:28px 28px 40px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--tx);line-height:1;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--txd);margin-bottom:6px;}
.breadcrumb a{color:var(--txd);text-decoration:none;}.breadcrumb a:hover{color:var(--ac);}

/* BİLGİ KUTUSU */
.info-banner{display:flex;align-items:center;gap:12px;background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:var(--txm);}
.info-banner svg{flex-shrink:0;color:var(--warn);}

/* ✅ TABLO KARTI */
.tablo-kart{background:var(--sur);border:1px solid var(--bor);border-radius:16px;overflow:hidden;}
.tablo-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bor);}
.tablo-baslik{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 16px;text-align:left;font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--bor);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--bor);transition:background 0.12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--sur2);}
td{padding:12px 16px;font-size:14px;vertical-align:middle;}
.td-kod{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--ac);}

/* BUTON */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;font-family:'Barlow',sans-serif;}
.btn-ac{background:var(--ac);color:#fff;}.btn-ac:hover{filter:brightness(1.1);}
.btn-g{background:var(--sur2);color:var(--tx);border:1px solid var(--bor);}.btn-g:hover{border-color:var(--ac);color:var(--ac);}
.btn-g:disabled{opacity:0.35;cursor:not-allowed;}.btn-g:disabled:hover{border-color:var(--bor);color:var(--tx);}
.btn-re{background:rgba(229,62,62,.10);color:var(--re);border:1px solid rgba(229,62,62,.25);}.btn-re:hover{background:rgba(229,62,62,.18);}
.btn-sm{padding:5px 10px;font-size:14px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:9999;animation:tin 0.3s ease;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.t-ok{border-left:3px solid var(--gr);}.t-er{border-left:3px solid var(--re);}
@keyframes tin{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ✅ SOL KENAR RENK — B-01 */
.cl-ac{border-left:3px solid var(--ac) !important;}
.cl-gr{border-left:3px solid var(--gr) !important;}
.cl-re{border-left:3px solid var(--re) !important;}
.cl-warn{border-left:3px solid var(--warn) !important;}
.cl-leg{border-left:3px solid var(--leg) !important;}

.bos{text-align:center;padding:40px 20px;color:var(--txd);font-size:14px;}

/* Filtre barı */
.filtre-bari{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:10px 14px;}
.fi{width:100%;padding:8px 12px;border-radius:9px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;box-sizing:border-box;}
.fi:focus{border-color:var(--ac);}
</style>
<!-- ✅ Script sırası — SC-01 -->
<script src="ares-store.js"></script>
<script src="ares-lang.js"></script>
<script src="ares-layout.js"></script>
</head>
<body>

<div class="app-shell">
<div class="main-content">
  <div class="page">

    <div style="margin-bottom:20px;">
      <div class="breadcrumb">
        <a href="index.html" data-i18n="genel_ana_sayfa">Ana Sayfa</a>
        <span>/</span>
        <span>Tanımlar</span>
      </div>
      <h1 class="page-title">Tanımlar</h1>
    </div>

    <!-- Bilgi Banner -->
    <div class="info-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>İşlem basamakları artık firma bazında süper admin tarafından yönetilmektedir. Erişim için: <strong>Admin Paneli → Firma Detay</strong></span>
    </div>

    <!-- KOD SERİLERİ -->
    <div class="filtre-bari cl-leg" style="margin-bottom:16px;">
      <button class="btn btn-sm" style="background:rgba(124,58,237,.12);color:var(--leg);border:1px solid rgba(124,58,237,.3);" onclick="kodSeriEkle()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Yeni Seri Ekle
      </button>
      <div style="flex:1"></div>
      <span style="font-size:14px;color:var(--txd);">Prefix değişikliği geçmiş numaraları etkilemez.</span>
    </div>
    <div class="tablo-kart cl-leg">
      <div class="tablo-header">
        <div class="tablo-baslik">Kod Serileri &amp; Sayaçlar</div>
        <div style="font-size:14px;color:var(--txd);">sayac_tanimlari</div>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:120px;">Tip</th>
            <th>Açıklama</th>
            <th style="width:80px;">Prefix</th>
            <th style="width:80px;text-align:center;">Yıl Ekle</th>
            <th style="width:80px;text-align:center;">Basamak</th>
            <th style="width:120px;">Örnek</th>
            <th style="width:80px;text-align:right;">Son No</th>
            <th style="width:90px;"></th>
          </tr>
        </thead>
        <tbody id="kodSeriTablo"></tbody>
      </table>
    </div>

  </div><!-- /page -->
</div><!-- /main-content -->
</div><!-- /app-shell -->

<script>
'use strict';

function tv(key, tr) {
  if (typeof window.tv === 'function' && window.tv !== tv) return window.tv(key, tr);
  return tr !== undefined ? tr : key;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

var _toastT = null;
function toast(msg, tip) {
  tip = tip || 'ok';
  var e = document.querySelector('.toast');
  if (e) e.remove();
  var el = document.createElement('div');
  el.className = 'toast t-' + tip;
  el.textContent = msg;
  document.body.appendChild(el);
  if (_toastT) clearTimeout(_toastT);
  _toastT = setTimeout(function(){ el.remove(); }, 3500);
}

window._onLangChange = function() {};

// ═══════════════════════════════════════════════════════════════════
// ✅ SB-01: Auth kontrolü
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  (async function() {
    try {
      var _bekle = 0;
      while (_bekle < 80) {
        if (typeof ARES === 'undefined') { await new Promise(function(r){ setTimeout(r,100); }); _bekle++; continue; }
        var _supa = ARES.supabase();
        if (_supa) {
          var _ses = await _supa.auth.getSession();
          if (_ses.data && _ses.data.session) {
            await ARES.oturumKontrol();
            if (!await ARES.sayfaYetkiKontrol(['yonetici', 'firma_admin', 'super_admin'])) return;
            break;
          }
          if (_bekle > 20) { location.href = 'giris.html'; return; }
        }
        await new Promise(function(r){ setTimeout(r, 100); });
        _bekle++;
      }
    } catch(e) { /* offline */ }
    document.documentElement.style.visibility = '';
    try {
      await kodSeriYukle();
    } catch(e){ console.error('[ARES]', e); }
  })();
});

// ═══════════════════════════════════════════════════════════════════
// KOD SERİLERİ — sayac_tanimlari CRUD
// ═══════════════════════════════════════════════════════════════════
var _kodSeriData = [];

async function kodSeriYukle() {
  if (typeof ARES === 'undefined') return;
  var supa = ARES.supabase();
  if (supa && ARES.mod === 'supabase') {
    var res = await supa
      .from('sayac_tanimlari')
      .select('id, tip, aciklama, prefix, yil_ekle, digits, son_no')
      .eq('tenant_id', ARES.tenantId())
      .order('tip');
    if (!res.error) {
      _kodSeriData = res.data || [];
    } else {
      toast('Kod serileri yüklenemedi: ' + res.error.message, 'er');
      _kodSeriData = [];
    }
  } else {
    _kodSeriData = [];
  }
  kodSeriRender();
}

function _kodOrnek(row) {
  var yil = row.yil_ekle ? new Date().getFullYear().toString().slice(-2) : '';
  var sep = row.yil_ekle ? '-' : '';
  var digits = row.digits || 3;
  return (row.prefix || '') + yil + sep + String(row.son_no != null ? row.son_no + 1 : 1).padStart(digits, '0');
}

function kodSeriRender() {
  var tbody = document.getElementById('kodSeriTablo');
  if (!tbody) return;
  if (!_kodSeriData.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--txd);">Henüz kayıt yok</td></tr>';
    return;
  }
  tbody.innerHTML = _kodSeriData.map(function(r) {
    var kilitli = (r.son_no || 0) > 0;
    var kilitIkon = kilitli ? '<span title="Numara üretildi — prefix değişimi dikkat gerektirir" style="color:var(--warn);font-size:14px;">⚠</span>' : '';
    var id = esc(r.id);
    var tip = esc(r.tip);
    return [
      '<tr>',
      '<td class="td-kod" style="color:var(--leg);">' + tip + '</td>',
      '<td><input class="fi" style="font-size:14px;padding:5px 8px;" value="' + esc(r.aciklama || '') + '" onblur="kodSeriKaydet(&quot;' + id + '&quot;,&quot;aciklama&quot;,this.value)"></td>',
      '<td><div style="display:flex;align-items:center;gap:4px;">',
        '<input class="fi" style="font-size:14px;padding:5px 8px;width:52px;" value="' + esc(r.prefix || '') + '" maxlength="4" onblur="kodSeriKaydet(&quot;' + id + '&quot;,&quot;prefix&quot;,this.value)">',
        kilitIkon,
      '</div></td>',
      '<td style="text-align:center;"><input type="checkbox"' + (r.yil_ekle ? ' checked' : '') + ' onchange="kodSeriKaydet(&quot;' + id + '&quot;,&quot;yil_ekle&quot;,this.checked)"></td>',
      '<td style="text-align:center;"><input class="fi" type="number" style="font-size:14px;padding:5px 6px;width:52px;text-align:center;" value="' + (r.digits || 3) + '" min="2" max="6" onblur="kodSeriKaydet(&quot;' + id + '&quot;,&quot;digits&quot;,parseInt(this.value)||3)"></td>',
      '<td class="td-kod">' + esc(_kodOrnek(r)) + '</td>',
      '<td style="text-align:right;font-size:14px;font-weight:600;color:var(--txm);">' + (r.son_no || 0) + '</td>',
      '<td style="text-align:right;"><button class="btn btn-g btn-sm" style="background:rgba(217,119,6,.1);color:var(--warn);border-color:rgba(217,119,6,.3);" onclick="kodSeriSifirla(&quot;' + id + '&quot;,&quot;' + tip + '&quot;)" title="Sayacı sıfırla">↺</button></td>',
      '</tr>'
    ].join('');
  }).join('');
}

async function kodSeriKaydet(id, alan, deger) {
  var supa = ARES.supabase();
  var guncelleme = { guncelleme: new Date().toISOString() };
  guncelleme[alan] = deger;
  if (supa && ARES.mod === 'supabase') {
    var res = await supa.from('sayac_tanimlari').update(guncelleme).eq('id', id);
    if (res.error) { toast('Kayıt hatası: ' + res.error.message, 'er'); return; }
  }
  var row = _kodSeriData.find(function(r){ return r.id === id; });
  if (row) row[alan] = deger;
  kodSeriRender();
  ARES.sayacConfigSifirla();
  toast('Kaydedildi.', 'ok');
}

async function kodSeriSifirla(id, tip) {
  if (!confirm(tip + ' sayacını sıfırlamak istiyor musunuz? Sonraki numara 1den başlar.')) return;
  var supa = ARES.supabase();
  if (supa && ARES.mod === 'supabase') {
    var res = await supa.from('sayac_tanimlari').update({ son_no: 0 }).eq('id', id);
    if (res.error) { toast('Sıfırlama hatası: ' + res.error.message, 'er'); return; }
  }
  var row = _kodSeriData.find(function(r){ return r.id === id; });
  if (row) row.son_no = 0;
  kodSeriRender();
  ARES.sayacConfigSifirla();
  toast(tip + ' sayacı sıfırlandı.', 'ok');
}

async function kodSeriEkle() {
  var tip = prompt('Yeni seri tipi (sistem adı, örn: kk_davet):');
  if (!tip || !tip.trim()) return;
  tip = tip.trim().toLowerCase().replace(/[^a-z0-9_]/g, '_');
  var aciklama = prompt('Açıklama (örn: Kalite Kontrol No):') || tip;
  var prefix   = prompt('Prefix (örn: KK, boş bırakılabilir):') || '';
  var supa = ARES.supabase();
  if (supa && ARES.mod === 'supabase') {
    var res = await supa.from('sayac_tanimlari').insert({
      tenant_id: ARES.tenantId(),
      tip:       tip,
      son_no:    0,
      prefix:    prefix,
      yil_ekle:  true,
      digits:    3,
      aciklama:  aciklama,
    }).select().single();
    if (res.error) { toast('Eklenemedi: ' + res.error.message, 'er'); return; }
    _kodSeriData.push(res.data);
    kodSeriRender();
    ARES.sayacConfigSifirla();
    toast(tip + ' serisi eklendi.', 'ok');
  }
}
</script>
</body>
</html>
