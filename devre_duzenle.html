<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Devre Düzenle | AresPipe</title>
<script>(function(){var t=localStorage.getItem('ares_theme')||'light-anthracite';document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="ares-store.js"></script>
<script src="ares-lang.js"></script>
<script src="ares-normalize.js"></script>
<script src="ares-layout.js"></script>
<style>
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txm:#94a3b8;--txd:#6b7a90;--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}

.page{max-width:780px;margin:0 auto;padding:28px 20px 60px;}
.breadcrumb{font-size:13px;color:var(--txd);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.breadcrumb a{color:var(--txd);text-decoration:none;}
.breadcrumb a:hover{color:var(--ac);}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--txm);margin-bottom:24px;}

.form-kart{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:22px;margin-bottom:18px;}
.form-kart-baslik{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.tek{grid-template-columns:1fr;}
.form-grup{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:13px;font-weight:600;color:var(--txm);}
.form-label .req{color:var(--re);margin-left:2px;}
.fi{background:var(--sur2);border:1px solid var(--bor);border-radius:9px;padding:10px 13px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--tx);width:100%;transition:border-color .15s;}
.fi:focus{outline:none;border-color:var(--ac);}
.fi:disabled{opacity:.5;cursor:not-allowed;}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;min-height:80px;}

.malzeme-grid{display:flex;flex-wrap:wrap;gap:8px;}
.radio-btn{display:none;}
.radio-btn+label{padding:7px 14px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--txm);}
.radio-btn:checked+label{border-color:var(--ac);background:rgba(45,142,255,.12);color:var(--ac);}
.radio-btn:disabled+label{opacity:.35;cursor:not-allowed;text-decoration:line-through;}
.radio-btn:disabled+label:hover{border-color:var(--bor);color:var(--txm);}

.yuzey-grid{display:flex;flex-wrap:wrap;gap:8px;}
.yuzey-btn{display:none;}
.yuzey-btn+label{padding:7px 14px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--txm);}
.yuzey-btn:checked+label{border-color:var(--warn);background:rgba(245,158,11,.12);color:var(--warn);}
.yuzey-btn:disabled+label{opacity:.35;cursor:not-allowed;text-decoration:line-through;}
.yuzey-btn:disabled+label:hover{border-color:var(--bor);color:var(--txm);}

.btn-row{display:flex;gap:10px;margin-top:24px;}
.btn{padding:11px 22px;border-radius:10px;border:none;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-kaydet{background:var(--ac);color:#fff;flex:1;}
.btn-kaydet:hover:not(:disabled){opacity:.85;}
.btn-iptal{background:var(--sur2);color:var(--txm);border:1px solid var(--bor);}
.btn-iptal:hover{color:var(--tx);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:9999;display:flex;align-items:center;gap:10px;}
.toast.t-ok{border-color:rgba(16,185,129,.4);color:var(--gr);}
.toast.t-er{border-color:rgba(229,62,62,.4);color:var(--re);}

/* FARK POPUP */
.fp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px;}
.fp-overlay.show{display:flex;}
.fp-card{background:var(--sur);border:1px solid var(--bor);border-radius:12px;width:100%;max-width:540px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
.fp-head{padding:16px 20px;border-bottom:1px solid var(--bor);display:flex;gap:12px;align-items:center;}
.fp-ikon{width:32px;height:32px;border-radius:50%;background:rgba(217,119,6,.15);color:var(--warn);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-size:18px;}
.fp-baslik{font-size:16px;font-weight:600;color:var(--tx);}
.fp-alt{font-size:14px;color:var(--txd);margin-top:2px;}
.fp-body{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.fp-kart{border:1px solid var(--bor);border-left:3px solid var(--warn);border-radius:8px;padding:12px 14px;background:var(--sur2);}
.fp-kart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.fp-kart-alan{font-size:14px;font-weight:600;color:var(--tx);}
.fp-kart-sayi{font-size:14px;font-weight:600;color:var(--warn);}
.fp-kart-diff{display:flex;gap:10px;align-items:center;font-size:14px;}
.fp-kart-col{flex:1;min-width:0;}
.fp-kart-lbl{font-size:14px;color:var(--txd);margin-bottom:3px;}
.fp-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:14px;margin-right:4px;margin-bottom:2px;}
.fp-pill-b{background:rgba(14,165,233,.12);color:var(--ac);}
.fp-pill-y{background:rgba(239,68,68,.12);color:var(--re);}
.fp-ok{color:var(--txd);font-size:18px;flex-shrink:0;}
.fp-spool-liste{margin-top:8px;font-size:14px;color:var(--txd);font-family:'Barlow Condensed',sans-serif;}
.fp-foot{padding:14px 20px;border-top:1px solid var(--bor);background:var(--sur2);display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.fp-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--bor);background:var(--sur);color:var(--tx);font-size:14px;font-weight:500;cursor:pointer;}
.fp-btn:hover{border-color:var(--ac);color:var(--ac);}
.fp-btn.fp-warn{background:rgba(217,119,6,.12);border-color:rgba(217,119,6,.4);color:var(--warn);}
.fp-btn.fp-warn:hover{background:rgba(217,119,6,.2);border-color:var(--warn);color:var(--warn);}
</style>
</head>
<body>
<div class="app-shell">
<div class="main-content">
<div class="page">

  <div class="breadcrumb">
    <a href="index.html">Ana Sayfa</a> ›
    <a href="devreler.html">Aktif Devreler</a> ›
    <a href="#" id="bcDevre" onclick="geriDon()">Devre Detay</a> ›
    <span>Düzenle</span>
  </div>

  <div class="page-title">✏️ Devre Düzenle</div>
  <div class="page-sub" id="pageSub">Yükleniyor...</div>

  <!-- Proje Bilgileri -->
  <div class="form-kart">
    <div class="form-kart-baslik">📋 Proje Bilgileri</div>
    <div class="form-grid">
      <div class="form-grup">
        <label class="form-label">Tersane</label>
        <input class="fi" id="fTersane" disabled placeholder="—">
      </div>
      <div class="form-grup">
        <label class="form-label">Proje / Gemi</label>
        <input class="fi" id="fProje" disabled placeholder="—">
      </div>
    </div>
  </div>

  <!-- Devre Bilgileri -->
  <div class="form-kart">
    <div class="form-kart-baslik">⚡ Devre Bilgileri</div>
    <div class="form-grid">
      <div class="form-grup">
        <label class="form-label">Devre Adı / Kodu <span class="req">*</span></label>
        <input class="fi" id="fDevreAdi" placeholder="örn: 265-overboard" oninput="validateForm()">
      </div>
      <div class="form-grup">
        <label class="form-label">Bölge / Zone <span class="req">*</span></label>
        <input class="fi" id="fZone" placeholder="örn: Z01, A-Deck" oninput="validateForm()">
      </div>
      <div class="form-grup">
        <label class="form-label">İş Emri No</label>
        <input class="fi" id="fIsEmri" disabled placeholder="—">
      </div>
      <div class="form-grup">
        <label class="form-label">Termin Tarihi</label>
        <input class="fi" type="date" id="fTermin">
      </div>
    </div>
  </div>

  <!-- Malzeme & Yüzey -->
  <div class="form-kart">
    <div class="form-kart-baslik">🔧 Malzeme & Yüzey</div>
    <div class="form-grid">
      <div class="form-grup">
        <label class="form-label">Ana Malzeme</label>
        <div class="malzeme-grid">
          <input type="radio" name="malzeme" id="mKarbon" value="karbon" class="radio-btn">
          <label for="mKarbon" data-i18n="cmn_malzeme_karbon">Karbon Çelik</label>
          <input type="radio" name="malzeme" id="mPaslanmaz" value="paslanmaz" class="radio-btn">
          <label for="mPaslanmaz" data-i18n="cmn_malzeme_paslanmaz">Paslanmaz</label>
          <input type="radio" name="malzeme" id="mBakir" value="bakir" class="radio-btn">
          <label for="mBakir" data-i18n="cmn_malzeme_bakir">Bakır Alaşım</label>
          <input type="radio" name="malzeme" id="mAlum" value="alum" class="radio-btn">
          <label for="mAlum" data-i18n="cmn_malzeme_alum">Alüminyum</label>
          <input type="radio" name="malzeme" id="mDiger" value="diger" class="radio-btn">
          <label for="mDiger" data-i18n="cmn_malzeme_diger">Diğer</label>
        </div>
      </div>
      <div class="form-grup">
        <label class="form-label">Yüzey İşlemi</label>
        <div class="yuzey-grid">
          <input type="radio" name="yuzey" id="yAsit" value="asit" class="yuzey-btn">
          <label for="yAsit" data-i18n="cmn_yuzey_asit">Asit</label>
          <input type="radio" name="yuzey" id="yGalvaniz" value="galvaniz" class="yuzey-btn">
          <label for="yGalvaniz" data-i18n="cmn_yuzey_galvaniz">Galvaniz</label>
          <input type="radio" name="yuzey" id="ySiyah" value="siyah" class="yuzey-btn">
          <label for="ySiyah" data-i18n="cmn_yuzey_siyah">Siyah</label>
          <input type="radio" name="yuzey" id="yBoyali" value="boyali" class="yuzey-btn">
          <label for="yBoyali" data-i18n="cmn_yuzey_boyali">Boya</label>
          <input type="radio" name="yuzey" id="yDiger" value="diger" class="yuzey-btn">
          <label for="yDiger" data-i18n="cmn_yuzey_diger">Diğer</label>
        </div>
        <input class="fi" id="fYuzeyAciklama" data-i18n-placeholder="dny_ph_yuzey_diger" placeholder="Yüzey açıklaması (anodize, pasivasyon…)" style="display:none;margin-top:8px;">
      </div>
    </div>
  </div>

  <!-- Notlar -->
  <div class="form-kart">
    <div class="form-kart-baslik">📝 Notlar</div>
    <div class="form-grid tek">
      <div class="form-grup">
        <label class="form-label">Açıklama / Notlar</label>
        <textarea class="fi" id="fNot" placeholder="Opsiyonel notlar..."></textarea>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-iptal" onclick="geriDon()">← İptal</button>
    <button class="btn btn-kaydet" id="btnKaydet" onclick="kaydet()" disabled>💾 Kaydet</button>
  </div>

</div>
</div>
</div>

<!-- FARK TESPİT POPUP -->
<div class="fp-overlay" id="farkPopup">
  <div class="fp-card">
    <div class="fp-head">
      <div class="fp-ikon">!</div>
      <div>
        <div class="fp-baslik" data-i18n="dny_fark_title">Fark tespit edildi</div>
        <div class="fp-alt" data-i18n="dny_fark_alt">Girilen ve yüklenen veriler arasında uyumsuzluk var</div>
      </div>
    </div>
    <div class="fp-body" id="farkPopupBody"></div>
    <div class="fp-foot">
      <button class="fp-btn" onclick="farkIptal()" data-i18n="dny_fark_iptal_tam">İptal et</button>
      <div style="display:flex;gap:8px;">
        <button class="fp-btn" onclick="farkDuzelt()" data-i18n="dny_fark_duzelt">Düzelt</button>
        <button class="fp-btn fp-warn" onclick="farkDevam()" data-i18n="dny_fark_devam">Yüklemeye devam et</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

var _devreId = null;
var _devre = {};

function tv(k, fb) {
  if (typeof window._tv === 'function') return window._tv(k, fb);
  return fb || k;
}

function toast(msg, tip) {
  var old = document.querySelector('.toast'); if (old) old.remove();
  var t = document.createElement('div');
  t.className = 'toast t-' + (tip || 'ok');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.remove(); }, 3000);
}

function geriDon() {
  if (_devreId) {
    window.location.href = 'devre_detay.html?id=' + _devreId;
  } else {
    window.location.href = 'devreler.html';
  }
}

function validateForm() {
  var ok = (document.getElementById('fDevreAdi').value || '').trim() &&
           (document.getElementById('fZone').value || '').trim();
  document.getElementById('btnKaydet').disabled = !ok;
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Devre altındaki spool'lar (sayfa yüklenirken DB'den çekilir)
var _devreSpools = [];

// Sayfa ilk açılışta mevcut uyumsuzluğu ZORLA düzeltmez (grace period).
// Kullanıcı malzeme veya yüzeyi manuel değiştirirse kural devreye girer.
var _formHazir = false;

// Malzeme değiştikçe yüzey radio'larının uyumlu/uyumsuzluğunu günceller
function yuzeyUyumGuncelle() {
  if (typeof ARES_NORM === 'undefined' || !ARES_NORM.uyumluYuzeyler) return;
  var malRadio = document.querySelector('input[name="malzeme"]:checked');
  if (!malRadio) return;
  var izinli = ARES_NORM.uyumluYuzeyler(malRadio.value);
  var seciliYuzey = document.querySelector('input[name="yuzey"]:checked');
  var yasakSecili = false;
  document.querySelectorAll('input[name="yuzey"]').forEach(function(r){
    var ok = izinli.indexOf(r.value) !== -1;
    r.disabled = !ok;
    if (!ok) {
      // Label'a uyum tooltip yaz
      var lbl = document.querySelector('label[for="'+r.id+'"]');
      if (lbl) {
        var malEt = (typeof ARES_NORM !== 'undefined' && ARES_NORM.tvMalzeme)
          ? ARES_NORM.tvMalzeme(malRadio.value) : malRadio.value;
        lbl.title = tv('dny_uyum_uyari', '{mal} malzemeye bu yüzey uygulanmaz').replace('{mal}', malEt);
      }
      if (seciliYuzey && seciliYuzey.value === r.value) yasakSecili = true;
    } else {
      var lbl2 = document.querySelector('label[for="'+r.id+'"]');
      if (lbl2) lbl2.title = '';
    }
  });
  // Kullanıcı değiştirmişse (form hazır ise) yasak seçili yüzeyi Asit'e çek
  if (_formHazir && yasakSecili && izinli.length) {
    var yeni = document.querySelector('input[name="yuzey"][value="' + izinli[0] + '"]');
    if (yeni) {
      yeni.checked = true;
      // "Diğer" açıklama alanı kapat
      document.getElementById('fYuzeyAciklama').style.display = yeni.value === 'diger' ? 'block' : 'none';
    }
  }
}

// Malzeme & yüzey radio değişince tetikle
document.addEventListener('change', function(e){
  if (e.target.name === 'malzeme') {
    yuzeyUyumGuncelle();
  }
  if (e.target.name === 'yuzey') {
    document.getElementById('fYuzeyAciklama').style.display =
      e.target.value === 'diger' ? 'block' : 'none';
  }
});

// ── FARK TESPİT — form beyanı ↔ DB'deki spool'lar ────────────
function farkTespit() {
  var farklar = [];
  if (!_devreSpools.length) return farklar;
  if (typeof ARES_NORM === 'undefined') return farklar;

  var malRadio = document.querySelector('input[name="malzeme"]:checked');
  var malBeyanKod = malRadio ? malRadio.value : '';
  if (malBeyanKod && malBeyanKod !== 'diger') {
    var uyumsuz = [], yuklenen = {};
    _devreSpools.forEach(function(s){
      if (!s.malzeme) return;
      var kod = ARES_NORM.malzemeKod(s.malzeme);
      if (kod && kod !== malBeyanKod) { uyumsuz.push(s); yuklenen[kod] = (yuklenen[kod]||0) + 1; }
    });
    if (uyumsuz.length) {
      farklar.push({
        alan: 'malzeme',
        alanEtiket: tv('cmn_th_malzeme', 'Malzeme'),
        beyanKod: malBeyanKod,
        beyanEtiket: ARES_NORM.tvMalzeme(malBeyanKod),
        yuklenenKodlar: Object.keys(yuklenen),
        uyumsuzSpoolNolar: uyumsuz.map(function(s){return s.spool_id || s.spool_no || '(?)';}).slice(0,20),
        uyumsuzAdet: uyumsuz.length,
      });
    }
  }

  var yuzRadio = document.querySelector('input[name="yuzey"]:checked');
  var yuzBeyanKod = yuzRadio ? yuzRadio.value : '';
  if (yuzBeyanKod && yuzBeyanKod !== 'diger') {
    var uyumsuz2 = [], yuklenen2 = {};
    _devreSpools.forEach(function(s){
      if (!s.yuzey) return;
      var kod = ARES_NORM.yuzeyKod(s.yuzey);
      if (kod && kod !== yuzBeyanKod) { uyumsuz2.push(s); yuklenen2[kod] = (yuklenen2[kod]||0) + 1; }
    });
    if (uyumsuz2.length) {
      farklar.push({
        alan: 'yuzey',
        alanEtiket: tv('cmn_th_yuzey', 'Yüzey'),
        beyanKod: yuzBeyanKod,
        beyanEtiket: ARES_NORM.tvYuzey(yuzBeyanKod),
        yuklenenKodlar: Object.keys(yuklenen2),
        uyumsuzSpoolNolar: uyumsuz2.map(function(s){return s.spool_id || s.spool_no || '(?)';}).slice(0,20),
        uyumsuzAdet: uyumsuz2.length,
      });
    }
  }

  return farklar;
}

function farkPopupGoster(farklar) {
  var body = document.getElementById('farkPopupBody');
  var altEl = document.querySelector('#farkPopup .fp-alt');
  if (altEl) altEl.textContent = tv('dny_fark_alt','Girilen ve yüklenen veriler arasında uyumsuzluk var') + ' (' + farklar.length + ')';
  body.innerHTML = farklar.map(function(f){
    var yukPills = f.yuklenenKodlar.map(function(k){
      var et = f.alan === 'malzeme' ? ARES_NORM.tvMalzeme(k) : ARES_NORM.tvYuzey(k);
      return '<span class="fp-pill fp-pill-y">' + esc(et) + '</span>';
    }).join('');
    var spoolListe = f.uyumsuzSpoolNolar.length
      ? esc(f.uyumsuzSpoolNolar.join(' · ')) + (f.uyumsuzAdet > f.uyumsuzSpoolNolar.length ? ' +' + (f.uyumsuzAdet - f.uyumsuzSpoolNolar.length) : '')
      : '';
    return '' +
      '<div class="fp-kart">' +
        '<div class="fp-kart-head">' +
          '<div class="fp-kart-alan">' + esc(f.alanEtiket) + '</div>' +
          '<div class="fp-kart-sayi">' + f.uyumsuzAdet + ' ' + tv('cmn_spool','Spool').toLowerCase() + '</div>' +
        '</div>' +
        '<div class="fp-kart-diff">' +
          '<div class="fp-kart-col">' +
            '<div class="fp-kart-lbl">' + tv('dny_fark_beyan','Beyan') + '</div>' +
            '<span class="fp-pill fp-pill-b">' + esc(f.beyanEtiket) + '</span>' +
          '</div>' +
          '<div class="fp-ok">→</div>' +
          '<div class="fp-kart-col">' +
            '<div class="fp-kart-lbl">' + tv('dny_fark_yuklenen','Yüklenen') + '</div>' +
            yukPills +
          '</div>' +
        '</div>' +
        (spoolListe ? '<div class="fp-spool-liste">' + spoolListe + '</div>' : '') +
      '</div>';
  }).join('');
  document.getElementById('farkPopup').classList.add('show');
}

function farkPopupKapat() {
  document.getElementById('farkPopup').classList.remove('show');
}

var _farkResolver = null;

function farkIptal() {
  if (confirm(tv('dny_fark_iptal_confirm','Devre oluşturmayı iptal et?'))) {
    geriDon();
  }
}

function farkDuzelt() {
  farkPopupKapat();
  var btn = document.getElementById('btnKaydet');
  if (btn) { btn.disabled = false; btn.textContent = '💾 Kaydet'; }
  var r = _farkResolver; _farkResolver = null; if (r) r(false);
}

function farkDevam() {
  farkPopupKapat();
  var r = _farkResolver; _farkResolver = null; if (r) r(true);
}

function farkKararAl() {
  var farklar = farkTespit();
  if (!farklar.length) return Promise.resolve(true);
  return new Promise(function(resolve){
    _farkResolver = resolve;
    farkPopupGoster(farklar);
  });
}

function formDoldur(d) {
  document.getElementById('fTersane').value  = d.tersane  || '';
  document.getElementById('fProje').value    = d.gemi     || d.proje_no || '';
  document.getElementById('fDevreAdi').value = d.devre_no || d.ad || '';
  document.getElementById('fZone').value     = d.zone     || '';
  document.getElementById('fIsEmri').value   = d.is_emri_no || '';
  document.getElementById('fNot').value      = d.not_     || '';

  if (d.termin_tarihi) {
    document.getElementById('fTermin').value = d.termin_tarihi.substring(0, 10);
  }

  // Malzeme seç — ARES_NORM hem kod hem legacy Türkçe'yi doğru kod'a çevirir
  var malzKod = (typeof ARES_NORM!=='undefined') ? ARES_NORM.malzemeKod(d.malzeme) : '';
  var malzRadioId = { karbon:'mKarbon', paslanmaz:'mPaslanmaz', bakir:'mBakir',
                      alum:'mAlum', diger:'mDiger' }[malzKod];
  if (malzRadioId) {
    var elM = document.getElementById(malzRadioId);
    if (elM) elM.checked = true;
  }

  // Yüzey seç
  var yuzKod = (typeof ARES_NORM!=='undefined') ? ARES_NORM.yuzeyKod(d.yuzey) : '';
  var yuzRadioId = { asit:'yAsit', galvaniz:'yGalvaniz', siyah:'ySiyah',
                     boyali:'yBoyali', diger:'yDiger' }[yuzKod];
  if (yuzRadioId) {
    var elY = document.getElementById(yuzRadioId);
    if (elY) elY.checked = true;
  }

  // "Diğer" yüzey ise açıklamayı input'a koy + aç
  if (yuzKod === 'diger') {
    var aciklamaEl = document.getElementById('fYuzeyAciklama');
    aciklamaEl.value = d.yuzey_aciklama || '';
    aciklamaEl.style.display = 'block';
  }

  // Mevcut malzeme-yüzey kombinasyonu için sadece disabled/enabled işaretleri uygula
  // (grace period: _formHazir=false iken yasak yüzeyi zorla değiştirmez)
  yuzeyUyumGuncelle();

  document.getElementById('pageSub').textContent = d.devre_no + (d.zone ? ' — ' + d.zone : '');
  validateForm();
  // Form tamamen hazır — artık kullanıcı değişiklikleri kural işletir
  _formHazir = true;
}

async function kaydet() {
  var btn = document.getElementById('btnKaydet');
  btn.disabled = true;

  // 5. oturum: Fark tespit popup — form beyanı ↔ DB'deki spool'lar
  var devam = await farkKararAl();
  if (!devam) {
    // Düzelt seçildi → buton zaten enable edildi, geri dön
    return;
  }

  btn.textContent = '⏳ Kaydediliyor...';

  try {
    var supa = ARES.supabase();
    if (!supa) throw new Error('Bağlantı yok');

    var malzeme = (document.querySelector('input[name="malzeme"]:checked') || {}).value || null;
    var yuzey   = (document.querySelector('input[name="yuzey"]:checked')   || {}).value || null;
    var yuzeyAciklama = (yuzey === 'diger') ? (document.getElementById('fYuzeyAciklama').value || '').trim() || null : null;
    var termin  = document.getElementById('fTermin').value || null;

    var guncelleme = {
      ad:             document.getElementById('fDevreAdi').value.trim(),
      devre_no:       document.getElementById('fDevreAdi').value.trim(),
      zone:           document.getElementById('fZone').value.trim(),
      termin_tarihi:  termin || null,
      not_:           document.getElementById('fNot').value.trim() || null,
      malzeme:        malzeme,
      yuzey:          yuzey,
      yuzey_aciklama: yuzeyAciklama,
      guncelleme:     new Date().toISOString(),
    };

    var res = await supa.from('devreler')
      .update(guncelleme)
      .eq('id', _devreId)
      .eq('tenant_id', ARES.tenantId());

    if (res.error) throw new Error(res.error.message);

    await ARES.logEkle('DEVRE_GUNCELLE', guncelleme.devre_no + ' güncellendi', 'devreler', _devreId, {});

    toast('✅ Devre güncellendi', 'ok');
    setTimeout(function() { geriDon(); }, 1000);

  } catch(e) {
    console.error('[ARES] Kaydet hatası:', e);
    toast('⚠ ' + e.message, 'er');
    btn.disabled = false;
    btn.textContent = '💾 Kaydet';
  }
}

// ── BAŞLATMA ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  (async function() {
    try {
      var _bekle = 0;
      while (_bekle < 80) {
        if (typeof ARES === 'undefined') { await new Promise(function(r){ setTimeout(r,100); }); _bekle++; continue; }
        var _supa = ARES.supabase();
        if (_supa) {
          var _ses = await _supa.auth.getSession();
          if (_ses.data && _ses.data.session) { await ARES.oturumKontrol(); break; }
          if (_bekle > 20) { location.href = 'giris.html'; return; }
        }
        await new Promise(function(r){ setTimeout(r,100); });
        _bekle++;
      }

      // URL'den devre ID al
      var params = new URLSearchParams(window.location.search);
      _devreId = params.get('id') || localStorage.getItem('ares_aktif_devre_id');

      if (!_devreId) {
        toast('Devre ID bulunamadı', 'er');
        setTimeout(function(){ window.location.href = 'devreler.html'; }, 1500);
        return;
      }

      // Devre bilgilerini çek
      var supa = ARES.supabase();
      var res = await supa.from('devreler')
        .select('*, projeler(proje_no, gemi_adi, tersaneler(ad,kisa_ad))')
        .eq('id', _devreId)
        .eq('tenant_id', ARES.tenantId())
        .single();

      if (res.error || !res.data) {
        toast('Devre bulunamadı', 'er');
        setTimeout(function(){ window.location.href = 'devreler.html'; }, 1500);
        return;
      }

      var d = res.data;
      var prj = d.projeler || {};
      var trs = prj.tersaneler || {};

      // Devre altındaki spool'ları çek — farkTespit için gerekli
      try {
        var spRes = await supa.from('spooller')
          .select('id, spool_id, spool_no, malzeme, yuzey')
          .eq('devre_id', _devreId)
          .eq('tenant_id', ARES.tenantId());
        if (!spRes.error && spRes.data) _devreSpools = spRes.data;
      } catch(spE) {
        console.warn('[ARES] Spool çekme:', spE);
      }

      _devre = {
        devre_no:       d.devre_no   || '',
        ad:             d.ad         || '',
        zone:           d.zone       || '',
        is_emri_no:     d.is_emri_no || '',
        termin_tarihi:  d.termin_tarihi || '',
        not_:           d.not_       || '',
        malzeme:        d.malzeme    || '',
        yuzey:          d.yuzey      || '',
        yuzey_aciklama: d.yuzey_aciklama || '',
        tersane:        trs.kisa_ad || trs.ad || '',
        gemi:           prj.gemi_adi || '',
        proje_no:       prj.proje_no || '',
      };

      // localStorage'daki aktif devre ile breadcrumb için
      localStorage.setItem('ares_aktif_devre_id', _devreId);

      formDoldur(_devre);

    } catch(e) {
      console.error('[ARES]', e);
      toast('Hata: ' + e.message, 'er');
    } finally {
      document.documentElement.style.visibility = '';
    }
  })();
});
</script>
