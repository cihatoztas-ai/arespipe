<!DOCTYPE html>
<html lang="tr" data-theme="light-anthracite">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Giriş | AresPipe</title>
<script>(function(){
  var t=localStorage.getItem('ares_theme')||'light-anthracite';
  var l=localStorage.getItem('ares_lang')||'tr';
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.setAttribute('lang',l);
  document.documentElement.style.visibility='hidden';
})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;}

[data-theme=dark]{
  --bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;
  --tx:#e6ecf4;--txm:#94a3b8;--txd:#6b7a90;
}
[data-theme=light-anthracite]{
  --bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;
  --tx:#141e2b;--txm:#3a4f63;--txd:#637080;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{height:100%;}

body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--tx);
  min-height:100vh;
  min-height:-webkit-fill-available;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* ── Üst alan ── */
.ust{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 24px 24px;
  padding-top:max(40px,env(safe-area-inset-top));
}

.logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:52px;
  font-weight:900;
  color:var(--ac);
  letter-spacing:-2px;
  line-height:1;
  margin-bottom:6px;
}

.logo-alt{
  font-size:13px;
  font-weight:600;
  color:var(--txd);
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:48px;
}

/* ── Form ── */
.form{width:100%;max-width:380px;}

.form-grup{margin-bottom:14px;}

.form-etiket{
  display:block;
  font-size:11px;
  font-weight:700;
  color:var(--txd);
  text-transform:uppercase;
  letter-spacing:.8px;
  margin-bottom:7px;
}

.form-input-wrap{position:relative;}

.form-input{
  width:100%;
  height:52px;
  padding:0 46px 0 16px;
  border-radius:14px;
  border:1.5px solid var(--bor);
  background:var(--sur);
  color:var(--tx);
  font-size:16px;
  font-family:'Barlow',sans-serif;
  outline:none;
  transition:border-color .15s;
  -webkit-appearance:none;
}
.form-input:focus{border-color:var(--ac);}
.form-input::placeholder{color:var(--txd);}

.goz-btn{
  position:absolute;
  right:14px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;
  color:var(--txd);cursor:pointer;
  padding:4px;
  display:flex;align-items:center;justify-content:center;
}

.giris-btn{
  width:100%;
  height:56px;
  border-radius:16px;
  background:var(--ac);
  border:none;
  color:#fff;
  font-size:17px;
  font-weight:700;
  font-family:'Barlow',sans-serif;
  cursor:pointer;
  margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s, transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.giris-btn:active{transform:scale(0.98);opacity:.9;}
.giris-btn:disabled{opacity:.5;cursor:not-allowed;}

/* Spinner */
.spinner{
  width:20px;height:20px;
  border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Hata */
.hata-kutu{
  display:none;
  margin-top:14px;
  padding:12px 14px;
  background:rgba(229,62,62,.1);
  border:1px solid rgba(229,62,62,.3);
  border-radius:12px;
  font-size:14px;
  color:var(--re);
  line-height:1.5;
}
.hata-kutu.goster{display:block;}

/* ── Alt alan ── */
.alt{
  padding:16px 24px;
  padding-bottom:max(24px,env(safe-area-inset-bottom));
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* Tema toggle */
.tema-toggle{
  display:flex;
  background:var(--sur2);
  border:1px solid var(--bor);
  border-radius:8px;
  overflow:hidden;
}
.tema-btn{
  padding:6px 10px;
  font-size:16px;
  background:none;border:none;cursor:pointer;
  color:var(--txd);transition:all .15s;
}
.tema-btn.aktif{background:var(--ac);color:#fff;}

/* Dil toggle */
.dil-toggle{
  display:flex;
  background:var(--sur2);
  border:1px solid var(--bor);
  border-radius:8px;
  overflow:hidden;
}
.dil-btn{
  padding:6px 10px;
  font-size:12px;font-weight:700;
  background:none;border:none;cursor:pointer;
  color:var(--txd);transition:all .15s;
  font-family:'Barlow',sans-serif;
}
.dil-btn.aktif{background:var(--ac);color:#fff;}
</style>
</head>
<body>

<div class="ust">
  <div class="logo">AP</div>
  <div class="logo-alt">AresPipe</div>

  <div class="form">
    <!-- Email -->
    <div class="form-grup">
      <label class="form-etiket" data-i18n="giris_eposta_lbl">E-posta</label>
      <div class="form-input-wrap">
        <input class="form-input" id="emailInp" type="email"
          placeholder="ornek@firma.com"
          autocomplete="email" inputmode="email"
          onkeydown="if(event.key==='Enter')document.getElementById('sifreInp').focus()">
      </div>
    </div>

    <!-- Şifre -->
    <div class="form-grup">
      <label class="form-etiket" data-i18n="giris_sifre_lbl">Şifre</label>
      <div class="form-input-wrap">
        <input class="form-input" id="sifreInp" type="password"
          placeholder="••••••••"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter')girisYap()">
        <button class="goz-btn" id="gozBtn" onclick="sifreGoster()" type="button">
          <svg id="gozIkon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Buton -->
    <button class="giris-btn" id="girisBtn" onclick="girisYap()">
      <div class="spinner" id="spinner"></div>
      <span id="girisbtnYazi" data-i18n="giris_btn">Giriş Yap</span>
    </button>

    <!-- Hata -->
    <div class="hata-kutu" id="hataKutu"></div>
  </div>
</div>

<!-- Alt: tema + dil -->
<div class="alt">
  <div class="tema-toggle" id="temaToggle">
    <button class="tema-btn" data-tema="light-anthracite" onclick="temaDegistir('light-anthracite')">☀️</button>
    <button class="tema-btn" data-tema="dark" onclick="temaDegistir('dark')">🌙</button>
  </div>
  <div class="dil-toggle" id="dilToggle">
    <button class="dil-btn" data-dil="tr" onclick="dilDegistir('tr')">TR</button>
    <button class="dil-btn" data-dil="en" onclick="dilDegistir('en')">EN</button>
    <button class="dil-btn" data-dil="ar" onclick="dilDegistir('ar')">AR</button>
  </div>
</div>

<script src="../ares-store.js"></script>
<script src="../ares-lang.js"></script>
<script>
'use strict';

// ── Tema & Dil ────────────────────────────────────────────────────
function temaDegistir(tema) {
  document.documentElement.setAttribute('data-theme', tema);
  localStorage.setItem('ares_theme', tema);
  document.querySelectorAll('.tema-btn').forEach(function(b) {
    b.classList.toggle('aktif', b.dataset.tema === tema);
  });
}

function dilDegistir(dil) {
  document.documentElement.setAttribute('lang', dil);
  document.documentElement.setAttribute('dir', dil === 'ar' ? 'rtl' : 'ltr');
  localStorage.setItem('ares_lang', dil);
  document.querySelectorAll('.dil-btn').forEach(function(b) {
    b.classList.toggle('aktif', b.dataset.dil === dil);
  });
  if (typeof window._applyI18n === 'function') window._applyI18n();
}

function toggleleriGuncelle() {
  var tema = localStorage.getItem('ares_theme') || 'light-anthracite';
  var dil  = localStorage.getItem('ares_lang')  || 'tr';
  document.querySelectorAll('.tema-btn').forEach(function(b) {
    b.classList.toggle('aktif', b.dataset.tema === tema);
  });
  document.querySelectorAll('.dil-btn').forEach(function(b) {
    b.classList.toggle('aktif', b.dataset.dil === dil);
  });
}

// ── Şifre göster/gizle ────────────────────────────────────────────
var _sifreGoster = false;
function sifreGoster() {
  _sifreGoster = !_sifreGoster;
  document.getElementById('sifreInp').type = _sifreGoster ? 'text' : 'password';
  document.getElementById('gozIkon').style.opacity = _sifreGoster ? '1' : '.5';
}

// ── Hata ──────────────────────────────────────────────────────────
function hataGoster(mesaj) {
  var k = document.getElementById('hataKutu');
  k.textContent = mesaj;
  k.classList.add('goster');
}
function hataSil() {
  document.getElementById('hataKutu').classList.remove('goster');
}

// ── Giriş ─────────────────────────────────────────────────────────
async function girisYap() {
  hataSil();
  var email = (document.getElementById('emailInp').value || '').trim();
  var sifre = (document.getElementById('sifreInp').value || '').trim();

  if (!email) { hataGoster(tv('giris_hata_bos_eposta', 'E-posta boş bırakılamaz.')); return; }
  if (!sifre) { hataGoster(tv('giris_hata_bos_sifre', 'Şifre boş bırakılamaz.')); return; }

  // Yükleniyor
  var btn = document.getElementById('girisBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('girisbtnYazi').style.display = 'none';

  try {
    var sonuc = await ARES.girisYap(email, sifre);

    if (sonuc.hata) {
      var ham = sonuc.hata, mesaj;
      if      (ham.includes('Invalid login'))       mesaj = tv('giris_hata_invalid', 'E-posta veya şifre hatalı.');
      else if (ham.includes('Email not confirmed')) mesaj = tv('giris_hata_email',   'E-posta adresiniz doğrulanmamış.');
      else if (ham.includes('Too many requests'))   mesaj = tv('giris_hata_limit',   'Çok fazla deneme. Lütfen bekleyin.');
      else if (ham.includes('bağlı değil'))         mesaj = tv('giris_hata_sunucu',  'Sunucuya bağlanılamadı…');
      else                                          mesaj = ham;
      hataGoster(mesaj);
      btn.disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('girisbtnYazi').style.display = '';
      return;
    }

    // Başarılı
    setTimeout(function() { location.href = 'index.html'; }, 400);

  } catch(e) {
    hataGoster(tv('giris_hata_genel', 'Beklenmeyen hata: ') + e.message);
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('girisbtnYazi').style.display = '';
  }
}

// ── Başlatma ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  toggleleriGuncelle();

  // Zaten giriş yapılmışsa direkt geç
  try {
    var _b = 0;
    while (_b < 30) {
      if (typeof ARES !== 'undefined') {
        var _s = ARES.supabase();
        if (_s) {
          var _ses = await _s.auth.getSession();
          if (_ses.data && _ses.data.session) {
            if (typeof ARES.oturumKontrol === 'function') await ARES.oturumKontrol();
            location.href = 'index.html';
            return;
          }
          break; // Supabase hazır, oturum yok → giriş göster
        }
      }
      await new Promise(function(r) { setTimeout(r, 100); });
      _b++;
    }
  } catch(e) {}

  document.documentElement.style.visibility = '';
  document.getElementById('emailInp').focus();
});
</script>
</body>
</html>
