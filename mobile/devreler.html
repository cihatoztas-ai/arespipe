<!DOCTYPE html>
<html lang="tr" data-theme="light-anthracite">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Aktif Devreler — AresPipe</title>
<script>(function(){

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="ares-mobile.css">
<style>
/* ── Stat kartları (sticky) ── */
.stat-wrap {
  position: sticky;
  top: 52px;
  z-index: 20;
  background: var(--bg);
  padding: 9px 12px 8px;
  border-bottom: 1px solid var(--bor);
}
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.stat-kart {
  background: var(--sur);
  border: 1px solid var(--bor);
  border-radius: 11px;
  padding: 9px 11px;
  display: flex;
  align-items: center;
  gap: 9px;
  border-left-width: 3px;
}
.stat-ikon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.stat-ikon svg { width: 13px; height: 13px; }
.stat-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--txd);
  letter-spacing: .4px;
  text-transform: uppercase;
  margin-bottom: 1px;
}
.stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--tx);
  line-height: 1;
}
.stat-val-sm {
  font-size: 15px;
}
.stat-val-unit {
  font-size: 10px;
  font-weight: 500;
  color: var(--txd);
}
.stat-prog {
  width: 52px; height: 3px;
  background: var(--bor);
  border-radius: 99px;
  margin-top: 4px;
  overflow: hidden;
}
.stat-prog-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--warn), var(--gr));
}

/* ── Devre listesi ── */
.devre-liste {
  padding: 9px 12px 100px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Devre kartı ── */
.devre-kart {
  background: var(--sur);
  border: 1px solid var(--bor);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  align-items: stretch;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s;
}
.devre-kart:active { opacity: .78; }

.dk-sol { width: 4px; flex-shrink: 0; }
.dk-ic {
  flex: 1;
  padding: 9px 11px;
  min-width: 0;
}
.dk-sag { width: 4px; flex-shrink: 0; }

.dk-ust {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 3px;
}
.dk-meta { min-width: 0; flex: 1; }
.dk-is-emri {
  font-size: 10px;
  font-weight: 700;
  color: var(--txd);
  letter-spacing: .5px;
  margin-bottom: 2px;
}
.dk-is-emri.durdu { color: var(--re); }
.dk-ad {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--tx);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dk-sub {
  font-size: 10px;
  color: var(--txd);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dk-prog-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  flex-shrink: 0;
}
.dk-pct {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 800;
  line-height: 1;
}
.dk-prog-bar {
  width: 36px; height: 3px;
  background: var(--bor);
  border-radius: 99px;
  overflow: hidden;
}
.dk-prog-fill { height: 100%; border-radius: 99px; }

.dk-alt {
  display: flex;
  align-items: center;
  gap: 0;
  border-top: 1px solid var(--bor);
  padding-top: 6px;
  margin-top: 4px;
}
.dk-alt-metin {
  font-size: 11px;
  color: var(--txm);
  font-weight: 600;
}
.dk-alt-sep {
  font-size: 11px;
  color: var(--bor);
  margin: 0 5px;
}
.dk-alist {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 3px;
}
.dk-alist-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dk-alist-text { font-size: 10px; }

/* ── İskelet ── */
.iskelet-wrap {
  padding: 9px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.iskelet-kart {
  background: var(--sur);
  border: 1px solid var(--bor);
  border-radius: 12px;
  padding: 12px 13px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* ── Filtre overlay ── */
.filtre-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.filtre-overlay.open {
  opacity: 1;
  pointer-events: all;
}

/* ── Filtre panel ── */
.filtre-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 82%;
  max-width: 340px;
  background: var(--sur);
  z-index: 101;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  border-left: 1px solid var(--bor);
}
.filtre-panel.open { transform: translateX(0); }

.filtre-panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--bor);
  flex-shrink: 0;
}
.filtre-baslik {
  font-size: 15px;
  font-weight: 600;
  color: var(--tx);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: .2px;
}
.filtre-temizle {
  font-size: 12px;
  color: var(--ac);
  font-weight: 600;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  font-family: 'Barlow', sans-serif;
}
.filtre-kapat {
  width: 28px; height: 28px;
  background: var(--sur2);
  border: 1px solid var(--bor);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--txd);
}

/* Seçili filtreler özeti */
.filtre-secili-wrap {
  margin: 10px 14px;
  background: var(--sur2);
  border: 1px solid var(--bor);
  border-radius: 10px;
  padding: 10px 12px;
  flex-shrink: 0;
}
.filtre-secili-baslik {
  font-size: 9px;
  font-weight: 700;
  color: var(--txd);
  letter-spacing: .6px;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.filtre-secili-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.filtre-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  background: rgba(45,142,255,.1);
  border: 1px solid rgba(45,142,255,.25);
  cursor: pointer;
}
.filtre-chip span { font-size: 11px; color: var(--ac); }
.filtre-chip svg { width: 9px; height: 9px; color: var(--ac); }
.filtre-bos-text {
  font-size: 12px;
  color: var(--txd);
}

/* Akordiyon */
.filtre-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 14px;
}
.akordion {
  border-bottom: 1px solid var(--bor);
}
.akordion-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 2px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.akordion-label {
  font-size: 13px;
  color: var(--txm);
  font-weight: 500;
}
.akordion-label.aktif { color: var(--ac); }
.akordion-badge {
  background: rgba(45,142,255,.15);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  color: var(--ac);
  margin-left: 5px;
  font-weight: 700;
}
.akordion-ok {
  width: 16px; height: 16px;
  color: var(--txd);
  transition: transform .2s;
  flex-shrink: 0;
}
.akordion-ok.acik { transform: rotate(180deg); }
.akordion-icerik {
  display: none;
  padding-bottom: 10px;
  gap: 5px;
  flex-direction: column;
}
.akordion-icerik.acik { display: flex; }

.secim-satir {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 11px;
  background: var(--sur2);
  border: 1px solid var(--bor);
  border-radius: 9px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .12s;
}
.secim-satir.secili {
  border-color: var(--ac);
  background: var(--sur);
}
.secim-sol {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.secim-cizgi {
  width: 3px; height: 15px;
  border-radius: 99px;
  flex-shrink: 0;
}
.secim-text {
  font-size: 13px;
  color: var(--txd);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.secim-satir.secili .secim-text { color: var(--ac); }
.secim-cb {
  width: 18px; height: 18px;
  border: 1.5px solid var(--bor);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .12s;
}
.secim-satir.secili .secim-cb {
  background: var(--ac);
  border-color: var(--ac);
}
.secim-cb svg { width: 10px; height: 10px; display: none; }
.secim-satir.secili .secim-cb svg { display: block; }

/* Uygula butonu */
.filtre-alt {
  padding: 12px 14px 24px;
  border-top: 1px solid var(--bor);
  flex-shrink: 0;
}
.btn-uygula {
  width: 100%;
  padding: 13px;
  border-radius: 11px;
  border: none;
  background: var(--ac);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Barlow', sans-serif;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-uygula:active { opacity: .85; }

/* ── Boş durum ── */
.m-bos {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 10px;
}
.m-bos-ikon { font-size: 36px; }
.m-bos-text { font-size: 14px; color: var(--txd); }
</style>
</head>

<script>
'use strict';

/* ── Durum etiketleri (tv() ile) ── */
function durumEtiket(kod) {
  var map = {
    'imalatta':       'mob_durum_imalatta',
    'kalite_davette': 'mob_durum_kk_davette',
    'sevke_hazir':    'mob_durum_sevke_hazir',
    'baslamadi':      'mob_durum_baslamadi',
    'durduruldu':     'mob_durum_durduruldu',
  };
  var fallbackMap = {
    'imalatta': 'İmalatta', 'kalite_davette': 'KK Davette',
    'sevke_hazir': 'Sevke Hazır', 'baslamadi': 'Başlamadı', 'durduruldu': 'Durduruldu',
  };
  var key = map[kod];
  return key ? tv(key, fallbackMap[kod] || kod) : (kod || '—');
}

var DURUM_RENK = {
  'imalatta':       'var(--ac)',
  'kalite_davette': 'var(--leg)',
  'sevke_hazir':    'var(--gr)',
  'baslamadi':      '#B4B2A9',
  'durduruldu':     'var(--re)',
};

/* ── State ── */
var _tumDevreler  = [];  // ham veri
var _spoolAgg     = {};  // devre_id → { count, agirlik, alistirma }
var _aktifFiltreler = { firma: [], proje: [], malzeme: [], yuzey: [], durum: [] };
var _bekleyenFiltreler = { firma: [], proje: [], malzeme: [], yuzey: [], durum: [] };
var _filtreSec    = {};  // dinamik seçenek listeleri

/* ── Yardımcılar ── */
function solRenk(d) {
  if (d.durdurma_sebebi || (d.durum||'').toLowerCase() === 'durduruldu') return 'var(--re)';
  return DURUM_RENK[(d.durum||'').toLowerCase()] || '#B4B2A9';
}

function sagRenk(devreId) {
  var agg = _spoolAgg[devreId];
  if (!agg) return 'var(--bor)';
  if (agg.alistirma === 'VAR')   return 'var(--gr)';
  if (agg.alistirma === 'KISMI') return 'var(--warn)';
  return 'var(--re)';
}

function alistiramaLabel(devreId) {
  var agg = _spoolAgg[devreId];
  if (!agg) return { renk: 'var(--bor)', text: '—' };
  if (agg.alistirma === 'VAR')   return { renk: 'var(--gr)',   text: tv('mob_alistirma_tam',   'Tam alıştırma') };
  if (agg.alistirma === 'KISMI') return { renk: 'var(--warn)', text: tv('mob_alistirma_kismi', 'Kısmi alıştırma') };
  return { renk: 'var(--re)', text: tv('mob_alistirma_yok', 'Alıştırma yok') };
}

function progRenk(pct) {
  if (pct >= 100) return 'var(--gr)';
  if (pct >= 50)  return 'var(--ac)';
  if (pct > 0)    return 'var(--warn)';
  return 'var(--bor)';
}

function durumGrubu(d) {
  if (d.durdurma_sebebi || (d.durum||'').toLowerCase() === 'durduruldu') return 'durduruldu';
  return (d.durum||'').toLowerCase() || 'baslamadi';
}

/* ── Kart HTML ── */
function kartHtml(d) {
  var pct = d.ilerleme || 0;
  var agg = _spoolAgg[d.id] || {};
  var proje = d.projeler || {};
  var tersaneAd = proje.tersaneler ? proje.tersaneler.ad : '';
  var sub = [tersaneAd, proje.proje_no, d.zone || d.zone_no].filter(Boolean).join(' · ');
  var adText = d.devre_no ? (d.devre_no + (d.ad ? ' — ' + d.ad : '')) : (d.ad || '—');
  var durduruldu = d.durdurma_sebebi || (d.durum||'').toLowerCase() === 'durduruldu';
  var alist = alistiramaLabel(d.id);

  var isEmriHtml = durduruldu
    ? '<div class="dk-is-emri durdu">' + esc(d.is_emri_no || '—') + ' · ⏸ Durduruldu</div>'
    : '<div class="dk-is-emri">' + esc(d.is_emri_no || '—') + '</div>';

  var malzeme = d.malzeme || (agg.malzeme || '');
  var yuzey   = d.yuzey   || (agg.yuzey   || '');

  return '<div class="devre-kart" onclick="devreAc(\'' + d.id + '\')">' +
    '<div class="dk-sol" style="background:' + solRenk(d) + ';"></div>' +
    '<div class="dk-ic">' +
      '<div class="dk-ust">' +
        '<div class="dk-meta">' +
          isEmriHtml +
          '<div class="dk-ad">' + esc(adText) + '</div>' +
          (sub ? '<div class="dk-sub">' + esc(sub) + '</div>' : '') +
        '</div>' +
        '<div class="dk-prog-wrap">' +
          '<div class="dk-pct" style="color:' + progRenk(pct) + ';">' + pct + '%</div>' +
          '<div class="dk-prog-bar"><div class="dk-prog-fill" style="width:' + Math.min(pct,100) + '%;background:' + progRenk(pct) + ';"></div></div>' +
        '</div>' +
      '</div>' +
      '<div class="dk-alt">' +
        (malzeme ? '<span class="dk-alt-metin">' + esc(malzeme) + '</span>' : '') +
        (malzeme && yuzey ? '<span class="dk-alt-sep">|</span>' : '') +
        (yuzey ? '<span class="dk-alt-metin">' + esc(yuzey) + '</span>' : '') +
        (agg.agirlik ? '<span class="dk-alt-sep">|</span><span class="dk-alt-metin">' + Math.round(agg.agirlik) + ' kg</span>' : '') +
        '<div class="dk-alist">' +
          '<div class="dk-alist-dot" style="background:' + alist.renk + ';"></div>' +
          '<span class="dk-alist-text" style="color:' + alist.renk + ';">' + alist.text + '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="dk-sag" style="background:' + sagRenk(d.id) + ';"></div>' +
  '</div>';
}

/* ── Filtreleme ── */
function getFiltered() {
  return _tumDevreler.filter(function(d) {
    var proje = d.projeler || {};
    var tersaneAd = proje.tersaneler ? proje.tersaneler.ad : '';

    if (_aktifFiltreler.firma.length && !_aktifFiltreler.firma.includes(tersaneAd)) return false;
    if (_aktifFiltreler.proje.length && !_aktifFiltreler.proje.includes(proje.proje_no)) return false;
    if (_aktifFiltreler.malzeme.length && !_aktifFiltreler.malzeme.includes(d.malzeme)) return false;
    if (_aktifFiltreler.yuzey.length && !_aktifFiltreler.yuzey.includes(d.yuzey)) return false;
    if (_aktifFiltreler.durum.length && !_aktifFiltreler.durum.includes(durumGrubu(d))) return false;
    return true;
  });
}

/* ── Stat güncelle ── */
function statGuncelle(liste) {
  var devreCount = liste.length;
  var spoolCount = 0;
  var toplamAgirlik = 0;
  var toplamIlerleme = 0;
  var ilerlemeSayisi = 0;

  liste.forEach(function(d) {
    var agg = _spoolAgg[d.id] || {};
    spoolCount     += agg.count   || 0;
    toplamAgirlik  += agg.agirlik || 0;
    if (agg.count > 0) {
      toplamIlerleme += Math.round((agg.ilerlemeToplam || 0) / agg.count);
      ilerlemeSayisi++;
    }
  });

  var ortIlerleme = ilerlemeSayisi > 0 ? Math.round(toplamIlerleme / ilerlemeSayisi) : 0;
  var agirlikText = toplamAgirlik >= 1000
    ? (toplamAgirlik / 1000).toFixed(1) + ' t'
    : Math.round(toplamAgirlik) + ' kg';

  var T = function(id) { return document.getElementById(id); };
  T('stDevre').textContent     = devreCount;
  T('stSpool').textContent     = spoolCount;
  T('stAgirlik').textContent   = agirlikText;
  T('stIlerleme').textContent  = '%' + ortIlerleme;
  T('stIlerlemebar').style.width = ortIlerleme + '%';
}

/* ── Render ── */
function render() {
  var liste = getFiltered();
  var el = document.getElementById('devreListe');

  statGuncelle(liste);

  if (!liste.length) {
    el.innerHTML = '<div class="m-bos"><div class="m-bos-ikon">🔗</div><div class="m-bos-text">' + tv('mob_bulunamadi','Bulunamadı') + '</div></div>';
    return;
  }

  el.innerHTML = '<div class="devre-liste">' + liste.map(kartHtml).join('') + '</div>';
}

/* ── Navigasyon ── */
function devreAc(id) {
  location.href = 'devre_detay.html?id=' + id;
}

/* ── Filtre panel ── */
function filtreAc() {
  // Bekleyen filtreleri aktif ile senkronize et
  _bekleyenFiltreler = {
    firma:    _aktifFiltreler.firma.slice(),
    proje:    _aktifFiltreler.proje.slice(),
    malzeme:  _aktifFiltreler.malzeme.slice(),
    yuzey:    _aktifFiltreler.yuzey.slice(),
    durum:    _aktifFiltreler.durum.slice(),
  };
  filtrePanelRender();
  document.getElementById('filtreOverlay').classList.add('open');
  document.getElementById('filtrePanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function filtreKapat() {
  document.getElementById('filtreOverlay').classList.remove('open');
  document.getElementById('filtrePanel').classList.remove('open');
  document.body.style.overflow = '';
}

function filtreUygula() {
  _aktifFiltreler = {
    firma:    _bekleyenFiltreler.firma.slice(),
    proje:    _bekleyenFiltreler.proje.slice(),
    malzeme:  _bekleyenFiltreler.malzeme.slice(),
    yuzey:    _bekleyenFiltreler.yuzey.slice(),
    durum:    _bekleyenFiltreler.durum.slice(),
  };
  filtreDotGuncelle();
  render();
  filtreKapat();
}

function filtreTumunuTemizle() {
  _bekleyenFiltreler = { firma: [], proje: [], malzeme: [], yuzey: [], durum: [] };
  filtrePanelRender();
}

function filtreDotGuncelle() {
  var toplam = _aktifFiltreler.firma.length + _aktifFiltreler.proje.length +
               _aktifFiltreler.malzeme.length + _aktifFiltreler.yuzey.length +
               _aktifFiltreler.durum.length;
  document.getElementById('filtreDot').style.display = toplam > 0 ? 'block' : 'none';
}

/* ── Seçim toggle ── */
function secimToggle(tip, deger) {
  var idx = _bekleyenFiltreler[tip].indexOf(deger);
  if (idx >= 0) {
    _bekleyenFiltreler[tip].splice(idx, 1);
  } else {
    _bekleyenFiltreler[tip].push(deger);
  }
  filtrePanelRender();
}

/* ── Chip'ten filtre kaldır ── */
function chipKaldir(tip, deger) {
  var idx = _bekleyenFiltreler[tip].indexOf(deger);
  if (idx >= 0) _bekleyenFiltreler[tip].splice(idx, 1);
  filtrePanelRender();
}

/* ── Akordiyon toggle ── */
function akordionToggle(key) {
  var icerik = document.getElementById('ai-' + key);
  var ok = document.getElementById('ao-' + key);
  if (!icerik) return;
  var acik = icerik.classList.contains('acik');
  icerik.classList.toggle('acik', !acik);
  if (ok) ok.classList.toggle('acik', !acik);
}

/* ── Filtre panel render ── */
function filtrePanelRender() {
  var toplam = Object.values(_bekleyenFiltreler).reduce(function(s, arr) { return s + arr.length; }, 0);

  // Uygula butonu
  var btnUygula = document.getElementById('btnUygula');
  if (btnUygula) btnUygula.textContent = toplam > 0
    ? tv('mob_filtre_uygula','Uygula') + ' (' + toplam + ')'
    : tv('mob_filtre_uygula','Uygula');

  // Seçili chip'ler
  var chipsEl = document.getElementById('seciliChipler');
  if (chipsEl) {
    var tipEtiket = { firma: 'Firma', proje: 'Proje', malzeme: 'Malzeme', yuzey: 'Yüzey', durum: 'Durum' };
    var html = '';
    Object.keys(_bekleyenFiltreler).forEach(function(tip) {
      _bekleyenFiltreler[tip].forEach(function(deger) {
        html += '<div class="filtre-chip" onclick="chipKaldir(\'' + tip + '\',\'' + esc(deger) + '\')">' +
          '<span>' + esc(deger) + '</span>' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</div>';
      });
    });
    chipsEl.innerHTML = html || '<span class="filtre-bos-text">' + tv('mob_filtre_bos', 'Henüz filtre seçilmedi') + '</span>';
  }

  // Akordiyon başlıkları — renk + sayaç
  var tiplerMap = {
    firma:   { labelEl: 'al-firma',   icerikEl: 'ai-firma' },
    proje:   { labelEl: 'al-proje',   icerikEl: 'ai-proje' },
    malzeme: { labelEl: 'al-malzeme', icerikEl: 'ai-malzeme' },
    yuzey:   { labelEl: 'al-yuzey',   icerikEl: 'ai-yuzey' },
    durum:   { labelEl: 'al-durum',   icerikEl: 'ai-durum' },
  };

  var tipBaslik = {
    firma:   tv('mob_filtre_firmalar',   'Firmalar'),
    proje:   tv('mob_filtre_projeler',   'Projeler'),
    malzeme: tv('mob_filtre_malzemeler', 'Malzemeler'),
    yuzey:   tv('mob_filtre_yuzeyler',   'Yüzeyler'),
    durum:   tv('mob_filtre_durumlar',   'Durumlar'),
  };

  Object.keys(tiplerMap).forEach(function(tip) {
    var seciliSayi = _bekleyenFiltreler[tip].length;
    var labelEl = document.getElementById(tiplerMap[tip].labelEl);
    if (labelEl) {
      labelEl.className = 'akordion-label' + (seciliSayi > 0 ? ' aktif' : '');
      var badge = seciliSayi > 0 ? '<span class="akordion-badge">' + seciliSayi + '</span>' : '';
      labelEl.innerHTML = tipBaslik[tip] + badge;
    }

    // Seçenek listesi
    var icerikEl = document.getElementById(tiplerMap[tip].icerikEl);
    if (!icerikEl) return;
    var secenekler = _filtreSec[tip] || [];

    icerikEl.innerHTML = secenekler.map(function(item) {
      var secili = _bekleyenFiltreler[tip].includes(item.deger);
      var cizgiRenk = tip === 'durum' ? (DURUM_RENK[item.deger] || 'var(--bor)') : 'var(--bor)';
      return '<div class="secim-satir' + (secili ? ' secili' : '') + '" onclick="secimToggle(\'' + tip + '\',\'' + esc(item.deger) + '\')">' +
        '<div class="secim-sol">' +
          '<div class="secim-cizgi" style="background:' + cizgiRenk + ';"></div>' +
          '<span class="secim-text">' + esc(item.etiket) + '</span>' +
        '</div>' +
        '<div class="secim-cb">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' +
        '</div>' +
      '</div>';
    }).join('');
  });
}

/* ── Filtre seçeneklerini türet ── */
function filtreSecenekleriniOlustur() {
  var firmalar  = {}, projeler = {}, malzemeler = {}, yuzeyler = {};

  _tumDevreler.forEach(function(d) {
    var proje = d.projeler || {};
    var tersaneAd = proje.tersaneler ? proje.tersaneler.ad : '';
    if (tersaneAd) firmalar[tersaneAd] = true;
    if (proje.proje_no) projeler[proje.proje_no] = true;
    if (d.malzeme) malzemeler[d.malzeme] = true;
    if (d.yuzey) yuzeyler[d.yuzey] = true;
  });

  _filtreSec.firma   = Object.keys(firmalar).sort().map(function(v) { return { deger: v, etiket: v }; });
  _filtreSec.proje   = Object.keys(projeler).sort().map(function(v) { return { deger: v, etiket: v }; });
  _filtreSec.malzeme = Object.keys(malzemeler).sort().map(function(v) { return { deger: v, etiket: v }; });
  _filtreSec.yuzey   = Object.keys(yuzeyler).sort().map(function(v) { return { deger: v, etiket: v }; });
  _filtreSec.durum   = [
    { deger: 'imalatta',       etiket: tv('mob_durum_imalatta',    'İmalatta') },
    { deger: 'kalite_davette', etiket: tv('mob_durum_kk_davette',  'KK Davette') },
    { deger: 'sevke_hazir',    etiket: tv('mob_durum_sevke_hazir', 'Sevke Hazır') },
    { deger: 'baslamadi',      etiket: tv('mob_durum_baslamadi',   'Başlamadı') },
    { deger: 'durduruldu',     etiket: tv('mob_durum_durduruldu',  'Durduruldu') },
  ];
}

/* ── İskelet ── */
function iskeletGoster() {
  var html = '';
  for (var i = 0; i < 6; i++) {
    html += '<div class="iskelet-kart">' +
      '<div class="m-skeleton" style="width:70px;height:10px;"></div>' +
      '<div class="m-skeleton" style="width:60%;height:15px;"></div>' +
      '<div class="m-skeleton" style="width:40%;height:10px;"></div>' +
      '<div class="m-skeleton" style="width:80%;height:10px;margin-top:4px;"></div>' +
      '</div>';
  }
  document.getElementById('devreListe').innerHTML = '<div class="iskelet-wrap">' + html + '</div>';
}

/* ── Veri yükleme ── */
async function yukle() {
  iskeletGoster();
  var supa = mSupabase();
  var tid  = mTenantId();
  if (!supa || !tid) {
    document.getElementById('devreListe').innerHTML = '<div class="m-bos"><div class="m-bos-ikon">⚠️</div><div class="m-bos-text">' + tv('mob_baglanti_hatasi','Bağlantı kurulamadı') + '</div></div>';
    return;
  }

  try {
    // 1) Devreler + proje + tersane
    var { data: devreler, error: dvErr } = await supa
      .from('devreler')
      .select('id, is_emri_no, devre_no, ad, zone, zone_no, durum, durdurma_sebebi, ilerleme, agirlik, malzeme, yuzey, projeler(proje_no, gemi_adi, tersaneler(ad))')
      .eq('tenant_id', tid)
      .or('silindi.is.null,silindi.eq.false')
      .order('guncelleme', { ascending: false });

    if (dvErr) throw dvErr;
    _tumDevreler = devreler || [];

    if (!_tumDevreler.length) {
      document.getElementById('devreListe').innerHTML = '<div class="m-bos"><div class="m-bos-ikon">🔗</div><div class="m-bos-text">Henüz devre yok</div></div>';
      statGuncelle([]);
      return;
    }

    // 2) Spool aggregate — tüm devreler için tek sorguda
    var devreIds = _tumDevreler.map(function(d) { return d.id; });
    if (devreIds.length > 0) {
      var { data: spooller } = await supa
        .from('spooller')
        .select('devre_id, agirlik, alistirma, aktif_basamak')
        .in('devre_id', devreIds)
        .or('silindi.is.null,silindi.eq.false');

      // Client-side aggregate
      _spoolAgg = {};

      // Aşama → ilerleme yüzdesi (web ile aynı mantık)
      var ASAMA_PCT = {
        'bekliyor': 0, 'imalat': 17, 'kaynak': 33,
        'on_kontrol': 50, 'kk': 67, 'sevkiyat': 83, 'tamamlandi': 100
      };

      (spooller || []).forEach(function(s) {
        if (!_spoolAgg[s.devre_id]) {
          _spoolAgg[s.devre_id] = { count: 0, agirlik: 0, ilerlemeToplam: 0, varCount: 0, kismiCount: 0, yokCount: 0 };
        }
        var agg = _spoolAgg[s.devre_id];
        agg.count++;
        agg.agirlik += parseFloat(s.agirlik || 0);
        agg.ilerlemeToplam += ASAMA_PCT[(s.aktif_basamak || 'bekliyor').toLowerCase()] || 0;
        if (s.alistirma === 'VAR')   agg.varCount++;
        else if (s.alistirma === 'KISMI') agg.kismiCount++;
        else agg.yokCount++;
      });
      });

      // Alıştırma durumu özeti
      Object.keys(_spoolAgg).forEach(function(id) {
        var agg = _spoolAgg[id];
        if (agg.count > 0 && agg.varCount === agg.count) {
          agg.alistirma = 'VAR';
        } else if (agg.varCount > 0 || agg.kismiCount > 0) {
          agg.alistirma = 'KISMI';
        } else {
          agg.alistirma = 'YOK';
        }
      });
    } // end if devreIds.length > 0

    // 3) Filtre seçeneklerini oluştur ve render et
    filtreSecenekleriniOlustur();
    render();

  } catch(e) {
    console.warn('[Devreler]', e);
    mToast('Devreler yüklenemedi', 'error');
    document.getElementById('devreListe').innerHTML = '<div class="m-bos"><div class="m-bos-ikon">⚠️</div><div class="m-bos-text">' + tv('mob_yuklenemiyor','Yükleme hatası') + '</div></div>';
  }
}

/* ── Başlatma ── */
document.addEventListener('DOMContentLoaded', async function() {
  try {
    var ok = await mInit();
    document.documentElement.style.visibility = ''; // her durumda göster
    if (!ok) return;
    document.getElementById('mPage').style.display = '';

    // Dil değişince listeyi ve filtreyi yeniden render et
    window._onLangChange = function() {
      filtreSecenekleriniOlustur();
      render();
      filtrePanelRender();
    };

    await yukle();
  } catch(e) {
    document.documentElement.style.visibility = '';
    console.error('[Devreler init]', e);
  }
});
</script>
</body>
</html>
