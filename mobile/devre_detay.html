<!DOCTYPE html>
<html lang="tr" data-theme="light-anthracite">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Devre Detay | AresPipe</title>
<script>(function(){
  var t=localStorage.getItem('ares_theme')||'light-anthracite';
  var l=localStorage.getItem('ares_lang')||'tr';
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.setAttribute('lang',l);
  document.documentElement.style.visibility='hidden';
})()</script>
<link rel="stylesheet" href="ares-mobile.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Devre Detay Özel ── */
.devre-hdr {
  font-size: 13px;
  font-weight: 500;
  color: var(--tx);
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.devre-hdr span { color: var(--txd); margin: 0 5px; }

.search-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--sur);
  border: 1px solid var(--bor);
  border-radius: 10px;
  padding: 0 10px;
  height: 34px;
  flex: 1;
  min-width: 0;
  transition: border-color .15s;
}
.search-box:focus-within { border-color: var(--ac); }
.search-box svg { width: 13px; height: 13px; stroke: var(--txd); flex-shrink: 0; }
.search-box input {
  flex: 1; border: none; background: none; outline: none;
  font-size: 12px; color: var(--tx); font-family: inherit; min-width: 0;
}
.search-box input::placeholder { color: var(--txd); }

.counters { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.cnt-total { font-size: 12px; font-weight: 600; color: var(--tx); white-space: nowrap; }
.cnt-total em { color: var(--txd); font-style: normal; font-weight: 400; }
.cnt-stopped { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--re); white-space: nowrap; }
.cnt-stopped-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--re); flex-shrink: 0; }

/* Oval aşama tracker */
.stage-track { display: flex; align-items: flex-start; }
.st-step { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; flex: 1; }
.st-pill {
  height: 36px; width: 100%; max-width: 52px;
  border-radius: 18px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 1.5px solid var(--bor);
  background: var(--sur);
  transition: all .15s; gap: 1px;
}
.st-pill:active { transform: scale(.95); }
.st-count { font-size: 14px; font-weight: 700; line-height: 1; color: var(--txd); }
.st-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--txd); }

.sp-bekliyor .st-count { color: var(--txm); } .sp-bekliyor .st-dot { background: var(--txd); }
.sp-imalat { border-color: #85B7EB; background: #E6F1FB; } .sp-imalat .st-count { color: #185FA5; } .sp-imalat .st-dot { background: var(--ac); }
.sp-kaynak { border-color: #5DCAA5; background: #E1F5EE; } .sp-kaynak .st-count { color: #0F6E56; } .sp-kaynak .st-dot { background: #1D9E75; }
.sp-on_kontrol { border-color: #FAC775; background: #FAEEDA; } .sp-on_kontrol .st-count { color: #633806; } .sp-on_kontrol .st-dot { background: var(--warn); }
.sp-kk { border-color: #AFA9EC; background: #EEEDFE; } .sp-kk .st-count { color: #3C3489; } .sp-kk .st-dot { background: var(--leg); }
.sp-sevkiyat { border-color: #97C459; background: #EAF3DE; } .sp-sevkiyat .st-count { color: #27500A; } .sp-sevkiyat .st-dot { background: var(--gr); }

/* Seçili */
.st-step.sel .sp-bekliyor { border: 2.5px solid var(--txm); box-shadow: 0 0 0 2px var(--txm); }
.st-step.sel .sp-imalat  { border: 2.5px solid var(--ac); box-shadow: 0 0 0 2px var(--ac); }
.st-step.sel .sp-kaynak  { border: 2.5px solid #1D9E75; box-shadow: 0 0 0 2px #1D9E75; }
.st-step.sel .sp-on_kontrol { border: 2.5px solid var(--warn); box-shadow: 0 0 0 2px var(--warn); }
.st-step.sel .sp-kk      { border: 2.5px solid var(--leg); box-shadow: 0 0 0 2px var(--leg); }
.st-step.sel .sp-sevkiyat { border: 2.5px solid var(--gr); box-shadow: 0 0 0 2px var(--gr); }

.st-label { font-size: 9px; color: var(--txd); text-align: center; white-space: nowrap; }
.st-step.sel .st-label { font-weight: 700; color: var(--tx); }
.st-line { flex: 0 0 4px; height: 1.5px; margin-top: 17px; background: var(--bor); }
.st-line.done { background: #97C459; }

.filter-bar { display: flex; align-items: center; justify-content: space-between; padding: 5px 0 0; }
.filter-info { font-size: 11px; color: var(--txd); }
.filter-info span { font-weight: 600; color: var(--tx); }
.clear-btn { font-size: 11px; color: var(--ac); font-weight: 600; background: none; border: none; cursor: pointer; font-family: inherit; }

/* Spool kartları */
.sc {
  background: var(--sur);
  border-radius: 11px;
  overflow: hidden;
  border: 1px solid var(--bor);
  display: flex;
  align-items: stretch;
  cursor: pointer;
  transition: border-color .15s;
}
.sc:active { opacity: .85; }
.sc.stopped .sc-inner { background: rgba(229,62,62,.06); }

.sc-l { width: 4px; flex-shrink: 0; }
.sc-r { width: 4px; flex-shrink: 0; }

.l-bekliyor { background: var(--txd); }
.l-imalat   { background: var(--ac); }
.l-kaynak   { background: #1D9E75; }
.l-on_kontrol { background: var(--warn); }
.l-kk       { background: var(--leg); }
.l-sevkiyat { background: var(--gr); }
.l-durduruldu { background: var(--re); }

.r-none    { background: var(--re); }
.r-kismi   { background: var(--warn); }
.r-tam     { background: var(--gr); }

.sc-inner { flex: 1; min-width: 0; padding: 9px 11px; display: flex; align-items: center; gap: 8px; }
.sc-id-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 36px; flex-shrink: 0; }
.sc-id { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; color: var(--ac); letter-spacing: .5px; line-height: 1; text-align: center; }
.sc-ops { display: flex; gap: 3px; }
.op { width: 15px; height: 15px; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
.op svg { width: 9px; height: 9px; stroke-width: 2.5; }
.oi-done { background: rgba(22,163,110,.15); } .oi-done svg { stroke: var(--gr); }
.oi-wip  { background: rgba(217,119,6,.15); }  .oi-wip svg  { stroke: var(--warn); }
.oi-no   { background: rgba(229,62,62,.12); }   .oi-no svg   { stroke: var(--re); }

.sc-div { width: 0.5px; height: 32px; background: var(--bor); flex-shrink: 0; }
.sc-body { flex: 1; min-width: 0; padding-left: 2px; }
.sc-name { font-size: 12px; font-weight: 500; color: var(--tx); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sc-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; flex-wrap: nowrap; }
.mt { font-size: 10px; color: var(--txd); white-space: nowrap; }
.mt.hi { color: var(--txm); font-weight: 500; }
.mt.al { color: var(--re); font-weight: 500; }
.mdot { width: 2px; height: 2px; border-radius: 50%; background: var(--bor); flex-shrink: 0; }

.sc-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 4px; padding-left: 4px; }
.badge { padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.b-bekliyor { background: rgba(107,122,144,.15); color: var(--txm); }
.b-imalat   { background: rgba(45,142,255,.12); color: var(--ac); }
.b-kaynak   { background: rgba(29,158,117,.12); color: #0F6E56; }
.b-on_kontrol { background: rgba(217,119,6,.12); color: var(--warn); }
.b-kk       { background: rgba(124,58,237,.12); color: var(--leg); }
.b-sevkiyat { background: rgba(22,163,110,.12); color: var(--gr); }
.b-durduruldu { background: rgba(229,62,62,.12); color: var(--re); }

.sticky-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--bor);
}

.spool-list { padding: 8px 16px 80px; display: flex; flex-direction: column; gap: 5px; }

/* Topbar geri butonu */
.m-topbar { position: fixed; top: 0; left: 0; right: 0; height: 52px; background: var(--sur); border-bottom: 1px solid var(--bor); display: flex; align-items: center; padding: 0 14px; gap: 10px; z-index: 100; }
.m-topbar-back { width: 34px; height: 34px; border-radius: 9px; background: var(--sur2); border: 1px solid var(--bor); display: flex; align-items: center; justify-content: center; color: var(--tx); flex-shrink: 0; cursor: pointer; }
.m-topbar-back svg { width: 18px; height: 18px; }
.m-topbar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: var(--tx); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.page-body { padding-top: 52px; }

/* Boş durum */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; gap: 10px; }
.empty-icon { font-size: 36px; opacity: .35; }
.empty-text { font-size: 14px; color: var(--txd); text-align: center; }

/* Skeleton */
.skel { background: var(--sur2); border-radius: 11px; height: 64px; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
</style>
</head>
<body>

<!-- Topbar -->
<div class="m-topbar">
  <div class="m-topbar-back" onclick="location.href='devreler.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <div class="m-topbar-title" id="topbarTitle">Devre</div>
  <div id="mDrawerOverlay" class="m-drawer-overlay" onclick="mDrawerKapat()"></div>
  <div id="mDrawer" class="m-drawer"></div>
</div>

<div class="page-body">

  <!-- Sticky header -->
  <div class="sticky-header" id="stickyHeader">

    <!-- Gemi / Devre + Linkler -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="devre-hdr" id="devreHdr" style="margin-bottom:0;flex:1;min-width:0;">
        <span style="color:var(--txd);">Yükleniyor...</span>
      </div>
      <a href="devreler.html" style="font-size:11px;color:var(--ac);font-weight:600;white-space:nowrap;margin-left:10px;flex-shrink:0;">Tüm Devreler</a>
    </div>

    <!-- Arama + sayaçlar -->
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInp" placeholder="Spool ara..." oninput="doSearch(this.value)">
      </div>
      <div class="counters">
        <div class="cnt-total" id="cntTotal">— <em>spool</em></div>
        <div class="cnt-stopped" id="cntStopped" style="display:none;">
          <div class="cnt-stopped-dot"></div>
          <span id="cntStoppedN">0</span> durduruldu
        </div>
      </div>
    </div>

    <!-- Aşama tracker -->
    <div class="stage-track" id="stageTrack">
      <div class="st-step" data-stage="bekliyor" onclick="toggleStage(this)">
        <div class="st-pill sp-bekliyor"><span class="st-count" id="cnt-bekliyor">—</span><div class="st-dot"></div></div>
        <div class="st-label">Bekliyor</div>
      </div>
      <div class="st-line"></div>
      <div class="st-step" data-stage="imalat" onclick="toggleStage(this)">
        <div class="st-pill sp-imalat"><span class="st-count" id="cnt-imalat">—</span><div class="st-dot"></div></div>
        <div class="st-label">İmalat</div>
      </div>
      <div class="st-line"></div>
      <div class="st-step" data-stage="kaynak" onclick="toggleStage(this)">
        <div class="st-pill sp-kaynak"><span class="st-count" id="cnt-kaynak">—</span><div class="st-dot"></div></div>
        <div class="st-label">Kaynak</div>
      </div>
      <div class="st-line"></div>
      <div class="st-step" data-stage="on_kontrol" onclick="toggleStage(this)">
        <div class="st-pill sp-on_kontrol"><span class="st-count" id="cnt-on_kontrol">—</span><div class="st-dot"></div></div>
        <div class="st-label">Ön Kont.</div>
      </div>
      <div class="st-line"></div>
      <div class="st-step" data-stage="kk" onclick="toggleStage(this)">
        <div class="st-pill sp-kk"><span class="st-count" id="cnt-kk">—</span><div class="st-dot"></div></div>
        <div class="st-label">KK</div>
      </div>
      <div class="st-line"></div>
      <div class="st-step" data-stage="sevkiyat" onclick="toggleStage(this)">
        <div class="st-pill sp-sevkiyat"><span class="st-count" id="cnt-sevkiyat">—</span><div class="st-dot"></div></div>
        <div class="st-label">Sevkiyat</div>
      </div>
    </div>

    <div class="filter-bar" id="filterBar" style="display:none;">
      <div class="filter-info" id="filterInfo"></div>
      <button class="clear-btn" onclick="clearAll()">Temizle</button>
    </div>
  </div>

  <!-- Spool listesi -->
  <div class="spool-list" id="spoolList">
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
  </div>

</div>

<!-- Bottom nav -->
<nav class="m-bottomnav" id="mBottomNav"></nav>

<script src="../ares-store.js"></script>
<script src="../ares-lang.js"></script>
<script src="ares-mobile.js"></script>
<script>
'use strict';

var _spooller = [];
var _selected = new Set();
var _devreId = null;

// ── Filtre ──────────────────────────────────────────
function toggleStage(el) {
  var s = el.dataset.stage;
  _selected.has(s) ? (_selected.delete(s), el.classList.remove('sel')) : (_selected.add(s), el.classList.add('sel'));
  applyFilter();
}

function applyFilter() {
  var cards = document.querySelectorAll('.sc');
  var vis = 0;
  cards.forEach(function(c) {
    var show = !_selected.size || _selected.has(c.dataset.stage);
    c.style.display = show ? '' : 'none';
    if (show) vis++;
  });
  var bar = document.getElementById('filterBar');
  var total = _spooller.length;
  if (!_selected.size) {
    bar.style.display = 'none';
    document.getElementById('cntTotal').innerHTML = total + ' <em>spool</em>';
  } else {
    bar.style.display = 'flex';
    document.getElementById('filterInfo').innerHTML = '<span>' + vis + '/' + total + '</span> spool gösteriliyor';
    document.getElementById('cntTotal').innerHTML = vis + '/' + total + ' <em>spool</em>';
  }
}

function clearAll() {
  _selected.clear();
  document.querySelectorAll('.st-step').forEach(function(s) { s.classList.remove('sel'); });
  applyFilter();
}

function doSearch(v) {
  v = v.toLowerCase();
  document.querySelectorAll('.sc').forEach(function(c) {
    if (_selected.size && !_selected.has(c.dataset.stage)) return;
    c.style.display = c.textContent.toLowerCase().includes(v) ? '' : 'none';
  });
}

// ── SVG İkonlar ─────────────────────────────────────
function iconKesim(cls) {
  return '<div class="op ' + cls + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/></svg></div>';
}
function iconBukum(cls) {
  return '<div class="op ' + cls + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 009 9 9 9 0 006-2.4"/><polyline points="15 15 21 21 21 15"/></svg></div>';
}
function iconMarka(cls) {
  return '<div class="op ' + cls + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div>';
}

function opClass(durum) {
  if (durum === 'tamamlandi') return 'oi-done';
  if (durum === 'devam') return 'oi-wip';
  return 'oi-no';
}

// ── Badge ─────────────────────────────────────────────
var BADGE_MAP = {
  bekliyor:    ['b-bekliyor', 'Bekliyor'],
  imalat:      ['b-imalat',   'İmalat'],
  kaynak:      ['b-kaynak',   'Kaynak'],
  on_kontrol:  ['b-on_kontrol','Ön Kontrol'],
  kk:          ['b-kk',       'KK'],
  sevkiyat:    ['b-sevkiyat', 'Sevkiyat'],
  durduruldu:  ['b-durduruldu','Durduruldu'],
};

function badge(durum) {
  var v = BADGE_MAP[durum] || ['b-bekliyor', durum || '—'];
  return '<span class="badge ' + v[0] + '">' + v[1] + '</span>';
}

// ── Spool Kartı ───────────────────────────────────────
function spoolKart(s) {
  var stage = s.durduruldu ? 'durduruldu' : (s.aktif_basamak || 'bekliyor');
  var lClass = 'l-' + stage;
  var rClass = s.alistirma === 'tam' ? 'r-tam' : s.alistirma === 'kismi' ? 'r-kismi' : 'r-none';
  var stopped = s.durduruldu ? 'stopped' : '';

  var kesimD = s.kesim_durum || 'baslamadi';
  var bukumD = s.bukum_durum || 'baslamadi';
  var markaD = s.markalama_durum || 'baslamadi';

  var stopNote = s.durduruldu && s.durdurma_aciklama
    ? '<div class="mdot"></div><span class="mt al">⛔ ' + esc(s.durdurma_aciklama.substring(0,30)) + '</span>'
    : '';

  return '<div class="sc ' + stopped + '" data-stage="' + stage + '" onclick="spoolAc(\'' + s.id + '\')">' +
    '<div class="sc-l ' + lClass + '"></div>' +
    '<div class="sc-inner">' +
      '<div class="sc-id-wrap">' +
        '<div class="sc-id">' + esc(s.spool_id || '—') + '</div>' +
        '<div class="sc-ops">' +
          iconKesim(opClass(kesimD)) +
          iconBukum(opClass(bukumD)) +
          iconMarka(opClass(markaD)) +
        '</div>' +
      '</div>' +
      '<div class="sc-div"></div>' +
      '<div class="sc-body">' +
        '<div class="sc-name">' + esc(s.spool_no || '—') + '</div>' +
        '<div class="sc-meta">' +
          '<span class="mt hi">Ø' + (s.cap_mm || '—') + '</span>' +
          '<div class="mdot"></div>' +
          '<span class="mt">' + esc(s.malzeme || '—') + '</span>' +
          (s.kalite ? '<div class="mdot"></div><span class="mt">' + esc(s.kalite) + '</span>' : '') +
          stopNote +
        '</div>' +
      '</div>' +
      '<div class="sc-right">' +
        badge(stage) +
      '</div>' +
    '</div>' +
    '<div class="sc-r ' + rClass + '"></div>' +
  '</div>';
}

function spoolAc(id) {
  location.href = 'spool_detay.html?id=' + id;
}

// ── Veri Yükle ────────────────────────────────────────
async function yukle() {
  if (!_devreId) {
    document.getElementById('spoolList').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Devre bulunamadı</div></div>';
    return;
  }

  var supa = mSupabase();
  var tid = mTenantId();
  if (!supa || !tid) return;

  try {
    // Devre bilgisi
    var { data: devre } = await supa
      .from('devreler')
      .select('id, devre_no, devre_adi, zone, projeler(id, proje_no, tersaneler(ad))')
      .eq('id', _devreId)
      .single();

    if (devre) {
      var gemi = devre.projeler?.proje_no || '—';
      var sistem = devre.devre_adi || devre.devre_no || '—';
      var _projeId = devre.projeler?.id || '';
      document.getElementById('devreHdr').innerHTML =
        '<a href="gemi_detay.html?id=' + esc(_projeId) + '" style="font-weight:600;color:var(--ac);">' + esc(gemi) + '</a><span style="color:var(--txd);margin:0 5px;">/</span>' + esc(sistem);
      document.getElementById('topbarTitle').textContent = devre.devre_no || 'Devre';
    }

    // Spooller
    var { data: spooller } = await supa
      .from('spooller')
      .select('id, spool_id, spool_no, aktif_basamak, durduruldu, durdurma_aciklama, cap_mm, malzeme, kalite, alistirma, kesim_durum, bukum_durum, markalama_durum')
      .eq('tenant_id', tid)
      .eq('devre_id', _devreId)
      .order('spool_id', { ascending: true });

    _spooller = spooller || [];
    renderSpooller();

  } catch(e) {
    console.error('[Devre]', e);
    document.getElementById('spoolList').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Veri yüklenemedi</div></div>';
  }
}

function renderSpooller() {
  var total = _spooller.length;
  var durduruldu = _spooller.filter(function(s) { return s.durduruldu; }).length;

  // Sayaçlar
  document.getElementById('cntTotal').innerHTML = total + ' <em>spool</em>';
  if (durduruldu > 0) {
    document.getElementById('cntStopped').style.display = 'flex';
    document.getElementById('cntStoppedN').textContent = durduruldu;
  }

  // Aşama sayıları
  var stageCounts = { bekliyor:0, imalat:0, kaynak:0, on_kontrol:0, kk:0, sevkiyat:0 };
  _spooller.forEach(function(s) {
    var st = s.durduruldu ? null : (s.aktif_basamak || 'bekliyor');
    if (st && stageCounts.hasOwnProperty(st)) stageCounts[st]++;
  });
  Object.keys(stageCounts).forEach(function(k) {
    var el = document.getElementById('cnt-' + k);
    if (el) el.textContent = stageCounts[k];
  });

  // Durdurulmuşlar önce
  var sorted = _spooller.slice().sort(function(a, b) {
    return (b.durduruldu ? 1 : 0) - (a.durduruldu ? 1 : 0);
  });

  if (!sorted.length) {
    document.getElementById('spoolList').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Bu devreye ait spool bulunamadı</div></div>';
    return;
  }

  document.getElementById('spoolList').innerHTML = sorted.map(spoolKart).join('');
}

// ── Başlat ────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  _devreId = mUrlParam('id');
  var ok = await mInit();
  if (!ok) return;
  await yukle();
});
</script>
