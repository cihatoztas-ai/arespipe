<!DOCTYPE html>
<html lang="tr" data-theme="light-anthracite">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title data-i18n="isb_sayfa_baslik">İş Başlat</title>
  <script>(function(){
    var t=localStorage.getItem('ares_theme')||'light-anthracite';
    var l=localStorage.getItem('ares_lang')||'tr';
    document.documentElement.setAttribute('data-theme',t);
    document.documentElement.setAttribute('lang',l);
    document.documentElement.style.visibility='hidden';
  })()</script>
  <link rel="stylesheet" href="ares-mobile.css">
  <style>
    /* Scrollbar gizle */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }

    /* Renk sistemi */
    :root {
      --ac: #2D8EFF;
      --gr: #16a36e;
      --re: #e53e3e;
      --warn: #d97706;
      --leg: #7c3aed;
    }
    [data-theme=light-anthracite] {
      --bg: #d8dde4; --sur: #e4e9ef; --sur2: #d0d7e0;
      --bor: #bcc5d0; --tx: #141e2b; --txd: #637080; --txm: #3a4f63;
    }
    [data-theme=dark] {
      --bg: #0d1117; --sur: #161b24; --sur2: #1c2333;
      --bor: #262f3e; --tx: #e6ecf4; --txd: #6b7a90; --txm: #94a3b8;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .m-page { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Ekranlar */
    .ekran { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .ekran.aktif { display: flex; }

    /* Topbar */
    .m-topbar { display: flex; align-items: center; padding: 12px 16px; gap: 12px; flex-shrink: 0; border-bottom: 1px solid var(--bor); transition: background .25s; }
    .m-topbar.bekliyor { background: var(--sur); }
    .m-topbar.devam    { background: #fef3c7; border-bottom-color: #f0c040; }
    .m-topbar.tamam    { background: #dcfce7; border-bottom-color: #86efac; }

    .tb-geri { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--bor); background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 20px; color: var(--txm); }
    .tb-icerik { flex: 1; min-width: 0; }
    .tb-baslik { font-size: 15px; font-weight: 500; color: var(--tx); }
    .tb-alt    { font-size: 12px; color: var(--txd); margin-top: 1px; }

    /* Spool sabit başlık */
    .spool-pin { padding: 9px 16px 7px; flex-shrink: 0; border-bottom: 1px solid var(--bor); transition: background .25s; }
    .spool-pin.bekliyor { background: var(--sur); }
    .spool-pin.devam    { background: #fef9e7; border-bottom-color: #f0c040; }
    .spool-pin.tamam    { background: #dcfce7; border-bottom-color: #86efac; }
    .spool-no   { font-size: 15px; font-weight: 500; color: var(--tx); }
    .spool-meta { font-size: 12px; color: var(--txd); margin-top: 2px; }

    /* Kaydırılabilir gövde */
    .m-govde { flex: 1; overflow-y: auto; padding: 12px 14px; }

    /* Bölüm başlığı */
    .sec-bas { font-size: 11px; color: var(--txd); font-weight: 500; margin-bottom: 7px; letter-spacing: .4px; text-transform: uppercase; }

    /* Stat grid */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .stat-kart { background: var(--sur); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--bor); border-left: 3px solid var(--ac); }
    .stat-ic   { width: 30px; height: 30px; border-radius: 8px; background: #dbeafe; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-etiket { font-size: 11px; color: var(--txd); }
    .stat-deger  { font-size: 15px; font-weight: 500; color: var(--tx); line-height: 1.1; }
    .stat-birim  { font-size: 11px; color: var(--txd); }

    /* Alert */
    .alert { display: flex; align-items: flex-start; gap: 9px; border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; border: 1px solid; border-left-width: 4px; }
    .alert.kirmizi { background: #fef2f2; border-color: #fca5a5; border-left-color: var(--re); }
    .alert.amber   { background: #fffbeb; border-color: #fcd34d; border-left-color: var(--warn); }
    .alert.mavi    { background: #eff6ff; border-color: #93c5fd; border-left-color: var(--ac); }
    .alert-ikon    { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-bas     { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .alert-bas.kirmizi { color: #b91c1c; }
    .alert-bas.amber   { color: #92400e; }
    .alert-bas.mavi    { color: #1d4ed8; }
    .alert-metin { font-size: 12px; color: var(--txd); line-height: 1.4; }

    /* Fotoğraf carousel */
    .foto-carousel { display: flex; gap: 7px; overflow-x: auto; margin-bottom: 10px; }
    .foto-kucuk    { width: 64px; height: 64px; border-radius: 9px; flex-shrink: 0; background: var(--bor); border: 1px solid var(--bor); object-fit: cover; display: block; }

    /* Rol kartları */
    .rol-kart { display: flex; align-items: center; gap: 12px; background: var(--sur); border-radius: 10px; padding: 14px 13px; margin-bottom: 8px; border: 1px solid var(--bor); border-left: 4px solid var(--ac); }
    .rol-ikon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .rol-ad   { font-size: 15px; font-weight: 500; color: var(--tx); }
    .rol-alt  { font-size: 12px; color: var(--txd); margin-top: 2px; }
    .rol-ok   { color: var(--bor); font-size: 22px; line-height: 1; }

    /* Alt buton bar */
    .btn-bar { padding: 10px 14px; border-top: 1px solid var(--bor); flex-shrink: 0; transition: background .25s; }
    .btn-bar.bekliyor { background: var(--sur); }
    .btn-bar.devam    { background: #fef9e7; }
    .btn-bar.tamam    { background: #dcfce7; }

    /* Butonlar */
    .btn { border: none; cursor: pointer; font-family: inherit; font-weight: 500; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px; }
    .btn-tam  { width: 100%; padding: 12px; font-size: 15px; margin-bottom: 7px; }
    .btn-uc   { display: flex; gap: 6px; }
    .btn-uc .btn { flex: 1; padding: 10px 4px; font-size: 13px; }
    .btn-uc .btn:last-child { margin-bottom: 0; }

    .btn-mavi          { background: var(--ac); color: #fff; }
    .btn-kirmizi       { background: var(--re); color: #fff; }
    .btn-ghost-mavi    { background: transparent; color: var(--ac); border: 1.5px solid var(--ac); }
    .btn-ghost-kirmizi { background: transparent; color: var(--re); border: 1.5px solid var(--re); }
    .btn-ghost-yesil   { background: transparent; color: var(--gr); border: 1.5px solid var(--gr); }

    /* QR tam ekran */
    .qr-ekran   { flex: 1; background: #0d1117; display: flex; flex-direction: column; overflow: hidden; }
    .qr-kamera  { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; }
    .qr-cerceve { position: relative; width: 210px; height: 210px; }
    .qr-kose    { position: absolute; width: 28px; height: 28px; border-color: var(--ac); border-style: solid; }
    .qr-kose.sol-ust { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 5px 0 0 0; }
    .qr-kose.sag-ust { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 5px 0 0; }
    .qr-kose.sol-alt { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 5px; }
    .qr-kose.sag-alt { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 5px 0; }
    .qr-cizgi { position: absolute; left: 4px; right: 4px; height: 2px; background: linear-gradient(90deg, transparent, var(--ac), transparent); animation: qrtara 2s ease-in-out infinite; }
    @keyframes qrtara { 0%{top:8px;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:calc(100% - 10px);opacity:0} }

    .qr-alt-panel  { background: #111827; padding: 14px 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .qr-alt-etiket { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; }
    .qr-giris-kutu { display: flex; align-items: center; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
    .qr-giris      { flex: 1; background: transparent; border: none; padding: 12px 14px; font-size: 16px; color: #fff; outline: none; min-width: 0; font-family: inherit; }
    .qr-giris::placeholder { color: rgba(255,255,255,0.3); }
    .qr-ayrac { width: 1px; height: 38px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .qr-bul   { padding: 0 16px; font-size: 14px; font-weight: 500; color: var(--ac); cursor: pointer; white-space: nowrap; background: transparent; border: none; height: 46px; font-family: inherit; }
    .qr-iptal-ktr { text-align: center; }
    .qr-iptal-btn { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer; padding: 5px 16px; font-family: inherit; }

    /* Fotoğraf tam ekran */
    .foto-ekran  { flex: 1; background: #0d1117; display: flex; flex-direction: column; }
    .foto-vizor  { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    .foto-vizor-ic { width: 240px; height: 240px; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; pointer-events: none; }
    .foto-alt { background: #0d1117; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.06); }
    .foto-deklansor { width: 64px; height: 64px; border-radius: 50%; background: #fff; border: 4px solid rgba(255,255,255,0.25); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .foto-deklansor-ic { width: 48px; height: 48px; border-radius: 50%; background: #fff; border: 2px solid #ddd; }
    .foto-yan { font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer; text-align: center; width: 56px; padding: 8px 0; background: none; border: none; font-family: inherit; }

    /* Not bottom sheet */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: none; align-items: flex-end; }
    .sheet-overlay.acik { display: flex; }
    .sheet { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; padding-bottom: env(safe-area-inset-bottom, 12px); }
    .sheet-tutac { width: 38px; height: 4px; border-radius: 2px; background: var(--bor); margin: 11px auto 13px; }
    .sheet-baslik { font-size: 15px; font-weight: 500; color: var(--tx); padding: 0 16px 11px; border-bottom: 1px solid var(--bor); display: flex; justify-content: space-between; align-items: center; }
    .sheet-kapat  { font-size: 24px; color: var(--txd); cursor: pointer; line-height: 1; background: none; border: none; font-family: inherit; padding: 0; }
    .sheet-govde  { padding: 13px 16px; }
    .not-alan { width: 100%; background: var(--sur); border: 1.5px solid var(--ac); border-radius: 10px; padding: 11px 13px; font-size: 16px; color: var(--tx); resize: none; outline: none; font-family: inherit; line-height: 1.5; height: 100px; box-sizing: border-box; }
    .not-alan::placeholder { color: var(--txd); }
    .foto-ekle-btn { display: flex; align-items: center; gap: 10px; background: var(--sur); border: 1px solid var(--bor); border-left: 4px solid var(--ac); border-radius: 10px; padding: 11px 13px; margin-top: 9px; cursor: pointer; width: 100%; text-align: left; font-family: inherit; }
    .foto-ekle-ic  { width: 30px; height: 30px; border-radius: 8px; background: #dbeafe; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .foto-ekle-ad  { font-size: 14px; font-weight: 500; color: var(--tx); }
    .foto-ekle-alt { font-size: 12px; color: var(--txd); margin-top: 1px; }
    .sheet-btn-ktr { display: flex; gap: 8px; padding: 10px 16px 4px; }
    .sheet-btn-ktr .btn { flex: 1; padding: 11px; font-size: 14px; }

    /* İptal onay modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 60; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.acik { display: flex; }
    .modal-kutu { background: var(--sur); border-radius: 16px; padding: 20px; width: 100%; max-width: 300px; }
    .modal-baslik { font-size: 16px; font-weight: 500; color: var(--tx); margin-bottom: 8px; }
    .modal-metin  { font-size: 14px; color: var(--txd); margin-bottom: 18px; line-height: 1.5; }
    .modal-btn-ktr { display: flex; gap: 8px; }
    .modal-btn-ktr .btn { flex: 1; padding: 11px; }

    /* Pulse */
    .pulse-nokta { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); display: inline-block; margin-right: 6px; animation: pulseAnim 1.2s ease-in-out infinite; vertical-align: middle; }
    @keyframes pulseAnim { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.5)} }

    /* Toast */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #141e2b; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; white-space: nowrap; }
    .toast.goster { opacity: 1; }
  </style>
</head>
<body>

<div class="m-page" id="mPage">

  <!-- ① ROL SEÇ -->
  <div class="ekran aktif" id="ekranRol">
    <div class="m-topbar bekliyor">
      <div class="tb-icerik">
        <div class="tb-baslik" data-i18n="isb_baslik">İş Başlat</div>
        <div class="tb-alt" data-i18n="isb_rol_sec_alt">Rolünü seç</div>
      </div>
    </div>
    <div class="m-govde">
      <div class="sec-bas" data-i18n="isb_hangi_islem">Hangi işlemi yapacaksın?</div>
      <div id="rolListesi"></div>
    </div>
  </div>

  <!-- ② QR TARA -->
  <div class="ekran" id="ekranQR">
    <div class="qr-ekran">
      <div class="qr-kamera">
        <div style="position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;z-index:2">
          <div style="background:rgba(0,0,0,0.55);border-radius:10px;padding:9px 13px">
            <div style="font-size:15px;font-weight:500;color:#fff" data-i18n="isb_qr_baslik">QR Okutun</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px" data-i18n="isb_qr_alt">Spool QR kodunu okutun</div>
          </div>
          <div style="background:rgba(0,0,0,0.5);border-radius:8px;padding:8px 12px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:13px" data-geri="rol">
            ✕ <span data-i18n="cmn_iptal">İptal</span>
          </div>
        </div>
        <!-- Gerçek implementasyonda burada getUserMedia kamera görüntüsü olacak -->
        <div style="position:absolute;inset:0;background:#0a0a0a;"></div>
        <div class="qr-cerceve" style="position:relative;z-index:2">
          <div class="qr-kose sol-ust"></div>
          <div class="qr-kose sag-ust"></div>
          <div class="qr-kose sol-alt"></div>
          <div class="qr-kose sag-alt"></div>
          <div class="qr-cizgi"></div>
        </div>
        <div style="position:absolute;bottom:14px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.35);font-size:12px;z-index:2" data-i18n="isb_qr_yardim">QR kodu çerçeve içine alın</div>
      </div>
      <div class="qr-alt-panel">
        <div class="qr-alt-etiket" data-i18n="isb_manuel_giris">Manuel giriş</div>
        <div class="qr-giris-kutu">
          <input class="qr-giris" id="qrGirisInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <div class="qr-ayrac"></div>
          <button class="qr-bul" id="qrBulBtn" data-i18n="isb_bul">Bul</button>
        </div>
        <div class="qr-iptal-ktr">
          <button class="qr-iptal-btn" data-geri="rol" data-i18n="cmn_iptal">İptal</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ③ SPOOL DETAY (tek ekran, durum değişir) -->
  <div class="ekran" id="ekranSpool">
    <div class="m-topbar bekliyor" id="spoolTopbar">
      <div class="tb-geri" data-geri="qr">‹</div>
      <div class="tb-icerik">
        <div class="tb-baslik" id="spoolTbBaslik" data-i18n="isb_spool_detay">Spool Detay</div>
        <div class="tb-alt" id="spoolTbAlt"></div>
      </div>
    </div>
    <div class="spool-pin bekliyor" id="spoolPin">
      <div class="spool-no" id="spoolNo">—</div>
      <div class="spool-meta" id="spoolMeta">—</div>
    </div>
    <div class="m-govde" id="spoolGovde"></div>
    <div class="btn-bar bekliyor" id="spoolBtnBar"></div>
  </div>

  <!-- ④ FOTOĞRAF TAM EKRAN -->
  <div class="ekran" id="ekranFoto">
    <div class="foto-ekran">
      <div class="foto-vizor">
        <div id="fotoKontext" style="position:absolute;top:12px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.4);font-size:12px;z-index:2"></div>
        <div class="foto-vizor-ic"></div>
        <!-- iOS uyumlu: label ile sarılı file input -->
        <label for="fotoInputDeklansor" style="position:absolute;inset:0;cursor:pointer;display:block;z-index:3">
          <input type="file" id="fotoInputDeklansor" accept="image/*" capture="environment" style="display:none">
        </label>
      </div>
      <div class="foto-alt">
        <label for="fotoInputGaleri" class="foto-yan" data-i18n="isb_galeri">
          Galeri
          <input type="file" id="fotoInputGaleri" accept="image/*" style="display:none">
        </label>
        <label for="fotoInputDeklansor2" class="foto-deklansor">
          <div class="foto-deklansor-ic"></div>
          <input type="file" id="fotoInputDeklansor2" accept="image/*" capture="environment" style="display:none">
        </label>
        <button class="foto-yan" id="fotoIptalBtn" data-i18n="cmn_iptal">İptal</button>
      </div>
    </div>
  </div>

</div>

<!-- NOT BOTTOM SHEET -->
<div class="sheet-overlay" id="notSheet">
  <div class="sheet">
    <div class="sheet-tutac"></div>
    <div class="sheet-baslik">
      <span data-i18n="isb_not_ekle">Not Ekle</span>
      <button class="sheet-kapat" id="sheetKapatBtn">×</button>
    </div>
    <div class="sheet-govde">
      <textarea class="not-alan" id="notMetin"></textarea>
      <label for="notFotoInput" class="foto-ekle-btn">
        <div class="foto-ekle-ic">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2D8EFF" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <div>
          <div class="foto-ekle-ad" data-i18n="isb_foto_ekle">Fotoğraf Ekle</div>
          <div class="foto-ekle-alt" id="notFotoAlt" data-i18n="isb_foto_istege_bagli">İsteğe bağlı</div>
        </div>
        <input type="file" id="notFotoInput" accept="image/*" capture="environment" style="display:none">
      </label>
    </div>
    <div class="sheet-btn-ktr">
      <button class="btn btn-ghost-mavi" id="sheetIptalBtn" data-i18n="cmn_iptal">İptal</button>
      <button class="btn btn-mavi" id="notKaydetBtn" data-i18n="isb_kaydet">Kaydet</button>
    </div>
  </div>
</div>

<!-- İPTAL ONAY MODAL (confirm() yerine) -->
<div class="modal-overlay" id="iptalModal">
  <div class="modal-kutu">
    <div class="modal-baslik" data-i18n="isb_iptal_baslik">İşi iptal et?</div>
    <div class="modal-metin" data-i18n="isb_iptal_aciklama">İş kaydedilmeyecek. Devam etmek istediğinizden emin misiniz?</div>
    <div class="modal-btn-ktr">
      <button class="btn btn-ghost-mavi" id="iptalVazgecBtn" data-i18n="isb_iptal_vazgec">Vazgeç</button>
      <button class="btn btn-kirmizi" id="iptalOnayBtn" data-i18n="isb_iptal_onayla">İptal Et</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../ares-store.js"
  onerror="console.error('[is_baslat] YÜKLENEMEDİ: ../ares-store.js')"></script>
<script src="../ares-lang.js"
  onerror="console.error('[is_baslat] YÜKLENEMEDİ: ../ares-lang.js')"></script>
<script src="ares-mobile.js"
  onerror="console.error('[is_baslat] YÜKLENEMEDİ: ares-mobile.js — dosya mobile/ klasöründe mevcut mu?')"></script>
<script>

// ─── ares-mobile.js yükleme kontrolü ─────────────────────────
if (typeof mInit === 'undefined') {
  console.error('[is_baslat] ares-mobile.js yüklenemedi. Yol kontrolü yapın: mobile/ares-mobile.js');
}

// ─── mInit fallback ───────────────────────────────────────────
if (typeof mInit === 'undefined') {
  window.mInit = async function() {
    var token = null;
    try {
      var keys = Object.keys(localStorage);
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].startsWith('sb-') && keys[i].endsWith('-auth-token')) {
          token = keys[i]; break;
        }
      }
    } catch(e) {}
    if (!token) { location.href = 'giris.html'; return false; }
    document.documentElement.style.visibility = '';
    return true;
  };
}

// ─── mSupabase / mTenantId / mOturum fallback ─────────────────
if (typeof mSupabase === 'undefined') {
  window.mSupabase = function() {
    if (typeof ARES !== 'undefined' && ARES.supabase) return ARES.supabase();
    console.error('[is_baslat] mSupabase tanımlı değil');
    return null;
  };
}
if (typeof mTenantId === 'undefined') {
  window.mTenantId = function() {
    if (typeof ARES !== 'undefined' && ARES.tenantId) return ARES.tenantId();
    return null;
  };
}
if (typeof mOturum === 'undefined') {
  window.mOturum = function() {
    if (typeof ARES !== 'undefined' && ARES.oturum) return ARES.oturum();
    return null;
  };
}

// ─── mSayfaKontrol inline fallback ───────────────────────────
if (typeof mSayfaKontrol === 'undefined') {
  window.mSayfaKontrol = async function(sayfaKodu) {
    var oturum = typeof mOturum === 'function' ? mOturum() : null;
    if (!oturum) { location.href = 'giris.html'; return false; }
    if (typeof ARES !== 'undefined' && ARES.sayfaYetkiKontrol) {
      return await ARES.sayfaYetkiKontrol(sayfaKodu);
    }
    return true;
  };
}

// ─── Supabase _safe wrapper ───────────────────────────────────
var _safe = function(p) {
  return Promise.resolve(p).catch(function(e) {
    console.warn('[sorgu hata]', e && e.message);
    return { data: null, error: e };
  });
};

// ─── Uygulama durumu ─────────────────────────────────────────
var _aktifRol     = null;   // seçili rol adı
var _aktifSpool   = null;   // DB'den gelen spool objesi
var _fotoMod      = null;   // 'tamamla' | 'not'
var _notFotoDosya = null;   // not sheet'teki fotoğraf

// ─── Rol tanımları ───────────────────────────────────────────
var ROL_TANIMLARI = {
  'İmalat':    { renk: '#2D8EFF', bg: '#dbeafe', blokAdi: 'İmalat' },
  'Kaynak':    { renk: '#e53e3e', bg: '#fee2e2', blokAdi: 'Kaynak' },
  'Büküm':     { renk: '#d97706', bg: '#fef3c7', blokAdi: 'Büküm' },
  'Kesim':     { renk: '#7c3aed', bg: '#ede9fe', blokAdi: 'Kesim' },
  'Markalama': { renk: '#16a36e', bg: '#dcfce7', blokAdi: 'Markalama' }
};

// ─── Ekran geçişi ─────────────────────────────────────────────
function ekranGec(id) {
  document.querySelectorAll('.ekran').forEach(function(s) { s.classList.remove('aktif'); });
  document.getElementById(id).classList.add('aktif');
}

// ─── Toast ───────────────────────────────────────────────────
var _toastTimer = null;
function toast(mesaj, sure) {
  var el = document.getElementById('toast');
  el.textContent = mesaj;
  el.classList.add('goster');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('goster'); }, sure || 2500);
}

// ─── Geri navigasyon — event delegation ──────────────────────
document.body.addEventListener('click', function(e) {
  var geriEl = e.target.closest('[data-geri]');
  if (!geriEl) return;
  var hedef = geriEl.getAttribute('data-geri');
  if (hedef === 'qr')  ekranGec('ekranQR');
  if (hedef === 'rol') ekranGec('ekranRol');
});

// ─── Rol listesi ─────────────────────────────────────────────
async function rolListesiYukle() {
  var gosteRoller = Object.keys(ROL_TANIMLARI);

  try {
    var bloklari   = await ARES.kullaniciBloklari();
    var tumBloklar = await ARES.tumBloklar();
    var blokMap = {};
    tumBloklar.forEach(function(b) { blokMap[b.id] = b; });

    var kullaniciBloklari = bloklari.map(function(kb) {
      var b = blokMap[kb.blok_id];
      return b ? b.ad : null;
    }).filter(Boolean);

    if (kullaniciBloklari.length > 0) {
      var filtreliRoller = gosteRoller.filter(function(r) {
        return kullaniciBloklari.some(function(a) {
          return a.toLowerCase().includes(r.toLowerCase());
        });
      });
      if (filtreliRoller.length > 0) gosteRoller = filtreliRoller;
    }
  } catch(e) {
    console.warn('[rol blok yükle]', e);
  }

  var liste = document.getElementById('rolListesi');
  var html = '';
  gosteRoller.forEach(function(rol) {
    var t = ROL_TANIMLARI[rol];
    html +=
      '<div class="rol-kart" style="border-left-color:' + t.renk + '" data-rol="' + rol + '">' +
        '<div class="rol-ikon" style="background:' + t.bg + '">' + rolSvg(rol, t.renk) + '</div>' +
        '<div style="flex:1">' +
          '<div class="rol-ad">' + rol + '</div>' +
          '<div class="rol-alt">' + tv('isb_rol_' + rol.toLowerCase().replace(/\s/g,'_') + '_alt', rolAltMetin(rol)) + '</div>' +
        '</div>' +
        '<div class="rol-ok">›</div>' +
      '</div>';
  });
  liste.innerHTML = html;
}

function rolSvg(rol, renk) {
  var svgMap = {
    'İmalat':    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + renk + '" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>',
    'Kaynak':    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + renk + '" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>',
    'Büküm':     '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + renk + '" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>',
    'Kesim':     '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + renk + '" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
    'Markalama': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + renk + '" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
  };
  return svgMap[rol] || '';
}

function rolAltMetin(rol) {
  var altlar = {
    'İmalat': 'Boru imalat işlemleri', 'Kaynak': 'Kaynak işlemleri',
    'Büküm': 'Boru büküm işlemleri',  'Kesim': 'Boru kesim işlemleri',
    'Markalama': 'Markalama işlemleri'
  };
  return altlar[rol] || '';
}

// Rol tıklama — event delegation
document.getElementById('rolListesi').addEventListener('click', function(e) {
  var kart = e.target.closest('[data-rol]');
  if (!kart) return;
  _aktifRol = kart.getAttribute('data-rol');
  document.getElementById('qrGirisInput').value = '';
  ekranGec('ekranQR');
});

// ─── QR / Manuel arama ───────────────────────────────────────
document.getElementById('qrBulBtn').addEventListener('click', spoolAra);
document.getElementById('qrGirisInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') spoolAra();
});

async function spoolAra() {
  var deger = (document.getElementById('qrGirisInput').value || '').trim();
  if (!deger) return;

  var supa      = mSupabase();
  var tenantId  = mTenantId();

  var r = await _safe(
    supa.from('spooller')
      .select('id, spool_id, spool_no, dis_cap_mm, et_kalinligi_mm, agirlik, malzeme, aktif_basamak, is_durumu, alistirma, ilerleme')
      .or('spool_id.eq.' + deger + ',spool_no.ilike.' + deger)
      .eq('tenant_id', tenantId)
      .maybeSingle()
  );

  if (!r.data) {
    toast(tv('isb_spool_bulunamadi', 'Spool bulunamadı'));
    return;
  }

  _aktifSpool = r.data;
  spoolEkraniAc();
}

// ─── Spool ekranı ────────────────────────────────────────────
function spoolEkraniAc() {
  if (!_aktifSpool) return;
  ekranGec('ekranSpool');
  document.getElementById('spoolNo').textContent = _aktifSpool.spool_no || _aktifSpool.spool_id;
  document.getElementById('spoolMeta').innerHTML =
    'ID: ' + _aktifSpool.spool_id + ' &nbsp;·&nbsp; <strong>' + (_aktifSpool.aktif_basamak || '—') + '</strong>';

  spoolIcerikRender();
  spoolDurumUygula(_aktifSpool.is_durumu === 'devam_ediyor' ? 'devam' : 'bekliyor');
}

function spoolIcerikRender() {
  var s    = _aktifSpool;
  var html = '';

  // Bilgiler
  html += '<div class="sec-bas">' + tv('isb_bilgiler', 'Bilgiler') + '</div>';
  html += '<div class="stat-grid">';
  html += _statKart('cap',      s.dis_cap_mm,       'mm',  tv('isb_dis_cap', 'Dış çap'));
  html += _statKart('et',       s.et_kalinligi_mm,  'mm',  tv('isb_et', 'Et kalınlığı'));
  html += _statKart('agirlik',  s.agirlik,           'kg',  tv('isb_agirlik', 'Ağırlık'));
  html += _statKart('malzeme',  null,                '',    tv('isb_malzeme', 'Malzeme'), s.malzeme);
  html += '</div>';

  // Uyarılar
  var uyariHtml = '';
  if (s.alistirma === 'VAR') {
    uyariHtml +=
      '<div class="alert kirmizi"><div class="alert-ikon">⚠</div><div>' +
      '<div class="alert-bas kirmizi">' + tv('isb_alistirma_var', 'Alıştırma: VAR') + '</div>' +
      '<div class="alert-metin">' + tv('isb_alistirma_aciklama', 'Bu spool alıştırma gerektiriyor. Kaynak seçenekleri kısıtlı.') + '</div>' +
      '</div></div>';
  } else if (s.alistirma === 'KISMI') {
    uyariHtml +=
      '<div class="alert amber"><div class="alert-ikon">⚠</div><div>' +
      '<div class="alert-bas amber">' + tv('isb_alistirma_kismi', 'Alıştırma: KISMİ') + '</div>' +
      '<div class="alert-metin">' + tv('isb_alistirma_kismi_aciklama', 'Bazı işlemler kısıtlı olabilir.') + '</div>' +
      '</div></div>';
  }
  if (uyariHtml) {
    html += '<div class="sec-bas">' + tv('isb_uyarilar', 'Uyarılar') + '</div>' + uyariHtml;
  }

  // Notlar — async doldurulacak
  html += '<div id="notlarAlani"></div>';

  // Fotoğraflar
  html += '<div class="sec-bas">' + tv('isb_son_fotolar', 'Son fotoğraflar') + '</div>';
  html += '<div class="foto-carousel" id="fotoCarousel">' +
    '<div style="font-size:13px;color:var(--txd)">' + tv('genel_yukleniyor', 'Yükleniyor...') + '</div>' +
  '</div>';

  document.getElementById('spoolGovde').innerHTML = html;

  // Paralel sorgular
  _fotograflariYukle();
  _notlariYukle();
}

function _statKart(tip, deger, birim, etiket, ozelDeger) {
  var gosterilen = (ozelDeger !== undefined && ozelDeger !== null)
    ? ozelDeger
    : (deger !== null && deger !== undefined ? deger : '—');
  return '<div class="stat-kart"><div class="stat-ic">' + _statSvg(tip) + '</div>' +
    '<div><div class="stat-etiket">' + etiket + '</div>' +
    '<div class="stat-deger">' + gosterilen + (birim ? '<span class="stat-birim"> ' + birim + '</span>' : '') + '</div>' +
    '</div></div>';
}

function _statSvg(tip) {
  var m = {
    'cap':      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2D8EFF" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>',
    'et':       '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2D8EFF" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>',
    'agirlik':  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2D8EFF" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
    'malzeme':  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2D8EFF" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>'
  };
  return m[tip] || '';
}

async function _fotograflariYukle() {
  if (!_aktifSpool) return;
  var supa = mSupabase();
  var r = await _safe(
    supa.from('fotograflar')
      .select('dosya_url, islem_turu, olusturma')
      .eq('spool_id', _aktifSpool.id)
      .order('olusturma', { ascending: false })
      .limit(6)
  );
  var el = document.getElementById('fotoCarousel');
  if (!el) return;
  if (!r.data || r.data.length === 0) {
    el.innerHTML = '<div style="font-size:13px;color:var(--txd)">' + tv('isb_foto_yok', 'Henüz fotoğraf yok') + '</div>';
    return;
  }
  el.innerHTML = r.data.map(function(f) {
    return '<img class="foto-kucuk" src="' + f.dosya_url + '" alt="">';
  }).join('');
}

async function _notlariYukle() {
  if (!_aktifSpool) return;
  var supa = mSupabase();
  var r = await _safe(
    supa.from('notlar')
      .select('id, metin, olusturma, qr_goster')
      .eq('spool_id', _aktifSpool.id)
      .eq('silindi', false)
      .order('olusturma', { ascending: false })
  );
  var el = document.getElementById('notlarAlani');
  if (!el) return;
  if (!r.data || r.data.length === 0) { el.innerHTML = ''; return; }

  var html = '<div class="sec-bas">' + tv('isb_notlar', 'Notlar') + ' (' + r.data.length + ')</div>';
  r.data.forEach(function(n) {
    html +=
      '<div class="alert mavi"><div class="alert-ikon">💬</div><div>' +
      '<div class="alert-bas mavi">' + _tarihFormat(n.olusturma) + '</div>' +
      '<div class="alert-metin">' + _guvenliMetin(n.metin) + '</div>' +
      '</div></div>';
  });
  el.innerHTML = html;
}

function _tarihFormat(iso) {
  if (!iso) return '—';
  var fark = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (fark < 60)   return fark + ' dk önce';
  if (fark < 1440) return Math.floor(fark / 60) + ' sa önce';
  return Math.floor(fark / 1440) + ' gün önce';
}

function _guvenliMetin(metin) {
  if (!metin) return '';
  return metin.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Spool durum uygula ──────────────────────────────────────
function spoolDurumUygula(durum) {
  var tb     = document.getElementById('spoolTopbar');
  var pin    = document.getElementById('spoolPin');
  var btnBar = document.getElementById('spoolBtnBar');
  var tbBas  = document.getElementById('spoolTbBaslik');
  var tbAlt  = document.getElementById('spoolTbAlt');

  var cls = durum === 'devam' ? 'devam' : durum === 'tamam' ? 'tamam' : 'bekliyor';
  tb.className     = 'm-topbar ' + cls;
  pin.className    = 'spool-pin ' + cls;
  btnBar.className = 'btn-bar ' + cls;

  if (durum === 'bekliyor') {
    tbBas.innerHTML   = tv('isb_spool_detay', 'Spool Detay');
    tbAlt.textContent = _aktifRol || '';
    tbAlt.style.color = '';
    btnBar.innerHTML  =
      '<button class="btn btn-mavi btn-tam" id="isBaslatBtn">' + tv('isb_ise_basla', 'İşe Başla') + '</button>' +
      '<div class="btn-uc">' +
        '<button class="btn btn-ghost-mavi" data-geri="qr">' + tv('isb_baska_spool', 'Başka Spool Tara') + '</button>' +
      '</div>';
    document.getElementById('isBaslatBtn').addEventListener('click', _isBaslat);

  } else if (durum === 'devam') {
    tbBas.innerHTML   = '<span class="pulse-nokta"></span>' + tv('isb_devam_ediyor', 'İş Devam Ediyor');
    tbAlt.textContent = (_aktifRol || '') + ' · ' + tv('isb_qr_ile_baslatildi', 'QR ile başlatıldı');
    tbAlt.style.color = '#b45309';
    btnBar.innerHTML  =
      '<div class="btn-uc">' +
        '<button class="btn btn-kirmizi" id="isTamamlaBtn">' + tv('isb_isi_tamamla', 'İşi Tamamla') + '</button>' +
        '<button class="btn btn-ghost-mavi" id="notEkleBtn">' + tv('isb_not_ekle', 'Not Ekle') + '</button>' +
        '<button class="btn btn-ghost-kirmizi" id="isIptalBtn">' + tv('cmn_iptal', 'İptal Et') + '</button>' +
      '</div>';
    document.getElementById('isTamamlaBtn').addEventListener('click', _isTamamlaBaslat);
    document.getElementById('notEkleBtn').addEventListener('click', _notSheetAc);
    document.getElementById('isIptalBtn').addEventListener('click', _iptalModalAc);

  } else if (durum === 'tamam') {
    tbBas.innerHTML   = '✓ ' + tv('isb_is_tamamlandi', 'İş Tamamlandı');
    tbAlt.textContent = _aktifRol || '';
    tbAlt.style.color = '#16a34a';
    btnBar.innerHTML  =
      '<button class="btn btn-ghost-yesil btn-tam" id="yeniSpoolBtn">' + tv('isb_yeni_spool', 'Yeni Spool Tara') + '</button>';
    document.getElementById('yeniSpoolBtn').addEventListener('click', function() {
      _aktifSpool = null;
      document.getElementById('qrGirisInput').value = '';
      ekranGec('ekranQR');
    });
  }
}

// ─── İşe Başla ───────────────────────────────────────────────
async function _isBaslat() {
  if (!_aktifSpool) return;
  var supa = mSupabase();

  var r = await _safe(
    supa.from('spooller')
      .update({ is_durumu: 'devam_ediyor', guncelleme: new Date().toISOString() })
      .eq('id', _aktifSpool.id)
  );
  if (r.error) { toast(tv('isb_hata', 'Bir hata oluştu')); return; }

  _aktifSpool.is_durumu = 'devam_ediyor';
  localStorage.setItem('ares_is_aktif', JSON.stringify({ id: _aktifSpool.id, rol: _aktifRol }));
  spoolDurumUygula('devam');
}

// ─── İşi Tamamla — kameraya yönlendir ────────────────────────
function _isTamamlaBaslat() {
  _fotoMod = 'tamamla';
  document.getElementById('fotoKontext').textContent =
    (_aktifRol || '') + ' · ' + (_aktifSpool ? _aktifSpool.spool_id : '');
  ekranGec('ekranFoto');
}

// ─── Fotoğraf input olayları ─────────────────────────────────
function _fotoIsle(dosya) {
  if (!dosya) return;
  if (_fotoMod === 'not') {
    _notFotoDosya = dosya;
    document.getElementById('notFotoAlt').textContent = dosya.name;
    _notSheetAc();
  } else {
    _isTamamla(dosya);
  }
}

['fotoInputDeklansor', 'fotoInputDeklansor2', 'fotoInputGaleri'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', function(e) {
    _fotoIsle(e.target.files[0]);
  });
});

document.getElementById('fotoIptalBtn').addEventListener('click', function() {
  if (_fotoMod === 'not') { _fotoMod = null; _notSheetAc(); }
  else { ekranGec('ekranSpool'); }
});

// ─── İşi tamamla DB işlemleri ────────────────────────────────
async function _isTamamla(dosya) {
  if (!_aktifSpool || !dosya) return;
  var supa     = mSupabase();
  var oturum   = mOturum();
  var tenantId = mTenantId();

  // Fotoğraf yükle
  var uzanti   = (dosya.name.split('.').pop() || 'jpg').toLowerCase();
  var yol      = tenantId + '/spooller/' + _aktifSpool.id + '/tamamla_' + Date.now() + '.' + uzanti;

  var yukR = await _safe(
    supa.storage.from('arespipe-dosyalar').upload(yol, dosya, { upsert: false })
  );
  if (yukR.error) {
    toast(tv('isb_foto_hata', 'Fotoğraf yüklenemedi'));
    ekranGec('ekranSpool');
    return;
  }

  var dosyaUrl = supa.storage.from('arespipe-dosyalar').getPublicUrl(yol).data.publicUrl;
  var yeniIlerleme = Math.min(100, (_aktifSpool.ilerleme || 0) + 20);

  // Paralel kayıt
  await Promise.all([
    _safe(supa.from('fotograflar').insert({
      tenant_id:   tenantId,
      spool_id:    _aktifSpool.id,
      dosya_url:   dosyaUrl,
      yukleyen_id: oturum.id,
      islem_turu:  (_aktifRol || 'genel').toLowerCase(),
      olusturma:   new Date().toISOString()
    })),
    _safe(supa.from('spooller').update({
      is_durumu:   'bekliyor',
      ilerleme:    yeniIlerleme,
      guncelleme:  new Date().toISOString()
    }).eq('id', _aktifSpool.id))
  ]);

  localStorage.removeItem('ares_is_aktif');
  _aktifSpool.is_durumu = 'bekliyor';
  _aktifSpool.ilerleme  = yeniIlerleme;

  ekranGec('ekranSpool');
  spoolDurumUygula('tamam');
  _fotograflariYukle();
  toast(tv('isb_tamamlandi', 'İş tamamlandı!'));
}

// ─── İptal modal ─────────────────────────────────────────────
function _iptalModalAc()  { document.getElementById('iptalModal').classList.add('acik'); }
function _iptalModalKapat(){ document.getElementById('iptalModal').classList.remove('acik'); }

document.getElementById('iptalVazgecBtn').addEventListener('click', _iptalModalKapat);
document.getElementById('iptalModal').addEventListener('click', function(e) {
  if (e.target === this) _iptalModalKapat();
});
document.getElementById('iptalOnayBtn').addEventListener('click', async function() {
  _iptalModalKapat();
  if (!_aktifSpool) return;
  var supa = mSupabase();
  await _safe(
    supa.from('spooller')
      .update({ is_durumu: 'bekliyor', guncelleme: new Date().toISOString() })
      .eq('id', _aktifSpool.id)
  );
  localStorage.removeItem('ares_is_aktif');
  _aktifSpool.is_durumu = 'bekliyor';
  spoolDurumUygula('bekliyor');
  toast(tv('isb_is_iptal_edildi', 'İş iptal edildi'));
});

// ─── Not sheet ───────────────────────────────────────────────
function _notSheetAc()  { document.getElementById('notSheet').classList.add('acik'); }
function _notSheetKapat() {
  document.getElementById('notSheet').classList.remove('acik');
  _fotoMod = null;
}

document.getElementById('sheetKapatBtn').addEventListener('click', _notSheetKapat);
document.getElementById('sheetIptalBtn').addEventListener('click', _notSheetKapat);
document.getElementById('notSheet').addEventListener('click', function(e) {
  if (e.target === this) _notSheetKapat();
});

document.getElementById('notFotoInput').addEventListener('change', function(e) {
  var dosya = e.target.files[0];
  if (!dosya) return;
  _notFotoDosya = dosya;
  document.getElementById('notFotoAlt').textContent = dosya.name;
});

document.getElementById('notKaydetBtn').addEventListener('click', _notKaydet);

async function _notKaydet() {
  var metin    = (document.getElementById('notMetin').value || '').trim();
  var supa     = mSupabase();
  var oturum   = mOturum();
  var tenantId = mTenantId();

  if (!metin && !_notFotoDosya) {
    toast(tv('isb_not_bos', 'Not yazın veya fotoğraf ekleyin'));
    return;
  }
  if (!_aktifSpool) return;

  // Fotoğraf varsa yükle
  if (_notFotoDosya) {
    var uzanti  = (_notFotoDosya.name.split('.').pop() || 'jpg').toLowerCase();
    var yol     = tenantId + '/notlar/' + _aktifSpool.id + '/not_' + Date.now() + '.' + uzanti;
    var yukR    = await _safe(
      supa.storage.from('arespipe-dosyalar').upload(yol, _notFotoDosya, { upsert: false })
    );
    if (!yukR.error) {
      var dosyaUrl = supa.storage.from('arespipe-dosyalar').getPublicUrl(yol).data.publicUrl;
      await _safe(supa.from('fotograflar').insert({
        tenant_id:   tenantId,
        spool_id:    _aktifSpool.id,
        dosya_url:   dosyaUrl,
        yukleyen_id: oturum.id,
        islem_turu:  'not',
        olusturma:   new Date().toISOString()
      }));
    }
  }

  // Notu kaydet
  if (metin) {
    await _safe(supa.from('notlar').insert({
      tenant_id:  tenantId,
      spool_id:   _aktifSpool.id,
      metin:      metin,
      ekleyen_id: oturum.id,
      qr_goster:  false,
      olusturma:  new Date().toISOString()
    }));
  }

  _notSheetKapat();
  document.getElementById('notMetin').value = '';
  document.getElementById('notFotoAlt').textContent = tv('isb_foto_istege_bagli', 'İsteğe bağlı');
  _notFotoDosya = null;
  toast(tv('isb_not_kaydedildi', 'Not kaydedildi'));
  _notlariYukle();
  if (_notFotoDosya) _fotograflariYukle();
}

// ─── Aktif iş kontrolü (sayfa açılışında) ────────────────────
async function _aktifIsKontrol() {
  var kayitli = null;
  try { kayitli = JSON.parse(localStorage.getItem('ares_is_aktif') || 'null'); } catch(e) {}
  if (!kayitli || !kayitli.id) return;

  var supa = mSupabase();
  var r    = await _safe(
    supa.from('spooller')
      .select('id, spool_id, spool_no, dis_cap_mm, et_kalinligi_mm, agirlik, malzeme, aktif_basamak, is_durumu, alistirma, ilerleme')
      .eq('id', kayitli.id)
      .maybeSingle()
  );

  if (r.data && r.data.is_durumu === 'devam_ediyor') {
    _aktifRol   = kayitli.rol;
    _aktifSpool = r.data;
    spoolEkraniAc();
    spoolDurumUygula('devam');
  } else {
    localStorage.removeItem('ares_is_aktif');
  }
}

// ─── Init ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  try {
    console.log('[is_baslat] mInit:', typeof mInit, '| mSupabase:', typeof mSupabase);

    var ok = await mInit();
    document.documentElement.style.visibility = '';
    if (!ok) return;

    document.getElementById('mPage').style.display = 'flex';

    if (!await mSayfaKontrol('mobile/is_baslat')) return;

    window._onLangChange = function() {
      if (typeof window._applyI18n === 'function') window._applyI18n();
    };

    await _aktifIsKontrol();
    await rolListesiYukle();

  } catch(e) {
    document.documentElement.style.visibility = '';
    console.error('[is_baslat init]', e.name + ':', e.message);
  }
});

</script>
