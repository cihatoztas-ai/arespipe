<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title data-i18n="kul_title">Kullanıcılar | AresPipe</title>
<script>(function(){var t=localStorage.getItem('ares_theme')||'dark';var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txd:#6b7a90;--txm:#94a3b8;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh;}
.page{padding:24px 28px 60px;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--txd);margin-bottom:6px;}
.breadcrumb a{color:var(--txd);text-decoration:none;}.breadcrumb a:hover{color:var(--ac);}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--tx);}
.page-sub{font-size:13px;color:var(--txd);margin-top:3px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:36px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--txm);font-size:14px;font-weight:500;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s;}
.btn:hover{border-color:var(--ac);color:var(--ac);}
.btn-ac{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600;}.btn-ac:hover{filter:brightness(1.1);color:#fff;}
/* STAT KARTLAR */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:800px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.sc{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;}
.sc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic-ac{background:rgba(45,142,255,.12);color:var(--ac);}
.ic-gr{background:rgba(22,163,110,.12);color:var(--gr);}
.ic-warn{background:rgba(217,119,6,.12);color:var(--warn);}
.ic-leg{background:rgba(124,58,237,.12);color:var(--leg);}
.sc-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1;}
.sc-lbl{font-size:11px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
/* FİLTRE */
.fbar{background:var(--sur);border:1px solid var(--bor);border-left:3px solid var(--warn);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:280px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txd);pointer-events:none;}
.sinp{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:6px 10px 6px 32px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--tx);outline:none;height:34px;}
.sinp:focus{border-color:var(--ac);}
.fsel{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:0 10px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--txm);outline:none;cursor:pointer;height:34px;}
.fsel:focus{border-color:var(--ac);}
.res-cnt{font-size:13px;color:var(--txd);margin-left:auto;}
/* TABLO */
.tbl-wrap{background:var(--sur);border:1px solid var(--bor);border-left:3px solid var(--ac);border-radius:12px;overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;font-size:14px;}
.tbl thead th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;background:var(--sur2);border-bottom:1px solid var(--bor);white-space:nowrap;}
.tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--bor);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:rgba(45,142,255,.03);cursor:pointer;}
.tbl tbody tr.pasif td{opacity:.5;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;background:#333;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.rol-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-size:12px;font-weight:700;}
.r-super{background:rgba(229,62,62,.1);color:var(--re);}
.r-yonetici{background:rgba(124,58,237,.1);color:var(--leg);}
.r-kk{background:rgba(45,142,255,.1);color:var(--ac);}
.r-operator{background:rgba(22,163,110,.1);color:var(--gr);}
.r-izleyici{background:rgba(107,122,144,.1);color:var(--txd);}
.dbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;}
.dbadge.aktif{background:rgba(22,163,110,.1);color:var(--gr);border:1px solid rgba(22,163,110,.25);}
.dbadge.aktif::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gr);}
.dbadge.pasif{background:var(--sur2);color:var(--txd);border:1px solid var(--bor);}
.dbadge.davet{background:rgba(217,119,6,.1);color:var(--warn);border:1px solid rgba(217,119,6,.25);}
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bor);background:var(--sur2);color:var(--txm);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;}
.icon-btn:hover{border-color:var(--ac);color:var(--ac);}
.bos{text-align:center;padding:48px 20px;color:var(--txd);font-size:14px;}
.pgn{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--bor);flex-wrap:wrap;gap:8px;}
.pgn-info{font-size:13px;color:var(--txd);}
.pgn-btns{display:flex;gap:4px;}
.pgn-btn{min-width:30px;height:30px;padding:0 8px;border-radius:6px;border:1px solid var(--bor);background:var(--sur2);color:var(--txm);font-family:'Barlow',sans-serif;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.pgn-btn:hover:not(:disabled){border-color:var(--ac);color:var(--ac);}
.pgn-btn.on{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600;}
.pgn-btn:disabled{opacity:.35;cursor:default;}
/* DAVET MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.mov.open{display:flex;}
.mbox{background:var(--sur);border:1px solid var(--bor);border-radius:16px;width:100%;max-width:460px;box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden;}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--bor);}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--tx);}
.mclose{background:none;border:none;color:var(--txd);font-size:22px;cursor:pointer;line-height:1;}
.mbody{padding:20px;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:12px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fi{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--ac);}
.mfoot{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--bor);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:9999;animation:tin .3s ease;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.t-ok{border-left:3px solid var(--gr);}.t-er{border-left:3px solid var(--re);}.t-in{border-left:3px solid var(--ac);}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
<script src="ares-store.js"></script>
<script src="ares-lang.js"></script>
<script src="ares-layout.js"></script>
</head>
<body>
<div class="app-shell"><div class="main-content"><div class="page">

<div class="breadcrumb"><a href="index.html">Ana Sayfa</a><span>/</span><span>Kullanıcılar</span></div>
<div class="ph">
  <div>
    <h1 class="page-title" data-i18n="kul_baslik">Kullanıcılar</h1>
    <div class="page-sub" data-i18n="kul_sub">Sisteme erişimi olan tüm kullanıcılar · davet ile eklenir</div>
  </div>
  <button class="btn btn-ac" onclick="davetAc()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Kullanıcı Davet Et
  </button>
</div>

<!-- STAT KARTLAR -->
<div class="stat-row">
  <div class="sc">
    <div class="sc-icon ic-ac"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
    <div><div class="sc-val" id="sv-toplam" style="color:var(--ac);">—</div><div class="sc-lbl" data-i18n="kul_stat_toplam">Toplam</div></div>
  </div>
  <div class="sc">
    <div class="sc-icon ic-gr"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></div>
    <div><div class="sc-val" id="sv-aktif" style="color:var(--gr);">—</div><div class="sc-lbl" data-i18n="kul_stat_aktif">Aktif</div></div>
  </div>
  <div class="sc">
    <div class="sc-icon ic-warn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
    <div><div class="sc-val" id="sv-davet" style="color:var(--warn);">—</div><div class="sc-lbl" data-i18n="kul_stat_davet">Davet Bekliyor</div></div>
  </div>
  <div class="sc">
    <div class="sc-icon ic-leg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <div><div class="sc-val" id="sv-admin" style="color:var(--leg);">—</div><div class="sc-lbl" data-i18n="kul_stat_yonetici">Yönetici</div></div>
  </div>
</div>

<!-- FİLTRE -->
<div class="fbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="sinp" id="searchInp" placeholder="Ad, email, firma..." data-i18n-placeholder="kul_search_ph" oninput="filtrele()">
  </div>
  <select class="fsel" id="filtRol" onchange="filtrele()">
    <option value="" data-i18n="kul_filter_tum_rol">Tüm Roller</option>
    <option value="super_admin">Süper Admin</option>
    <option value="yonetici">Yönetici</option>
    <option value="kk_uzmani">KK Uzmanı</option>
    <option value="operator">Operatör</option>
    <option value="izleyici">İzleyici</option>
  </select>
  <select class="fsel" id="filtDurum" onchange="filtrele()">
    <option value="" data-i18n="kul_filter_tum_durum">Tüm Durumlar</option>
    <option value="aktif" data-i18n="kul_durum_aktif">Aktif</option>
    <option value="pasif" data-i18n="kul_durum_pasif">Pasif</option>
    <option value="davet" data-i18n="kul_durum_davet">Davet Bekliyor</option>
  </select>
  <span class="res-cnt" id="resCnt"></span>
</div>

<!-- TABLO -->
<div class="tbl-wrap">
  <table class="tbl">
    <thead>
      <tr>
        <th style="width:48px;"></th>
        <th data-i18n="kul_th_ad">Ad Soyad</th>

    <tbody id="tbody"></tbody>

  <div class="pgn" id="pgnWrap" style="display:none;">
    <div class="pgn-info" id="pgnInfo"></div>
    <div class="pgn-btns" id="pgnBtns"></div>
  </div>
</div>

</div></div></div>

<!-- DAVET MODAL -->
<div class="mov" id="davetModal" onclick="if(event.target===this)davetKapat()">
  <div class="mbox">
    <div class="mhead">
      <span class="mtitle" data-i18n="kul_modal_title">✉️ Kullanıcı Davet Et</span>
      <button class="mclose" onclick="davetKapat()">✕</button>
    </div>
    <div class="mbody">
      <div class="fg">
        <label class="fl" data-i18n="kul_label_email">E-posta *</label>
        <input class="fi" id="dEmail" type="email" placeholder="kullanici@firma.com" data-i18n-placeholder="kul_ph_email">
      </div>
      <div class="fg">
        <label class="fl" data-i18n="kul_label_ad">Ad Soyad *</label>
        <input class="fi" id="dAd" placeholder="Ad Soyad" data-i18n-placeholder="kul_ph_ad">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="fg">
          <label class="fl" data-i18n="kul_label_rol">Rol *</label>
          <select class="fi" id="dRol">
            <option value="operator">Operatör</option>
            <option value="kk_uzmani">KK Uzmanı</option>
            <option value="yonetici">Yönetici</option>
            <option value="izleyici">İzleyici</option>
            <option value="super_admin">Süper Admin</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl" data-i18n="kul_label_brans">Branş</label>
          <select class="fi" id="dBrans">
            <option value="" data-i18n="kul_opt_secin">Seçin</option>
            <option>Kaynakçı</option>
            <option>İmalatçı</option>
            <option>Kesimci</option>
            <option>Boru Montajcı</option>
            <option>Mühendis</option>
            <option>Yönetici</option>
            <option>Diğer</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fl" data-i18n="kul_label_firma">Firma</label>
        <input class="fi" id="dFirma" placeholder="Çalıştığı firma / taşeron" data-i18n-placeholder="kul_ph_firma">
      </div>
      <div class="fg">
        <label class="fl" data-i18n="kul_label_tel">Telefon</label>
        <input class="fi" id="dTel" placeholder="+90 5xx xxx xx xx" type="tel">
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="davetKapat()" style="flex:1;" data-i18n="cmn_iptal">İptal</button>
      <button class="btn btn-ac" onclick="davetGonder()" style="flex:2;" id="davetBtn">
        <span data-i18n="kul_btn_davet">✉️ Davet Gönder</span>
      </button>
    </div>
  </div>
</div>

<script>
'use strict';

var KULLANICILAR = [];
var _filtreli = [];
var _sayfa = 1;
var SAYFA_BOYUT = 20;

function ROL_LABEL(r){
  var m={super_admin:tv('kul_rol_super_admin','Süper Admin'),yonetici:tv('kul_rol_yonetici','Yönetici'),kk_uzmani:tv('kul_rol_kk_uzmani','KK Uzmanı'),operator:tv('kul_rol_operator','Operatör'),izleyici:tv('kul_rol_izleyici','İzleyici')};
  return m[r]||r;
}
var ROL_CLS = {
  super_admin:'r-super', yonetici:'r-yonetici',
  kk_uzmani:'r-kk', operator:'r-operator', izleyici:'r-izleyici'
};
var AVATAR_RENKLER = ['#2D8EFF','#16a36e','#d97706','#7c3aed','#e53e3e','#0891b2','#059669'];

function avatarRenk(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_RENKLER[Math.abs(h) % AVATAR_RENKLER.length];
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SUPABASE YÜKLE ────────────────────────────────────────
async function yukle() {
  try {
    var supa = ARES.supabase();
    if (!supa) return;
    var res = await supa.from('kullanicilar')
      .select('*')
      .eq('tenant_id', ARES.tenantId())
      .order('olusturma', {ascending: false});
    if (res.error) { toast('Veri yükleme hatası', 'er'); return; }
    KULLANICILAR = res.data || [];
    guncelStatlar();
    filtrele();
  } catch(e) { toast('Hata: ' + e.message, 'er'); }
}

function guncelStatlar() {
  var toplam = KULLANICILAR.length;
  var aktif  = KULLANICILAR.filter(function(u){ return u.aktif && u.son_giris; }).length;
  var davet  = KULLANICILAR.filter(function(u){ return !u.son_giris; }).length;
  var admin  = KULLANICILAR.filter(function(u){ return u.rol==='yonetici'||u.rol==='super_admin'; }).length;
  txv('sv-toplam', toplam);
  txv('sv-aktif',  aktif);
  txv('sv-davet',  davet);
  txv('sv-admin',  admin);
}

function txv(id, v) { var e = document.getElementById(id); if(e) e.textContent = v; }

// ── FİLTRELE ──────────────────────────────────────────────
function filtrele() {
  var ara   = (document.getElementById('searchInp').value || '').toLowerCase();
  var rol   = document.getElementById('filtRol').value;
  var durum = document.getElementById('filtDurum').value;

  _filtreli = KULLANICILAR.filter(function(u) {
    var txt = ((u.ad_soyad||'') + (u.email||'') + (u.firma||'')).toLowerCase();
    var okA = !ara   || txt.indexOf(ara) >= 0;
    var okR = !rol   || u.rol === rol;
    var okD = true;
    if (durum === 'aktif') okD = u.aktif && !!u.son_giris;
    if (durum === 'pasif') okD = !u.aktif;
    if (durum === 'davet') okD = !u.son_giris;
    return okA && okR && okD;
  });

  _sayfa = 1;
  var el = document.getElementById('resCnt');
  if (el) el.textContent = _filtreli.length + ' kullanıcı';
  renderTablo();
  renderPgn();
}

// ── TABLO ─────────────────────────────────────────────────
function renderTablo() {
  var tbody = document.getElementById('tbody');
  var bos   = document.getElementById('bosMsg');
  var pgn   = document.getElementById('pgnWrap');
  tbody.textContent = '';

  if (!_filtreli.length) {
    bos.style.display = '';
    pgn.style.display = 'none';
    return;
  }
  bos.style.display = 'none';
  pgn.style.display = '';

  var bas = (_sayfa - 1) * SAYFA_BOYUT;
  var bit = Math.min(bas + SAYFA_BOYUT, _filtreli.length);

  _filtreli.slice(bas, bit).forEach(function(u) {
    var tr = document.createElement('tr');
    if (!u.aktif) tr.classList.add('pasif');
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', function() {
      location.href = 'kullanici_detay.html?id=' + u.id;
    });

    var harf = (u.ad_soyad || '?').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
    var renk  = avatarRenk(u.ad_soyad || u.id);
    var rolL  = ROL_LABEL(u.rol) || u.rol || '—';
    var rolC  = ROL_CLS[u.rol]   || 'r-izleyici';

    // Durum badge
    var durumEl;
    if (!u.son_giris) {
      durumEl = '<span class="dbadge davet">⏳ '+tv('kul_durum_davet','Davet Bekliyor')+'</span>';
    } else if (u.aktif) {
      durumEl = '<span class="dbadge aktif">Aktif</span>';
    } else {
      durumEl = '<span class="dbadge pasif">Pasif</span>';
    }

    var sonGiris = u.son_giris
      ? new Date(u.son_giris).toLocaleString('tr-TR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
      : '<span style="color:var(--txd);font-size:12px;">Henüz giriş yok</span>';

    tr.innerHTML = '<td><div class="avatar" style="background:' + renk + ';">' + esc(harf) + '</div></td>' +
      '<td><div style="font-size:14px;font-weight:600;">' + esc(u.ad_soyad||'—') + '</div>' +
        '<div style="font-size:12px;color:var(--txd);">' + esc(u.email||'') + '</div></td>' +
      '<td><span class="rol-badge ' + rolC + '">' + esc(rolL) + '</span></td>' +
      '<td><div style="font-size:13px;">' + esc(u.firma||'—') + '</div>' +
        '<div style="font-size:12px;color:var(--txd);">' + esc(u.brans||'') + '</div></td>' +
      '<td style="font-size:13px;color:var(--txm);">' + sonGiris + '</td>' +
      '<td>' + durumEl + '</td>' +
      '<td><button class="icon-btn" title="Düzenle" onclick="event.stopPropagation();location.href=\'kullanici_detay.html?id=' + u.id + '\'">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
      '</button></td>';
    tbody.appendChild(tr);
  });
}

function renderPgn() {
  var top  = Math.max(1, Math.ceil(_filtreli.length / SAYFA_BOYUT));
  var bas  = (_sayfa - 1) * SAYFA_BOYUT + 1;
  var bit  = Math.min(_sayfa * SAYFA_BOYUT, _filtreli.length);
  var info = document.getElementById('pgnInfo');
  var btns = document.getElementById('pgnBtns');
  if (info) info.textContent = bas + '–' + bit + ' / ' + _filtreli.length;
  if (!btns) return;
  btns.textContent = '';

  var prev = document.createElement('button');
  prev.className = 'pgn-btn'; prev.textContent = '←';
  if (_sayfa <= 1) prev.disabled = true;
  prev.addEventListener('click', function(){ _sayfa--; renderTablo(); renderPgn(); });
  btns.appendChild(prev);

  for (var i = 1; i <= top; i++) {
    if (i === 1 || i === top || Math.abs(i - _sayfa) <= 1) {
      var b = document.createElement('button');
      b.className = 'pgn-btn' + (i === _sayfa ? ' on' : '');
      b.textContent = i;
      (function(pg){ b.addEventListener('click', function(){ _sayfa=pg; renderTablo(); renderPgn(); }); })(i);
      btns.appendChild(b);
    }
  }

  var next = document.createElement('button');
  next.className = 'pgn-btn'; next.textContent = '→';
  if (_sayfa >= top) next.disabled = true;
  next.addEventListener('click', function(){ _sayfa++; renderTablo(); renderPgn(); });
  btns.appendChild(next);
}

// ── DAVET ─────────────────────────────────────────────────
function davetAc() { document.getElementById('davetModal').classList.add('open'); }
function davetKapat() { document.getElementById('davetModal').classList.remove('open'); }

async function davetGonder() {
  var email = (document.getElementById('dEmail').value || '').trim();
  var ad    = (document.getElementById('dAd').value || '').trim();
  var rol   = document.getElementById('dRol').value;
  var firma = (document.getElementById('dFirma').value || '').trim();
  var brans = document.getElementById('dBrans').value;
  var tel   = (document.getElementById('dTel').value || '').trim();

  if (!email) { toast(tv('kul_err_email','E-posta zorunlu'), 'er'); return; }
  if (!ad)    { toast(tv('kul_err_ad','Ad Soyad zorunlu'), 'er'); return; }

  var btn = document.getElementById('davetBtn');
  btn.disabled = true; btn.textContent = tv('kul_btn_gonderiyor','⏳ Gönderiliyor...');

  try {
    var supa = ARES.supabase();
    if (!supa) throw new Error('Supabase bağlantısı yok');

    // 1. Magic link gönder — anon key ile çalışır
    var { error: otpErr } = await supa.auth.signInWithOtp({
      email: email,
      options: {
        shouldCreateUser: true,
        emailRedirectTo: window.location.origin + '/index.html',
        data: { ad_soyad: ad, rol: rol, tenant_id: ARES.tenantId() }
      }
    });
    if (otpErr) throw new Error(otpErr.message);

    // 2. Kullanicilar tablosuna kayıt ekle (auth ID olmadan — ilk girişte bağlanır)
    var res = await supa.from('kullanicilar').upsert({
      tenant_id:  ARES.tenantId(),
      ad_soyad:   ad,
      email:      email,
      rol:        rol,
      firma:      firma || null,
      brans:      brans || null,
      tel:        tel   || null,
      aktif:      true,
    }, { onConflict: 'email' }).select().single();

    if (res.error) throw new Error(res.error.message);

    toast('✅ Davet maili gönderildi — ' + email, 'ok');
    davetKapat();
    // Formu temizle
    ['dEmail','dAd','dFirma','dTel'].forEach(function(id){
      var e = document.getElementById(id); if(e) e.value='';
    });
    document.getElementById('dRol').value   = 'operator';
    document.getElementById('dBrans').value = '';
    await yukle();
  } catch(e) {
    toast('Hata: ' + e.message, 'er');
  } finally {
    btn.disabled = false; btn.textContent = tv('kul_btn_davet','✉️ Davet Gönder');
  }
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, tip) {
  var old = document.getElementById('_t'); if(old) old.remove();
  var t = document.createElement('div');
  t.id = '_t'; t.className = 'toast t-' + (tip||'in');
  var s = document.createElement('span'); s.textContent = msg;
  var b = document.createElement('button');
  b.style.cssText = 'background:none;border:none;color:var(--txd);cursor:pointer;font-size:16px;margin-left:8px;';
  b.textContent = '✕'; b.addEventListener('click', function(){ t.remove(); });
  t.appendChild(s); t.appendChild(b);
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); }, 4000);
}

// ── INIT ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  (async function() {
    try {
      var _b = 0;
      while (_b < 80) {
        if (typeof ARES === 'undefined') { await new Promise(function(r){setTimeout(r,100);}); _b++; continue; }
        var supa = ARES.supabase();
        if (supa) {
          var ses = await supa.auth.getSession();
          if (ses.data && ses.data.session) { await ARES.oturumKontrol(); if (!await ARES.sayfaYetkiKontrol(['yonetici', 'firma_admin', 'super_admin'])) return; break; }
          if (_b > 20) { location.href = 'giris.html'; return; }
        }
        await new Promise(function(r){setTimeout(r,100);}); _b++;
      }
    } catch(e) {}
    await yukle();
    document.documentElement.style.visibility = '';
  })();
});
</script>
