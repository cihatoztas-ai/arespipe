<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Sayfa | AresPipe</title>
<!-- ✅ A3: Flash prevention — font link'ten ÖNCE -->
<script>(function(){var t=localStorage.getItem('ares_theme')||'dark';document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TEMA ── */
:root{
  --ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;--or:#f97316;
  /* B2: Stage renkleri CSS var */
  --st-bekleyen:#e8705f;--st-imalat:#d4b84a;--st-kaynak:#4a90d9;
  --st-on_kontrol:#e89a3a;--st-kalite:#9b59b6;--st-sevke_hazir:#48a87a;
  /* B2: Takvim event renkleri CSS var */
  --ev-proje:#3B82F6;--ev-personel:#10B981;--ev-not:#F59E0B;--ev-musteri:#EC4899;
  /* B2: Malzeme buton renkleri CSS var */
  --mat-pas:#2563eb;--mat-alu:#7c3aed;--mat-amb:#b45309;--mat-cunife:#c2410c;
}
[data-theme=dark]{
  --bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;
  --tx:#e6ecf4;--txm:#94a3b8;--txd:#6b7a90;
  --blue-l:rgba(45,142,255,.1);--blue-b:rgba(45,142,255,.3);
}
[data-theme=light-anthracite]{
  --bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;
  --tx:#141e2b;--txm:#3a4f63;--txd:#637080;
  --blue-l:rgba(45,142,255,.1);--blue-b:rgba(45,142,255,.3);
}
/* ── B1: Sol kenar renk sistemi ── */
.cl-ac{border-left:3px solid var(--ac)!important;}
.cl-gr{border-left:3px solid var(--gr)!important;}
.cl-re{border-left:3px solid var(--re)!important;}
.cl-warn{border-left:3px solid var(--warn)!important;}
.cl-leg{border-left:3px solid var(--leg)!important;}
/* ── Layout ── */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh;}
.app-shell{display:flex;min-height:100vh;}
.main-content{flex:1;min-width:0;}
.page{padding:28px 28px 40px;}
/* ── Page header ── */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.page-label{font-size:14px;color:var(--txd);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;color:var(--tx);line-height:1;}
/* ── Stat kartlar ── */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s;}
.stat-card:hover{border-color:var(--ac);}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.si-b{background:rgba(45,142,255,.12);color:var(--ac);}
.si-g{background:rgba(22,163,110,.12);color:var(--gr);}
.si-a{background:rgba(217,119,6,.12);color:var(--warn);}
.si-r{background:rgba(229,62,62,.12);color:var(--re);}
.si-p{background:rgba(124,58,237,.12);color:var(--leg);}
.stat-label{font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--tx);line-height:1;}
/* ── Dashboard grid ── */
.dash-grid{display:grid;grid-template-columns:1fr 460px;gap:20px;align-items:start;}
/* ── Spool block ── */
.sp-block{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:16px 18px 18px;}
.sp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sp-title{font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--txm);}
.sp-body{display:grid;grid-template-columns:240px 1fr;gap:0 14px;align-items:start;}
/* ── Donut ── */
.sp-left{display:flex;flex-direction:column;align-items:center;gap:10px;}
.donut-box{position:relative;width:240px;height:240px;}
.donut-box svg{display:block;}
.donut-bg-hit{fill:transparent;cursor:pointer;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;padding:0 40px;}
.donut-num{font-weight:800;line-height:1;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:44px;letter-spacing:-.02em;}
.donut-lbl{font-size:14px;font-weight:600;color:var(--txm);letter-spacing:.05em;text-transform:uppercase;margin-top:6px;text-align:center;}
circle.donut-seg{cursor:pointer;transition:stroke-width .15s;}
/* ── Unit toggle ── */
.unit-tog{display:inline-flex;padding:3px;background:rgba(255,255,255,.04);border:1px solid var(--bor);border-radius:8px;}
.unit-tog button{border:0;background:transparent;color:var(--txm);padding:4px 14px;border-radius:5px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s;}
.unit-tog button.on{background:var(--ac);color:#fff;}
/* ── Heatmap ── */
.hm-scroll{overflow-x:auto;}
.hm-tbl{border-collapse:separate;border-spacing:3px;}
.hm-corner,.hm-row-th{width:120px;min-width:120px;}
.hm-col-th{font-size:14px;font-weight:600;color:var(--txm);text-align:center;padding:0 3px 8px;cursor:pointer;white-space:nowrap;}
.hm-col-th.hl{color:var(--tx);}
.hm-row-th{padding:2px 6px 2px 0;vertical-align:middle;min-width:120px;}
.hm-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 5px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;color:var(--txm);}
.hm-tag:hover{background:rgba(255,255,255,.04);}
.hm-tag.hl{color:var(--tx);}
.hm-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.hm-cell{height:34px;border-radius:6px;text-align:center;vertical-align:middle;font-size:14px;font-weight:600;cursor:pointer;background:var(--sur2);}
.hm-cell.bekleyen{border:2px solid var(--st-bekleyen);}
.hm-cell.imalat{border:2px solid var(--st-imalat);}
.hm-cell.kaynak{border:2px solid var(--st-kaynak);}
.hm-cell.on_kontrol{border:2px solid var(--st-on_kontrol);}
.hm-cell.kalite{border:2px solid var(--st-kalite);}
.hm-cell.sevke_hazir{border:2px solid var(--st-sevke_hazir);}
.hm-cell.empty{border:2px dashed var(--bor);opacity:.5;}
.hm-cell.selected{outline:2px solid var(--ac);outline-offset:1px;}
.hm-grp-td{padding:8px 3px 3px;font-size:14px;font-weight:700;color:var(--txm);letter-spacing:.05em;text-transform:uppercase;}
.hm-grp-td.first{padding-top:0;}
.hm-sep-td{padding:4px 0 0;}
/* ── Malzeme butonlar ── */
.mat-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.mat-btn{border:1px solid var(--bor);background:rgba(255,255,255,.04);color:var(--txm);padding:4px 10px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s;}
.mat-btn.on{color:#fff;border-color:transparent;}
.mat-btn.on[data-m=tumu]{background:var(--ac);}
.mat-btn.on[data-m=celik]{background:var(--ac);}
.mat-btn.on[data-m=paslanmaz]{background:var(--mat-pas);}
.mat-btn.on[data-m=aluminyum]{background:var(--mat-alu);}
.mat-btn.on[data-m=cunife]{background:var(--mat-cunife);}
/* ── Takvim ── */
.cal-wrap{background:var(--sur);border:1px solid var(--bor);border-radius:16px;overflow:hidden;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.cal-title{font-size:16px;font-weight:600;color:var(--tx);}
.nav-btn{background:none;border:1px solid var(--bor);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px;color:var(--txm);display:flex;align-items:center;justify-content:center;transition:background .15s;}
.nav-btn:hover{background:var(--sur2);}
.today-btn{font-size:14px;font-weight:500;color:var(--ac);cursor:pointer;padding:4px 10px;border:1px solid var(--blue-b);border-radius:8px;background:transparent;}
.today-btn:hover{background:var(--blue-l);}
.cal-search{padding:8px 12px;border-bottom:1px solid var(--bor);}
.cal-s-wrap{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:5px 10px;}
.cal-s-wrap input{border:none;background:transparent;color:var(--tx);font-size:14px;outline:none;flex:1;font-family:'Barlow',sans-serif;}
.cal-s-wrap input::placeholder{color:var(--txd);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--bor);}
.cal-dow{font-size:14px;font-weight:500;color:var(--txd);text-align:center;padding:7px 0;border-bottom:1px solid var(--bor);}
.cal-cell{padding:6px 4px 5px;border-right:1px solid var(--bor);border-bottom:1px solid var(--bor);cursor:pointer;display:flex;flex-direction:column;align-items:center;min-height:50px;user-select:none;transition:background .1s;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell:hover{background:var(--sur2);}
.cal-cell.other .dn{opacity:.3;}
.cal-cell.today .dn{background:var(--ac);color:#fff;border-radius:50%;}
.cal-cell.selected{background:var(--blue-l);}
.dn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;color:var(--tx);}
.has-note::after{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--ac);margin-top:3px;}
.cal-popup{border-top:1px solid var(--bor);padding:12px 14px;background:var(--sur);max-height:160px;overflow-y:auto;min-height:52px;}
.pop-date{font-size:14px;font-weight:500;color:var(--txm);margin-bottom:8px;}
.pop-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;padding:4px;border-radius:6px;transition:background .1s;}
.pop-item:hover{background:var(--sur2);}
.pop-bar{width:3px;min-height:26px;border-radius:2px;flex-shrink:0;}
.pop-title{font-size:14px;font-weight:500;line-height:1.4;color:var(--tx);}
.pop-sub{font-size:14px;color:var(--txm);margin-top:1px;}
.pop-badge{font-size:14px;padding:2px 7px;border-radius:99px;margin-left:auto;flex-shrink:0;white-space:nowrap;}
.badge-proje{background:rgba(59,130,246,.12);color:var(--ev-proje);}
.badge-personel{background:rgba(16,185,129,.12);color:var(--ev-personel);}
.badge-not{background:rgba(245,158,11,.12);color:var(--ev-not);}
.badge-musteri{background:rgba(236,72,153,.12);color:var(--ev-musteri);}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 14px;border-top:1px solid var(--bor);font-size:14px;color:var(--txm);align-items:center;background:var(--sur);}
/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:1100;animation:slideIn .3s ease;font-size:14px;}
.t-ok{border-left:3px solid var(--gr);}
.t-er{border-left:3px solid var(--re);}
.t-in{border-left:3px solid var(--ac);}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
<script src="ares-store.js"></script>
<script src="ares-lang.js"></script>
<script src="ares-layout.js"></script>
</head>
<body>
<div class="app-shell">
<div class="main-content">
<div class="page">

  <!-- BAŞLIK -->
  <div class="page-header">
    <div>
      <div class="page-label" data-i18n="idx_sys_label">Tersane Yönetim Sistemi</div>
      <div class="page-title" data-i18n="idx_title">Ana Sayfa</div>
    </div>
    <div style="font-size:14px;color:var(--txd);" id="clockDisplay"></div>
  </div>

  <!-- STAT KARTLAR -->
  <div class="stat-row">
    <div class="stat-card cl-ac">
      <div class="stat-icon si-b"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div>
      <div><div class="stat-label" data-i18n="idx_stat_proje">Aktif Proje</div><div class="stat-value" id="stPrj">—</div></div>
    </div>
    <div class="stat-card cl-leg">
      <div class="stat-icon si-p"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div><div class="stat-label" data-i18n="idx_stat_devre">Aktif Devre</div><div class="stat-value" id="stDev">—</div></div>
    </div>
    <div class="stat-card cl-warn">
      <div class="stat-icon si-a"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/></svg></div>
      <div><div class="stat-label" data-i18n="idx_stat_kesim">Kesim Bekleyen</div><div class="stat-value" style="color:var(--warn);" id="stKes">—</div></div>
    </div>
    <div class="stat-card cl-re">
      <div class="stat-icon si-r"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <div><div class="stat-label" data-i18n="idx_stat_kk">KK Bekleyen</div><div class="stat-value" style="color:var(--re);" id="stKK">—</div></div>
    </div>
    <div class="stat-card cl-gr">
      <div class="stat-icon si-g"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8l5 2v5h-5V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
      <div><div class="stat-label" data-i18n="idx_stat_sevk">Bu Ay Sevk</div><div class="stat-value" style="color:var(--gr);" id="stSev">—</div></div>
    </div>
  </div>

  <!-- DASHBOARD GRİD -->
  <div class="dash-grid">

    <!-- SPOOL DONUT + HEATMAP -->
    <div class="sp-block">
      <div class="sp-hdr">
        <div class="sp-title" data-i18n="idx_spool_title">Sistemdeki Toplam Spool Durumu</div>
        <div id="spLoadInd" style="font-size:14px;color:var(--txd);"></div>
      </div>
      <div class="sp-body">
        <!-- Donut + unit + malzeme -->
        <div class="sp-left">
          <div class="donut-box">
            <svg width="240" height="240" viewBox="0 0 240 240">
              <rect class="donut-bg-hit" width="240" height="240" id="bgHit"/>
              <g transform="rotate(-90 120 120)">
                <circle cx="120" cy="120" r="96" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="24"/>
              </g>
              <g id="sbSegs" transform="rotate(-90 120 120)"></g>
            </svg>
            <div class="donut-center">
              <div id="sbNum" class="donut-num">—</div>
              <div id="sbLbl" class="donut-lbl" data-i18n="idx_lbl_total_adet">TOPLAM ADET</div>
            </div>
          </div>
          <div class="unit-tog">
            <button id="btnAdet" class="on" data-i18n="idx_btn_adet">Adet</button>
            <button id="btnKg" data-i18n="idx_btn_kg">Ağırlık</button>
          </div>
          <div class="mat-row" id="matRow">
            <button class="mat-btn on" data-m="tumu" data-i18n="idx_mat_tumu">Tümü</button>
            <button class="mat-btn" data-m="celik" data-i18n="idx_mat_celik">Çelik</button>
            <button class="mat-btn" data-m="paslanmaz" data-i18n="idx_mat_pas">Paslanmaz</button>
            <button class="mat-btn" data-m="aluminyum" data-i18n="idx_mat_alu">Alüminyum</button>
            <button class="mat-btn" data-m="cunife" data-i18n="idx_mat_cunife">Cunife</button>
          </div>
        </div>
        <!-- Heatmap -->
        <div style="flex:1;min-width:0;">
          <div class="hm-scroll"><table class="hm-tbl" id="sbHm"></table></div>
        </div>
      </div>
    </div>

    <!-- TAKVİM -->
    <div class="cal-wrap">
      <div class="cal-hdr">
        <div style="display:flex;align-items:center;gap:7px;">
          <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
          <span class="cal-title" id="monthTitle"></span>
          <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
          <button class="today-btn" onclick="goToday()" data-i18n="idx_cal_today">Bugün</button>
        </div>
        <button style="font-size:14px;color:var(--txm);cursor:pointer;padding:4px 10px;border:1px solid var(--bor);border-radius:8px;background:transparent;" data-i18n="idx_cal_calendars">Takvimler</button>
      </div>
      <div class="cal-search">
        <div class="cal-s-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--txd);flex-shrink:0;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="calSearch" data-i18n-placeholder="idx_cal_search" placeholder="Etkinlik ara..." oninput="onSearch(this.value)">
          <button id="searchClear" onclick="clearSearch()" style="display:none;background:none;border:none;cursor:pointer;color:var(--txd);font-size:16px;line-height:1;padding:0;">&times;</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-popup" id="calPopup"></div>
      <div class="cal-legend">
        <span style="display:inline-flex;align-items:center;gap:5px;">
          <span style="width:5px;height:5px;border-radius:50%;background:var(--ac);display:inline-block;"></span>
          <span data-i18n="idx_cal_legend">Etkinlik olan günler</span>
        </span>
        <span style="color:var(--txd);margin-left:4px;" data-i18n="idx_cal_dblclick">· Çift tıklayarak not ekleyin</span>
      </div>
    </div>

  </div>
</div>
</div>
</div>
<script>
'use strict';
// ── YARDIMCI ────────────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── D-01 DİL SİSTEMİ ────────────────────────────────────────
var _MO_TR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
var _DOW_TR=['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];
function getMo(i){return tvArr('idx_mo',_MO_TR)[i]||_MO_TR[i];}
function getDow(i){return tvArr('idx_dow',_DOW_TR)[i]||_DOW_TR[i];}
window._onLangChange=function(){_applyI18n();updateClock();renderAll();renderMiniCal();renderPopup();};

// ── SAAT ────────────────────────────────────────────────────
function updateClock(){
  var lang=_getLang();
  var locale=lang==='ar'?'ar-SA':lang==='en'?'en-US':'tr-TR';
  document.getElementById('clockDisplay').textContent=
    new Date().toLocaleString(locale,{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
updateClock();setInterval(updateClock,60000);

// ── STAGE & CAP TANIMLAR ────────────────────────────────────
var STAGES=[
  {key:'bekleyen',   i18n:'idx_stage_bekleyen',   label:'BEKLEYEN',    color:'var(--st-bekleyen)'},
  {key:'imalat',     i18n:'idx_stage_imalat',      label:'İMALAT',      color:'var(--st-imalat)'},
  {key:'kaynak',     i18n:'idx_stage_kaynak',      label:'KAYNAK',      color:'var(--st-kaynak)'},
  {key:'on_kontrol', i18n:'idx_stage_on_kontrol',  label:'ÖN KONTROL',  color:'var(--st-on_kontrol)'},
  {key:'kalite',     i18n:'idx_stage_kalite',      label:'KALİTE KNT.', color:'var(--st-kalite)'},
  {key:'sevke_hazir',i18n:'idx_stage_sevke_hazir', label:'SEVKE HAZIR', color:'var(--st-sevke_hazir)'}
];
var STAGE_GROUPS=[
  {i18n:'idx_grp_uretim', label:'ÜRETİM',          keys:['bekleyen','imalat','kaynak','on_kontrol']},

// ── SUPABASE VERİ YÜKLEME ──────────────────────────────────
function _matKey(m){
  if(!m)return 'celik';
  var s=m.toLowerCase().replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c');
  if(s.includes('paslanmaz')||s.includes('316')||s.includes('304'))return 'paslanmaz';
  if(s.includes('alumin'))return 'aluminyum';
  if(s.includes('cunife')||s.includes('cu-ni'))return 'cunife';
  return 'celik';
}
function _capKey(mm){var d=parseFloat(mm)||0;if(d<=48.3)return 's';if(d<=114.3)return 'm';if(d<=273)return 'l';return 'xl';}
var _bMap={on_imalat:'bekleyen',imalat:'imalat',kaynak:'kaynak',on_kontrol:'on_kontrol',kk:'kalite',sevkiyat:'sevke_hazir'};
function _stKey(b){return _bMap[(b||'').toLowerCase()]||'bekleyen';}

async function veriYukle(){
  var ind=document.getElementById('spLoadInd');
  var supa=(typeof ARES!=='undefined')?ARES.supabase():null;
  if(!supa)return;
  try{
    if(ind)ind.textContent=tv('idx_loading','Yükleniyor...');
    var res=await supa.from('spooller')
      .select('id,aktif_basamak,spool_malzemeleri(malzeme,dis_cap_mm,agirlik_kg)');
    if(res.error){console.warn('[ARES] veriYukle:',res.error.message);if(ind)ind.textContent='';return;}
    STAGES.forEach(function(st){st.items=[];});
    (res.data||[]).forEach(function(row){
      var mal=Array.isArray(row.spool_malzemeleri)?(row.spool_malzemeleri[0]||{}):(row.spool_malzemeleri||{});
      var stKey=_stKey(row.aktif_basamak);
      var st=STAGES.find(function(s){return s.key===stKey;});
      if(!st)return;
      st.items.push({id:row.id,mat:_matKey(mal.malzeme),capGrp:_capKey(mal.dis_cap_mm),kg:parseFloat(mal.agirlik_kg)||0});
    });
    if(ind)ind.textContent='';
    renderAll();
    console.log('[ARES] Donut:',(res.data||[]).length,'spool');
    _statYukle(supa);
  }catch(e){console.warn('[ARES] veriYukle:',e);if(ind)ind.textContent='';}
}

async function _statYukle(supa){
  try{
    var r=await Promise.all([
      supa.from('projeler').select('id',{count:'exact',head:true}),
      supa.from('devreler').select('id',{count:'exact',head:true}).eq('silindi',false),
      supa.from('kesim_kalemleri').select('id',{count:'exact',head:true}).eq('kesildi',false),
      supa.from('spooller').select('id',{count:'exact',head:true}).eq('aktif_basamak','kk')
    ]);
    var s=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v!==null&&v!==undefined?v:'—';};
    s('stPrj',r[0].count);s('stDev',r[1].count);s('stKes',r[2].count);s('stKK',r[3].count);
  }catch(e){console.warn('[ARES] statYukle:',e);}
}

// ── DONUT & HEATMAP RENDER ──────────────────────────────────
var unit='adet',selSt=null,selCG=null,actMats=new Set();
var fmt=function(v){return new Intl.NumberFormat('tr-TR').format(v);};
function getIt(stKey,cg){
  var it=STAGES.find(function(s){return s.key===stKey;}).items;
  if(actMats.size>0)it=it.filter(function(i){return actMats.has(i.mat);});
  if(cg)it=it.filter(function(i){return i.capGrp===cg;});
  return it;
}
function stVal(k){var it=getIt(k);return unit==='kg'?it.reduce(function(s,i){return s+i.kg;},0):it.length;}
function hmVal(k,cg){var it=getIt(k,cg);return unit==='kg'?it.reduce(function(s,i){return s+i.kg;},0):it.length;}

function renderDonut(){
  var g=document.getElementById('sbSegs');g.innerHTML='';
  var total=STAGES.reduce(function(s,st){return s+stVal(st.key);},0);
  var cVal=selSt?(selCG?hmVal(selSt,selCG):stVal(selSt)):total;
  var selStObj=selSt?STAGES.find(function(s){return s.key===selSt;}):null;
  var selCGObj=selCG?CAP_GROUPS.find(function(c){return c.key===selCG;}):null;
  var cLbl=selStObj
    ?(selCGObj?tv(selStObj.i18n,selStObj.label)+' · '+selCGObj.label:tv(selStObj.i18n,selStObj.label))
    :(unit==='kg'?tv('idx_lbl_total_kg','TOPLAM KG'):tv('idx_lbl_total_adet','TOPLAM ADET'));
  document.getElementById('sbNum').textContent=unit==='kg'?fmt(Math.round(cVal)):fmt(cVal);
  document.getElementById('sbLbl').textContent=cLbl;
  var R=96,C=2*Math.PI*R,GAP=2.5,acc=0;
  STAGES.forEach(function(st){
    var v=stVal(st.key);if(!v)return;
    var sl=total>0?(v/total)*C:0,dl=sl>GAP*2?sl-GAP:sl;
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ['cx','cy','r','fill'].forEach(function(a,_,aa){c.setAttribute(a,['120','120','96','none'][_]);});
    c.setAttribute('stroke',st.color);
    c.setAttribute('stroke-width',selSt===st.key?'32':'24');
    c.setAttribute('stroke-dasharray',dl+' '+(C-dl));
    c.setAttribute('stroke-dashoffset',-(acc+GAP/2));
    c.setAttribute('class','donut-seg');
    (function(stKey){c.addEventListener('click',function(e){e.stopPropagation();selSt=(selSt===stKey)?null:stKey;selCG=null;renderAll();});})(st.key);
    acc+=sl;g.appendChild(c);
  });
}
document.getElementById('bgHit').addEventListener('click',function(){selSt=null;selCG=null;renderAll();});

function renderHeatmap(){
  var tbl=document.getElementById('sbHm');tbl.innerHTML='';
  var thead=tbl.createTHead(),hr=thead.insertRow();
  hr.appendChild(document.createElement('th')).className='hm-corner hm-row-th';
  CAP_GROUPS.forEach(function(cg){
    var th=document.createElement('th');
    th.className='hm-col-th'+(selCG===cg.key?' hl':'');
    th.textContent=cg.label;
    (function(k){th.addEventListener('click',function(){selCG=selCG===k?null:k;renderAll();});})(cg.key);
    hr.appendChild(th);
  });
  var tbody=tbl.createTBody();
  STAGE_GROUPS.forEach(function(grp,gi){
    if(gi>0){var sr=tbody.insertRow();var sep=sr.insertCell();sep.colSpan=CAP_GROUPS.length+1;sep.className='hm-sep-td';sep.innerHTML='<div style="height:1px;background:var(--bor)"></div>';}
    var gr=tbody.insertRow();var gtd=gr.insertCell();gtd.colSpan=CAP_GROUPS.length+1;gtd.className='hm-grp-td'+(gi===0?' first':'');gtd.textContent=tv(grp.i18n,grp.label);
    grp.keys.forEach(function(stKey){
      var st=STAGES.find(function(s){return s.key===stKey;});
      var row=tbody.insertRow();
      var rth=document.createElement('td');rth.className='hm-row-th';
      rth.innerHTML='<span class="hm-tag'+(selSt===stKey&&!selCG?' hl':'')+'"><span class="hm-dot" style="background:'+st.color+'"></span>'+esc(tv(st.i18n,st.label))+'</span>';
      (function(k){rth.querySelector('.hm-tag').addEventListener('click',function(){selSt=(selSt===k&&!selCG)?null:k;selCG=null;renderAll();});})(stKey);
      row.appendChild(rth);
      CAP_GROUPS.forEach(function(cg){
        var val=hmVal(stKey,cg.key);
        var td=row.insertCell();
        var isSel=selSt===stKey&&selCG===cg.key;
        td.className='hm-cell '+(val?stKey:'empty')+(isSel?' selected':'');
        td.textContent=val?(unit==='kg'?fmt(Math.round(val)):val):'·';
        (function(sk,ck){td.addEventListener('click',function(){if(selSt===sk&&selCG===ck){selSt=null;selCG=null;}else{selSt=sk;selCG=ck;}renderAll();});})(stKey,cg.key);
      });
    });
  });
}

document.getElementById('matRow').addEventListener('click',function(e){
  var btn=e.target.closest('.mat-btn');if(!btn)return;

function renderAll(){
  document.getElementById('btnAdet').classList.toggle('on',unit==='adet');

}

var evOn=function(ds){return EVENTS.filter(function(e){return ds>=e.start&&ds<=e.end;});};

function renderMiniCal(){
  var yr=cur.getFullYear(),mo=cur.getMonth();
  document.getElementById('monthTitle').textContent=getMo(mo)+' '+yr;
  var first=new Date(yr,mo,1),startDow=(first.getDay()+6)%7;
  var dim=new Date(yr,mo+1,0).getDate(),dip=new Date(yr,mo,0).getDate();
  var today=new Date(),isTM=today.getFullYear()===yr&&today.getMonth()===mo;
  var html='';
  for(var di=0;di<7;di++)html+='<div class="cal-dow">'+esc(getDow(di))+'</div>';
  for(var i=0;i<startDow;i++)html+='<div class="cal-cell other"><div class="dn">'+(dip-startDow+1+i)+'</div></div>';
  for(var d=1;d<=dim;d++){
    var ds=dk(new Date(yr,mo,d)),hn=evOn(ds).length>0;
    var isT=isTM&&d===today.getDate(),isSel=d===selDay&&!isT;
    html+='<div class="cal-cell'+(isT?' today':'')+(isSel?' selected':'')+(hn?' has-note':'')+'" onclick="handleClick('+d+')" ondblclick="handleDblClick('+d+',event)"><div class="dn">'+d+'</div></div>';
  }
  var rem=(7-(startDow+dim)%7)%7;
  for(var i2=1;i2<=rem;i2++)html+='<div class="cal-cell other"><div class="dn">'+i2+'</div></div>';
  document.getElementById('calGrid').innerHTML=html;
}

function renderPopup(){
  var yr=cur.getFullYear(),mo=cur.getMonth(),ds=dk(new Date(yr,mo,selDay));
  var evs=evOn(ds),el=document.getElementById('calPopup');
  var lbl=selDay+' '+getMo(mo)+' '+yr;
  if(!evs.length){el.innerHTML='<div class="pop-date">'+esc(lbl)+'<span style="color:var(--txd);margin-left:6px;">— '+tv('idx_cal_no_event','etkinlik yok')+'</span></div>';return;}
  el.innerHTML='<div class="pop-date">'+esc(lbl)+'</div>'+evs.map(function(e){
    var tc=TC[e.type]||TC.not;
    return '<div class="pop-item">'
      +'<div class="pop-bar" style="background:var('+tc.bar+')"></div>'
      +'<div style="flex:1"><div class="pop-title">'+esc(e.title)+'</div>'+(e.sub?'<div class="pop-sub">'+esc(e.sub)+'</div>':'')+'</div>'
      +'<span class="pop-badge '+tc.badge+'">'+esc(tv(tc.i18n,tc.label))+'</span>'
      +'</div>';
  }).join('');
}
function handleClick(d){clearTimeout(clickTimer);clickTimer=setTimeout(function(){selDay=d;renderMiniCal();renderPopup();},200);}
function handleDblClick(d,e){e.preventDefault();clearTimeout(clickTimer);selDay=d;renderMiniCal();renderPopup();}
function changeMonth(dir){cur=new Date(cur.getFullYear(),cur.getMonth()+dir,1);selDay=1;renderMiniCal();renderPopup();}
function goToday(){var t=new Date();cur=new Date(t.getFullYear(),t.getMonth(),1);selDay=t.getDate();renderMiniCal();renderPopup();}

function renderFCal(){
  var yr=fCur.getFullYear(),mo=fCur.getMonth();
  document.getElementById('fCalTitle').textContent=getMo(mo)+' '+yr;
  // Gün başlıkları
  var dowHtml='';
  for(var di=0;di<7;di++)dowHtml+='<div style="text-align:center;font-size:14px;font-weight:600;color:var(--txd);padding:6px 0;">'+esc(getDow(di))+'</div>';
  document.getElementById('fCalDow').innerHTML=dowHtml;
  // Hücreler
  var first=new Date(yr,mo,1),startDow=(first.getDay()+6)%7;
  var dim=new Date(yr,mo+1,0).getDate(),dip=new Date(yr,mo,0).getDate();
  var today=new Date(),isTM=today.getFullYear()===yr&&today.getMonth()===mo;
  var html='';
  for(var i=0;i<startDow;i++){
    var dd=dip-startDow+1+i;
    html+='<div style="min-height:70px;border-radius:8px;border:1px solid var(--bor);padding:6px;opacity:.3;background:var(--sur2);">'
      +'<div style="font-size:14px;color:var(--txd);">'+dd+'</div></div>';
  }
  for(var d=1;d<=dim;d++){
    var ds=dk(new Date(yr,mo,d));
    var dayEvs=evOn(ds);
    var isT=isTM&&d===today.getDate();
    var border=isT?'2px solid var(--ac)':'1px solid var(--bor)';
    html+='<div style="min-height:70px;border-radius:8px;border:'+border+';padding:6px;background:var(--sur);cursor:pointer;" onclick="fCalSelDay('+d+')">'
      +'<div style="font-size:14px;font-weight:'+(isT?'800':'500')+';color:'+(isT?'var(--ac)':'var(--tx)')+';">'+(isT?'<span style="background:var(--ac);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;">'+d+'</span>':d)+'</div>'
      +dayEvs.slice(0,2).map(function(e){
        var tc=TC[e.type]||TC.not;
        return '<div style="margin-top:3px;font-size:14px;background:var(--sur2);border-left:3px solid var('+tc.bar+');padding:1px 5px;border-radius:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--tx);">'+esc(e.title)+'</div>';
      }).join('')
      +(dayEvs.length>2?'<div style="font-size:14px;color:var(--ac);margin-top:2px;">+'+(dayEvs.length-2)+' daha</div>':'')
      +'</div>';
  }
  var rem=(7-(startDow+dim)%7)%7;
  for(var i2=1;i2<=rem;i2++){
    html+='<div style="min-height:70px;border-radius:8px;border:1px solid var(--bor);padding:6px;opacity:.3;background:var(--sur2);">'
      +'<div style="font-size:14px;color:var(--txd);">'+i2+'</div></div>';
  }
  document.getElementById('fCalGrid').innerHTML=html;
  // Ay etkinlikleri listesi
  var moEvs=EVENTS.filter(function(e){
    return (e.start<=dk(new Date(yr,mo,dim)))&&(e.end>=dk(new Date(yr,mo,1)));
  });
  document.getElementById('fEvTitle').textContent=getMo(mo)+' — '+moEvs.length+' etkinlik';
  if(!moEvs.length){document.getElementById('fEvList').innerHTML='<div style="font-size:14px;color:var(--txd);padding:8px 0;">'+tv('idx_cal_no_event','etkinlik yok')+'</div>';return;}
  document.getElementById('fEvList').innerHTML=moEvs.map(function(e){
    var tc=TC[e.type]||TC.not;
    var sDate=e.start.slice(8)+' '+getMo(parseInt(e.start.slice(5,7))-1);
    var eDate=e.end!==e.start?(' — '+e.end.slice(8)+' '+getMo(parseInt(e.end.slice(5,7))-1)):'';
    return '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bor);">'
      +'<div style="width:3px;border-radius:2px;background:var('+tc.bar+');flex-shrink:0;"></div>'
      +'<div style="flex:1;">'
        +'<div style="font-size:14px;font-weight:600;color:var(--tx);">'+esc(e.title)+'</div>'
        +(e.sub?'<div style="font-size:14px;color:var(--txm);">'+esc(e.sub)+'</div>':'')
        +'<div style="font-size:14px;color:var(--txd);margin-top:3px;">'+esc(sDate+eDate)+'</div>'
      +'</div>'
      +'<span style="font-size:14px;padding:2px 8px;border-radius:99px;height:fit-content;flex-shrink:0;" class="badge-'+e.type+'">'+esc(tv(tc.i18n,tc.label))+'</span>'
      +'</div>';
  }).join('');
}
