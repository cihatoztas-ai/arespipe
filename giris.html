/* Üst gradient — logo/yazı kalıntısı tamamen kapanır */
.giris-sol::before{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(to bottom,
      rgba(7,9,15,0.92) 0%,
      rgba(7,9,15,0.30) 28%,
      rgba(7,9,15,0.10) 50%,
      rgba(7,9,15,0.25) 72%,
      rgba(7,9,15,0.75) 100%
    );
}
/* Sağa blend */
.giris-sol::after{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to right,transparent 60%,var(--bg) 100%);
}
.sol-ust{
  position:absolute;top:36px;left:44px;z-index:3;
  display:flex;align-items:center;gap:8px;
}
.etiket-nokta{
  width:6px;height:6px;border-radius:50%;background:var(--ac);
  animation:nab 2.2s ease-in-out infinite;
}
@keyframes nab{0%,100%{opacity:1;}50%{opacity:0.25;}}
.etiket-yazi{font-size:14px;color:rgba(255,255,255,0.35);font-weight:500;letter-spacing:0.5px;}
.sol-brand{
  position:absolute;bottom:48px;left:44px;right:44px;z-index:3;
}
.brand-ad{
  font-family:'Barlow Condensed',sans-serif;
  font-size:30px;font-weight:800;color:#fff;letter-spacing:1.5px;
  margin-bottom:6px;
}
.brand-cizgi{width:44px;height:2px;background:linear-gradient(to right,var(--ac),transparent);margin-bottom:10px;}
.brand-alt{font-size:14px;color:rgba(255,255,255,0.45);line-height:1.5;}

/* ── Sağ panel ──────────────────────────────────────────── */
.giris-sag{
  flex:1;background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 52px;position:relative;overflow-y:auto;
}
.lang-secici{position:absolute;top:22px;right:22px;display:flex;gap:4px;}
.lang-btn{
  background:var(--sur2);border:1px solid var(--bor2);
  border-radius:7px;padding:4px 10px;
  font-size:14px;font-weight:600;font-family:'Barlow',sans-serif;
  color:var(--txd);cursor:pointer;transition:all 0.15s;
}
.lang-btn:hover{color:var(--tx);border-color:var(--bor);}
.lang-btn.aktif{background:rgba(45,142,255,.12);color:var(--ac);border-color:rgba(45,142,255,.3);}

.form-wrap{
  width:100%;max-width:360px;
  animation:rise 0.5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.logo-alan{margin-bottom:32px;}
.logo-baslik{
  font-family:'Barlow Condensed',sans-serif;
  font-size:30px;font-weight:800;color:var(--tx);
  letter-spacing:2px;line-height:1;margin-bottom:6px;
}
.logo-altyazi{font-size:14px;color:var(--txd);}

.form-grup{margin-bottom:18px;}
.form-etiket{
  display:block;font-size:14px;font-weight:700;
  color:var(--txd);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:7px;
}
.form-input{
  width:100%;background:var(--sur2);
  border:1px solid var(--bor2);border-radius:10px;
  padding:12px 15px;font-size:15px;color:var(--tx);
  font-family:'Barlow',sans-serif;
  transition:border-color 0.18s,box-shadow 0.18s;outline:none;
}
.form-input:focus{border-color:rgba(45,142,255,.5);box-shadow:0 0 0 3px rgba(45,142,255,.09);}
.form-input::placeholder{color:var(--txd);}
.sifre-kapsam{position:relative;}
.sifre-goster{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--txd);
  padding:4px;transition:color 0.15s;display:flex;align-items:center;
}
.sifre-goster:hover{color:var(--ac);}
.sifre-goster svg{width:18px;height:18px;}

.giris-btn{
  width:100%;
  background:linear-gradient(135deg,#2D8EFF 0%,#1a75e8 100%);
  color:#fff;border:none;border-radius:10px;padding:13px;
  font-size:16px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
  letter-spacing:0.8px;cursor:pointer;
  transition:opacity 0.15s,box-shadow 0.15s,transform 0.1s;
  margin-top:4px;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 20px rgba(45,142,255,.25);
}
.giris-btn:hover{opacity:0.9;box-shadow:0 6px 28px rgba(45,142,255,.38);}
.giris-btn:active{transform:scale(0.985);}
.giris-btn:disabled{opacity:0.55;cursor:not-allowed;box-shadow:none;}
.spinner{
  width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.7s linear infinite;display:none;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ✅ B3: 14px */
.hata-kutu{
  display:none;background:rgba(229,62,62,.07);
  border:1px solid rgba(229,62,62,.22);border-left:3px solid var(--re);
  border-radius:9px;padding:11px 15px;font-size:14px;color:var(--re);
  margin-top:16px;line-height:1.5;
}
.hata-kutu.goster{display:block;}
.bilgi-kutu{
  display:none;background:rgba(45,142,255,.06);
  border:1px solid rgba(45,142,255,.18);border-left:3px solid var(--ac);
  border-radius:9px;padding:11px 15px;font-size:14px;color:var(--txm);margin-top:16px;
}
.bilgi-kutu.goster{display:block;}
.giris-alt{margin-top:24px;font-size:14px;color:var(--txd);text-align:center;}

@media(max-width:768px){
  html,body{overflow:auto;}
  .giris-sayfa{flex-direction:column;height:auto;min-height:100vh;}
  .giris-sol{display:none;}
  .giris-sag{padding:32px 24px;min-height:100vh;}
  .lang-secici{position:fixed;top:14px;right:14px;}
}
</style>

        <span class="spinner" id="spinner"></span>
        <span id="btnYazi" data-i18n="giris_gir">Giriş Yap</span>
      </button>
      <div class="hata-kutu" id="hataKutu"></div>
      <div class="bilgi-kutu" id="bilgiKutu" data-i18n="giris_yukleniyor">Giriş yapılıyor, lütfen bekleyin…</div>
      <div class="giris-alt">AresPipe &copy; 2026</div>
    </div>
  </div>

</div>

<script>
'use strict'; // ✅ A1

// ✅ C1: _I18N
var _I18N = {
  en: {
    giris_altyazi:         'Shipyard Pipe Fabrication Tracking',
    giris_hosgeldiniz:     'Welcome back',
    giris_eposta:          'Email',
    giris_sifre:           'Password',
    giris_gir:             'Sign In',
    giris_yukleniyor:      'Signing in, please wait\u2026',
    giris_basarili:        'Login successful, redirecting\u2026',
    giris_hata_bos_eposta: 'Email address is required.',
    giris_hata_bos_sifre:  'Password is required.',
    giris_hata_invalid:    'Invalid email or password.',
    giris_hata_email:      'Email address not confirmed.',
    giris_hata_limit:      'Too many attempts. Please wait.',
    giris_hata_sunucu:     'Cannot connect to server\u2026',
    giris_hata_genel:      'Unexpected error: ',
    giris_yukleniyor_btn:  'Signing in\u2026',
  },
  ar: {
    giris_altyazi:         '\u0646\u0638\u0627\u0645 \u062a\u062a\u0628\u0639 \u062a\u0635\u0646\u064a\u0639 \u0627\u0644\u0623\u0646\u0627\u0628\u064a\u0628',
    giris_hosgeldiniz:     '\u0645\u0631\u062d\u0628\u0627\u064b \u0628\u0639\u0648\u062f\u062a\u0643',
    giris_eposta:          '\u0627\u0644\u0628\u0631\u064a\u062f \u0627\u0644\u0625\u0644\u0643\u062a\u0631\u0648\u0646\u064a',
    giris_sifre:           '\u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631',
    giris_gir:             '\u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644',
    giris_yukleniyor:      '\u062c\u0627\u0631\u0650 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644\u2026',
    giris_basarili:        '\u062a\u0645 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644\u060c \u062c\u0627\u0631\u0650 \u0627\u0644\u062a\u062d\u0648\u064a\u0644\u2026',
    giris_hata_bos_eposta: '\u0627\u0644\u0628\u0631\u064a\u062f \u0645\u0637\u0644\u0648\u0628.',
    giris_hata_bos_sifre:  '\u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u0645\u0637\u0644\u0648\u0628\u0629.',
    giris_hata_invalid:    '\u0628\u0631\u064a\u062f \u0623\u0648 \u0643\u0644\u0645\u0629 \u063a\u064a\u0631 \u0635\u062d\u064a\u062d\u0629.',
    giris_hata_email:      '\u0644\u0645 \u064a\u062a\u0645 \u062a\u0623\u0643\u064a\u062f \u0627\u0644\u0628\u0631\u064a\u062f.',
    giris_hata_limit:      '\u0645\u062d\u0627\u0648\u0644\u0627\u062a \u0643\u062b\u064a\u0631\u0629. \u0627\u0646\u062a\u0638\u0631.',
    giris_hata_sunucu:     '\u062a\u0639\u0630\u0651\u0631 \u0627\u0644\u0627\u062a\u0635\u0627\u0644\u2026',
    giris_hata_genel:      '\u062e\u0637\u0623: ',
    giris_yukleniyor_btn:  '\u062c\u0627\u0631\u0650 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644\u2026',
  }
};

// ✅ C2: tv()
function tv(key, tr) {
  var lang = document.documentElement.getAttribute('lang') || 'tr';
  var dict = _I18N[lang];
  if (dict && dict[key] !== undefined) return dict[key];
  return tr !== undefined ? tr : key;
}

// ✅ C2: _applyI18n()
function _applyI18n() {
  var lang = document.documentElement.getAttribute('lang') || 'tr';
  var isTr = lang === 'tr';
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (!el.hasAttribute('data-i18n-tr')) el.setAttribute('data-i18n-tr', el.textContent.trim());
    el.textContent = isTr ? el.getAttribute('data-i18n-tr') : (tv(key) !== key ? tv(key) : el.getAttribute('data-i18n-tr'));
  });
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('aktif', b.dataset.lang === lang);
  });
  document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
}

// ✅ C2: MutationObserver
new MutationObserver(function(m) {
  m.forEach(function(r){ if(r.attributeName==='lang') _applyI18n(); });
}).observe(document.documentElement, { attributes:true, attributeFilter:['lang'] });

// ✅ D1: esc()
function esc(s) {
  if (s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function _setLangGiris(lang) {
  localStorage.setItem('ares_lang', lang);
  document.documentElement.setAttribute('lang', lang);
}

function sifreGoster() {
  var inp = document.getElementById('sifre');
  var show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  document.getElementById('ikonGor').style.display   = show ? 'none' : '';
  document.getElementById('ikonGizle').style.display = show ? '' : 'none';
}

// ── UI yardımcıları — ✅ C6: tv()
function hataGoster(mesaj) {
  var k = document.getElementById('hataKutu');
  k.textContent = mesaj;
  k.classList.add('goster');
  document.getElementById('bilgiKutu').classList.remove('goster');
}
function yukleniyorAc() {
  document.getElementById('spinner').style.display   = 'block';
  document.getElementById('btnYazi').textContent      = tv('giris_yukleniyor_btn','Giriş yapılıyor\u2026');
  document.getElementById('girisBtn').disabled        = true;
  document.getElementById('hataKutu').classList.remove('goster');
  document.getElementById('bilgiKutu').textContent    = tv('giris_yukleniyor','Giriş yapılıyor, lütfen bekleyin\u2026');
  document.getElementById('bilgiKutu').classList.add('goster');
}
function yukleniyorKapat() {
  document.getElementById('spinner').style.display   = 'none';
  document.getElementById('btnYazi').textContent      = tv('giris_gir','Giriş Yap');
  document.getElementById('girisBtn').disabled        = false;
  document.getElementById('bilgiKutu').classList.remove('goster');
}

// ── Giriş
async function girisYap() {
  var email = document.getElementById('email').value.trim();
  var sifre = document.getElementById('sifre').value;
  if (!email) { hataGoster(tv('giris_hata_bos_eposta','E-posta adresi boş bırakılamaz.')); return; }
  if (!sifre) { hataGoster(tv('giris_hata_bos_sifre','Şifre boş bırakılamaz.')); return; }
  yukleniyorAc();
  try {
    var sonuc = await ARES.girisYap(email, sifre);
    if (sonuc.hata) {
      yukleniyorKapat();
      var ham = sonuc.hata, mesaj;
      if      (ham.includes('Invalid login'))       mesaj = tv('giris_hata_invalid','E-posta veya şifre hatalı.');
      else if (ham.includes('Email not confirmed')) mesaj = tv('giris_hata_email','E-posta adresiniz doğrulanmamış.');
      else if (ham.includes('Too many requests'))   mesaj = tv('giris_hata_limit','Çok fazla deneme. Lütfen bekleyin.');
      else if (ham.includes('bağlı değil'))         mesaj = tv('giris_hata_sunucu','Sunucuya bağlanılamadı\u2026');
      else                                           mesaj = esc(ham);
      hataGoster(mesaj);
      return;
    }
    document.getElementById('bilgiKutu').textContent = tv('giris_basarili','Giriş başarılı, yönlendiriliyorsunuz\u2026');
    document.getElementById('bilgiKutu').classList.add('goster');
    setTimeout(function(){ window.location.href = 'index.html'; }, 600);
  } catch(e) {
    yukleniyorKapat();
    hataGoster(tv('giris_hata_genel','Beklenmeyen hata: ') + esc(e.message));
  }
}

// ── Klavye
document.getElementById('email').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('sifre').focus(); });
document.getElementById('sifre').addEventListener('keydown', function(e){ if(e.key==='Enter') girisYap(); });

// ── Mevcut oturum kontrolü
(async function() {
  try {
    if (typeof ARES === 'undefined') return;
    var o = await ARES.oturumKontrol();
    if (o) { window.location.href = 'index.html'; }
  } catch(e) { /* sessiz */ }
})();

// ✅ Flash fix: görüntüyü sync olarak aç, sonra img fade-in
_applyI18n();
document.documentElement.style.visibility = '';
// Görsel 1 frame sonra fade-in (flash olmadan)
requestAnimationFrame(function(){
  requestAnimationFrame(function(){
    var el = document.getElementById('bgImg');
    if (el) el.classList.add('gorunsun');
  });
});
</script>
</body>
</html>
