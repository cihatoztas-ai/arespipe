<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/assets/marka/arespipe-favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/marka/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/marka/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/marka/icon-180.png">

<title>Kütüphane | AresPipe</title>
<script>(function(){
  var t=localStorage.getItem('ares_theme')||'light-anthracite';
  var l=localStorage.getItem('ares_lang')||'tr';
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.setAttribute('lang',l);
  document.documentElement.style.visibility='hidden';
})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txd:#6b7a90;--txm:#94a3b8;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}
*{margin:0;padding:0;box-sizing:border-box;}
a{color:var(--ac);cursor:pointer;text-decoration:none;}

/* ZONE 1 — üst ana seçim (açılır kutu, overlay) */
.kf-bar{background:var(--bg);border-bottom:1px solid var(--bor);padding:11px 24px;position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.kf-ara-w{position:relative;width:210px;}
.kf-ara-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txd);font-size:14px;}
.kf-ara{width:100%;height:34px;background:var(--sur);border:1px solid var(--bor);border-radius:8px;color:var(--tx);font-size:13px;font-family:'Barlow',sans-serif;padding:0 10px 0 31px;outline:none;}
.kf-ara:focus{border-color:var(--ac);}
.kf-foto{width:38px;height:34px;border-radius:8px;border:1px dashed var(--bor);background:var(--sur);color:var(--txd);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.kf-vsep{width:1px;height:24px;background:var(--bor);}
.kf-dd{height:34px;padding:0 12px;border-radius:8px;border:1px solid var(--bor);background:var(--sur);color:var(--txm);font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;display:inline-flex;align-items:center;}
.kf-dd.active{border-color:var(--ac);background:rgba(45,142,255,0.10);color:var(--ac);}
.kf-dd.open{border-color:var(--ac);background:rgba(45,142,255,0.18);color:var(--ac);}
.kf-dd .lk{font-size:9px;color:var(--txd);font-weight:700;margin-right:5px;text-transform:uppercase;letter-spacing:.4px;}
.kf-dd svg{margin-right:5px;}
.kf-dd-host{position:relative;z-index:50;}
.kf-dd-panel{position:absolute;top:4px;border:1px solid var(--ac);border-radius:10px;background:var(--sur);box-shadow:0 12px 30px rgba(0,0,0,.5);padding:10px;display:flex;gap:7px;flex-wrap:wrap;max-width:420px;}
.kf-opt-ic{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 11px;border-radius:9px;border:1px solid var(--bor);background:var(--bg);cursor:pointer;min-width:72px;}
.kf-opt-ic.on{border-color:var(--ac);background:rgba(45,142,255,0.12);}
.kf-opt-ic.dis{opacity:.32;cursor:default;}
.kf-opt-ic span{font-size:11px;font-weight:600;color:var(--txm);}
.kf-opt-ic.on span{color:var(--ac);}
.kf-opt{height:30px;padding:0 12px;border-radius:99px;border:1px solid var(--bor);background:transparent;color:var(--txm);font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;display:inline-flex;align-items:center;}
.kf-opt.on{border-color:var(--ac);background:rgba(45,142,255,0.16);color:var(--ac);}
.kf-opt.dis{opacity:.4;cursor:default;}

.wrap{padding:18px 24px 40px;}
.kf-h{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1;margin-bottom:14px;}

/* ZONE 2 — detay (sabit yükseklik) */
.kf-detay{display:grid;grid-template-columns:248px 1fr;gap:14px;margin-bottom:16px;min-height:228px;}
.kf-kesit{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:12px;position:relative;display:flex;align-items:center;justify-content:center;}
.kf-kesit-lbl{position:absolute;top:9px;left:12px;font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--txd);}
.kf-sag{display:flex;flex-direction:column;gap:10px;}
.kf-olcu-box{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:12px 16px;flex:1;}
.kf-olcu-bas{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--txd);margin-bottom:10px;}
.kf-olcu{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;}
.kf-olcu-row{display:flex;justify-content:space-between;font-size:13px;}
.kf-olcu-row .k{color:var(--txd);}
.kf-olcu-row .v{color:var(--tx);font-weight:500;}
.kf-medya{display:flex;gap:8px;}
.kf-medya div{flex:1;height:46px;background:var(--sur);border:1px solid var(--bor);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:var(--txd);}
.kf-medya span{font-size:9px;}

/* ZONE 3 — tablo (Excel: kolon başlığı süz/sırala) */
.kf-sec-lbl{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--txd);margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.kf-temizle{height:24px;padding:0 9px;border-radius:6px;border:1px solid var(--bor);background:transparent;color:var(--txd);font-size:11px;cursor:pointer;font-family:'Barlow',sans-serif;}
.kf-tablo-wrap{border:1px solid var(--bor);border-radius:10px;overflow:auto;max-height:360px;margin-bottom:20px;position:relative;}
table.kf{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap;}
table.kf th{text-align:left;padding:8px 11px;font-size:11px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.4px;background:var(--sur2);border-bottom:1px solid var(--bor);position:sticky;top:0;z-index:2;cursor:pointer;user-select:none;}
table.kf th.act{color:#cfe2ff;background:rgba(45,142,255,0.10);}
table.kf th .car{color:var(--txd);font-size:9px;margin-left:4px;}
table.kf td{padding:8px 11px;border-bottom:1px solid var(--bor);color:var(--tx);}
table.kf tbody tr{cursor:pointer;}
table.kf tbody tr:hover{background:var(--sur);}
table.kf tbody tr.on{background:rgba(45,142,255,0.12);}
table.kf tbody tr.on td:first-child{border-left:3px solid var(--ac);}
.kf-colmenu{position:absolute;z-index:20;border:1px solid var(--ac);border-radius:9px;background:var(--sur);box-shadow:0 10px 28px rgba(0,0,0,.55);padding:8px;min-width:178px;}
.kf-srt{display:block;width:100%;text-align:left;height:28px;padding:0 9px;border-radius:6px;border:none;background:transparent;color:var(--tx);font-size:12px;cursor:pointer;font-family:'Barlow',sans-serif;}
.kf-srt.on{background:rgba(45,142,255,0.16);color:#cfe2ff;}
.kf-fv{height:26px;padding:0 10px;border-radius:99px;border:1px solid var(--bor);background:transparent;color:var(--txm);font-size:11.5px;cursor:pointer;font-family:'Barlow',sans-serif;}
.kf-fv.on{border-color:var(--ac);background:rgba(45,142,255,0.16);color:#cfe2ff;}
.kf-std{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ac);}
.kf-mg{font-size:11px;padding:1px 7px;border-radius:5px;border:1px solid var(--bor);color:var(--txm);}

/* ZONE 4 — karşılaştırma */
.kf-cmp-bas{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.kf-cmp-ad{font-size:13px;font-weight:600;color:var(--tx);}
.kf-cmp-alt{font-size:12px;color:var(--txm);}
.kf-cmp-wrap{overflow-x:auto;border:1px solid var(--bor);border-radius:10px;}
table.kfc{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap;}
table.kfc th{text-align:left;padding:9px 12px;background:var(--sur2);border-bottom:1px solid var(--bor);}
table.kfc td{padding:8px 12px;border-bottom:1px solid var(--bor);color:var(--txm);}
table.kfc .ozk{position:sticky;left:0;background:var(--bg);color:var(--txd);font-size:12px;}
.kf-cmp-not{margin-top:8px;font-size:11px;color:var(--txd);}
.kf-durum{font-size:13px;color:var(--txm);padding:40px 4px;text-align:center;}
.kf-diff-swatch{display:inline-block;width:10px;height:10px;background:rgba(217,151,6,0.25);border-left:2px solid var(--warn);vertical-align:-1px;}
</style>
<script src="ares-store.js"></script>
<script src="ares-lang.js"></script>
<script src="ares-layout.js"></script>
<script src="ares-normalize.js"></script>
</head>
<body>
<div class="app-shell">
<div class="main-content">
<div class="page">

  <!-- ZONE 1: üst ana seçim -->
  <div class="kf-bar">
    <div class="kf-ara-w"><span class="kf-ara-ic">&#8980;</span><input id="kfAra" class="kf-ara" type="text" placeholder="Ara…"></div>
    <button class="kf-foto" title="Fotoğrafla ara (yakında)" aria-label="Fotoğrafla ara"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
    <span class="kf-vsep"></span>
    <div id="kfBar" style="display:flex;gap:7px;flex-wrap:wrap;"></div>
  </div>
  <div class="kf-dd-host"><div id="kfDD"></div></div>

  <div class="wrap">
    <div class="kf-h" data-i18n="nav_kutuphane">Kütüphane</div>
    <div id="kfDurum" class="kf-durum" data-i18n="kt_yukleniyor">Yükleniyor…</div>

    <!-- ZONE 2 -->
    <div id="kfDetay" class="kf-detay" style="display:none;">
      <div class="kf-kesit"><div class="kf-kesit-lbl" data-i18n="kt_kesit">KESİT</div><div id="kfKesit" style="width:100%;"></div></div>
      <div class="kf-sag">
        <div class="kf-olcu-box"><div class="kf-olcu-bas" data-i18n="kt_olculer">SEÇİLİ SATIR ÖLÇÜLERİ</div><div id="kfOlcu" class="kf-olcu"></div></div>
        <div class="kf-medya">
          <div><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>FOTO</span></div>
          <div><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg><span>3D</span></div>
          <div><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg><span>DXF</span></div>
        </div>
      </div>
    </div>

    <!-- ZONE 3 -->
    <div id="kfTabloBlok" style="display:none;">
      <div id="kfSecLbl" class="kf-sec-lbl"></div>
      <div class="kf-tablo-wrap"><table class="kf"><thead id="kfThead"></thead><tbody id="kfTbody"></tbody></table><div id="kfColMenu"></div></div>
    </div>

    <!-- ZONE 4 -->
    <div id="kfCmpBlok" style="display:none;">
      <div class="kf-cmp-bas"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gr)" stroke-width="1.8"><path d="M8 7h12M8 7l-4 4 4 4M16 17H4M16 17l4-4-4-4"/></svg><span class="kf-cmp-ad" data-i18n="kt_benzer">Benzer parçalar</span><span id="kfCmpAlt" class="kf-cmp-alt"></span></div>
      <div class="kf-cmp-wrap"><table class="kfc"><thead id="kfCmpHead"></thead><tbody id="kfCmpBody"></tbody></table></div>
      <div class="kf-cmp-not"><span class="kf-diff-swatch"></span> <span data-i18n="kt_cmp_not">seçili satırdan farklı değer · ilk sütun = seçtiğin parça</span></div>
    </div>
  </div>

</div>
</div>
</div>

<script>
'use strict';
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function _tv(k,fb){return (typeof window.tv==='function')?window.tv(k,fb):fb;}
function num(v,d){ if(v==null||v==='')return '—'; var n=Number(v); return isNaN(n)?esc(v):(d!=null?n.toFixed(d):String(n)); }

var PARCALAR=[
  {k:'boru',ad:'Boru',tablo:'boru_olculer',stdCol:'standart',tip:null,dnCol:'dn',ic:'<circle cx="14" cy="14" r="10"/><circle cx="14" cy="14" r="5.5"/>'},
  {k:'dirsek',ad:'Dirsek',tablo:'fitting_olculer',stdCol:'standart',tip:['90LR','45LR','90_3D','45_3D','elbow_90lr','elbow_45lr','elbow_90sr','elbow_45sr','90SW','45SW'],dnCol:'cap_buyuk_dn',ic:'<path d="M8 24 V14 Q8 8 14 8 H24" fill="none"/>'},
  {k:'tee',ad:'Tee',tablo:'fitting_olculer',stdCol:'standart',tip:['tee_eq','tee_red','tee_eq_sw','cross_sw'],dnCol:'cap_buyuk_dn',ic:'<path d="M4 18 H24 M14 18 V6" fill="none"/>'},
  {k:'reduksiyon',ad:'Redüksiyon',tablo:'fitting_olculer',stdCol:'standart',tip:['reducer_conc','reducer_ecc'],dnCol:'cap_buyuk_dn',ic:'<path d="M4 9 H12 L24 5 V23 L12 19 H4 Z" fill="none"/>'},
  {k:'cap',ad:'Cap',tablo:'fitting_olculer',stdCol:'standart',tip:['cap','cap_sw'],dnCol:'cap_buyuk_dn',ic:'<path d="M5 6 H20 Q26 14 20 22 H5" fill="none"/>'},
  {k:'baglanti',ad:'Bağlantı',tablo:'fitting_olculer',stdCol:'standart',tip:['coupling_full','coupling_half','stub_end'],dnCol:'cap_buyuk_dn',ic:'<rect x="6" y="9" width="16" height="10" rx="2" fill="none"/>'},
  {k:'flansh',ad:'Flanş',tablo:'flansh_olculer',stdCol:'geometri_std',tip:null,dnCol:'cap_dn',ic:'<rect x="9" y="4" width="6" height="20" rx="1"/><path d="M15 9 L23 12 V16 L15 19" fill="none"/>'}
];
var RAW2PART={}; PARCALAR.forEach(function(p){ if(p.tip) p.tip.forEach(function(t){ RAW2PART[t]=p.k; }); });
var TIPNORM={'90LR':'90lr','elbow_90lr':'90lr','45LR':'45lr','elbow_45lr':'45lr','90_3D':'90_3d','45_3D':'45_3d','90SW':'90sw','45SW':'45sw','elbow_90sr':'90sr','elbow_45sr':'45sr'};
function normTip(raw){ return TIPNORM[raw]||raw; }
function rawCodesFor(p,norm){ if(!p.tip) return []; return p.tip.filter(function(t){return normTip(t)===norm;}); }

function stdEtiket(s){ if(!s)return '—'; var m={'ASME-B16.9':'ASME B16.9','ASME-B16.11':'ASME B16.11','ASME-B36.10M':'ASME B36.10M','ASME-B36.19M':'ASME B36.19M','ASTM-B241':'ASTM B241','DIN-2448':'DIN 2448','DIN-86019':'DIN 86019','DIN-86088':'DIN 86088','DIN-86089':'DIN 86089','DIN-86090':'DIN 86090','DIN-86037-2':'DIN 86037-2','EN-10216-1':'EN 10216-1','EN-1092-1':'EN 1092-1','EN-1092-3':'EN 1092-3','EEMUA-144':'EEMUA 144','B16.5':'ASME B16.5','Ozel':'Özel'}; return m[s]||String(s).replace(/-/g,' '); }
function malEtiket(m){ var x={karbon:'Karbon',paslanmaz:'Paslanmaz',cunife:'CuNi',aluminyum:'Alüminyum'}; return x[m]||m||'—'; }
function tipEtiket(k){ if(!k)return '—'; var m={'90lr':'90° Dirsek (LR)','90LR':'90° Dirsek (LR)','elbow_90lr':'90° Dirsek (LR)','90_3d':'90° Dirsek (3D)','90_3D':'90° Dirsek (3D)','90sw':'90° Dirsek (SW)','90SW':'90° Dirsek (SW)','90sr':'90° Dirsek (SR)','elbow_90sr':'90° Dirsek (SR)','45lr':'45° Dirsek (LR)','45LR':'45° Dirsek (LR)','elbow_45lr':'45° Dirsek (LR)','45_3d':'45° Dirsek (3D)','45_3D':'45° Dirsek (3D)','45sw':'45° Dirsek (SW)','45SW':'45° Dirsek (SW)','45sr':'45° Dirsek (SR)','elbow_45sr':'45° Dirsek (SR)','tee_eq':'Eşit Tee','tee_red':'Redüksiyonlu Tee','tee_eq_sw':'Eşit Tee (SW)','cross_sw':'Çapraz (SW)','reducer_conc':'Konsantrik Redüksiyon','reducer_ecc':'Eksantrik Redüksiyon','cap':'Kep','cap_sw':'Kep (SW)','coupling_full':'Manşon (tam)','coupling_half':'Manşon (yarım)','stub_end':'Stub End','WN':'Welding Neck (WN)','SO':'Slip-On (SO)','BL':'Kör (BL)','LJ':'Lap Joint (LJ)','EN-T01':'Düz / Slip-on — EN Type 01','EN-T05':'Kör — EN Type 05','EN-T11':'Boyunlu (WN) — EN Type 11','EN-T12':'Lap Joint — EN Type 12'}; return m[k]||k; }
function tipIcon(t){
  var EQ={'EN-T11':'WN','EN-T01':'SO','EN-T05':'BL','EN-T12':'LJ'}; if(EQ[t]) t=EQ[t];
  if(/^90/.test(t)) return '<path d="M9 26 V15 Q9 9 15 9 H26" fill="none"/>';
  if(/^45/.test(t)) return '<path d="M7 25 L25 9" fill="none"/>';
  if(t==='reducer_conc') return '<path d="M5 9 H13 L25 11 V21 L13 23 H5 Z M5 9 V23" fill="none"/>';
  if(t==='reducer_ecc') return '<path d="M5 8 H13 L25 14 V23 L13 23 H5 Z M5 8 V23" fill="none"/>';
  if(t==='tee_eq'||t==='tee_eq_sw') return '<path d="M5 20 H27 M16 20 V8" fill="none"/>';
  if(t==='tee_red') return '<path d="M5 20 H27 M16 20 V10" fill="none" stroke-width="2.6"/>';
  if(t==='cross_sw') return '<path d="M5 16 H27 M16 5 V27" fill="none"/>';
  if(t==='cap'||t==='cap_sw') return '<path d="M6 9 H19 Q26 16 19 23 H6" fill="none"/>';
  if(t==='coupling_full'||t==='coupling_half') return '<rect x="6" y="10" width="20" height="12" rx="2" fill="none"/>';
  if(t==='stub_end') return '<path d="M6 10 H18 V8 L24 12 L18 16 V14 H6 Z" fill="none"/>';
  if(t==='WN') return '<rect x="10" y="6" width="5" height="18" rx="1"/><path d="M15 10 L23 12 V18 L15 20" fill="none"/>';
  if(t==='SO') return '<rect x="10" y="6" width="5" height="18" rx="1"/><rect x="15" y="10" width="8" height="10" fill="none"/>';
  if(t==='BL') return '<rect x="9" y="6" width="6" height="18" rx="1"/><line x1="9" y1="7" x2="15" y2="23"/>';
  if(t==='LJ') return '<rect x="10" y="6" width="5" height="18" rx="1"/><path d="M15 9 H21 V21 H15" fill="none"/>';
  return '<rect x="7" y="9" width="18" height="12" rx="2" fill="none"/>';
}

var st={parca:'boru',tip:'',mal:'',std:'',q:'',combos:[],rows:[],sel:null,colFilt:{},colSort:{k:null,dir:1},openDD:null,openCol:null,openColLeft:0};
function pCfg(){ return PARCALAR.filter(function(p){return p.k===st.parca;})[0]; }
function supaOk(){ var s=ARES.supabase(); return (s&&ARES.mod==='supabase')?s:null; }

/* ── kombinasyonlar (cross-filter için, açılışta 1 kez) ── */
async function combosYukle(){
  var supa=supaOk(); if(!supa) return;
  var out=[];
  var b=await supa.from('boru_olculer').select('standart,malzeme_grubu').is('tenant_id',null);
  (b.data||[]).forEach(function(r){ out.push({parca:'boru',tip:null,mal:r.malzeme_grubu,std:r.standart}); });
  var f=await supa.from('fitting_olculer').select('parca_tipi,standart,malzeme_grubu').is('tenant_id',null);
  (f.data||[]).forEach(function(r){ var pk=RAW2PART[r.parca_tipi]; if(pk) out.push({parca:pk,tip:normTip(r.parca_tipi),mal:r.malzeme_grubu,std:r.standart}); });
  var fl=await supa.from('flansh_olculer').select('flansh_tipi,geometri_std,malzeme_grubu').is('tenant_id',null);
  (fl.data||[]).forEach(function(r){ out.push({parca:'flansh',tip:r.flansh_tipi,mal:r.malzeme_grubu,std:r.geometri_std}); });
  st.combos=out;
}
var XF=[['parca'],['tip'],['mal'],['std']];
function matches(ignore){
  return st.combos.filter(function(c){
    if(ignore!=='parca' && st.parca && String(c.parca)!==String(st.parca)) return false;
    if(ignore!=='tip' && st.tip && String(c.tip)!==String(st.tip)) return false;
    if(ignore!=='mal' && st.mal && String(c.mal)!==String(st.mal)) return false;
    if(ignore!=='std' && st.std && String(c.std)!==String(st.std)) return false;
    return true;
  });
}
function validVals(field){ var s={}; matches(field).forEach(function(c){ if(c[field]!=null) s[c[field]]=1; }); return s; }
function allVals(field){ var s={}; st.combos.forEach(function(c){ if(c[field]!=null) s[c[field]]=1; }); return Object.keys(s); }
function validateSel(){ ['tip','mal','std'].forEach(function(k){ if(st[k] && !validVals(k)[st[k]]) st[k]=''; }); if(st.parca && !validVals('parca')[st.parca]){ /* parça hep kalır */ } }

/* ── ZONE 1: üst bar + overlay panel ── */
var DDORDER=[['parca','Parça'],['tip','Tip'],['mal','Malzeme'],['std','Standart']];
function ddIcon(field,val){
  if(field==='parca'){ var pc=PARCALAR.filter(function(p){return p.k===val;})[0]; return pc?'<svg width="15" height="15" viewBox="0 0 28 28" stroke="currentColor" stroke-width="1.8" fill="none">'+pc.ic+'</svg>':''; }
  if(field==='tip' && val){ return '<svg width="17" height="14" viewBox="0 0 32 30" stroke="currentColor" stroke-width="1.8" fill="none">'+tipIcon(val)+'</svg>'; }
  if(field==='mal' && val){ var c={karbon:'#94a3b8',paslanmaz:'#2D8EFF',cunife:'#d97706',aluminyum:'#16a36e'}[val]||'#94a3b8'; return '<span style="width:8px;height:8px;border-radius:50%;background:'+c+';display:inline-block;margin-right:5px;"></span>'; }
  return '';
}
function ddLabel(field,val){ if(field==='parca'){var pc=PARCALAR.filter(function(p){return p.k===val;})[0];return pc?pc.ad:val;} if(field==='tip')return tipEtiket(val); if(field==='mal')return malEtiket(val); if(field==='std')return stdEtiket(val); return val; }
function barCiz(){
  var p=pCfg();
  document.getElementById('kfBar').innerHTML=DDORDER.map(function(d){
    var field=d[0], val=st[field];
    if(field==='tip'){ var anyTip=matches('tip').some(function(c){return c.tip!=null;}); if(!anyTip) return ''; }
    if(field==='parca') val=st.parca;
    var open=st.openDD===field, active=!!val && !(field==='parca');
    var ic = val?ddIcon(field,val):'';
    var txt = val?ddLabel(field,val):'tümü';
    return '<button class="kf-dd'+(open?' open':(active?' active':''))+'" data-f="'+field+'"><span class="lk">'+esc(d[1])+'</span>'+ic+esc(txt)+' <span style="margin-left:5px;font-size:9px;">▾</span></button>';
  }).join('');
  Array.prototype.forEach.call(document.querySelectorAll('#kfBar .kf-dd'),function(b){ b.onclick=function(ev){ ev.stopPropagation(); st.openDD=st.openDD===b.dataset.f?null:b.dataset.f; st.openCol=null; ddCiz(b); barCiz(); }; });
}
function ddCiz(anchorBtn){
  var host=document.getElementById('kfDD');
  if(!st.openDD){ host.innerHTML=''; return; }
  var field=st.openDD, p=pCfg();
  var valid=validVals(field);
  var list, iconMode=(field==='parca'||field==='tip');
  if(field==='parca'){ list=PARCALAR.map(function(x){return x.k;}); }
  else if(field==='tip'){ var tipset={}; matches('tip').forEach(function(c){ if(c.tip!=null) tipset[c.tip]=1; }); list=Object.keys(tipset); }
  else { list=allVals(field).filter(function(v){ return matches('parca').concat(matches(field)).length; }); list=allVals(field); }
  // sıralama
  list.sort();
  var hostW=(document.getElementById('kfDD').parentElement||{}).clientWidth||1000; var left=anchorBtn?Math.max(0,Math.min(anchorBtn.offsetLeft,hostW-430)):20;
  var html='<div class="kf-dd-panel" style="left:'+left+'px;">';
  list.forEach(function(v){
    var on=String(st[field])===String(v), ok=field==='parca'?true:!!valid[v];
    if(iconMode){
      var inner=field==='parca'?(PARCALAR.filter(function(x){return x.k===v;})[0]||{}).ic:tipIcon(v);
      html+='<button class="kf-opt-ic'+(on?' on':'')+(ok?'':' dis')+'" data-v="'+esc(v)+'" '+(ok?'':'disabled')+'><svg width="28" height="24" viewBox="0 0 32 30" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" style="color:'+(on?'var(--ac)':'var(--txm)')+';">'+(inner||'')+'</svg><span>'+esc(ddLabel(field,v))+'</span></button>';
    } else {
      var dot=field==='mal'?ddIcon('mal',v):'';
      html+='<button class="kf-opt'+(on?' on':'')+(ok?'':' dis')+'" data-v="'+esc(v)+'" '+(ok?'':'disabled')+'>'+dot+esc(ddLabel(field,v))+'</button>';
    }
  });
  html+='</div>';
  host.innerHTML=html;
  Array.prototype.forEach.call(host.querySelectorAll('[data-v]'),function(b){ if(b.disabled)return; b.onclick=function(ev){ ev.stopPropagation(); secFilter(field,b.dataset.v); }; });
}
function secFilter(field,v){
  if(field==='parca'){ if(st.parca!==v){ st.parca=v; st.tip=''; } }
  else { st[field]=(String(st[field])===String(v)?'':v); }
  st.openDD=null; validateSel(); barCiz(); document.getElementById('kfDD').innerHTML='';
  tabloYukle();
}

/* ── ZONE 3: tablo yükle ── */
async function tabloYukle(){
  var p=pCfg(), supa=supaOk(); if(!supa) return;
  durum(_tv('kt_yukleniyor','Yükleniyor…'));
  var q=supa.from(p.tablo).select('*').is('tenant_id',null);
  if(p.tablo==='boru_olculer'){ if(st.std)q=q.eq('standart',st.std); if(st.mal)q=q.eq('malzeme_grubu',st.mal); }
  else if(p.tablo==='flansh_olculer'){ if(st.tip)q=q.eq('flansh_tipi',st.tip); if(st.std)q=q.eq('geometri_std',st.std); if(st.mal)q=q.eq('malzeme_grubu',st.mal); }
  else { var codes=st.tip?rawCodesFor(p,st.tip):p.tip; q=q.in('parca_tipi',codes); if(st.std)q=q.eq('standart',st.std); if(st.mal)q=q.eq('malzeme_grubu',st.mal); }
  var res=await q;
  if(res.error){ console.warn('[kutuphane] tablo:',res.error.message); durum('Hata: '+res.error.message); return; }
  st.rows=res.data||[];
  st.rows.sort(function(a,b){ var d=(a[p.dnCol]||0)-(b[p.dnCol]||0); if(d)return d; return (a.cap_kucuk_dn||0)-(b.cap_kucuk_dn||0) || ((a.et_mm||0)-(b.et_mm||0)); });
  st.colFilt={}; st.colSort={k:null,dir:1}; st.openCol=null;
  st.sel=st.rows[0]||null;
  render();
  if(st.sel) karsilastirYukle();
}

function olculer(p,r){
  if(p.tablo==='boru_olculer') return [['DN','DN'+(r.dn||'—')],['Dış çap',num(r.dis_cap_mm,1)+' mm'],['İç çap',num(r.ic_cap_mm,1)+' mm'],['Et',num(r.et_mm,2)+' mm'],['Schedule',esc(r.schedule_deger||r.schedule_kod||'—')],['Ağırlık',num(r.agirlik_kg_m,2)+' kg/m']];
  if(p.tablo==='flansh_olculer') return [['Tip',esc(tipEtiket(r.flansh_tipi))],['Class/PN',esc(r.basinc_sinifi||'—')],['DN','DN'+(r.cap_dn||'—')],['Flanş Ø',num(r.flansh_od_mm,1)+' mm'],['Kalınlık',num(r.flansh_kalinlik_mm,1)+' mm'],['Bolt','('+(r.bolt_count!=null?r.bolt_count:'—')+') '+(r.bolt_holes_inch||'—')],['Bolt circle',num(r.bolt_circle_mm,1)+' mm'],['Ağırlık',num(r.agirlik_kg,1)+' kg']];
  return [['Tip',esc(tipEtiket(r.parca_tipi))],['DN','DN'+(r.cap_buyuk_dn||'—')+(r.cap_kucuk_dn?('×'+r.cap_kucuk_dn):'')],['Et',num(r.et_mm,2)+' mm'],['A (uç-uca)',num(r.ucu_uca_a_mm,1)+' mm'],['Yarıçap',num(r.yaricap_mm,1)+' mm'],['Ağırlık',num(r.agirlik_kg,2)+' kg']];
}
function kesitSVG(p,r){

    var od=Number(r.dis_cap_mm)||60, et=Number(r.et_mm)||3;
    var rO=40+Math.min(28,(od-21)/6), rI=rO-Math.max(8,et*2.2);
    return '<svg viewBox="0 0 200 170" style="width:100%;height:auto;max-height:200px;"><circle cx="100" cy="88" r="'+rO+'" fill="#1c2738" stroke="var(--ac)" stroke-width="2"/><circle cx="100" cy="88" r="'+rI+'" fill="var(--bg)" stroke="var(--ac)" stroke-width="1.5"/><text x="100" y="20" fill="var(--ac)" font-size="11" font-weight="700" text-anchor="middle" font-family="Barlow">OD '+num(od,1)+'</text><text x="100" y="93" fill="#7fb0e8" font-size="10" text-anchor="middle" font-family="Barlow">ID '+num(r.ic_cap_mm,1)+'</text><text x="100" y="160" fill="var(--warn)" font-size="10" font-weight="700" text-anchor="middle" font-family="Barlow">et '+num(et,2)+'</text></svg>';
  }
  return '<div style="text-align:center;color:var(--txd);"><svg width="86" height="86" viewBox="0 0 28 28" stroke="var(--txd)" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">'+p.ic+'</svg><div style="font-size:11px;margin-top:6px;">şema yakında</div></div>';
}

function durum(msg){ var d=document.getElementById('kfDurum'); ['kfDetay','kfTabloBlok','kfCmpBlok'].forEach(function(id){ document.getElementById(id).style.display='none'; }); d.style.display='block'; d.textContent=msg; }

/* kolon tanımı: {b,key,val,sayisal,f} */

    {b:'Ø mm',key:'dis_cap_mm',sayisal:true,val:function(r){return r.dis_cap_mm;},f:function(r){return num(r.dis_cap_mm,1);}},
    {b:'Sch',key:'sch',val:function(r){return r.schedule_deger||r.schedule_kod||'—';},f:function(r){return esc(r.schedule_deger||r.schedule_kod||'—');}},
    {b:'Et',key:'et_mm',sayisal:true,val:function(r){return r.et_mm;},f:function(r){return num(r.et_mm,2);}},

  ];

    {b:'Tip',key:'flansh_tipi',val:function(r){return r.flansh_tipi||'—';},f:function(r){return esc(r.flansh_tipi||'—');}},
    {b:'Class/PN',key:'basinc_sinifi',val:function(r){return r.basinc_sinifi||'—';},f:function(r){return esc(r.basinc_sinifi||'—');}},
    {b:'Ø mm',key:'flansh_od_mm',sayisal:true,val:function(r){return r.flansh_od_mm;},f:function(r){return num(r.flansh_od_mm,1);}},
    {b:'Kal.',key:'flansh_kalinlik_mm',sayisal:true,val:function(r){return r.flansh_kalinlik_mm;},f:function(r){return num(r.flansh_kalinlik_mm,1);}},

  return [

    {b:'Et',key:'et_mm',sayisal:true,val:function(r){return r.et_mm;},f:function(r){return num(r.et_mm,2);}},
    {b:'A',key:'ucu_uca_a_mm',sayisal:true,val:function(r){return r.ucu_uca_a_mm;},f:function(r){return num(r.ucu_uca_a_mm,1);}},

}

function dispRows(){
  var p=pCfg(), cols=kolonlar(p);
  var rows=st.rows.filter(function(r){
    return cols.every(function(c){ var set=st.colFilt[c.key]; if(!set||!set.length)return true; return set.indexOf(String(c.val(r)))>=0; });
  });
  if(st.q){ var qq=st.q.toLowerCase(); rows=rows.filter(function(r){ return Object.keys(r).some(function(k){var v=r[k];return v!=null&&String(v).toLowerCase().indexOf(qq)>=0;}) || (r.parca_tipi&&tipEtiket(r.parca_tipi).toLowerCase().indexOf(qq)>=0); }); }
  if(st.colSort.k){ var c=cols.filter(function(x){return x.key===st.colSort.k;})[0]; if(c){ rows=rows.slice().sort(function(a,b){ var x=c.val(a),y=c.val(b); if(c.sayisal){x=Number(x)||0;y=Number(y)||0;} else {x=String(x);y=String(y);} return (x>y?1:x<y?-1:0)*st.colSort.dir; }); } }
  return rows;
}

function render(){
  var p=pCfg();
  if(!st.rows.length){ durum(_tv('kt_bos','Bu seçim için kayıt yok.')); return; }
  document.getElementById('kfDurum').style.display='none';

  if(st.sel){
    document.getElementById('kfKesit').innerHTML=kesitSVG(p,st.sel);
    document.getElementById('kfOlcu').innerHTML=olculer(p,st.sel).map(function(o){ return '<div class="kf-olcu-row"><span class="k">'+esc(o[0])+'</span><span class="v">'+o[1]+'</span></div>'; }).join('');
  }

  document.getElementById('kfSecLbl').innerHTML='<span>'+esc(st.std?stdEtiket(st.std):'Tüm standartlar')+' · '+esc(st.mal?malEtiket(st.mal):'tüm malzemeler')+' — '+rows.length+'/'+st.rows.length+' kayıt</span>'+(aktif?'<button class="kf-temizle" id="kfTemizle">süzgeç/sıralama temizle</button>':'');
  document.getElementById('kfThead').innerHTML='<tr>'+cols.map(function(c){ var fset=st.colFilt[c.key]; var act=(fset&&fset.length)||st.colSort.k===c.key; var ar=st.colSort.k===c.key?(st.colSort.dir>0?' ↑':' ↓'):''; return '<th class="'+(act?'act':'')+'" data-k="'+esc(c.key)+'">'+esc(c.b)+ar+(fset&&fset.length?' <span style="color:var(--ac);">['+fset.length+']</span>':'')+'<span class="car">▾</span></th>'; }).join('')+'</tr>';
  document.getElementById('kfTbody').innerHTML=rows.map(function(r){ var on=st.sel&&r.id===st.sel.id; return '<tr data-id="'+esc(r.id)+'" class="'+(on?'on':'')+'">'+cols.map(function(c){return '<td>'+c.f(r)+'</td>';}).join('')+'</tr>'; }).join('');
  Array.prototype.forEach.call(document.querySelectorAll('#kfThead th'),function(th){ th.onclick=function(ev){ ev.stopPropagation(); st.openDD=null; document.getElementById('kfDD').innerHTML=''; st.openColLeft=th.offsetLeft; st.openCol=st.openCol===th.dataset.k?null:th.dataset.k; colMenuCiz(); }; });
  Array.prototype.forEach.call(document.querySelectorAll('#kfTbody tr'),function(tr){ tr.onclick=function(){ var r=st.rows.filter(function(x){return String(x.id)===tr.dataset.id;})[0]; if(r){ st.sel=r; render(); karsilastirYukle(); } }; });
  var tmz=document.getElementById('kfTemizle'); if(tmz) tmz.onclick=function(){ st.colFilt={}; st.colSort={k:null,dir:1}; st.openCol=null; render(); };
  colMenuCiz();
}
function colMenuCiz(){
  var host=document.getElementById('kfColMenu');
  if(!st.openCol){ host.innerHTML=''; return; }
  var p=pCfg(), cols=kolonlar(p), c=cols.filter(function(x){return x.key===st.openCol;})[0];
  if(!c){ host.innerHTML=''; return; }
  // bu kolonun kendi filtresi hariç değerler
  var base=st.rows.filter(function(r){ return cols.every(function(cc){ if(cc.key===c.key)return true; var set=st.colFilt[cc.key]; if(!set||!set.length)return true; return set.indexOf(String(cc.val(r)))>=0; }); });
  var vset={}; base.forEach(function(r){ vset[String(c.val(r))]=1; });
  var vals=Object.keys(vset); vals.sort(function(a,b){ if(c.sayisal)return (Number(a)||0)-(Number(b)||0); return a.localeCompare(b); });
  var sel=st.colFilt[c.key]||[];
  var html='<div class="kf-colmenu" style="left:'+Math.min(st.openColLeft,420)+'px;top:36px;">'
    +'<button class="kf-srt'+(st.colSort.k===c.key&&st.colSort.dir>0?' on':'')+'" data-d="1">↑ Artan sırala</button>'
    +'<button class="kf-srt'+(st.colSort.k===c.key&&st.colSort.dir<0?' on':'')+'" data-d="-1">↓ Azalan sırala</button>'
    +'<div style="border-top:1px solid var(--bor);margin:7px 0;padding-top:7px;font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.4px;">Süz</div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap;max-height:150px;overflow:auto;">'
    +vals.map(function(v){ var on=sel.indexOf(v)>=0; return '<button class="kf-fv'+(on?' on':'')+'" data-v="'+esc(v)+'">'+esc(v)+'</button>'; }).join('')
    +'</div>';
  if(sel.length) html+='<button class="kf-srt" data-clr="1" style="margin-top:6px;color:var(--txd);">✕ bu kolonu temizle</button>';
  html+='</div>';
  host.innerHTML=html;
  Array.prototype.forEach.call(host.querySelectorAll('.kf-srt[data-d]'),function(b){ b.onclick=function(ev){ ev.stopPropagation(); st.colSort={k:c.key,dir:+b.dataset.d}; st.openCol=null; render(); }; });
  Array.prototype.forEach.call(host.querySelectorAll('.kf-fv'),function(b){ b.onclick=function(ev){ ev.stopPropagation(); var v=b.dataset.v; var cur=st.colFilt[c.key]||[]; var i=cur.indexOf(v); if(i>=0)cur.splice(i,1); else cur.push(v); st.colFilt[c.key]=cur; render(); }; });

/* ── ZONE 4: otomatik karşılaştırma (mantık sonra gözden geçirilecek) ── */
async function karsilastirYukle(){
  var p=pCfg(), r=st.sel, supa=supaOk();
  if(!r||!supa){ document.getElementById('kfCmpBlok').style.display='none'; return; }
  var q=supa.from(p.tablo).select('*').is('tenant_id',null);
  if(p.tablo==='boru_olculer'){ q=q.eq('dn',r.dn); }
  else if(p.tablo==='flansh_olculer'){ q=q.eq('flansh_tipi',r.flansh_tipi).eq('cap_dn',r.cap_dn); q=(r.basinc_sinifi==null||r.basinc_sinifi==='')?q.is('basinc_sinifi',null):q.eq('basinc_sinifi',r.basinc_sinifi); }
  else { var _raws=rawCodesFor(p,normTip(r.parca_tipi)); if(!_raws||!_raws.length) _raws=[r.parca_tipi]; q=q.in('parca_tipi',_raws).eq('cap_buyuk_dn',r.cap_buyuk_dn); q=(r.cap_kucuk_dn==null)?q.is('cap_kucuk_dn',null):q.eq('cap_kucuk_dn',r.cap_kucuk_dn); }
  var res=await q;
  if(res.error){ console.warn('[kutuphane] cmp:',res.error.message); document.getElementById('kfCmpBlok').style.display='none'; return; }
  karsilastirCiz(p,r,res.data||[]);
}
function karsilastirCiz(p,sel,peers){
  var items;
  if(p.tablo==='boru_olculer'){
    var grup={}, selEt=Number(sel.et_mm)||0, selOd=Number(sel.dis_cap_mm)||0, TOL=0.05;
    peers.forEach(function(r){ var et=Number(r.et_mm)||0, od=Number(r.dis_cap_mm)||0; if(Math.abs(od-selOd)>0.1)return; if(Math.abs(et-selEt)>TOL)return; var key=r.malzeme_grubu+'|'+r.standart, cur=grup[key]; if(!cur||r.id===sel.id||Math.abs(et-selEt)<Math.abs((Number(cur.et_mm)||0)-selEt)) grup[key]=r; });
    items=Object.keys(grup).map(function(k){return grup[k];});
  } else { items=peers.slice(); }
  items.sort(function(a,b){ if(a.id===sel.id)return -1; if(b.id===sel.id)return 1; return String(a.malzeme_grubu).localeCompare(String(b.malzeme_grubu)); });
  if(!items.some(function(x){return x.id===sel.id;})) items.unshift(sel);
  var blok=document.getElementById('kfCmpBlok');
  if(items.length<2){ blok.style.display='none'; return; }
  blok.style.display='block';
  var dnTxt=p.tablo==='boru_olculer'?('DN'+sel.dn):(p.tablo==='flansh_olculer'?('DN'+sel.cap_dn+' '+(sel.flansh_tipi||'')):('DN'+sel.cap_buyuk_dn+(sel.cap_kucuk_dn?('×'+sel.cap_kucuk_dn):'')));
  document.getElementById('kfCmpAlt').textContent=dnTxt+' — '+items.length+' parça';
  var attrs;
  if(p.tablo==='boru_olculer') attrs=[['Standart',function(r){return stdEtiket(r.standart);}],['Malzeme',function(r){return malEtiket(r.malzeme_grubu);}],['Ø dış (mm)',function(r){return num(r.dis_cap_mm,1);}],['Et (mm)',function(r){return num(r.et_mm,2);}],['İç çap (mm)',function(r){return num(r.ic_cap_mm,1);}],['kg/m',function(r){return num(r.agirlik_kg_m,2);}],['Schedule',function(r){return r.schedule_deger||r.schedule_kod||'—';}]];
  else if(p.tablo==='flansh_olculer') attrs=[['Standart',function(r){return stdEtiket(r.geometri_std);}],['Malzeme',function(r){return malEtiket(r.malzeme_grubu);}],['Class/PN',function(r){return r.basinc_sinifi||'—';}],['Flanş Ø (mm)',function(r){return num(r.flansh_od_mm,1);}],['Kalınlık (mm)',function(r){return num(r.flansh_kalinlik_mm,1);}],['Bolt circle (mm)',function(r){return num(r.bolt_circle_mm,1);}],['Bolt',function(r){return (r.bolt_count!=null?r.bolt_count:'—');}],['kg',function(r){return num(r.agirlik_kg,1);}]];
  else attrs=[['Standart',function(r){return stdEtiket(r.standart);}],['Malzeme',function(r){return malEtiket(r.malzeme_grubu);}],['Ø büyük (mm)',function(r){return num(r.cap_buyuk_mm,1);}],['Et (mm)',function(r){return num(r.et_mm,2);}],['A (mm)',function(r){return num(r.ucu_uca_a_mm,1);}],['Yarıçap (mm)',function(r){return num(r.yaricap_mm,1);}],['kg',function(r){return num(r.agirlik_kg,2);}]];
  var head='<tr><th class="ozk" style="font-size:11px;font-weight:700;color:var(--txd);text-transform:uppercase;">Özellik</th>'+items.map(function(it,i){ return '<th style="'+(i===0?'background:rgba(45,142,255,0.10);border-left:2px solid var(--ac);':'')+'"><span style="font-size:12px;color:#cfe2ff;font-weight:600;">'+esc(malEtiket(it.malzeme_grubu))+'</span>'+(i===0?' <span style="font-size:9px;color:var(--ac);">●</span>':'')+'<div style="font-size:10px;color:var(--txm);font-family:JetBrains Mono,monospace;">'+esc(stdEtiket(it.standart||it.geometri_std))+'</div></th>'; }).join('')+'</tr>';
  var body=attrs.map(function(a){ var vals=items.map(function(it){return a[1](it);}); var diff=vals.some(function(v){return String(v)!==String(vals[0]);}); return '<tr><td class="ozk">'+esc(a[0])+'</td>'+vals.map(function(v,i){ var bg=(i===0)?'background:rgba(45,142,255,0.06);':(diff?'background:rgba(217,151,6,0.12);':''); var bl=(i===0)?'border-left:2px solid var(--ac);':(diff?'border-left:2px solid var(--warn);':''); return '<td style="'+bg+bl+'">'+esc(v)+'</td>'; }).join('')+'</tr>'; }).join('');
  document.getElementById('kfCmpHead').innerHTML=head;
  document.getElementById('kfCmpBody').innerHTML=body;
}

function araKur(){ document.getElementById('kfAra').addEventListener('input',function(e){ st.q=e.target.value; if(st.rows.length) render(); }); }
document.addEventListener('click',function(){ if(st.openDD){ st.openDD=null; document.getElementById('kfDD').innerHTML=''; barCiz(); } if(st.openCol){ st.openCol=null; colMenuCiz(); } });

document.addEventListener('DOMContentLoaded',function(){
  (async function(){
    var _bekle=0;
    while(_bekle<80){
      var _supa=ARES.supabase();
      if(_supa){
        var _ses=await _supa.auth.getSession();
        if(_ses.data&&_ses.data.session){
          await ARES.oturumKontrol();
          if(!await ARES.sayfaYetkiKontrol(['yonetici','firma_admin','super_admin','operator'])) return;
          break;
        }
        if(_bekle>20){ location.href='giris.html'; return; }
      }
      await new Promise(function(r){ setTimeout(r,100); });
      _bekle++;
    }
    araKur();
    await combosYukle();
    barCiz();
    tabloYukle();
  })();
});
</script>
