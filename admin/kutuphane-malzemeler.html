<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AresPipe — Kütüphane Malzeme Grupları</title>
<script>(function(){var t=localStorage.getItem('ares_theme')||'light-anthracite';var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="../ares-store.js"></script>
<script src="../ares-lang.js"></script>
<script src="../ares-normalize.js"></script>

<style>
:root {
  --ac:#2D8EFF; --ac2:#1a75e8; --gr:#16a36e; --re:#e53e3e;
  --warn:#d97706; --leg:#7c3aed; --admin:#f97316;
}
[data-theme=dark] {
  --bg:#0d1117; --sur:#161b24; --sur2:#1c2333; --bor:#262f3e;
  --tx:#e6ecf4; --txm:#94a3b8; --txd:#6b7a90;
}
[data-theme=light-anthracite] {
  --bg:#d8dde4; --sur:#e4e9ef; --sur2:#d0d7e0; --bor:#bcc5d0;
  --tx:#141e2b; --txm:#3a4f63; --txd:#637080;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--sur);border-bottom:1px solid var(--bor);position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px;color:var(--admin);display:flex;align-items:center;gap:8px;}
.topbar-logo span{color:var(--txm);font-weight:400;font-size:13px;letter-spacing:0;}
.topbar-sep{flex:1;}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txm);}
.topbar-badge{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--admin);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px;}
.btn-logout{background:none;border:1px solid var(--bor);color:var(--txm);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:all .15s;}
.btn-logout:hover{border-color:var(--re);color:var(--re);}

.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:220px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bor);padding:16px 8px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txm);transition:all .15s;border:1px solid transparent;text-decoration:none;}
.nav-item:hover{background:var(--sur2);color:var(--tx);}
.nav-item.active{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.2);color:var(--admin);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-sep{height:1px;background:var(--bor);margin:8px 4px;}

.main{flex:1;overflow-y:auto;padding:24px 32px;min-width:0;}

/* Breadcrumb */
.brd{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txm);margin-bottom:14px;flex-wrap:wrap;}
.brd a{color:var(--txm);text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all .15s;}
.brd a:hover{color:var(--tx);background:var(--sur);border-color:var(--bor);}
.brd-sep{color:var(--txd);font-size:11px;}
.brd-aktif{color:var(--tx);font-weight:600;padding:4px 8px;}

/* Sayfa başlığı */
.sf-bas{margin-bottom:20px;}
.sf-bas-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.sf-baslik{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--tx);}
.sf-cnt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--txm);background:var(--sur);border:1px solid var(--bor);padding:3px 9px;border-radius:7px;font-weight:600;}
.sf-alt{font-size:13px;color:var(--txm);margin-top:6px;}

/* Özet şerit */
.ozet{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.ozet-k{background:var(--sur);border:1px solid var(--bor);border-radius:11px;padding:14px 16px;}
.ozet-l{font-size:10px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.ozet-v{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;line-height:1;color:var(--tx);}
.ozet-s{font-size:11px;color:var(--txd);margin-top:3px;}
.ozet-tr{background:var(--sur2);height:5px;border-radius:3px;overflow:hidden;margin-top:8px;}
.ozet-fl{background:var(--ac);height:100%;transition:width .5s ease;}

/* Malzeme grubu listesi */
.mg-liste{display:flex;flex-direction:column;gap:10px;}

.mg-sat{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:16px 20px;display:grid;grid-template-columns:auto 1fr auto auto auto;gap:18px;align-items:center;cursor:pointer;transition:all .15s;border-left:3px solid var(--bor);text-decoration:none;color:inherit;}
.mg-sat:hover{border-color:var(--txd);background:var(--sur2);}
.mg-sat.dolu{border-left-color:var(--ac);}
.mg-sat.kismi{border-left-color:var(--warn);}
.mg-sat.bos{border-left-color:var(--txd);opacity:.55;}
.mg-sat.bos:hover{opacity:.85;}

.mg-ikon{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--sur2);border:1px solid var(--bor);border-radius:10px;flex-shrink:0;}

.mg-sol{min-width:0;}
.mg-bas{display:flex;align-items:center;gap:10px;margin-bottom:3px;flex-wrap:wrap;}
.mg-ad{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--tx);letter-spacing:.4px;}
.mg-rozet{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:1px 7px;border-radius:5px;letter-spacing:.3px;text-transform:uppercase;}
.mg-rozet.dolu{background:rgba(45,142,255,.1);color:var(--ac);border:1px solid rgba(45,142,255,.3);}
.mg-rozet.kismi{background:rgba(217,119,6,.1);color:var(--warn);border:1px solid rgba(217,119,6,.3);}
.mg-rozet.bos{background:var(--sur2);color:var(--txd);border:1px solid var(--bor);}
.mg-acik{font-size:12px;color:var(--txm);line-height:1.4;}

.mg-orta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:150px;}
.mg-saylar{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--tx);}
.mg-saylar .toplam{color:var(--txd);font-weight:500;font-size:12px;}
.mg-sat.bos .mg-saylar{color:var(--txd);}
.mg-bar{width:140px;height:6px;background:var(--sur2);border-radius:3px;overflow:hidden;}
.mg-bar-fl{height:100%;background:var(--ac);transition:width .5s ease;}
.mg-sat.kismi .mg-bar-fl{background:var(--warn);}
.mg-sat.bos .mg-bar-fl{background:var(--txd);}

.mg-olg{display:flex;align-items:center;gap:4px;}
.olg-b{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:7px;background:var(--sur2);border:1px solid var(--bor);font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--txd);font-weight:600;}
.olg-b.var{background:rgba(22,163,110,.08);border-color:rgba(22,163,110,.3);color:var(--gr);}
.olg-b .olg-i{font-size:11px;opacity:.85;}

.mg-ac{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;background:var(--sur2);border:1px solid var(--bor);color:var(--txm);font-size:18px;transition:all .15s;flex-shrink:0;}
.mg-sat:hover .mg-ac{color:var(--ac);border-color:var(--ac);background:rgba(45,142,255,.05);}
.mg-sat.bos .mg-ac{color:var(--txd);}

/* Bölüm başlığı */
.bolum-bas{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txd);margin:24px 0 10px;display:flex;align-items:center;gap:10px;}
.bolum-bas-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);background:var(--sur);border:1px solid var(--bor);padding:2px 7px;border-radius:5px;}
.bolum-bas::before{content:'';width:14px;height:1px;background:var(--bor);}
.bolum-bas::after{content:'';flex:1;height:1px;background:var(--bor);}

/* Yükleniyor */
.yuk{text-align:center;padding:48px 20px;color:var(--txd);}
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--bor);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Bilinmeyen tablo uyarısı */
.uyari{background:var(--sur);border:1px solid rgba(229,62,62,.3);border-left:3px solid var(--re);border-radius:10px;padding:16px 20px;color:var(--tx);font-size:13px;}
</style>
</head>

<script>
'use strict';

// ── KONFİG: Tablo başına malzeme grubu tanımı ──────────────
// Hedef tablo → o tablodaki malzeme grupları. Her grup kütüphane veri besleme vizyonuna
// uygun: kod (DB lookup), ad (UI), ikon, açıklama.
var TABLO_KONFIG = {
  boru_olculer: {
    ad: 'Boru Ölçüleri',
    kod: 'boru_olculer',
    aciklama: 'Çıplak boru kesit ölçüleri · malzeme grubu bazında standartlar',
    malzeme_grubu_kolonu: 'malzeme_grubu_kod',
    gruplar: [
      { kod:'karbon',     ad:'Karbon çelik',   ikon:'⚫', aciklama:'A106 · A53 · A179 · ST 37 · ST 52 · P195/P235/P265 grade\'leri' },
      { kod:'paslanmaz',  ad:'Paslanmaz çelik',ikon:'⚪', aciklama:'A312 TP304/TP316/TP316L · EN X5CrNi · paslanmaz tüm sınıflar' },
      { kod:'cuni',       ad:'CuNi (bakır-nikel)', ikon:'🟠', aciklama:'B466 · B467 · DIN 86019 · 90/10 · 70/30 · deniz suyu hatları' },
      { kod:'duplex',     ad:'Duplex',         ikon:'🟡', aciklama:'2205 · 2507 · süper duplex · korozif ortamlar' },
      { kod:'alasimli',   ad:'Alaşımlı',       ikon:'🔶', aciklama:'A335 P11/P22 · A691 · yüksek sıcaklık hatları' },
      { kod:'aluminyum',  ad:'Alüminyum',      ikon:'⬜', aciklama:'5083 · 6061 · 6063 · deniz/yat uygulamaları' },
      { kod:'nikel',      ad:'Nikel alaşım',   ikon:'🟢', aciklama:'Inconel · Hastelloy · Monel · özel projeler' }
    ]
  },
  fitting_olculer: {
    ad: 'Fitting Ölçüleri',
    kod: 'fitting_olculer',
    aciklama: 'Dirsek · tee · redüksiyon · cap · stub end ölçüleri',
    malzeme_grubu_kolonu: 'malzeme_grubu_kod',
    gruplar: [
      { kod:'karbon',     ad:'Karbon çelik',   ikon:'⚫', aciklama:'A234 WPB · A420 WPL6 · butt-weld ve socket fittings' },
      { kod:'paslanmaz',  ad:'Paslanmaz çelik',ikon:'⚪', aciklama:'A403 WP304/WP316/WP316L · paslanmaz fittings' },
      { kod:'cuni',       ad:'CuNi',           ikon:'🟠', aciklama:'B466 · DIN 86089 · deniz suyu fittings' },
      { kod:'duplex',     ad:'Duplex',         ikon:'🟡', aciklama:'2205 · 2507 fittings' },
      { kod:'alasimli',   ad:'Alaşımlı',       ikon:'🔶', aciklama:'P11 · P22 yüksek sıcaklık fittings' },
      { kod:'aluminyum',  ad:'Alüminyum',      ikon:'⬜', aciklama:'Alüminyum fittings' },
      { kod:'nikel',      ad:'Nikel alaşım',   ikon:'🟢', aciklama:'Inconel · Hastelloy fittings' }
    ]
  },
  flansh_olculer: {
    ad: 'Flanş Ölçüleri',
    kod: 'flansh_olculer',
    aciklama: 'WN · SO · BL · LJ · SW · TH flanş ölçüleri',
    malzeme_grubu_kolonu: 'malzeme_grubu_kod',
    gruplar: [
      { kod:'karbon',     ad:'Karbon çelik',   ikon:'⚫', aciklama:'A105 · A350 LF2 · A694 · flanş tüm tipler' },
      { kod:'paslanmaz',  ad:'Paslanmaz çelik',ikon:'⚪', aciklama:'A182 F304/F316/F316L · paslanmaz flanşlar' },
      { kod:'cuni',       ad:'CuNi',           ikon:'🟠', aciklama:'B467 · DIN 86087/88 · deniz suyu flanşları' },
      { kod:'duplex',     ad:'Duplex',         ikon:'🟡', aciklama:'F51 · F53 · F55 duplex flanşlar' },
      { kod:'alasimli',   ad:'Alaşımlı',       ikon:'🔶', aciklama:'F11 · F22 yüksek sıcaklık flanşları' },
      { kod:'aluminyum',  ad:'Alüminyum',      ikon:'⬜', aciklama:'Alüminyum flanşlar' },
      { kod:'nikel',      ad:'Nikel alaşım',   ikon:'🟢', aciklama:'Inconel · Hastelloy flanşlar' }
    ]
  }
};

// ── SUPABASE PROXY ────────────────────────────────────────
var _supa = null;
function _getSupa() {
  if (_supa) return _supa;
  if (typeof ARES !== 'undefined' && ARES.supabase()) _supa = ARES.supabase();
  return _supa;
}
var _supaProxy = new Proxy({}, {
  get: function(t, prop){
    var s = _getSupa();
    if (!s) throw new Error('Supabase hazır değil');
    var v = s[prop];
    return typeof v === 'function' ? v.bind(s) : v;
  }
});

// ── HELPERS ───────────────────────────────────────────────
function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function T(id){ return document.getElementById(id); }
async function cikisYap(){ await _supaProxy.auth.signOut(); window.location.href='../giris.html'; }
function qsParam(name){ var u=new URLSearchParams(window.location.search); return u.get(name); }

// ── URL parametresinden tabloyu al ────────────────────────
var TABLO = qsParam('tablo');
var KONFIG = TABLO ? TABLO_KONFIG[TABLO] : null;

// ── Malzeme grubu başına mevcut sayıları DB'den çek ──────
async function gruplariSay(){
  if (!KONFIG) return {};
  var sonuc = {};
  var supa = _supaProxy;
  var kol = KONFIG.malzeme_grubu_kolonu;

  // Paralel: her grup için count
  await Promise.all(KONFIG.gruplar.map(async function(g){
    try {
      var r = await supa.from(KONFIG.kod).select('*', { count:'exact', head:true }).eq(kol, g.kod);
      if (r && r.error) {
        var status = r.status || 0;
        var code = (r.error.code || '').toString();
        if (status === 404 || code === 'PGRST205' || code === '42P01') {
          sonuc[g.kod] = { durum:'yok' };
        } else {
          // Kolon yok hatası — schema henüz hazır değil, 0 say
          if (/malzeme_grubu_kod|column.*does not exist/i.test(r.error.message || '')) {
            sonuc[g.kod] = { durum:'ok', sayi:0, kolon_yok:true };
          } else {
            sonuc[g.kod] = { durum:'hata', mesaj:r.error.message };
          }
        }
      } else {
        sonuc[g.kod] = { durum:'ok', sayi: (r && typeof r.count === 'number') ? r.count : 0 };
      }
    } catch (e) {
      sonuc[g.kod] = { durum:'hata', mesaj:e.message };
    }
  }));

  return sonuc;
}

// ── ÇİZİM ─────────────────────────────────────────────────
function ciz(sayilar){
  if (!KONFIG) {
    return '<div class="uyari">⚠ Geçersiz tablo: <code>' + esc(TABLO || '(boş)') + '</code>. <a href="kutuphane.html" style="color:var(--ac);">Kütüphane envanterine dön</a>.</div>';
  }

  // Breadcrumb
  var brd = '<div class="brd">' +
    '<a href="kutuphane.html">📚 Kütüphane</a>' +
    '<span class="brd-sep">›</span>' +
    '<span class="brd-aktif">' + esc(KONFIG.ad) + '</span>' +
    '</div>';

  // Sayfa başlığı
  var toplamMevcut = 0;
  var doluGrupSayisi = 0;
  KONFIG.gruplar.forEach(function(g){
    var s = sayilar[g.kod];
    if (s && s.durum === 'ok' && s.sayi > 0) { toplamMevcut += s.sayi; doluGrupSayisi++; }
  });

  var sayfaBas = '<div class="sf-bas">' +
    '<div class="sf-bas-row">' +
      '<div class="sf-baslik">' + esc(KONFIG.ad) + '</div>' +
      '<span class="sf-cnt">' + toplamMevcut + ' ölçü · ' + doluGrupSayisi + '/' + KONFIG.gruplar.length + ' malzeme grubu</span>' +
    '</div>' +
    '<div class="sf-alt">' + esc(KONFIG.aciklama) + '</div>' +
  '</div>';

  // Özet kartları
  var ozet = '<div class="ozet">' +
    '<div class="ozet-k"><div class="ozet-l">Aktif Grup</div><div class="ozet-v">' + doluGrupSayisi + ' <span style="font-size:14px;color:var(--txd);font-weight:500;">/ ' + KONFIG.gruplar.length + '</span></div><div class="ozet-s">' + (KONFIG.gruplar.length - doluGrupSayisi) + ' grup bekliyor</div></div>' +
    '<div class="ozet-k"><div class="ozet-l">Toplam Ölçü</div><div class="ozet-v">' + toplamMevcut + '</div><div class="ozet-s">canlı DB sayımı</div></div>' +
    '<div class="ozet-k"><div class="ozet-l">Olgunluk</div><div class="ozet-v" style="font-size:18px;line-height:1.3;">📷 — · 🎲 — · 📐 —</div><div class="ozet-s">medya tablosu sonra (90+)</div></div>' +
    '<div class="ozet-k"><div class="ozet-l">Doluluk</div><div class="ozet-v">' + Math.round(doluGrupSayisi / KONFIG.gruplar.length * 100) + '%</div><div class="ozet-tr"><div class="ozet-fl" style="width:' + Math.round(doluGrupSayisi / KONFIG.gruplar.length * 100) + '%;"></div></div></div>' +
  '</div>';

  // Aktif + bekleyen grupları ayır
  var aktifler = [];
  var bekleyenler = [];
  KONFIG.gruplar.forEach(function(g){
    var s = sayilar[g.kod] || { durum:'yok' };
    if (s.durum === 'ok' && s.sayi > 0) aktifler.push({ g:g, s:s });
    else bekleyenler.push({ g:g, s:s });
  });

  function satirHtml(g, s){
    var sayi = (s.durum === 'ok') ? s.sayi : 0;
    var sinif = sayi > 0 ? 'dolu' : 'bos';
    var rozet = sayi > 0 ? '<span class="mg-rozet dolu">Aktif</span>' : '<span class="mg-rozet bos">Bekliyor</span>';

    // Link: Katman 3'e
    var link = 'kutuphane-standartlar.html?tablo=' + encodeURIComponent(KONFIG.kod) + '&mg=' + encodeURIComponent(g.kod);

    return '<a class="mg-sat ' + sinif + '" href="' + link + '">' +
      '<div class="mg-ikon">' + esc(g.ikon) + '</div>' +
      '<div class="mg-sol">' +
        '<div class="mg-bas"><div class="mg-ad">' + esc(g.ad) + '</div>' + rozet + '</div>' +
        '<div class="mg-acik">' + esc(g.aciklama) + '</div>' +
      '</div>' +
      '<div class="mg-orta">' +
        '<div class="mg-saylar">' + sayi + ' <span class="toplam">ölçü</span></div>' +
      '</div>' +
      '<div class="mg-olg">' +
        '<span class="olg-b"><span class="olg-i">📷</span>—</span>' +
        '<span class="olg-b"><span class="olg-i">🎲</span>—</span>' +
        '<span class="olg-b"><span class="olg-i">📐</span>—</span>' +
      '</div>' +
      '<div class="mg-ac">→</div>' +
    '</a>';
  }

  var aktifBolum = '';
  if (aktifler.length > 0) {
    aktifBolum = '<div class="bolum-bas">Aktif Malzeme Grupları <span class="bolum-bas-cnt">' + aktifler.length + '</span></div>' +
      '<div class="mg-liste">' + aktifler.map(function(x){ return satirHtml(x.g, x.s); }).join('') + '</div>';
  }

  var bekleyenBolum = '';
  if (bekleyenler.length > 0) {
    bekleyenBolum = '<div class="bolum-bas">Bekleyen Malzeme Grupları <span class="bolum-bas-cnt">' + bekleyenler.length + '</span></div>' +
      '<div class="mg-liste">' + bekleyenler.map(function(x){ return satirHtml(x.g, x.s); }).join('') + '</div>';
  }

  return brd + sayfaBas + ozet + aktifBolum + bekleyenBolum;
}

// ── ANA AKIŞ ──────────────────────────────────────────────
(async function init(){
  // 1) Supabase + auth + super_admin kontrolü (kutuphane.html pattern'i)
  var supa;
  try { supa = _getSupa(); }
  catch(e){ document.body.innerHTML = '<div style="padding:40px;color:#fff;">Supabase hazır değil. Sayfayı yenile.</div>'; return; }
  if (!supa) { window.location.href='../giris.html'; return; }

  var sr = await supa.auth.getSession();
  if (!sr || !sr.data || !sr.data.session) {
    window.location.href = '../giris.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
    return;
  }

  var kr = await supa.from('kullanicilar').select('rol,ad_soyad').eq('id', sr.data.session.user.id).single();
  if (!kr.data || kr.data.rol !== 'super_admin') {
    window.location.href = '../index.html';
    return;
  }

  // 2) appShell'i göster
  var ub = T('topbarUser'); if (ub) ub.textContent = kr.data.ad_soyad || '—';
  var app = T('appShell'); app.style.display = 'flex'; app.style.visibility = 'visible';
  document.documentElement.style.visibility = 'visible';

  // 3) Veri yükle + çiz
  if (!KONFIG) {
    T('anaIcerik').innerHTML = ciz({});
    return;
  }

  try {
    var sayilar = await gruplariSay();
    T('anaIcerik').innerHTML = ciz(sayilar);
  } catch (e) {
    console.error('[kutuphane-malzemeler] init hata:', e);
    T('anaIcerik').innerHTML = '<div class="uyari">⚠ Sayfa yüklenirken hata oluştu: ' + esc(e.message) + '</div>';
  }
})();
</script>
