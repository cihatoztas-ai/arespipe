<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="ko_title">Kütüphane Önerileri — AresPipe</title>
<script>(function(){var t=localStorage.getItem('ares_theme')||'light-anthracite';var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="../ares-store.js"></script>
<script src="../ares-lang.js"></script>
<script src="../ares-normalize.js"></script>
<script src="../ares-layout.js"></script>
<style>
:root {
  --ac:#2D8EFF; --ac2:#1a75e8; --gr:#16a36e; --re:#e53e3e;
  --warn:#d97706; --leg:#7c3aed; --admin:#f97316;
}
[data-theme=dark] {
  --bg:#0d1117; --sur:#161b24; --sur2:#1c2333; --bor:#262f3e;
  --tx:#e6ecf4; --txm:#94a3b8; --txd:#6b7a90;
}
[data-theme=light-anthracite] {
  --bg:#d8dde4; --sur:#e4e9ef; --sur2:#d0d7e0; --bor:#bcc5d0;
  --tx:#141e2b; --txm:#3a4f63; --txd:#637080;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--sur);border-bottom:1px solid var(--bor);position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px;color:var(--admin);display:flex;align-items:center;gap:8px;}
.topbar-logo span{color:var(--txm);font-weight:400;font-size:13px;letter-spacing:0;}
.topbar-sep{flex:1;}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txm);}
.topbar-badge{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--admin);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px;}
.btn-logout{background:none;border:1px solid var(--bor);color:var(--txm);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:all .15s;}
.btn-logout:hover{border-color:var(--re);color:var(--re);}

.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:220px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bor);padding:16px 8px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txm);transition:all .15s;border:1px solid transparent;text-decoration:none;}
.nav-item:hover{background:var(--sur2);color:var(--tx);}
.nav-item.active{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.2);color:var(--admin);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-sep{height:1px;background:var(--bor);margin:8px 4px;}

.main{flex:1;overflow-y:auto;padding:24px 32px;min-width:0;}

/* Breadcrumb */
.brd{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txm);margin-bottom:14px;flex-wrap:wrap;}
.brd a{color:var(--txm);text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all .15s;}
.brd a:hover{color:var(--ac);border-color:var(--bor);background:var(--sur);}
.brd-sep{color:var(--txd);font-size:10px;}
.brd-aktif{color:var(--tx);font-weight:600;padding:4px 8px;}

/* Sayfa başlığı */
.sf-bas{display:flex;align-items:flex-end;gap:18px;margin-bottom:8px;flex-wrap:wrap;}
.sf-baslik{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:800;letter-spacing:1px;color:var(--tx);line-height:1;}
.sf-alt{font-size:13px;color:var(--txm);margin-bottom:24px;}

/* Özet kartları */
.ozet{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.ozet-k{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;}
.ozet-l{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--txm);font-weight:600;}
.ozet-v{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--tx);line-height:1.1;}
.ozet-s{font-size:11px;color:var(--txd);}

/* Tablo */
.tablo-saran{background:var(--sur);border:1px solid var(--bor);border-radius:14px;overflow:hidden;}
.tablo-bas{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bor);}
.tablo-bas-baslik{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--tx);letter-spacing:.5px;}
.tablo-bas-cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txm);background:var(--sur2);padding:3px 10px;border-radius:8px;border:1px solid var(--bor);}

table{width:100%;border-collapse:collapse;}
thead th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txm);border-bottom:1px solid var(--bor);background:var(--sur2);}
tbody td{padding:10px 14px;font-size:13px;color:var(--tx);border-bottom:1px solid var(--bor);}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover{background:var(--sur2);}
.td-olcu{font-family:'JetBrains Mono',monospace;font-weight:600;}
.td-olcu small{color:var(--txd);font-weight:400;margin-left:3px;}
.td-kalite{font-family:'JetBrains Mono',monospace;color:var(--ac);}
.td-sayi{font-family:'JetBrains Mono',monospace;text-align:right;font-weight:600;}
.td-tarih{color:var(--txm);font-size:12px;}
.null{color:var(--txd);}

/* Boş durum */
.bos{padding:60px 20px;text-align:center;}
.bos-ikon{font-size:48px;color:var(--gr);margin-bottom:14px;line-height:1;}
.bos-msg{color:var(--txm);font-size:14px;}

/* Yükleme / hata */
.yuk{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--txm);}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--bor);border-top-color:var(--ac);border-radius:50%;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.uyari{background:rgba(229,62,62,.08);border:1px solid rgba(229,62,62,.25);color:var(--re);padding:14px 18px;border-radius:10px;font-size:13px;margin-bottom:16px;}
.uyari code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(229,62,62,.12);padding:1px 6px;border-radius:4px;}

/* Toast */
.toast-konteyner{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:1000;}
.toast{background:var(--sur);border:1px solid var(--bor);color:var(--tx);padding:10px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:10px;animation:tsl .25s ease-out;box-shadow:0 6px 24px rgba(0,0,0,.25);}
.toast.er{border-color:rgba(229,62,62,.4);}
@keyframes tsl{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

#appShell{display:none;flex-direction:column;flex:1;visibility:hidden;}
</style>
</head>
<body>

<div id="appShell">

<div class="topbar">
  <div class="topbar-logo">⚙ AresPipe<span>/ Süper Admin · Kütüphane</span></div>
  <div class="topbar-sep"></div>
  <div class="topbar-user">
    <span class="topbar-badge">SUPER ADMIN</span>
    <span id="topbarUser">—</span>
    <button class="btn-logout" onclick="cikisYap()">Çıkış</button>
  </div>
</div>

<div class="layout">

<div class="sidebar">
  <a class="nav-item" href="panel.html"><span class="nav-icon">📊</span>Dashboard</a>
  <a class="nav-item" href="panel.html"><span class="nav-icon">📋</span>Pano</a>
  <a class="nav-item" href="panel.html"><span class="nav-icon">🏢</span>Firmalar</a>
  <a class="nav-item" href="panel.html"><span class="nav-icon">👥</span>Kullanıcılar</a>
  <a class="nav-item" href="panel.html"><span class="nav-icon">🚩</span>Feature Flags</a>
  <a class="nav-item" href="panel.html"><span class="nav-icon">📱</span>Mobil Önizleme</a>
  <div class="nav-sep"></div>
  <a class="nav-item active" href="kutuphane.html"><span class="nav-icon">📚</span>Kütüphane</a>
  <div class="nav-sep"></div>
  <a class="nav-item" href="panel.html"><span class="nav-icon">📋</span>Sistem Logları</a>
</div>

<div class="main">
  <div id="anaIcerik">
    <div class="yuk"><span class="loader"></span> Yükleniyor…</div>
  </div>
</div>

</div>
</div>

<div class="toast-konteyner" id="toastKonteyner"></div>

<script>
'use strict';

// ── Supabase proxy ───────────────────────────────────────
var _supa = null;
function _getSupa() {
  if (_supa) return _supa;
  if (typeof ARES !== 'undefined' && ARES.supabase()) _supa = ARES.supabase();
  return _supa;
}
var _supaProxy = new Proxy({}, {
  get: function(t, prop){
    var s = _getSupa();
    if (!s) throw new Error('Supabase hazır değil');
    var v = s[prop];
    return typeof v === 'function' ? v.bind(s) : v;
  }
});

// ── Helpers ──────────────────────────────────────────────
function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function T(id){ return document.getElementById(id); }
async function cikisYap(){ await _supaProxy.auth.signOut(); window.location.href='../giris.html'; }
function tv(k, fb){ try { return (typeof ARES_LANG !== 'undefined' && ARES_LANG.tv) ? ARES_LANG.tv(k, fb) : fb; } catch(e){ return fb; } }

function toast(metin, tip){
  var k = T('toastKonteyner'); if (!k) return;
  var t = document.createElement('div');
  t.className = 'toast' + (tip === 'er' ? ' er' : '');
  t.innerHTML = '<span>' + (tip === 'er' ? '⚠' : '✓') + '</span><span>' + esc(metin) + '</span>';
  k.appendChild(t);
  setTimeout(function(){ t.style.opacity = '0'; t.style.transform = 'translateY(20px)'; }, 3000);
  setTimeout(function(){ t.remove(); }, 3400);
}

function fmtOlcu(disCap, et){
  if (disCap == null && et == null) return '—';
  var d = disCap != null ? Number(disCap).toFixed(1).replace(/\.0$/, '') : '?';
  var e = et != null ? Number(et).toFixed(2).replace(/0+$/, '').replace(/\.$/, '') : '?';
  return d + ' × ' + e;
}

function fmtTarih(ts){
  if (!ts) return '—';
  try {
    var d = new Date(ts);
    if (isNaN(d.getTime())) return '—';
    var bugun = new Date();
    var fark = Math.floor((bugun - d) / 86400000);
    if (fark === 0) return 'Bugün';
    if (fark === 1) return 'Dün';
    if (fark < 7) return fark + ' gün önce';
    if (fark < 30) return Math.floor(fark/7) + ' hafta önce';
    return d.toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric' });
  } catch(e){ return '—'; }
}

// ── Liste yükleme ────────────────────────────────────────
async function listeYukle(){
  try {
    var r = await _supaProxy.rpc('v_tanimsiz_havuz_listele');
    if (r && r.error) {
      var msg = (r.error.message || '').toLowerCase();
      var code = (r.error.code || '').toString();
      if (code === 'PGRST202' || /could not find.*function/i.test(msg)) {
        return { durum:'rpc_yok' };
      }
      return { durum:'hata', mesaj: r.error.message };
    }
    return { durum:'ok', satirlar: r.data || [] };
  } catch (e) {
    return { durum:'hata', mesaj: e.message };
  }
}

// ── Çizim ────────────────────────────────────────────────
function ciz(sonuc){
  // Breadcrumb
  var brd = '<div class="brd">' +
    '<a href="kutuphane.html">📚 Kütüphane</a>' +
    '<span class="brd-sep">›</span>' +
    '<span class="brd-aktif">Öneriler</span>' +
  '</div>';

  // Başlık + alt yazı
  var sayfaBas = '<div class="sf-bas">' +
    '<div class="sf-baslik">Kütüphane Önerileri</div>' +
  '</div>' +
  '<div class="sf-alt">Sistemde tanımsız olarak görünen malzemeler — sıklığa göre sıralandı. ' +
    'Bu liste pilot tersanedeki Spool AI eğitim verisini besler.</div>';

  // Hata durumları
  if (sonuc.durum === 'rpc_yok') {
    return brd + sayfaBas +
      '<div class="uyari">⚠ <code>v_tanimsiz_havuz_listele</code> RPC fonksiyonu bulunamadı. ' +
      'Migration 061 (tanimsiz_kayitlar) çalıştırılmamış olabilir.</div>';
  }
  if (sonuc.durum === 'hata') {
    return brd + sayfaBas +
      '<div class="uyari">⚠ Liste yüklenemedi: ' + esc(sonuc.mesaj || '') + '</div>';
  }

  var satirlar = sonuc.satirlar || [];

  // İstatistik hesabı
  var toplamKayit = satirlar.length;
  var toplamSpool = satirlar.reduce(function(acc, r){ return acc + Number(r.siklik || 0); }, 0);
  var tenantSet = {};
  satirlar.forEach(function(r){
    var tenants = r.tenant_ler || r.tenantler || [];
    if (Array.isArray(tenants)) tenants.forEach(function(t){ tenantSet[t] = 1; });
  });
  var tenantSayi = Object.keys(tenantSet).length;

  var ozet = '<div class="ozet">' +
    '<div class="ozet-k">' +
      '<div class="ozet-l">Tanımsız Kayıt</div>' +
      '<div class="ozet-v">' + toplamKayit + '</div>' +
      '<div class="ozet-s">benzersiz ölçü × kalite</div>' +
    '</div>' +
    '<div class="ozet-k">' +
      '<div class="ozet-l">Etkilenen Spool</div>' +
      '<div class="ozet-v">' + toplamSpool + '</div>' +
      '<div class="ozet-s">toplam görülme</div>' +
    '</div>' +
    '<div class="ozet-k">' +
      '<div class="ozet-l">Tenant</div>' +
      '<div class="ozet-v">' + tenantSayi + '</div>' +
      '<div class="ozet-s">farklı firma</div>' +
    '</div>' +
  '</div>';

  // Boş durum
  if (toplamKayit === 0) {
    return brd + sayfaBas + ozet +
      '<div class="tablo-saran">' +
        '<div class="bos">' +
          '<div class="bos-ikon">✓</div>' +
          '<div class="bos-msg">Tüm malzemeler kütüphaneye bağlı!</div>' +
        '</div>' +
      '</div>';
  }

  // Tablo
  var tabloBas = '<div class="tablo-bas">' +
    '<div class="tablo-bas-baslik">Tanımsız Havuz</div>' +
    '<div class="tablo-bas-cnt">' + toplamKayit + ' kayıt · sıklığa göre</div>' +
  '</div>';

  var thead = '<thead><tr>' +
    '<th>Ölçü</th>' +
    '<th>Kalite</th>' +
    '<th style="text-align:right;">Spool</th>' +
    '<th style="text-align:right;">Devre</th>' +
    '<th>Tenant</th>' +
    '<th>Son Görülme</th>' +
  '</tr></thead>';

  var tbody = '<tbody>' + satirlar.map(function(r){
    var olcu = fmtOlcu(r.dis_cap_mm, r.et_mm);
    var kalite = r.kalite_ham || r.kalite || '—';
    var spool = r.siklik || r.spool_sayi || 0;
    var devre = r.devre_sayi || '—';
    var tenants = r.tenant_ler || r.tenantler || [];
    var tenantStr = Array.isArray(tenants) ? tenants.length : '—';
    var tarih = fmtTarih(r.son_gorulme);

    return '<tr>' +
      '<td class="td-olcu"><strong>' + esc(olcu) + '</strong> <small>mm</small></td>' +
      '<td class="td-kalite">' + esc(kalite) + '</td>' +
      '<td class="td-sayi">' + esc(spool) + '</td>' +
      '<td class="td-sayi">' + esc(devre) + '</td>' +
      '<td>' + esc(tenantStr) + '</td>' +
      '<td class="td-tarih">' + esc(tarih) + '</td>' +
    '</tr>';
  }).join('') + '</tbody>';

  return brd + sayfaBas + ozet +
    '<div class="tablo-saran">' + tabloBas +
    '<table>' + thead + tbody + '</table></div>';
}

// ── ANA AKIŞ ─────────────────────────────────────────────
(async function init(){
  // ares-store async init için 80 iterasyonlu poll (kutuphane.html pattern'i)
  var b = 0; while (b < 80) { if (_getSupa()) break; await new Promise(function(r){ setTimeout(r, 100); }); b++; }
  var supa = _getSupa();
  if (!supa) { window.location.href = '../giris.html'; return; }

  // OAuth redirect sonrası URL hash'inde token gelirse oturumu kur
  if (window.location.hash) {
    var p = new URLSearchParams(window.location.hash.substring(1));
    var at = p.get('access_token'), rt = p.get('refresh_token');
    if (at) { await supa.auth.setSession({ access_token: at, refresh_token: rt }); window.location.hash = ''; }
  }

  var sr = await supa.auth.getSession();
  if (!sr || !sr.data || !sr.data.session) {
    window.location.href = '../giris.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
    return;
  }

  var kr = await supa.from('kullanicilar').select('rol,ad_soyad').eq('id', sr.data.session.user.id).single();
  if (!kr.data || kr.data.rol !== 'super_admin') {
    window.location.href = '../index.html';
    return;
  }

  // appShell'i göster
  var ub = T('topbarUser'); if (ub) ub.textContent = kr.data.ad_soyad || '—';
  var app = T('appShell'); app.style.display = 'flex'; app.style.visibility = 'visible';
  document.documentElement.style.visibility = 'visible';

  // Veri yükle + çiz
  try {
    var sonuc = await listeYukle();
    T('anaIcerik').innerHTML = ciz(sonuc);
  } catch (e) {
    console.error('[oneriler] init hata:', e);
    T('anaIcerik').innerHTML = '<div class="uyari">⚠ Sayfa yüklenirken hata oluştu: ' + esc(e.message) + '</div>';
  }
})();
</script>

</body>
</html>
