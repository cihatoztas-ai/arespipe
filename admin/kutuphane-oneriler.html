<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="ko_title">Kütüphane Önerileri — AresPipe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ===== Sayfa-yerel CSS (global var'lar ares-layout.js'ten gelir) ===== */
    .ko-main { padding: 24px; max-width: 1400px; margin: 0 auto; font-family: 'Barlow', sans-serif; }

    .ko-header { margin-bottom: 20px; }
    .ko-header h1 {
      margin: 0 0 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--tx);
    }
    .ko-subtitle { font-size: 14px; color: var(--txd); }

    /* G-02 Hero + Pill */
    .ko-hero { display: flex; gap: 16px; margin-bottom: 20px; }
    .ko-hero-left {
      display: flex; align-items: center; justify-content: center;
      width: 88px; background: var(--sur2);
      border: 1px solid var(--bor); border-radius: 10px;
      font-size: 36px;
    }
    .ko-hero-stats { display: flex; flex: 1; gap: 12px; }
    .ko-stat-pill {
      background: var(--sur2); border: 1px solid var(--bor);
      border-radius: 10px; padding: 14px 18px;
      min-width: 120px; flex: 1;
      display: flex; flex-direction: column; justify-content: center;
    }
    .ko-stat-label { font-size: 13px; color: var(--txd); margin-bottom: 4px; }
    .ko-stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 28px; color: var(--ac);
    }

    /* Skeleton shimmer (devreler.html pattern'i) */
    .sk {
      background: linear-gradient(90deg, var(--sur) 0%, var(--bor) 50%, var(--sur) 100%);
      background-size: 200% 100%;
      animation: _skShimmer 1.2s infinite;
      color: transparent !important;
      border-radius: 4px;
    }
    .sk-num { display: inline-block; min-width: 40px; }
    @keyframes _skShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Tablo */
    .ko-table-wrap {
      background: var(--sur2); border: 1px solid var(--bor);
      border-radius: 10px; overflow: hidden;
    }
    .ko-table { width: 100%; border-collapse: collapse; }
    .ko-table thead { background: var(--sur); }
    .ko-table th {
      text-align: left; padding: 12px 16px;
      font-size: 12px; font-weight: 600;
      color: var(--txd); text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 1px solid var(--bor);
    }
    .ko-table td {
      padding: 14px 16px; font-size: 15px; color: var(--tx);
      border-bottom: 1px solid var(--bor);
    }
    .ko-table tbody tr {
      opacity: 0;
      animation: _cascadeIn .35s ease forwards;
      animation-delay: calc(45ms * var(--ci, 0));
    }
    @keyframes _cascadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ko-td-olcu strong {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 16px;
    }
    .ko-td-olcu small { color: var(--txd); font-size: 13px; margin-left: 4px; }
    .ko-td-kalite { color: var(--txd); }
    .ko-td-tarih { color: var(--txd); font-size: 13px; }

    .ko-badge-siklik {
      display: inline-block; padding: 4px 12px;
      border-radius: 14px;
      background: rgba(45, 142, 255, 0.15);
      color: var(--ac); font-weight: 700;
      font-size: 14px; font-family: 'Barlow Condensed', sans-serif;
      min-width: 40px; text-align: center;
    }
    .ko-badge-tenant {
      display: inline-block; padding: 2px 8px;
      border-radius: 4px;
      background: var(--sur);
      border: 1px solid var(--bor);
      color: var(--txd); font-size: 13px;
    }

    .ko-btn-detay {
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--bor); background: var(--sur);
      color: var(--ac); font-size: 13px; font-weight: 600;
      font-family: 'Barlow', sans-serif;
      cursor: pointer; transition: all .15s;
    }
    .ko-btn-detay:hover {
      border-color: var(--ac); background: rgba(45, 142, 255, .05);
    }

    .ko-bos {
      padding: 48px 24px; text-align: center;
    }
    .ko-bos-icon { font-size: 48px; color: var(--gr); margin-bottom: 12px; }
    .ko-bos-msg { font-size: 16px; color: var(--txd); }
  </style>
</head>
<body data-sayfa="kutuphane-oneriler">

<main class="ko-main">

  <div class="ko-header">
    <h1 data-i18n="ko_baslik">Kütüphane Önerileri</h1>
    <div class="ko-subtitle" data-i18n="ko_aciklama">
      Sistemde tanımsız olarak görünen malzemeler — sıklığa göre sıralandı
    </div>
  </div>

  <div class="ko-hero">
    <div class="ko-hero-left">📚</div>
    <div class="ko-hero-stats">
      <div class="ko-stat-pill">
        <div class="ko-stat-label" data-i18n="ko_st_kayit">Tanımsız Kayıt</div>
        <span class="ko-stat-num sk sk-num" id="koStKayit">—</span>
      </div>
      <div class="ko-stat-pill">
        <div class="ko-stat-label" data-i18n="ko_st_spool">Etkilenen Spool</div>
        <span class="ko-stat-num sk sk-num" id="koStSpool">—</span>
      </div>
      <div class="ko-stat-pill">
        <div class="ko-stat-label" data-i18n="ko_st_tenant">Tenant</div>
        <span class="ko-stat-num sk sk-num" id="koStTenant">—</span>
      </div>
    </div>
  </div>

  <div class="ko-table-wrap">
    <table class="ko-table">
      <thead>
        <tr>
          <th data-i18n="ko_th_olcu">Ölçü</th>
          <th data-i18n="ko_th_kalite">Kalite</th>
          <th data-i18n="ko_th_siklik">Spool</th>
          <th data-i18n="ko_th_devre">Devre</th>
          <th data-i18n="ko_th_tenant">Tenant</th>
          <th data-i18n="ko_th_son_gorulme">Son Görülme</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="koTbody"></tbody>
    </table>
    <div class="ko-bos" id="koBos" style="display:none;">
      <div class="ko-bos-icon">✓</div>
      <div class="ko-bos-msg" data-i18n="ko_bos">Tüm malzemeler kütüphaneye bağlı!</div>
    </div>
  </div>

</main>

<!-- AresPipe core scripts (admin/ alt-dizininden parent path) -->
<script src="../ares-supabase.js"></script>
<script src="../ares-normalize.js"></script>
<script src="../ares-layout.js"></script>
<script src="../lang.js"></script>

<script>
(function() {
  'use strict';

  // ===== Yetki kontrolü =====
  if (typeof ARES !== 'undefined' && typeof ARES.sayfaYetkiKontrol === 'function') {
    ARES.sayfaYetkiKontrol(['super_admin']);
  } else {
    console.warn('[KO] ARES.sayfaYetkiKontrol bulunamadı — yetki kontrolü atlandı (geliştirme modu?)');
  }

  // ===== Helpers =====
  const tv = (k, fb) => (typeof window.tv === 'function' ? window.tv(k, fb) : (fb || k));
  const toast = (m, t) => (window.ARES?.toast ? ARES.toast(m, t) : console.log('[toast]', t, m));

  function _skTemizle(el) {
    if (!el) return;
    el.classList.remove('sk', 'sk-num');
  }

  function _fmtTarih(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    } catch { return '—'; }
  }

  function _fmtOlcu(dis_cap, et) {
    const a = Number(dis_cap).toFixed(1);
    const b = Number(et).toFixed(1);
    return `${a} × ${b}`;
  }

  // ===== Liste yükleme =====
  async function listeYukle() {
    try {
      const sb = ARES.supabase();
      const { data, error } = await sb.rpc('v_tanimsiz_havuz_listele');

      if (error) {
        console.error('[KO] RPC hata:', error);
        toast(tv('ko_hata_yukleme', 'Liste yüklenemedi: ') + error.message, 'er');
        _renderBos();
        return;
      }

      const rows = data || [];
      _renderStats(rows);
      _renderTablo(rows);
    } catch (e) {
      console.error('[KO] Beklenmeyen hata:', e);
      toast(tv('ko_hata_beklenmeyen', 'Beklenmeyen hata'), 'er');
      _renderBos();
    }
  }

  function _renderStats(rows) {
    const toplamKayit = rows.length;
    const toplamSpool = rows.reduce((acc, r) => acc + Number(r.siklik || 0), 0);
    const tenantSet = new Set();
    rows.forEach(r => (r.tenant_ler || []).forEach(t => tenantSet.add(t)));

    const elK = document.getElementById('koStKayit');
    const elS = document.getElementById('koStSpool');
    const elT = document.getElementById('koStTenant');

    if (elK) { elK.textContent = toplamKayit; _skTemizle(elK); }
    if (elS) { elS.textContent = toplamSpool; _skTemizle(elS); }
    if (elT) { elT.textContent = tenantSet.size; _skTemizle(elT); }
  }

  function _renderTablo(rows) {
    const tbody = document.getElementById('koTbody');
    if (!tbody) return;

    if (rows.length === 0) {
      tbody.innerHTML = '';
      _renderBos();
      return;
    }

    document.getElementById('koBos').style.display = 'none';

    const html = rows.map((r, i) => {
      const ci = Math.min(i, 19); // cascade max 20
      const olcu = _fmtOlcu(r.dis_cap_mm, r.et_mm);
      const kalite = r.kalite_ham || '—';
      const tarih = _fmtTarih(r.son_gorulme);
      const hashEsc = (r.hash_anahtari || '').replace(/[^a-z0-9]/gi, '');

      return `<tr style="--ci:${ci};" data-hash="${hashEsc}">
        <td class="ko-td-olcu"><strong>${olcu}</strong> <small>mm</small></td>
        <td class="ko-td-kalite">${kalite}</td>
        <td><span class="ko-badge-siklik">${r.siklik}</span></td>
        <td>${r.devre_sayisi}</td>
        <td><span class="ko-badge-tenant">${r.tenant_sayisi}</span></td>
        <td class="ko-td-tarih">${tarih}</td>
        <td>
          <button class="ko-btn-detay" data-hash="${hashEsc}" data-i18n="ko_btn_detay">
            ${tv('ko_btn_detay', 'Detay →')}
          </button>
        </td>
      </tr>`;
    }).join('');

    tbody.innerHTML = html;

    // Detay butonları — 88.G'de detay paneli açacak
    tbody.querySelectorAll('.ko-btn-detay').forEach(btn => {
      btn.addEventListener('click', () => {
        const hash = btn.dataset.hash;
        const row = rows.find(r => (r.hash_anahtari || '').replace(/[^a-z0-9]/gi, '') === hash);
        console.log('[KO] Detay tıklandı:', row);
        toast(tv('ko_detay_tba', '88.G ile detay paneli gelecek'), 'in');
      });
    });
  }

  function _renderBos() {
    const tbody = document.getElementById('koTbody');
    const bos = document.getElementById('koBos');
    if (tbody) tbody.innerHTML = '';
    if (bos) bos.style.display = 'block';

    // Stat'ları sıfırla, skeleton'ı temizle
    ['koStKayit', 'koStSpool', 'koStTenant'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.textContent = '0'; _skTemizle(el); }
    });
  }

  // ===== Başlat =====
  document.addEventListener('DOMContentLoaded', listeYukle);

})();
</script>

</body>
</html>
