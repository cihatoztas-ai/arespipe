<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --ac:#2D8EFF; --ac2:#1a75e8; --gr:#16a36e; --re:#e53e3e;
  --warn:#d97706; --leg:#7c3aed; --admin:#f97316;
}
[data-theme=dark] {
  --bg:#0d1117; --sur:#161b24; --sur2:#1c2333; --bor:#262f3e;
  --tx:#e6ecf4; --txm:#94a3b8; --txd:#6b7a90;
}
[data-theme=light-anthracite] {
  --bg:#d8dde4; --sur:#e4e9ef; --sur2:#d0d7e0; --bor:#bcc5d0;
  --tx:#141e2b; --txm:#3a4f63; --txd:#637080;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--sur);border-bottom:1px solid var(--bor);position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px;color:var(--admin);display:flex;align-items:center;gap:8px;}
.topbar-logo span{color:var(--txm);font-weight:400;font-size:13px;letter-spacing:0;}
.topbar-sep{flex:1;}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txm);}
.topbar-badge{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--admin);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px;}
.btn-logout{background:none;border:1px solid var(--bor);color:var(--txm);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:all .15s;}
.btn-logout:hover{border-color:var(--re);color:var(--re);}

.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:220px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bor);padding:16px 8px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txm);transition:all .15s;border:1px solid transparent;text-decoration:none;}
.nav-item:hover{background:var(--sur2);color:var(--tx);}
.nav-item.active{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.2);color:var(--admin);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-sep{height:1px;background:var(--bor);margin:8px 4px;}

.main{flex:1;overflow-y:auto;padding:24px 32px;min-width:0;}

/* Breadcrumb */
.brd{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txm);margin-bottom:14px;flex-wrap:wrap;}
.brd a{color:var(--txm);text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all .15s;}
.brd a:hover{color:var(--tx);background:var(--sur);border-color:var(--bor);}
.brd-sep{color:var(--txd);font-size:11px;}
.brd-aktif{color:var(--tx);font-weight:600;padding:4px 8px;}

/* Sayfa başlığı */
.sf-bas{margin-bottom:20px;}
.sf-bas-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.sf-baslik{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--tx);}
.sf-kod{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ac);background:rgba(45,142,255,.08);border:1px solid rgba(45,142,255,.25);padding:3px 9px;border-radius:7px;font-weight:600;}
.sf-cnt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--txm);background:var(--sur);border:1px solid var(--bor);padding:3px 9px;border-radius:7px;font-weight:600;}
.sf-mg-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:7px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);color:var(--leg);font-size:12px;font-weight:600;}
.sf-alt{font-size:13px;color:var(--txm);margin-top:6px;}

/* Üst kart: SVG + Sağ Panel */
.ust-kart{display:grid;grid-template-columns:380px 1fr;gap:16px;margin-bottom:14px;}

.svg-yer{background:var(--sur);border:1px solid var(--bor);border-radius:14px;min-height:280px;display:flex;align-items:center;justify-content:center;padding:18px;position:relative;}
.svg-yer svg{width:100%;height:auto;max-height:280px;}
.svg-yer-baslik{position:absolute;top:10px;left:14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--txd);text-transform:uppercase;}
.svg-yer-not{position:absolute;bottom:10px;right:14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);}

.sag-panel{display:flex;flex-direction:column;gap:14px;}
.panel-blok{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:14px 16px;}
.panel-blok-bas{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.panel-blok-ikon{font-size:14px;opacity:.7;}
.panel-blok-ad{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--tx);}
.panel-blok-not{font-size:10.5px;color:var(--txd);margin-left:auto;}

.lejant-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px 12px;}
.lejant-sat{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:3px 0;}
.harf-rozet{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:var(--sur2);border:1px solid var(--bor);color:var(--ac);padding:2px 6px;border-radius:5px;letter-spacing:.3px;min-width:42px;text-align:center;flex-shrink:0;line-height:1.2;}
.lejant-ad{color:var(--txm);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lejant-val{color:var(--tx);font-weight:600;font-family:'JetBrains Mono',monospace;}
.lejant-val.bos{color:var(--txd);font-style:italic;font-weight:400;}

.ek-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ek-kart{background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:8px 10px;text-align:center;}
.ek-ikon{font-size:16px;opacity:.5;display:block;margin-bottom:2px;}
.ek-sayi{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--tx);line-height:1;}
.ek-ad{font-size:9px;font-weight:600;color:var(--txd);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;}

/* Aksiyon barı */
.filter-bar{display:flex;align-items:center;gap:12px;background:var(--sur);border:1px solid var(--bor);border-radius:11px;padding:10px 16px;margin-bottom:10px;flex-wrap:wrap;}
.flt-label{font-size:11px;color:var(--txm);text-transform:uppercase;letter-spacing:.5px;font-weight:700;font-family:'Barlow Condensed',sans-serif;}
.flt-select{padding:5px 28px 5px 10px;border-radius:6px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;appearance:none;min-width:120px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path fill='%2394a3b8' d='M2 4l3 3 3-3z'/></svg>");background-repeat:no-repeat;background-position:right 8px center;}
.flt-chip{padding:4px 9px;border-radius:6px;background:rgba(45,142,255,.12);border:1px solid rgba(45,142,255,.3);color:var(--ac);font-size:11px;font-family:'JetBrains Mono',monospace;}
.flt-sifirla{margin-left:auto;font-size:11px;color:var(--txd);cursor:pointer;border:none;background:none;font-family:'Barlow',sans-serif;}
.flt-sifirla:hover{color:var(--ac);}
.aksiyon-bar{display:flex;align-items:center;justify-content:space-between;background:var(--sur);border:1px solid var(--bor);border-radius:11px;padding:10px 16px;margin-bottom:12px;flex-wrap:wrap;gap:10px;}
.aksiyon-sol{font-size:12px;color:var(--txm);font-family:'JetBrains Mono',monospace;}
.aksiyon-sol strong{color:var(--tx);font-weight:700;}
.aksiyon-sag{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;border:1px solid var(--bor);background:var(--sur);color:var(--tx);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{border-color:var(--ac);color:var(--ac);}
.btn-pri{background:var(--ac);border-color:var(--ac);color:#fff;}
.btn-pri:hover{background:var(--ac2);border-color:var(--ac2);color:#fff;}
.btn-yetkisiz{opacity:.5;cursor:not-allowed;}

/* Tablo */
.tbl-wrap{background:var(--sur);border:1px solid var(--bor);border-radius:14px;overflow:hidden;}
.veri-tbl-kapsayici{overflow-x:auto;max-height:calc(100vh - 460px);min-height:240px;}
.veri-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.veri-tbl th{position:sticky;top:0;text-align:left;font-size:10px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--bor);background:var(--sur2);white-space:nowrap;z-index:1;}
.veri-tbl td{padding:10px 12px;border-bottom:1px solid rgba(35,39,48,.4);font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--tx);white-space:nowrap;cursor:pointer;}
.veri-tbl tr:hover td{background:rgba(255,255,255,.02);}
.veri-tbl tr.secili td{background:rgba(45,142,255,.08);}
.veri-tbl tr.secili td:first-child{border-left:3px solid var(--ac);padding-left:9px;}
.veri-tbl td.null{color:var(--txd);font-style:italic;}

.olg-hucre{display:flex;align-items:center;gap:4px;}
.olg-badge{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;border:1px solid var(--bor);background:var(--sur2);color:var(--txd);transition:all .15s;}
.olg-badge.dolu{background:rgba(22,163,110,.12);border-color:rgba(22,163,110,.35);color:var(--gr);}

.nps-pill{display:inline-block;padding:2px 8px;border-radius:5px;background:rgba(45,142,255,.08);border:1px solid rgba(45,142,255,.2);color:var(--ac);font-weight:700;font-size:12px;font-family:'JetBrains Mono',monospace;}

/* Alt navigasyon */
.alt-nav{margin-top:30px;padding-top:20px;border-top:1px solid var(--bor);}
.alt-nav-bas{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txd);margin-bottom:12px;}
.alt-nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.alt-nav-k{background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 14px;text-decoration:none;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:all .15s;border-left:3px solid var(--bor);}
.alt-nav-k:hover{border-color:var(--ac);background:var(--sur2);}
.alt-nav-k.dolu{border-left-color:var(--ac);}
.alt-nav-k.bos{border-left-color:var(--txd);opacity:.6;}
.alt-nav-k.bos:hover{opacity:.85;}
.alt-nav-k.aktif{border-left-color:var(--ac);background:rgba(45,142,255,.05);border-color:var(--ac);pointer-events:none;}
.alt-nav-ad{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--tx);}
.alt-nav-sayi{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txd);}

/* Boş / yükleniyor */
.yuk{text-align:center;padding:48px 20px;color:var(--txd);}
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--bor);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.uyari{background:var(--sur);border:1px solid rgba(229,62,62,.3);border-left:3px solid var(--re);border-radius:10px;padding:16px 20px;color:var(--tx);font-size:13px;}
.bos-tablo{text-align:center;padding:40px 20px;color:var(--txd);}
.bos-tablo-ikon{font-size:36px;margin-bottom:10px;opacity:.4;}
</style>
</head>

// ── Supabase proxy ───────────────────────────────────────
var _supa = null;
function _getSupa() {
  if (_supa) return _supa;
  if (typeof ARES !== 'undefined' && ARES.supabase()) _supa = ARES.supabase();
  return _supa;
}
var _supaProxy = new Proxy({}, {
  get: function(t, prop){
    var s = _getSupa();
    if (!s) throw new Error('Supabase hazır değil');
    var v = s[prop];
    return typeof v === 'function' ? v.bind(s) : v;
  }
});

// ── Helpers ───────────────────────────────────────────────
function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function T(id){ return document.getElementById(id); }
async function cikisYap(){ await _supaProxy.auth.signOut(); window.location.href='../giris.html'; }
function qsParam(name){ var u=new URLSearchParams(window.location.search); return u.get(name); }
function fmtSayi(val, ondalik){
  if (val == null || val === '') return null;
  var n = Number(val);
  if (!isFinite(n)) return null;
  if (ondalik != null) return n.toFixed(ondalik);
  return String(n);
}

// ── URL parametreleri ────────────────────────────────────
var TABLO = qsParam('tablo');
var MG    = qsParam('mg');
var STD   = qsParam('std');

// ── DB'den o (tablo, mg, std) için tüm satırları çek ──
async function veriCek(){
  if (!TABLO || !MG || !STD) return { durum:'param_eksik' };
  var konfig = TABLO_KONFIG[TABLO];
  if (!konfig) return { durum:'tablo_yok' };
  if (!konfig.kolonlar || konfig.kolonlar.length === 0) {
    return { durum:'konfig_yok', not: konfig.not };
  }

  try {
    // Standart filtre client-side (DB '-' / KATALOG ' ' format farkı için normalize)
    var q = _supaProxy.from(TABLO).select('*').eq('malzeme_grubu', MG);
    (konfig.siralama || []).forEach(function(s){
      q = q.order(s.kol, { ascending: s.yon !== 'desc', nullsFirst: false });
    });
    var r = await q.limit(2000);
    if (r && r.error) {
      var code = (r.error.code || '').toString();
      var status = r.status || 0;
      var msg = (r.error.message || '').toLowerCase();
      if (status === 404 || code === 'PGRST205' || code === '42P01') return { durum:'tablo_yok' };
      if (/column.*does not exist/i.test(msg)) return { durum:'kolon_yok', mesaj:r.error.message };
      return { durum:'hata', mesaj:r.error.message };
    }
    function _nrm(x){ return String(x||'').toUpperCase().replace(/[\s\-_.]+/g,''); }
    var _stdN = _nrm(STD);
    var _filt = (r.data || []).filter(function(row){ return _nrm(row.standart) === _stdN; });
    return { durum:'ok', satirlar: _filt };
  } catch (e) {
    return { durum:'hata', mesaj: e.message };
  }
}

// "Bu malzeme grubunda diğer standartlar" için alt-nav verisi
async function digerStandartlariCek(){
  if (!TABLO || !MG) return [];
  try {
    var r = await _supaProxy.from(TABLO).select('standart').eq('malzeme_grubu', MG).limit(5000);
    if (!r || r.error) return [];
    var dag = {};
    (r.data || []).forEach(function(row){
      var s = (row.standart || '').trim();
      if (!s) return;
      dag[s] = (dag[s] || 0) + 1;
    });
    return Object.keys(dag).map(function(k){ return { kod:k, sayi:dag[k] }; }).sort(function(a,b){ return b.sayi - a.sayi; });
  } catch (e) { return []; }
}

// ── Hücre render (kolon tipine göre) ──────────────────────
function hucreHtml(satir, kolon){
  var v = satir[kolon.kol];
  if (v == null || v === '') return '<td class="null">—</td>';
  if (kolon.tip === 'nps_pill') return '<td><span class="nps-pill">' + esc(v) + '</span></td>';
  if (kolon.tip === 'kod')      return '<td>' + esc(v) + '</td>';
  if (kolon.tip === 'sayi') {
    var f = fmtSayi(v, kolon.ondalik);
    return '<td>' + esc(f || '—') + '</td>';
  }
  return '<td>' + esc(v) + '</td>';
}

        '<div class="alt-nav-sayi">' + d.sayi + ' ölçü</div>' +
      '</a>';
    }).join('');
    altNav = '<div class="alt-nav">' +
      '<div class="alt-nav-bas">' + esc(mgAd) + ' · diğer standartlar</div>' +
      '<div class="alt-nav-grid">' + altKartlar + '</div>' +
    '</div>';
  }

  return brd + sayfaBas + ustKart + filterBar + aksiyonBar + tabloHtml + altNav;
}

// ── Satır tıklama → SVG + panel güncelle ──────────────────
function satirTiklamasiBagla(){
  var tbody = document.getElementById('tblBody');
  if (!tbody) return;

  var konfig = TABLO_KONFIG[TABLO];
  if (!konfig || !konfig.panel_lejant) return;

  tbody.addEventListener('click', function(e){
    var tr = e.target.closest('tr');
    if (!tr) return;
    // En az bir panel_lejant kolonu data-attr olarak varsa satırdır
    var dataAttrEsleti = konfig.panel_lejant.some(function(L){
      return tr.hasAttribute('data-' + L.kol.replace(/_/g,'-'));
    });
    if (!dataAttrEsleti) return;

    tbody.querySelectorAll('tr.secili').forEach(function(r){ r.classList.remove('secili'); });
    tr.classList.add('secili');

    // Satır verilerini panel + SVG'ye yansıt
    var degerler = {};
    konfig.panel_lejant.forEach(function(L){
      var attr = 'data-' + L.kol.replace(/_/g,'-');
      var v = tr.getAttribute(attr);
      degerler[L.kol] = v;
      var el = T('pn_' + L.kol);
      if (el) {
        if (v == null || v === '') { el.textContent = '—'; el.classList.add('bos'); }
        else {
          var formatted = L.ondalik != null ? fmtSayi(v, L.ondalik) : v;
          var birim = L.birim ? ' ' + L.birim : '';
          el.textContent = (formatted || v) + birim;
          el.classList.remove('bos');
        }
      }
    });

    // SVG (boru için)
    if (konfig.svg_tipi === 'boru_kesit') {
      var od = parseFloat(degerler.dis_cap_mm || 0);
      var et = parseFloat(degerler.et_mm || 0);
      var id = degerler.ic_cap_mm ? parseFloat(degerler.ic_cap_mm) : (od - 2*et);
      var sch = degerler.schedule_kod || '—';
      var nps = ''; // boru_olculer'da NPS kolonu yok, DN'den turetilebilir

      var elOd = T('svgOd'); if (elOd) elOd.textContent = (od ? od.toFixed(1) : '—') + ' mm';
      var elId = T('svgId'); if (elId) elId.textContent = (id ? id.toFixed(2) : '—') + ' mm';
      var elEt = T('svgEt'); if (elEt) elEt.textContent = (et ? et.toFixed(2) : '—') + ' mm';
      var elSch = T('svgSch'); if (elSch) elSch.textContent = sch;
      var elRef = T('svgSatirRef'); if (elRef) elRef.textContent = (nps ? 'NPS ' + nps : '') + (sch ? ' · Sch ' + sch : '');
      var elSad = T('pnSatirAd'); if (elSad) elSad.textContent = (nps ? 'NPS ' + nps : '') + (sch ? ' · Sch ' + sch : '');
    }
  });

  // İlk satırı otomatik seç
  // Ilk gercek satiri bul (herhangi bir panel_lejant kolonu data-attr olarak varsa)
  var ilk = null;
  var tumSatirlar = tbody.querySelectorAll('tr');
  for (var i = 0; i < tumSatirlar.length; i++) {
    var herhangiBiriVar = konfig.panel_lejant.some(function(L){
      return tumSatirlar[i].hasAttribute('data-' + L.kol.replace(/_/g,'-'));
    });
    if (herhangiBiriVar) { ilk = tumSatirlar[i]; break; }
  }
  if (ilk) ilk.dispatchEvent(new Event('click', { bubbles:true }));
}

// ── Filtre handler ────────────────────────────────────────
function filtreHandlerBagla(){
  var sel = document.getElementById('fltSelect');
  if (!sel) return;

  var kol = sel.getAttribute('data-kol');
  var dataAttr = 'data-' + kol.replace(/_/g, '-');
  var chip = document.getElementById('fltChip');
  var sifirla = document.getElementById('fltSifirla');
  var aksiyonSol = document.querySelector('.aksiyon-sol strong');

  var tbody = document.getElementById('tblBody');
  if (!tbody) return;
  var tumSatirlar = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
  var toplam = tumSatirlar.filter(function(tr){ return tr.hasAttribute(dataAttr) || tr.hasAttribute('data-' + (TABLO_KONFIG[TABLO].panel_lejant[0].kol).replace(/_/g,'-')); }).length;

  function uygula(){
    var deger = sel.value;
    var gorunenSayi = 0;
    tumSatirlar.forEach(function(tr){
      // Boş veya basligi olmayan satirlari (colspan empty state) atla
      if (tr.cells.length === 1 && tr.cells[0].hasAttribute('colspan')) return;
      if (!deger) {
        tr.style.display = '';
        gorunenSayi++;
      } else {
        var v = tr.getAttribute(dataAttr);
        if (v === deger) { tr.style.display = ''; gorunenSayi++; }
        else { tr.style.display = 'none'; }
      }
    });
    if (deger) {
      chip.textContent = gorunenSayi + ' / ' + toplam + ' gösteriliyor';
      chip.style.display = '';
      sifirla.style.display = '';
      if (aksiyonSol) aksiyonSol.textContent = gorunenSayi;
    } else {
      chip.style.display = 'none';
      sifirla.style.display = 'none';
      if (aksiyonSol) aksiyonSol.textContent = toplam;
    }
  }

  sel.addEventListener('change', uygula);
  if (sifirla) sifirla.addEventListener('click', function(){
    sel.value = '';
    uygula();
  });
}

// ── Ana akış ──────────────────────────────────────────────
(async function init(){
  // ares-store async init için 80 iterasyonlu poll (kutuphane.html pattern'i)
  var b = 0; while (b < 80) { if (_getSupa()) break; await new Promise(function(r){ setTimeout(r, 100); }); b++; }
  var supa = _getSupa();
  if (!supa) { window.location.href = '../giris.html'; return; }

  // OAuth redirect sonrası URL hash'inde token gelirse oturumu kur
  if (window.location.hash) {
    var p = new URLSearchParams(window.location.hash.substring(1));
    var at = p.get('access_token'), rt = p.get('refresh_token');
    if (at) { await supa.auth.setSession({ access_token: at, refresh_token: rt }); window.location.hash = ''; }
  }

  var sr = await supa.auth.getSession();
  if (!sr || !sr.data || !sr.data.session) {
    window.location.href = '../giris.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
    return;
  }

  var kr = await supa.from('kullanicilar').select('rol,ad_soyad').eq('id', sr.data.session.user.id).single();
  if (!kr.data || kr.data.rol !== 'super_admin') {
    window.location.href = '../index.html';
    return;
  }

  var ub = T('topbarUser'); if (ub) ub.textContent = kr.data.ad_soyad || '—';
  var app = T('appShell'); app.style.display = 'flex'; app.style.visibility = 'visible';
  document.documentElement.style.visibility = 'visible';

  try {
    // Paralel: tablo verisi + diğer standartlar listesi
    var [veri, digerStandartlar] = await Promise.all([veriCek(), digerStandartlariCek()]);
    T('anaIcerik').innerHTML = ciz(veri, digerStandartlar);

    // Satır etkileşimini bağla (eğer kolon konfigi varsa ve veri varsa)
    if (veri.durum === 'ok' && (veri.satirlar || []).length > 0) {
      satirTiklamasiBagla();
      filtreHandlerBagla();
    }
  } catch (e) {
    console.error('[kutuphane-detay] init hata:', e);
    T('anaIcerik').innerHTML = '<div class="uyari">⚠ Sayfa yüklenirken hata oluştu: ' + esc(e.message) + '</div>';
  }
})();
</script>
