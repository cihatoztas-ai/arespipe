  --ac:#2D8EFF; --ac2:#1a75e8; --gr:#16a36e; --re:#e53e3e;

  --bg:#0d1117; --sur:#161b24; --sur2:#1c2333; --bor:#262f3e;
  --tx:#e6ecf4; --txm:#94a3b8; --txd:#6b7a90;
}
[data-theme=light-anthracite] {
  --bg:#d8dde4; --sur:#e4e9ef; --sur2:#d0d7e0; --bor:#bcc5d0;
  --tx:#141e2b; --txm:#3a4f63; --txd:#637080;

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--sur);border-bottom:1px solid var(--bor);position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px;color:var(--admin);display:flex;align-items:center;gap:8px;}
.topbar-logo span{color:var(--txm);font-weight:400;font-size:13px;letter-spacing:0;}
.topbar-sep{flex:1;}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txm);}
.topbar-badge{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--admin);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.5px;}
.btn-logout{background:none;border:1px solid var(--bor);color:var(--txm);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:all .15s;}
.btn-logout:hover{border-color:var(--re);color:var(--re);}

.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:220px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bor);padding:16px 8px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--txm);transition:all .15s;border:1px solid transparent;text-decoration:none;}
.nav-item:hover{background:var(--sur2);color:var(--tx);}
.nav-item.active{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.2);color:var(--admin);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-sep{height:1px;background:var(--bor);margin:8px 4px;}

.main{flex:1;overflow-y:auto;padding:24px 32px;min-width:0;}

/* Breadcrumb */
.brd{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txm);margin-bottom:14px;flex-wrap:wrap;}
.brd a{color:var(--txm);text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all .15s;}
.brd a:hover{color:var(--tx);background:var(--sur);border-color:var(--bor);}
.brd-sep{color:var(--txd);font-size:11px;}
.brd-aktif{color:var(--tx);font-weight:600;padding:4px 8px;}

/* Sayfa başlığı */
.sf-bas{margin-bottom:20px;}
.sf-bas-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.sf-baslik{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--tx);}
.sf-cnt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--txm);background:var(--sur);border:1px solid var(--bor);padding:3px 9px;border-radius:7px;font-weight:600;}
.sf-mg-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:8px;background:rgba(45,142,255,.08);border:1px solid rgba(45,142,255,.3);color:var(--ac);font-size:13px;font-weight:600;}
.sf-alt{font-size:13px;color:var(--txm);margin-top:6px;}

/* Özet */
.ozet{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.ozet-k{background:var(--sur);border:1px solid var(--bor);border-radius:11px;padding:14px 16px;}
.ozet-l{font-size:10px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.ozet-v{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;line-height:1;color:var(--tx);}
.ozet-s{font-size:11px;color:var(--txd);margin-top:3px;}
.ozet-tr{background:var(--sur2);height:5px;border-radius:3px;overflow:hidden;margin-top:8px;}
.ozet-fl{background:var(--ac);height:100%;transition:width .5s ease;}

/* Standart listesi */
.std-liste{display:flex;flex-direction:column;gap:10px;}

.std-sat{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:14px 18px;display:grid;grid-template-columns:1fr auto auto auto auto;gap:18px;align-items:center;cursor:pointer;transition:all .15s;border-left:3px solid var(--bor);text-decoration:none;color:inherit;}
.std-sat:hover{border-color:var(--txd);background:var(--sur2);}
.std-sat.dolu{border-left-color:var(--ac);}
.std-sat.kismi{border-left-color:var(--warn);}
.std-sat.bos{border-left-color:var(--txd);opacity:.55;}
.std-sat.bos:hover{opacity:.85;}
.std-sat.ekstra{border-left-color:var(--leg);}

.std-sol{min-width:0;}
.std-bas{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
.std-ad{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--tx);letter-spacing:.4px;}
.std-kod{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ac);background:rgba(45,142,255,.08);border:1px solid rgba(45,142,255,.25);padding:1px 7px;border-radius:5px;font-weight:600;}
.std-sat.bos .std-kod{color:var(--txd);background:var(--sur2);border-color:var(--bor);}
.std-sat.ekstra .std-kod{color:var(--leg);background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.25);}
.std-rozet{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:1px 7px;border-radius:5px;letter-spacing:.3px;text-transform:uppercase;}
.std-rozet.dolu{background:rgba(45,142,255,.1);color:var(--ac);border:1px solid rgba(45,142,255,.3);}
.std-rozet.kismi{background:rgba(217,119,6,.1);color:var(--warn);border:1px solid rgba(217,119,6,.3);}
.std-rozet.bos{background:var(--sur2);color:var(--txd);border:1px solid var(--bor);}
.std-rozet.ekstra{background:rgba(124,58,237,.1);color:var(--leg);border:1px solid rgba(124,58,237,.3);}
.std-acik{font-size:12px;color:var(--txm);line-height:1.4;}
.std-yardim{font-size:11px;color:var(--warn);margin-top:3px;display:flex;align-items:center;gap:5px;}

.std-orta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:140px;}
.std-saylar{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--tx);}
.std-saylar .toplam{color:var(--txd);font-weight:500;}
.std-sat.bos .std-saylar{color:var(--txd);}

.std-bar-fl{height:100%;background:var(--ac);transition:width .5s ease;}

.std-sat.bos .std-bar-fl{background:var(--txd);}
.std-sat.ekstra .std-bar-fl{background:var(--leg);}

.std-sat.bos .std-ac{color:var(--txd);}

/* Bölüm başlığı */
.bolum-bas{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txd);margin:24px 0 10px;display:flex;align-items:center;gap:10px;}
.bolum-bas-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txd);background:var(--sur);border:1px solid var(--bor);padding:2px 7px;border-radius:5px;}
.bolum-bas::before{content:'';width:14px;height:1px;background:var(--bor);}
.bolum-bas::after{content:'';flex:1;height:1px;background:var(--bor);}

/* Yükleniyor / uyarı */

.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--bor);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

// ── Supabase proxy ───────────────────────────────────────
var _supa = null;
function _getSupa() {
  if (_supa) return _supa;
  if (typeof ARES !== 'undefined' && ARES.supabase()) _supa = ARES.supabase();
  return _supa;
}
var _supaProxy = new Proxy({}, {
  get: function(t, prop){
    var s = _getSupa();
    if (!s) throw new Error('Supabase hazır değil');
    var v = s[prop];
    return typeof v === 'function' ? v.bind(s) : v;
  }
});

// ── Standart kod normalize (DB <-> KATALOG format birleştirici) ──
// DB: 'ASME-B36.10M' / 'EN-10216-1' · KATALOG: 'ASME B36.10M' / 'EN 10216'
// Boşluk, tire, alt-çizgi ve nokta atılır, büyük harfe çevrilir.
function normStd(s){
  if (!s) return '';
  return String(s).toUpperCase().replace(/[\s\-_.]+/g,'');
}
// DB anahtarlarını hem orijinal hem normalize key ile döndür
function normalizeDagilim(dag){
  var out = {};
  Object.keys(dag).forEach(function(k){
    out[k] = dag[k];
    out[normStd(k)] = dag[k];
  });
  return out;
}
// KATALOG kodu verilince DB'deki gerçek anahtarı bul (link URL'i için)
function dbAnahtariBul(katKod, dag){
  var n = normStd(katKod);
  var keys = Object.keys(dag);
  for (var i=0; i<keys.length; i++){
    if (normStd(keys[i]) === n) return keys[i];
  }
  return katKod;
}

// ── Helpers ───────────────────────────────────────────────
function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function T(id){ return document.getElementById(id); }
async function cikisYap(){ await _supaProxy.auth.signOut(); window.location.href='../giris.html'; }
function qsParam(name){ var u=new URLSearchParams(window.location.search); return u.get(name); }

// ── URL parametreleri ────────────────────────────────────
var TABLO = qsParam('tablo');
var MG    = qsParam('mg');

// ── DB'den o (tablo, mg) için tüm standart sayılarını çek ──
async function standartlariSay(){
  var sonuc = { 'standart_dagilim': {}, durum:'ok' };
  if (!TABLO || !MG) { sonuc.durum = 'param_eksik'; return sonuc; }

  try {
    var r = await _supaProxy.from(TABLO)
      .select('standart')
      .eq('malzeme_grubu', MG)
      .limit(5000);

    if (r && r.error) {
      var code = (r.error.code || '').toString();
      var status = r.status || 0;
      var msg = (r.error.message || '').toLowerCase();
      if (status === 404 || code === 'PGRST205' || code === '42P01') {
        sonuc.durum = 'tablo_yok';
        return sonuc;
      }
      if (/malzeme_grubu|standart|column.*does not exist/i.test(msg)) {
        // Kolon eksik — sayfa çalışsın, sayılar 0 olsun
        sonuc.durum = 'kolon_yok';
        return sonuc;
      }
      sonuc.durum = 'hata';
      sonuc.mesaj = r.error.message;
      return sonuc;
    }

    // Client-side gruplama
    var dag = {};
    (r.data || []).forEach(function(row){
      var s = (row.standart || '').trim();
      if (!s) return;
      dag[s] = (dag[s] || 0) + 1;
    });
    sonuc.standart_dagilim = dag;
    return sonuc;
  } catch (e) {
    sonuc.durum = 'hata';
    sonuc.mesaj = e.message;
    return sonuc;
  }
}

// ── Çizim ─────────────────────────────────────────────────
function ciz(sayim){
  // Param eksik
  if (!TABLO || !MG) {
    return '<div class="uyari">⚠ Eksik parametre. URL\'de <code>tablo</code> ve <code>mg</code> parametreleri gerekli. <a href="kutuphane.html" style="color:var(--ac);">Kütüphane envanterine dön</a>.</div>';
  }

  var tabloAd = TABLO_AD[TABLO] || TABLO;
  var mgAd = MG_AD[MG] || MG;

  // Konfigden hedef standartları al
  var hedefler = (STANDART_KATALOG[TABLO] && STANDART_KATALOG[TABLO][MG]) || [];

  // Breadcrumb
  var brd = '<div class="brd">' +
    '<a href="kutuphane.html">📚 Kütüphane</a>' +
    '<span class="brd-sep">›</span>' +
    '<a href="kutuphane-malzemeler.html?tablo=' + encodeURIComponent(TABLO) + '">' + esc(tabloAd) + '</a>' +
    '<span class="brd-sep">›</span>' +
    '<span class="brd-aktif">' + esc(mgAd) + '</span>' +
  '</div>';

  // Tablo yok / kolon yok uyarıları
  var sysUyari = '';
  if (sayim.durum === 'tablo_yok') {
    sysUyari = '<div class="uyari" style="margin-bottom:18px;">⚠ <code>' + esc(TABLO) + '</code> tablosu henüz oluşturulmamış. Hedef standartlar gösteriliyor ama tümü 0 ölçüyle.</div>';
  } else if (sayim.durum === 'kolon_yok') {
    sysUyari = '<div class="uyari" style="margin-bottom:18px;">⚠ <code>malzeme_grubu</code> kolonu DB\'de eksik. Hedef standartlar gösteriliyor ama tümü 0 ölçüyle. Migration sonrası gerçek sayılar görünecek.</div>';
  } else if (sayim.durum === 'hata') {
    sysUyari = '<div class="uyari" style="margin-bottom:18px;">⚠ DB hatası: ' + esc(sayim.mesaj || '') + '</div>';
  }

  // Sayfa başlığı + özet
  var dag = sayim.standart_dagilim || {};
  var dagN = normalizeDagilim(dag);
  var toplamMevcut = 0;
  hedefler.forEach(function(h){ toplamMevcut += (dagN[normStd(h.kod)] || 0); });
  var toplamHedef = 0;
  hedefler.forEach(function(h){ toplamHedef += (h.hedef_olcu || 0); });
  var aktifStdSayisi = hedefler.filter(function(h){ return (dag[h.kod] || 0) > 0; }).length;
  var pct = toplamHedef > 0 ? Math.round(toplamMevcut / toplamHedef * 100) : 0;

  var sayfaBas = '<div class="sf-bas">' +
    '<div class="sf-bas-row">' +
      '<div class="sf-baslik">' + esc(tabloAd) + '</div>' +
      '<div class="sf-mg-pill">🧪 ' + esc(mgAd) + '</div>' +
      '<span class="sf-cnt">' + toplamMevcut + ' / ' + toplamHedef + ' ölçü</span>' +
    '</div>' +
    '<div class="sf-alt">' + esc(mgAd) + ' için hedeflenen ' + hedefler.length + ' standart · ' + aktifStdSayisi + ' aktif · ' + (hedefler.length - aktifStdSayisi) + ' bekliyor</div>' +
  '</div>';

  var ozet = '<div class="ozet">' +
    '<div class="ozet-k"><div class="ozet-l">Aktif Standart</div><div class="ozet-v">' + aktifStdSayisi + ' <span style="font-size:14px;color:var(--txd);font-weight:500;">/ ' + hedefler.length + '</span></div><div class="ozet-s">' + (hedefler.length - aktifStdSayisi) + ' standart bekliyor</div></div>' +
    '<div class="ozet-k"><div class="ozet-l">Toplam Ölçü</div><div class="ozet-v">' + toplamMevcut + ' <span style="font-size:14px;color:var(--txd);font-weight:500;">/ ' + toplamHedef + '</span></div><div class="ozet-tr"><div class="ozet-fl" style="width:' + pct + '%;"></div></div></div>' +
    '<div class="ozet-k"><div class="ozet-l">Olgunluk</div><div class="ozet-v" style="font-size:18px;line-height:1.3;">📷 — · 🎲 — · 📐 —</div><div class="ozet-s">medya tablosu sonra (90+)</div></div>' +
    '<div class="ozet-k"><div class="ozet-l">Genel İlerleme</div><div class="ozet-v">' + pct + '%</div><div class="ozet-tr"><div class="ozet-fl" style="width:' + pct + '%;"></div></div></div>' +
  '</div>';

  // Aktif + bekleyen + ekstra ayrımı
  var aktifler = [];
  var bekleyenler = [];
  var hedefKodSet = {};

  hedefler.forEach(function(h){
    hedefKodSet[normStd(h.kod)] = true;
    var sayi = dagN[normStd(h.kod)] || 0;
    if (sayi > 0) aktifler.push({h:h, sayi:sayi});
    else bekleyenler.push({h:h, sayi:0});
  });

  // DB'de var ama hedefte yok = ekstra (mor)
  var ekstralar = [];
  Object.keys(dag).forEach(function(stdKod){
    if (!hedefKodSet[normStd(stdKod)]) {
      ekstralar.push({
        h: { kod:stdKod, ad:stdKod, aciklama:'Hedef kataloğunda tanımsız · veride mevcut', hedef_olcu:0 },
        sayi: dag[stdKod]
      });
    }
  });

  function satirHtml(x, tip){
    var h = x.h, sayi = x.sayi;
    var sinif = tip; // 'dolu' | 'bos' | 'ekstra'
    var rozet;
    if (tip === 'dolu') {
      var hedef = h.hedef_olcu || 0;
      var oran = hedef > 0 ? sayi / hedef : 0;
      if (oran >= 0.85)      { sinif = 'dolu';  rozet = '<span class="std-rozet dolu">Aktif</span>'; }
      else if (oran >= 0.30) { sinif = 'kismi'; rozet = '<span class="std-rozet kismi">Kısmi</span>'; }
      else                   { sinif = 'kismi'; rozet = '<span class="std-rozet kismi">Az</span>'; }
    } else if (tip === 'bos') {
      rozet = '<span class="std-rozet bos">Bekliyor</span>';
    } else {
      rozet = '<span class="std-rozet ekstra">Ekstra</span>';
    }

    var barPct = h.hedef_olcu > 0 ? Math.min(100, Math.round(sayi / h.hedef_olcu * 100)) : (sayi > 0 ? 100 : 0);
    var saylar = h.hedef_olcu > 0
      ? sayi + ' <span class="toplam">/ ' + h.hedef_olcu + '</span> ölçü'
      : sayi + ' <span class="toplam">ölçü</span>';

    var yardim = '';
    if (tip === 'bos') {
      yardim = '<div class="std-yardim">⚠ Hedefte var ama henüz yüklenmedi · İlk ölçüyü ekle</div>';
    } else if (tip === 'ekstra') {
      yardim = '<div class="std-yardim" style="color:var(--leg);">↪ Hedef kataloğunda tanımsız · veri var</div>';
    }

    var link = 'kutuphane-detay.html?tablo=' + encodeURIComponent(TABLO) +
               '&mg=' + encodeURIComponent(MG) +
               '&std=' + encodeURIComponent(dbAnahtariBul(h.kod, dag));

    return '<a class="std-sat ' + sinif + '" href="' + link + '">' +
      '<div class="std-sol">' +
        '<div class="std-bas">' +
          '<div class="std-ad">' + esc(h.ad) + '</div>' +
          '<span class="std-kod">' + esc(h.kod) + '</span>' +
          rozet +
        '</div>' +
        '<div class="std-acik">' + esc(h.aciklama || '') + '</div>' +
        yardim +
      '</div>' +
      '<div class="std-orta">' +
        '<div class="std-saylar">' + saylar + '</div>' +
        (h.hedef_olcu > 0 ? '<div class="std-bar"><div class="std-bar-fl" style="width:' + barPct + '%;"></div></div>' : '') +
      '</div>' +
      '<div class="std-olg">' +
        '<span class="olg-b"><span class="olg-i">📷</span>—</span>' +
        '<span class="olg-b"><span class="olg-i">🎲</span>—</span>' +
        '<span class="olg-b"><span class="olg-i">📐</span>—</span>' +
      '</div>' +
      '<div class="std-ac">→</div>' +
    '</a>';
  }

  var aktifBolum = '';
  if (aktifler.length > 0) {
    aktifBolum = '<div class="bolum-bas">Aktif Standartlar <span class="bolum-bas-cnt">' + aktifler.length + '</span></div>' +
      '<div class="std-liste">' + aktifler.map(function(x){ return satirHtml(x, 'dolu'); }).join('') + '</div>';
  }

  var bekleyenBolum = '';
  if (bekleyenler.length > 0) {
    bekleyenBolum = '<div class="bolum-bas">Bekleyen Standartlar <span class="bolum-bas-cnt">' + bekleyenler.length + '</span></div>' +
      '<div class="std-liste">' + bekleyenler.map(function(x){ return satirHtml(x, 'bos'); }).join('') + '</div>';
  }

  var ekstraBolum = '';
  if (ekstralar.length > 0) {
    ekstraBolum = '<div class="bolum-bas">Hedef Dışı (Tanımsız Standartlar) <span class="bolum-bas-cnt">' + ekstralar.length + '</span></div>' +
      '<div class="std-liste">' + ekstralar.map(function(x){ return satirHtml(x, 'ekstra'); }).join('') + '</div>';
  }

  // Hedefte hiç standart yoksa
  var bosKatalog = '';
  if (hedefler.length === 0 && ekstralar.length === 0) {
    bosKatalog = '<div class="uyari">📝 Bu (tablo, malzeme grubu) için hedef kataloğu henüz tanımlanmamış. <code>STANDART_KATALOG[' + esc(TABLO) + '][' + esc(MG) + ']</code> içeriği boş. <code>admin/kutuphane-standartlar.html</code> dosyasında bu alanı doldurmak gerekiyor.</div>';
  }

  return brd + sysUyari + sayfaBas + ozet + aktifBolum + bekleyenBolum + ekstraBolum + bosKatalog;
}

// ── Ana akış ──────────────────────────────────────────────
(async function init(){
  // ares-store async init için 80 iterasyonlu poll (kutuphane.html pattern'i)
  var b = 0; while (b < 80) { if (_getSupa()) break; await new Promise(function(r){ setTimeout(r, 100); }); b++; }
  var supa = _getSupa();
  if (!supa) { window.location.href = '../giris.html'; return; }

  // OAuth redirect sonrası URL hash'inde token gelirse oturumu kur
  if (window.location.hash) {
    var p = new URLSearchParams(window.location.hash.substring(1));
    var at = p.get('access_token'), rt = p.get('refresh_token');
    if (at) { await supa.auth.setSession({ access_token: at, refresh_token: rt }); window.location.hash = ''; }
  }

  var sr = await supa.auth.getSession();
  if (!sr || !sr.data || !sr.data.session) {
    window.location.href = '../giris.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
    return;
  }

  var kr = await supa.from('kullanicilar').select('rol,ad_soyad').eq('id', sr.data.session.user.id).single();
  if (!kr.data || kr.data.rol !== 'super_admin') {
    window.location.href = '../index.html';
    return;
  }

  var ub = T('topbarUser'); if (ub) ub.textContent = kr.data.ad_soyad || '—';
  var app = T('appShell'); app.style.display = 'flex'; app.style.visibility = 'visible';
  document.documentElement.style.visibility = 'visible';

  try {
    var sayim = await standartlariSay();
    T('anaIcerik').innerHTML = ciz(sayim);
  } catch (e) {
    console.error('[kutuphane-standartlar] init hata:', e);
    T('anaIcerik').innerHTML = '<div class="uyari">⚠ Sayfa yüklenirken hata oluştu: ' + esc(e.message) + '</div>';
  }
})();
</script>
