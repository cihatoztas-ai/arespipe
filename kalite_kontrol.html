<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kalite Kontrol | AresPipe</title>
<script>(function(){var t=localStorage.getItem('ares_theme')||'dark';document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TEMA DEĞİŞKENLERİ (flash önleme) ── */
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme="dark"]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txm:#94a3b8;--txd:#6b7a90;}
[data-theme="light-anthracite"]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}

/* ── SAYFA LAYOUT ── */
.page{padding:28px 28px 40px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--tx);line-height:1;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:px14px;color:var(--txd);margin-bottom:6px;}
.breadcrumb a{color:var(--txd);text-decoration:none;}.breadcrumb a:hover{color:var(--ac);}

/* ── SOL KENAR RENK SİSTEMİ (Kural B-01) ── */
.cl-ac  {border-left:3px solid var(--ac)   !important;}
.cl-gr  {border-left:3px solid var(--gr)   !important;}
.cl-re  {border-left:3px solid var(--re)   !important;}
.cl-warn{border-left:3px solid var(--warn) !important;}
.cl-leg {border-left:3px solid var(--leg)  !important;}

/* ── STAT KARTLAR ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.si-b{background:rgba(45,142,255,.12);color:var(--ac);}
.si-g{background:rgba(22,163,110,.12);color:var(--gr);}
.si-a{background:rgba(217,119,6,.12);color:var(--warn);}
.si-p{background:rgba(124,58,237,.12);color:var(--leg);}
.stat-label{font-size:px14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--tx);line-height:1;}

/* ── SEÇİM BAR ── */
.secim-bar{background:rgba(45,142,255,.06);border:1px solid rgba(45,142,255,.2);border-radius:12px;padding:12px 18px;margin-bottom:16px;display:none;align-items:center;gap:20px;flex-wrap:wrap;}
.secim-bar.on{display:flex;}
.sval{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--ac);line-height:1;}
.slbl{font-size:px14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;}
.ssep{width:1px;height:34px;background:rgba(45,142,255,.2);}

/* ── SEKMELER ── */
.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--bor);margin-bottom:20px;}
.tab-btn{background:none;border:none;color:var(--txm);font-family:'Barlow',sans-serif;font-size:14px;font-weight:500;padding:9px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--tx);}
.tab-btn.active{color:var(--leg);border-bottom-color:var(--leg);font-weight:600;}
.tc{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;border-radius:99px;font-size:px14px;font-weight:700;padding:0 5px;background:var(--sur2);color:var(--txd);}
.tab-btn.active .tc{background:rgba(124,58,237,.15);color:var(--leg);}
.panel{display:none;}.panel.on{display:block;}

/* ── FİLTRE (Kural F-01) ── */
.fbar{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.fsel{padding:7px 10px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:px14px;font-family:'Barlow',sans-serif;outline:none;height:34px;}
.fsel:focus{border-color:var(--ac);}
.swrap{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:0 10px;flex:1;min-width:180px;max-width:260px;height:34px;}
.swrap input{border:none;background:transparent;color:var(--tx);font-size:px14px;font-family:'Barlow',sans-serif;outline:none;flex:1;}
.swrap input::placeholder{color:var(--txd);}

/* ── GRUPLAR ── */
.dgrup{background:var(--sur);border:1px solid var(--bor);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.dhead{padding:12px 18px;background:var(--sur2);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;cursor:pointer;user-select:none;transition:background .15s;}
.dhead:hover{background:var(--bor);}
.dtitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--tx);}
.dsub{font-size:px14px;color:var(--txd);margin-top:2px;}
.dbody.shut{display:none;}

/* ── TABLO ── */
.st{width:100%;border-collapse:collapse;font-size:px14px;}
.st thead th{text-align:left;padding:8px 14px;font-size:px14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;background:var(--sur2);border-bottom:1px solid var(--bor);white-space:nowrap;}
.st td{padding:9px 14px;border-bottom:1px solid var(--bor);vertical-align:middle;}
.st tr:last-child td{border-bottom:none;}
.st tbody tr:hover td{background:rgba(45,142,255,.04);}
.ck{width:15px;height:15px;cursor:pointer;accent-color:var(--ac);}

/* ── BADGE ── */
.b{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:px14px;font-weight:600;white-space:nowrap;}
.bb{background:rgba(45,142,255,.12);color:var(--ac);}
.bg{background:rgba(22,163,110,.12);color:var(--gr);}
.ba{background:rgba(217,119,6,.12);color:var(--warn);}
.br{background:rgba(229,62,62,.12);color:var(--re);}
.bp{background:rgba(124,58,237,.12);color:var(--leg);}

/* ── BUTONLAR ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:px14px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:'Barlow',sans-serif;white-space:nowrap;}
.btn-p{background:var(--ac);color:#fff;}.btn-p:hover{opacity:.88;}
.btn-s{background:var(--sur2);color:var(--tx);border:1px solid var(--bor);}.btn-s:hover{border-color:var(--ac);color:var(--ac);}
.btn-g{background:transparent;color:var(--txm);border:1px solid var(--bor);}.btn-g:hover{background:var(--sur2);color:var(--tx);}
.btn-ok{background:rgba(22,163,110,.12);color:var(--gr);border:1px solid rgba(22,163,110,.3);}.btn-ok:hover{background:rgba(22,163,110,.2);}
.btn-no{background:rgba(229,62,62,.10);color:var(--re);border:1px solid rgba(229,62,62,.25);}.btn-no:hover{background:rgba(229,62,62,.18);}
.btn-sm{padding:5px 11px;font-size:px14px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── PAKET KARTLARI ── */
.pkart{background:var(--sur);border:1px solid var(--bor);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.phead{padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.pno{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--ac);}
.pbody{padding:10px 18px 14px;border-top:1px solid var(--bor);background:var(--sur2);}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:px14px;font-weight:600;background:var(--sur2);border:1px solid var(--bor);color:var(--txm);}
.chip.ok{background:rgba(22,163,110,.08);border-color:rgba(22,163,110,.3);color:var(--gr);}
.chip.no{background:rgba(229,62,62,.08);border-color:rgba(229,62,62,.3);color:var(--re);}

/* ── MODAL ── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mbox{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:24px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;}
.mcl{background:none;border:none;color:var(--txd);font-size:22px;cursor:pointer;line-height:1;padding:2px;}.mcl:hover{color:var(--tx);}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:px14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fi{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:px14px;font-family:'Barlow',sans-serif;outline:none;}
.fi:focus{border-color:var(--ac);}
.fi::placeholder{color:var(--txd);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fta{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:px14px;font-family:'Barlow',sans-serif;outline:none;resize:vertical;min-height:68px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:3000;animation:tslide .3s ease;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.t-ok{border-left:3px solid var(--gr);}
.t-er{border-left:3px solid var(--re);}
.t-in{border-left:3px solid var(--ac);}
@keyframes tslide{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.bos{text-align:center;padding:48px 24px;color:var(--txd);font-size:14px;}
</style>
<script src="ares-store.js"></script>
<script src="ares-lang.js"></script>
<script src="ares-layout.js"></script>
</head>

<script>
'use strict';
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}

// ── VERİ ────────────────────────────────────────────────────
var HAZIR    = [];
var paketler = [];
var sec      = {};
var karar    = '';
var _supa    = null;  // init'te set edilir

function secHas(id){ return !!sec[id]; }
function secAdd(id){ sec[id] = true; }
function secDel(id){ delete sec[id]; }
function secSize(){ return Object.keys(sec).length; }
function secClear(){ sec = {}; }

// ── FİLTRE ──────────────────────────────────────────────────
async function veriYukle() {
  if (!_supa) return;
  var supa = _supa;
  try {
    // Paralel sorgular — Promise.all
    var tid = ARES.tenantId();
    var results = await Promise.all([
      supa.from('spooller')
        .select('id, spool_no, spool_id, pipeline_no, agirlik, devre_id, devreler(devre_no, is_emri_no, projeler(proje_no, tersaneler(ad)))')
        .eq('aktif_basamak', 'on_kontrol')
        .eq('tenant_id', tid)
        .order('pipeline_no').order('spool_no'),
      supa.from('kk_davetler')
        .select('*, kk_davet_spooller(*, spooller(spool_no, spool_id, pipeline_no, agirlik, devreler(devre_no, projeler(proje_no, tersaneler(ad, kod)))))')
        .eq('tenant_id', tid)
        .order('olusturma', {ascending: false})
    ]);
    var spRes = results[0];
    var dvRes = results[1];

    HAZIR = (spRes.data || []).map(function(s) {
      var dv  = s.devreler || {};
      var prj = dv.projeler || {};
      var trs = prj.tersaneler || {};
      return {
        id:       s.id,
        supaId:   s.id,
        spool:    [prj.proje_no, s.pipeline_no, s.spool_no].filter(Boolean).join('-'),
        spoolId:  s.spool_id || '',
        devre:    dv.devre_no || '—',
        projeNo:  prj.proje_no || '—',
        isEmri:   dv.is_emri_no || '—',
        tersane:  trs.ad || '—',
        agirlik:  parseFloat(s.agirlik) || 0
      };
    });

    paketler = (dvRes.data || []).map(function(d) {
      // spooller listesinden tersane/proje bilgisi al
      var ilkSpool = (d.kk_davet_spooller||[])[0];
      var ilkSp = ilkSpool ? (ilkSpool.spooller||{}) : {};
      var ilkDv = ilkSp.devreler || {};
      var ilkPrj = ilkDv.projeler || {};
      var ilkTrs = ilkPrj.tersaneler || {};
      return {
        id:           d.id,
        davetNo:      d.davet_no || d.id.substring(0,8).toUpperCase(),
        tersane:      ilkTrs.ad || '—',
        projeNo:      ilkPrj.proje_no || '—',
        davetTarihi:  d.tarih ? new Date(d.tarih).toLocaleDateString('tr-TR') : '—',
        kontrolTarihi:'—',
        not:          d.not_ || '',
        mail:         '',
        durum:        d.durum || 'bekleyen',
        onay:         null,
        spooller:     (d.kk_davet_spooller || []).map(function(ks) {
          var sp = ks.spooller || {};
          var dv = sp.devreler || {};
          return {
            id:         ks.id,
            spoolId:    sp.spool_id || ks.spool_id,
            spool:      sp.spool_no || '—',
            devre:      dv.devre_no || '—',
            agirlik:    parseFloat(sp.agirlik) || 0,
            durumOnay:  ks.sonuc || null
          };
        })
      };
    });

  } catch(e) {
    console.error('[KK] veriYukle hatası:', e);
  }
  doldurFiltreler();
  filtrele();
  renderBekle();
  renderOnay();
  guncelStatler();
}

function doldurFiltreler() {
  var fT = document.getElementById('fT');
  fT.innerHTML = '<option value="">'+tv('kk_filter_all_yards','Tüm Tersaneler')+'</option>';
  var tersaneler = [];
  HAZIR.forEach(function(h){ if(tersaneler.indexOf(h.tersane)<0) tersaneler.push(h.tersane); });
  tersaneler.sort().forEach(function(t){
    var o = document.createElement('option');
    o.value = t; o.textContent = t; fT.appendChild(o);
  });
  fT.addEventListener('change', function() {
    var t = fT.value;
    var fP = document.getElementById('fP');
    fP.innerHTML = '<option value="">'+tv('kk_filter_all_projects','Tüm Projeler')+'</option>';
    var projs = [];
    HAZIR.forEach(function(h){ if(!t||h.tersane===t){ if(projs.indexOf(h.projeNo)<0) projs.push(h.projeNo); } });
    projs.sort().forEach(function(s){
      var o=document.createElement('option'); o.value=s; o.textContent=s; fP.appendChild(o);
    });
    filtrele();
  });
  var projSet = [];
  HAZIR.forEach(function(h){ if(projSet.indexOf(h.projeNo)<0) projSet.push(h.projeNo); });
  var fP = document.getElementById('fP');
  fP.innerHTML = '<option value="">'+tv('kk_filter_all_projects','Tüm Projeler')+'</option>';
  projSet.sort().forEach(function(s){
    var o=document.createElement('option'); o.value=s; o.textContent=s; fP.appendChild(o);
  });
}

function filtrele() {
  var t = document.getElementById('fT').value;
  var p = document.getElementById('fP').value;
  var a = document.getElementById('fA').value.toLowerCase().trim();
  renderHazir(HAZIR.filter(function(h){
    return (!t||h.tersane===t) && (!p||h.projeNo===p) &&
           (!a||h.devre.toLowerCase().indexOf(a)>=0||h.spool.toLowerCase().indexOf(a)>=0||h.spoolId.toLowerCase().indexOf(a)>=0);
  }));
}

function filtreSifirla() {
  document.getElementById('fT').value = '';
  document.getElementById('fA').value = '';
  var fP = document.getElementById('fP');
  fP.innerHTML = '<option value="">Tum Projeler</option>';
  var projSet = [];
  HAZIR.forEach(function(h){ if(projSet.indexOf(h.projeNo)<0) projSet.push(h.projeNo); });
  projSet.sort().forEach(function(s){
    var o=document.createElement('option'); o.value=s; o.textContent=s; fP.appendChild(o);
  });
  filtrele();
}

// ── HAZIR LİSTE RENDER ───────────────────────────────────────
function renderHazir(liste) {
  var el = document.getElementById('hazirListe');
  if (!liste.length) { el.innerHTML = '<div class="bos">Gosterilecek spool yok</div>'; return; }
  var G = {};
  liste.forEach(function(h) {
    var gk = h.tersane+'||'+h.projeNo;
    if (!G[gk]) G[gk] = {tersane:h.tersane,projeNo:h.projeNo,devs:{}};
    if (!G[gk].devs[h.devre]) G[gk].devs[h.devre] = [];
    G[gk].devs[h.devre].push(h);
  });
  var html = '';
  Object.keys(G).forEach(function(gk) {
    var g = G[gk];
    var all = [];
    Object.keys(g.devs).forEach(function(d){ all = all.concat(g.devs[d]); });
    var kg = all.reduce(function(a,s){ return a+s.agirlik; }, 0).toFixed(1);
    var nSec = all.filter(function(s){ return secHas(s.id); }).length;
    var ids = JSON.stringify(all.map(function(s){ return s.id; })).replace(/"/g,"'");
    html += '<div class="dgrup">';
    html += '<div class="dhead cl-ac" onclick="toggleGrup(this)">';
    html += '<div>';
    html += '<div class="dtitle">'+esc(g.tersane)+' &middot; <span style="color:var(--ac);">'+esc(g.projeNo)+'</span></div>';
    html += '<div class="dsub">'+all.length+' spool &middot; '+kg+' kg</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:10px;">';
    if(nSec>0) html += '<span class="b bb">'+nSec+' secili</span>';
    html += '<label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:5px;font-size:14px;color:var(--txm);cursor:pointer;">';
    html += '<input type="checkbox" class="ck" '+(nSec===all.length&&all.length>0?'checked':'')+' onchange="grupSec(this,\''+ids+'\')">';
    html += ' Tumu</label>';
    html += '<span style="color:var(--txd);font-size:14px;">&#9654;</span>';
    html += '</div></div>';
    html += '<div class="dbody shut">';
    Object.keys(g.devs).forEach(function(dev) {
      var spls = g.devs[dev];
      html += '<div style="border-bottom:1px solid var(--bor);">';
      html += '<div style="padding:8px 18px;background:var(--sur2);font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;">'+dev+'</div>';
      html += '<table class="st"><thead><tr><th style="width:32px;"></th><th>Spool</th><th style="text-align:right;">Agirlik</th></tr></thead><tbody>';
      spls.forEach(function(s) {
        html += '<tr>';
        html += '<td><input type="checkbox" class="ck" '+(secHas(s.id)?'checked':'')+' onchange="spSec(\''+s.id+'\',this.checked)"></td>';
        html += '<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:700;color:var(--ac);">'+esc(s.spool)+'</td><td style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;color:var(--leg);">'+esc(s.spoolId)+'</td>';
        html += '<td style="text-align:right;color:var(--txm);">'+s.agirlik+' kg</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function toggleGrup(head) {
  var body = head.nextElementSibling;
  body.classList.toggle('shut');
  var arr = head.querySelector('span:last-child');
  if (arr) arr.innerHTML = body.classList.contains('shut') ? '&#9654;' : '&#9660;';
}

function grupSec(cb, idsStr) {
  var ids = JSON.parse(idsStr.replace(/'/g,'"'));
  ids.forEach(function(id){ cb.checked ? secAdd(id) : secDel(id); });
  guncelSecBar();
  filtrele();
}

function spSec(id, checked) {
  checked ? secAdd(id) : secDel(id);
  guncelSecBar();
}

function hepsiniSec(c) {
  HAZIR.forEach(function(h){ c ? secAdd(h.id) : secDel(h.id); });
  filtrele();
}

function secTemizle() {
  secClear();
  var ck = document.getElementById('ckAll');
  if (ck) ck.checked = false;
  guncelSecBar();
  filtrele();
}

function guncelSecBar() {
  var sl = HAZIR.filter(function(h){ return secHas(h.id); });
  var n = sl.length;
  var devSet = {};
  sl.forEach(function(h){ devSet[h.devre+'||'+h.projeNo]=true; });
  var kg = sl.reduce(function(a,h){ return a+h.agirlik; }, 0).toFixed(1);
  document.getElementById('secBar').className = 'secim-bar' + (n>0?' on':'');
  document.getElementById('secD').textContent = Object.keys(devSet).length;
  document.getElementById('secS').textContent = n;
  document.getElementById('secK').textContent = kg;
  document.getElementById('btnDavetUst').disabled = n === 0;
}

// ── DAVET ────────────────────────────────────────────────────
function davetAc() {
  if (!secSize()) { showToast('Once spool secin','error'); return; }
  var sl = HAZIR.filter(function(h){ return secHas(h.id); });
  var kg = sl.reduce(function(a,h){ return a+h.agirlik; },0).toFixed(1);
  var devSet = {};
  sl.forEach(function(h){ devSet[h.devre]=true; });
  var ozet = 'Spool: <strong style="color:var(--tx);">'+sl.length+'</strong> &nbsp;';
  ozet += 'Devre: <strong style="color:var(--tx);">'+Object.keys(devSet).length+'</strong> &nbsp;';
  ozet += 'Toplam: <strong style="color:var(--ac);">'+kg+' kg</strong>';
  document.getElementById('mOzet').innerHTML = ozet;
  var listHtml = sl.map(function(h){
    return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bor);font-size:14px;">'+
      '<span style="color:var(--txm);">'+h.projeNo+' / <span style="color:var(--ac);">'+h.devre+'</span> / <strong style="color:var(--tx);">'+h.spool+'</strong></span>'+
      '<span style="color:var(--txd);">'+h.agirlik+' kg</span></div>';
  }).join('');
  document.getElementById('mListe').innerHTML = listHtml;
  document.getElementById('dTarih').value = new Date().toISOString().split('T')[0];
  document.getElementById('dKontrol').value = '';
  document.getElementById('dNot').value = '';
  document.getElementById('dMail').value = '';
  document.getElementById('mDavet').style.display = 'flex';
}

async function davetKaydet() {
  var tarih = document.getElementById('dTarih').value;
  if (!tarih) { showToast('Davet tarihi zorunlu','error'); return; }
  var sl = HAZIR.filter(function(h){ return secHas(h.id); });
  var fmt = function(d){ return d ? new Date(d).toLocaleDateString('tr-TR') : '-'; };
  if (!_supa) { showToast('Bağlantı hatası','error'); return; }
  var supa = _supa;
  try {
    // kk_davetler'e yaz
    var dvRes = await supa.from('kk_davetler').insert({
      tenant_id: ARES.tenantId(),
      tarih:     tarih,
      durum:     'bekleyen',
      not_:      document.getElementById('dNot').value.trim() || null
    }).select().single();
    if (dvRes.error) throw dvRes.error;
    var davetId = dvRes.data.id;
    // kk_davet_spooller'a yaz
    var spInserts = sl.map(function(h) {
      return { tenant_id: ARES.tenantId(), davet_id: davetId, spool_id: h.supaId };
    });
    await supa.from('kk_davet_spooller').insert(spInserts);
    // spooller aktif_basamak → 'kk'
    var spoolIds = sl.map(function(h){ return h.supaId; });
    await supa.from('spooller').update({ aktif_basamak: 'kk' }).in('id', spoolIds);
    ARES.logEkle('KK_DAVET', davetId+' daveti oluşturuldu', 'devre', null, {});
    secClear();
    document.getElementById('mDavet').style.display = 'none';
    showToast('Davet paketi oluşturuldu','success');
    await veriYukle();
    tabGit('bekleyen');
  } catch(e) {
    console.error('[KK] davetKaydet hatası:', e);
    showToast('Kayıt hatası: '+e.message,'error');
  }
}

// ── BEKLEYEN / ONAYLANAN ─────────────────────────────────────
function renderBekle() {
  var el = document.getElementById('bekleListe');
  var bl = paketler.filter(function(p){ return p.durum==='bekleyen'; });
  el.innerHTML = bl.length ? bl.map(pkart).join('') : '<div class="bos">Bekleyen davet paketi yok</div>';
}

function renderOnay() {
  var el = document.getElementById('onayListe');
  var ol = paketler.filter(function(p){ return p.durum==='onaylandi'||p.durum==='reddedildi'; });
  el.innerHTML = ol.length ? ol.map(pkart).join('') : '<div class="bos">Henuz onaylanan paket yok</div>';
}

function pkart(p) {
  var dm = {bekleyen:'<span class="b ba">Tersane Bekleniyor</span>',onaylandi:'<span class="b bg">Onaylandi</span>',reddedildi:'<span class="b br">Ret / Duzeltme</span>'};
  var kg = p.spooller.reduce(function(a,s){ return a+(s.agirlik||0); },0).toFixed(1);
  var h = '<div class="pkart"><div class="phead">';
  h += '<div>';
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;"><div class="pno">'+esc(p.davetNo||p.id.substring(0,8).toUpperCase())+'</div>'+(dm[p.durum]||'')+'</div>';
  h += '<div style="font-size:14px;color:var(--txm);">'+esc(p.tersane)+' &middot; <span style="color:var(--ac);">'+esc(p.projeNo)+'</span></div>';
  h += '<div style="font-size:14px;color:var(--txd);margin-top:4px;">Davet: <strong style="color:var(--tx);">'+p.davetTarihi+'</strong> &middot; Kontrol: <strong style="color:var(--tx);">'+p.kontrolTarihi+'</strong> &middot; '+p.spooller.length+' spool &middot; '+kg+' kg'+(p.not?' &middot; '+p.not:'')+'</div>';
  if (p.onay) h += '<div style="font-size:14px;margin-top:5px;color:'+(p.durum==='onaylandi'?'var(--gr)':'var(--re)')+';">'+(p.durum==='onaylandi'?'&check;':'&cross;')+' '+p.onay.kisi+' &mdash; '+p.onay.tarih+(p.onay.not?' &mdash; '+p.onay.not:'')+'</div>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-items:flex-start;">';
  h += '<button class="btn btn-g btn-sm" onclick="showToast(\'PDF indiriliyor...\',\'info\')">PDF</button>';
  if (p.durum==='bekleyen') h += '<button class="btn btn-p btn-sm" onclick="onayAc(\''+p.id+'\')">Onay Gir</button>';
  if (p.durum==='onaylandi') h += '<button class="btn btn-ok btn-sm" onclick="showToast(\'Sevkiyat hazirlik listesine eklendi\',\'success\')">Sevkiyata &rarr;</button>';
  h += '</div></div>';
  h += '<div class="pbody"><div class="chips">';
  p.spooller.forEach(function(s){
    h += '<span class="chip '+(s.durumOnay==='onay'?'ok':s.durumOnay==='ret'?'no':'')+'">'+s.spool+' <span style="opacity:.5;font-size:14px;">/ '+s.devre+'</span></span>';
  });
  h += '</div></div></div>';
  return h;
}

// ── ONAY ─────────────────────────────────────────────────────
function onayAc(id) {
  document.getElementById('oPaketId').value = id;
  document.getElementById('oTarih').value = new Date().toISOString().split('T')[0];
  document.getElementById('oKisi').value = '';
  document.getElementById('oNot').value = '';
  document.getElementById('oRetNot').value = '';
  document.getElementById('retBlok').style.display = 'none';
  karar = '';
  document.getElementById('bOnay').style.outline = '';
  document.getElementById('bRet').style.outline = '';
  document.getElementById('mOnay').style.display = 'flex';
}

function kararSec(k) {
  karar = k;
  document.getElementById('bOnay').style.outline = k==='onay' ? '2px solid var(--gr)' : '';
  document.getElementById('bRet').style.outline  = k==='ret'  ? '2px solid var(--re)' : '';
  document.getElementById('retBlok').style.display = k==='ret' ? 'block' : 'none';
}

async function onayKaydet() {
  var id    = document.getElementById('oPaketId').value;
  var tarih = document.getElementById('oTarih').value;
  var kisi  = document.getElementById('oKisi').value.trim();
  var not   = document.getElementById('oNot').value.trim();
  var ret   = document.getElementById('oRetNot').value.trim();
  if (!karar) { showToast('Karar secin','error'); return; }
  if (!tarih) { showToast('Tarih zorunlu','error'); return; }
  if (!kisi)  { showToast('Kontrol eden zorunlu','error'); return; }
  if (karar==='ret'&&!ret) { showToast('Ret nedeni girilmeli','error'); return; }
  var p = null;
  paketler.forEach(function(x){ if(x.id===id) p=x; });
  if (!p) return;
  if (!_supa) { showToast('Bağlantı hatası','error'); return; }
  var supa = _supa;
  try {
    var yeniDurum = karar==='onay' ? 'onaylandi' : 'reddedildi';
    var notFinal  = karar==='ret' ? ret+(not?' / '+not:'') : not;
    // kk_davetler güncelle
    await supa.from('kk_davetler').update({
      durum: yeniDurum,
      not_:  notFinal || null
    }).eq('id', id);
    // kk_davet_spooller güncelle
    await supa.from('kk_davet_spooller').update({ sonuc: karar }).eq('davet_id', id);
    // spooller aktif_basamak güncelle
    var p = paketler.find(function(x){ return x.id===id; });
    if (p && p.spooller) {
      var spoolIds = p.spooller.map(function(s){ return s.spoolId; }).filter(Boolean);
      if (spoolIds.length) {
        var yeniBasamak = karar==='onay' ? 'sevkiyat' : 'on_kontrol';
        await supa.from('spooller').update({ aktif_basamak: yeniBasamak }).in('id', spoolIds);
      }
    }
    ARES.logEkle('KK_'+(karar==='onay'?'ONAYLA':'RED'), id+' '+(karar==='onay'?'onaylandı':'reddedildi'), 'devre', null, {});
    document.getElementById('mOnay').style.display = 'none';
    showToast(karar==='onay' ? 'Onaylandı — Sevkiyata hazır!' : 'Reddedildi', karar==='onay'?'success':'error');
    await veriYukle();
    if (karar==='onay') tabGit('onaylanan');
  } catch(e) {
    console.error('[KK] onayKaydet hatası:', e);
    showToast('Kayıt hatası: '+e.message,'error');
  }
}

// ── STAT & TAB ───────────────────────────────────────────────
function guncelStatler() {
  document.getElementById('sH').textContent = HAZIR.length;
  var b=0, o=0;
  paketler.forEach(function(p){ if(p.durum==='bekleyen') b++; if(p.durum==='onaylandi') o++; });
  document.getElementById('sD').textContent = paketler.length;
  document.getElementById('sB').textContent = b;
  document.getElementById('sO').textContent = o;
  document.getElementById('tD').textContent = HAZIR.length;
  document.getElementById('tB').textContent = b;
  document.getElementById('tO').textContent = o;
}

function tabGit(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-tab')===tab);
  });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  var panel = document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1));
  if (panel) panel.classList.add('on');
}

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ tabGit(btn.getAttribute('data-tab')); });
});

// ── TOAST ────────────────────────────────────────────────────
var _tt;
function showToast(msg, type) {
  var old = document.getElementById('_toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.id = '_toast';
  t.className = 'toast t-'+({'success':'ok','error':'er'}[type]||'in');
  t.innerHTML = '<span>'+msg+'</span><button style="background:none;border:none;color:var(--txd);cursor:pointer;font-size:16px;margin-left:8px;" onclick="this.parentElement.remove()">&#x2715;</button>';
  document.body.appendChild(t);
  clearTimeout(_tt);
  _tt = setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}

// ── BAŞLAT ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  (async function() {
    try {
      // Diğer sayfalarla aynı auth pattern — ARES + session bekleme döngüsü
      var _b = 0;
      while (_b < 80) {
        if (typeof ARES === 'undefined') { await new Promise(function(r){setTimeout(r,100);}); _b++; continue; }
        _supa = ARES.supabase();
        if (_supa) {
          var _ses = await _supa.auth.getSession();
          if (_ses.data && _ses.data.session) { await ARES.oturumKontrol(); break; }
          if (_b > 20) { location.href = 'giris.html'; return; }
        }
        await new Promise(function(r){ setTimeout(r, 100); });
        _b++;
      }
      if (window._applyI18n) _applyI18n();
      await veriYukle();
      window._onLangChange = function() {
        if (window._applyI18n) _applyI18n();
        renderBekle();
        renderOnay();
      };
    } catch(e) { console.error('[ARES]', e); }
    finally {
      document.documentElement.style.visibility = '';
    }
  })();
});
