<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kalite Kontrol | AresPipe</title>
<!-- ✅ Flash prevention — B-03 -->
<script>(function(){var t=localStorage.getItem('ares_theme')||'dark';document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TEMA DEĞİŞKENLERİ (flash önleme) ── */
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme="dark"]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txm:#94a3b8;--txd:#6b7a90;}
[data-theme="light-anthracite"]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}

/* ── SAYFA LAYOUT ── */
.page{padding:28px 28px 40px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--tx);line-height:1;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--txd);margin-bottom:6px;}
.breadcrumb a{color:var(--txd);text-decoration:none;}.breadcrumb a:hover{color:var(--ac);}

/* ── SOL KENAR RENK SİSTEMİ (Kural B-01) ── */
.cl-ac  {border-left:3px solid var(--ac)   !important;}
.cl-gr  {border-left:3px solid var(--gr)   !important;}
.cl-re  {border-left:3px solid var(--re)   !important;}
.cl-warn{border-left:3px solid var(--warn) !important;}
.cl-leg {border-left:3px solid var(--leg)  !important;}

/* ── STAT KARTLAR ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.si-b{background:rgba(45,142,255,.12);color:var(--ac);}
.si-g{background:rgba(22,163,110,.12);color:var(--gr);}
.si-a{background:rgba(217,119,6,.12);color:var(--warn);}
.si-p{background:rgba(124,58,237,.12);color:var(--leg);}
.stat-label{font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--tx);line-height:1;}

/* ── SEÇİM BAR ── */
.secim-bar{background:rgba(45,142,255,.06);border:1px solid rgba(45,142,255,.2);border-radius:12px;padding:12px 18px;margin-bottom:16px;display:none;align-items:center;gap:20px;flex-wrap:wrap;}
.secim-bar.on{display:flex;}
.sval{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--ac);line-height:1;}
.slbl{font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;}
.ssep{width:1px;height:34px;background:rgba(45,142,255,.2);}

/* ── SEKMELER ── */
.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--bor);margin-bottom:20px;}
.tab-btn{background:none;border:none;color:var(--txm);font-family:'Barlow',sans-serif;font-size:14px;font-weight:500;padding:9px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--tx);}
.tab-btn.active{color:var(--leg);border-bottom-color:var(--leg);font-weight:600;}
.tc{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;border-radius:99px;font-size:14px;font-weight:700;padding:0 5px;background:var(--sur2);color:var(--txd);}
.tab-btn.active .tc{background:rgba(124,58,237,.15);color:var(--leg);}
.panel{display:none;}.panel.on{display:block;}

/* ── FİLTRE (Kural F-01) ── */
.fbar{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.fsel{padding:7px 10px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;height:34px;}
.fsel:focus{border-color:var(--ac);}
.swrap{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:0 10px;flex:1;min-width:180px;max-width:260px;height:34px;}
.swrap input{border:none;background:transparent;color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;flex:1;}
.swrap input::placeholder{color:var(--txd);}

/* ── GRUPLAR ── */
.dgrup{background:var(--sur);border:1px solid var(--bor);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.dhead{padding:12px 18px;background:var(--sur2);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;cursor:pointer;user-select:none;transition:background .15s;}
.dhead:hover{background:var(--bor);}
.dtitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--tx);}
.dsub{font-size:14px;color:var(--txd);margin-top:2px;}
.dbody.shut{display:none;}

/* ── TABLO ── */
.st{width:100%;border-collapse:collapse;font-size:14px;}
.st thead th{text-align:left;padding:8px 14px;font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;background:var(--sur2);border-bottom:1px solid var(--bor);white-space:nowrap;}
.st td{padding:9px 14px;border-bottom:1px solid var(--bor);vertical-align:middle;}
.st tr:last-child td{border-bottom:none;}
.st tbody tr:hover td{background:rgba(45,142,255,.04);}
.ck{width:15px;height:15px;cursor:pointer;accent-color:var(--ac);}

/* ── BADGE ── */
.b{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:14px;font-weight:600;white-space:nowrap;}
.bb{background:rgba(45,142,255,.12);color:var(--ac);}
.bg{background:rgba(22,163,110,.12);color:var(--gr);}
.ba{background:rgba(217,119,6,.12);color:var(--warn);}
.br{background:rgba(229,62,62,.12);color:var(--re);}
.bp{background:rgba(124,58,237,.12);color:var(--leg);}

/* ── BUTONLAR ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:'Barlow',sans-serif;white-space:nowrap;}
.btn-p{background:var(--ac);color:#fff;}.btn-p:hover{opacity:.88;}
.btn-s{background:var(--sur2);color:var(--tx);border:1px solid var(--bor);}.btn-s:hover{border-color:var(--ac);color:var(--ac);}
.btn-g{background:transparent;color:var(--txm);border:1px solid var(--bor);}.btn-g:hover{background:var(--sur2);color:var(--tx);}
.btn-ok{background:rgba(22,163,110,.12);color:var(--gr);border:1px solid rgba(22,163,110,.3);}.btn-ok:hover{background:rgba(22,163,110,.2);}
.btn-no{background:rgba(229,62,62,.10);color:var(--re);border:1px solid rgba(229,62,62,.25);}.btn-no:hover{background:rgba(229,62,62,.18);}
.btn-sm{padding:5px 11px;font-size:14px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── PAKET KARTLARI ── */
.pkart{background:var(--sur);border:1px solid var(--bor);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.phead{padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.pno{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--ac);}
.pbody{padding:10px 18px 14px;border-top:1px solid var(--bor);background:var(--sur2);}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:14px;font-weight:600;background:var(--sur2);border:1px solid var(--bor);color:var(--txm);}
.chip.ok{background:rgba(22,163,110,.08);border-color:rgba(22,163,110,.3);color:var(--gr);}
.chip.no{background:rgba(229,62,62,.08);border-color:rgba(229,62,62,.3);color:var(--re);}

/* ── MODAL ── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mbox{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:24px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;}
.mcl{background:none;border:none;color:var(--txd);font-size:22px;cursor:pointer;line-height:1;padding:2px;}.mcl:hover{color:var(--tx);}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.fi{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;}
.fi:focus{border-color:var(--ac);}
.fi::placeholder{color:var(--txd);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fta{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;resize:vertical;min-height:68px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:3000;animation:tslide .3s ease;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.t-ok{border-left:3px solid var(--gr);}
.t-er{border-left:3px solid var(--re);}
.t-in{border-left:3px solid var(--ac);}
@keyframes tslide{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.bos{text-align:center;padding:48px 24px;color:var(--txd);font-size:14px;}
</style>
<script src="ares-store.js"></script>
<script src="ares-layout.js"></script>
</head>
<body>
<div class="app-shell">
<div class="main-content">
<div class="page">

<!-- SAYFA BAŞLIĞI -->
<div class="page-header">
  <div>
    <div class="breadcrumb"><a href="index.html" data-i18n="kk_home">Ana Sayfa</a><span>/</span><span data-i18n="kk_breadcrumb">Kalite Kontrol</span></div>
    <h1 class="page-title" data-i18n="kk_title">Kalite Kontrol</h1>
  </div>
  <button class="btn btn-p" id="btnDavetUst" onclick="davetAc()" disabled>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg data-i18n="kk_btn_create">
    <span data-i18n="kk_btn_create_invite">Davet Paketi Oluştur</span>
  </button>
</div>

<!-- STAT KARTLAR -->
<div class="stat-row">
  <div class="stat-card cl-ac">
    <div class="stat-icon si-b"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div><div class="stat-label" data-i18n="kk_stat_hazir">Kaliteye Hazır</div><div class="stat-value" id="sH">0</div></div>
  </div>
  <div class="stat-card cl-leg">
    <div class="stat-icon si-p"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <div><div class="stat-label" data-i18n="kk_stat_davet">Davet Paketi</div><div class="stat-value" id="sD">0</div></div>
  </div>
  <div class="stat-card cl-warn">
    <div class="stat-icon si-a"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
    <div><div class="stat-label" data-i18n="kk_stat_bekle">Tersane Bekleniyor</div><div class="stat-value" id="sB">0</div></div>
  </div>
  <div class="stat-card cl-gr">
    <div class="stat-icon si-g"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
    <div><div class="stat-label" data-i18n="kk_stat_onay">Onaylanan</div><div class="stat-value" id="sO">0</div></div>
  </div>
</div>

<!-- SEÇİM BAR -->
<div class="secim-bar" id="secBar">
  <div><div class="sval" id="secD">0</div><div class="slbl" data-i18n="kk_sec_devre">Devre</div></div>
  <div class="ssep"></div>
  <div><div class="sval" id="secS">0</div><div class="slbl" data-i18n="kk_sec_spool">Spool</div></div>
  <div class="ssep"></div>
  <div><div class="sval" id="secK">0</div><div class="slbl" data-i18n="kk_sec_kg">kg</div></div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-g btn-sm" onclick="secTemizle()" data-i18n="kk_btn_clear">Temizle</button>
    <button class="btn btn-p btn-sm" onclick="davetAc()" data-i18n="kk_btn_create_pkg">Davet Paketi Oluştur</button>
  </div>
</div>

<!-- SEKMELER -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="davet"><span data-i18n="kk_tab_davet">Davet Oluştur</span> <span class="tc" id="tD">0</span></button>
  <button class="tab-btn" data-tab="bekleyen"><span data-i18n="kk_tab_bekle">Bekleyen</span> <span class="tc" id="tB">0</span></button>
  <button class="tab-btn" data-tab="onaylanan"><span data-i18n="kk_tab_onay">Onaylananlar</span> <span class="tc" id="tO">0</span></button>
</div>

<!-- PANEL: DAVET OLUŞTUR -->
<div class="panel on" id="panelDavet">
  <div class="fbar cl-warn">
    <select class="fsel" id="fT" onchange="filtrele()"><option value="" data-i18n="kk_filter_yard">Tüm Tersaneler</option></select>
    <select class="fsel" id="fP" onchange="filtrele()"><option value="" data-i18n="kk_filter_all_projects">Tüm Projeler</option></select>
    <div class="swrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--txd);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="fA" data-i18n-placeholder="kk_search_ph" data-i18n-placeholder="kk_search_ph" placeholder="Devre veya spool ara..." oninput="filtrele()">
    </div>
    <button class="btn btn-g btn-sm" onclick="filtreSifirla()" data-i18n="kk_btn_clear">Temizle</button>
    <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:var(--txm);cursor:pointer;margin-left:auto;">
      <input type="checkbox" id="ckAll" class="ck" onchange="hepsiniSec(this.checked)" data-i18n="kk_select_all"><span data-i18n="kk_select_all"> Tümünü Seç</span>
    </label>
  </div>
  <div id="hazirListe"></div>
</div>

<!-- PANEL: BEKLEYEN -->
<div class="panel" id="panelBekleyen">
  <div id="bekleListe"></div>
</div>

<!-- PANEL: ONAYLANAN -->
<div class="panel" id="panelOnaylanan">
  <div id="onayListe"></div>
</div>

</div><!-- /.page -->
</div><!-- /.main-content -->
</div><!-- /.app-shell -->

<!-- ═══ DAVET MODAL ═══ -->
<div id="mDavet" class="mov" style="display:none;">
  <div class="mbox">
    <div class="mhead">
      <div class="mtitle" data-i18n="kk_modal_davet_title">Kalite Davet Paketi Oluştur</div>
      <button class="mcl" onclick="document.getElementById('mDavet').style.display='none'">&#x2715;</button>
    </div>
    <div style="background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:12px 14px;margin-bottom:16px;">
      <div style="font-size:14px;font-weight:600;color:var(--txd);margin-bottom:8px;" data-i18n="kk_modal_secilenler">Seçilen Spooller</div>
      <div id="mOzet" style="display:flex;gap:16px;margin-bottom:8px;flex-wrap:wrap;font-size:14px;"></div>
      <div id="mListe" style="max-height:130px;overflow-y:auto;"></div>
    </div>
    <div class="fr fg">
      <div><label class="fl" data-i18n="kk_davet_tarihi">Davet Tarihi <span style="color:var(--re)">*</span></label><input type="date" class="fi" id="dTarih"></div>
      <div><label class="fl" data-i18n="kk_kontrol_tarihi">Tahmini Kontrol Tarihi</label><input type="date" class="fi" id="dKontrol"></div>
    </div>
    <div class="fg"><label class="fl" data-i18n="kk_kontakt">Kontakt / Not</label><input class="fi" id="dNot" placeholder="Tersane yetkilisi veya not..."></div>
    <div class="fg"><label class="fl" data-i18n="kk_mail">Mail</label><input type="email" class="fi" id="dMail" placeholder="quality@tersane.com.tr"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-g" style="flex:1;" onclick="document.getElementById('mDavet').style.display='none'" data-i18n="kk_btn_iptal">İptal</button>
      <button class="btn btn-s" onclick="showToast(tv('kk_toast_pdf','PDF önizleme yakında'),'info')" data-i18n="kk_btn_pdf">PDF Önizle</button>
      <button class="btn btn-p" style="flex:2;" onclick="davetKaydet()" data-i18n="kk_btn_kaydet">Paketi Oluştur &amp; Kaydet</button>
    </div>
  </div>
</div>

<!-- ═══ ONAY MODAL ═══ -->
<div id="mOnay" class="mov" style="display:none;">
  <div class="mbox" style="max-width:480px;">
    <div class="mhead">
      <div class="mtitle" data-i18n="kk_modal_onay_title">Kalite Onayı Gir</div>
      <button class="mcl" onclick="document.getElementById('mOnay').style.display='none'">&#x2715;</button>
    </div>
    <input type="hidden" id="oPaketId">
    <div class="fr fg">
      <div><label class="fl" data-i18n="kk_kontrol_tarihi2">Kontrol Tarihi <span style="color:var(--re)">*</span></label><input type="date" class="fi" id="oTarih"></div>
      <div><label class="fl" data-i18n="kk_kontrol_eden">Kontrol Eden <span style="color:var(--re)">*</span></label><input class="fi" id="oKisi" data-i18n-placeholder="kk_controller" placeholder="Ad Soyad"></div>
    </div>
    <div class="fg">
      <label class="fl" data-i18n="kk_karar">Karar <span style="color:var(--re)">*</span></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <button class="btn btn-ok" id="bOnay" onclick="kararSec('onay')" style="justify-content:center;padding:12px;" data-i18n="kk_tamami">Tamamı Onaylandı</button>
        <button class="btn btn-no" id="bRet"  onclick="kararSec('ret')"  style="justify-content:center;padding:12px;" data-i18n="kk_ret">Ret / Düzeltme</button>
      </div>
    </div>
    <div id="retBlok" style="display:none;" class="fg">
      <label class="fl" data-i18n="kk_ret_neden">Ret Nedeni <span style="color:var(--re)">*</span></label>
      <textarea class="fta" id="oRetNot" data-i18n-placeholder="kk_reject_ph" placeholder="Hangi spooller ret aldı, düzeltme talebi nedir?"></textarea>
    </div>
    <div class="fg"><label class="fl" data-i18n="kk_ek_not">Ek Not</label><input class="fi" id="oNot" data-i18n-placeholder="kk_optional" placeholder="Opsiyonel..."></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-g" style="flex:1;" onclick="document.getElementById('mOnay').style.display='none'" data-i18n="kk_btn_iptal">İptal</button>
      <button class="btn btn-p" style="flex:2;" onclick="onayKaydet()" data-i18n="kk_btn_onay_kaydet">Onayı Kaydet</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ════ D-01 DİL SİSTEMİ ════

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function _getLang(){return document.documentElement.getAttribute('lang')||'tr';}
function tv(key,tr){var lang=_getLang(),dict=_I18N[lang];if(dict&&dict[key])return dict[key];return tr!==undefined?tr:key;}
function _applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n');
    var isInp=el.tagName==='INPUT'||el.tagName==='TEXTAREA';
    if(!el.hasAttribute('data-i18n-tr'))el.setAttribute('data-i18n-tr',isInp?el.placeholder:el.textContent.trim());
    var v=tv(k,el.getAttribute('data-i18n-tr'));
    if(isInp){el.placeholder=v;}else{el.textContent=v;}
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){
    var k=el.getAttribute('data-i18n-placeholder');
    if(!el.hasAttribute('data-i18n-ph-tr'))el.setAttribute('data-i18n-ph-tr',el.placeholder);
    el.placeholder=tv(k,el.getAttribute('data-i18n-ph-tr'));
  });
}
window._onLangChange=function(){
  _applyI18n();
  filtrele();
  renderBekle();
  renderOnay();
};
new MutationObserver(function(){_applyI18n();}).observe(document.documentElement,{attributes:true,attributeFilter:['lang']});

function _buildHAZIR() {
  if (typeof SYOS === 'undefined' || typeof SYOS.kkHazirListesi !== 'function') return HAZIR_SABIT.slice();
  try {
    var storeHazir = SYOS.kkHazirListesi();
    var storeIds = {};
    storeHazir.forEach(function(s){ storeIds[s.id] = true; });
    return HAZIR_SABIT.filter(function(s){ return !storeIds[s.id]; }).concat(storeHazir);
  } catch(e) { return HAZIR_SABIT.slice(); }
}

function _buildPaketler() {
  var storePaketler = [];
  if (typeof SYOS !== 'undefined' && typeof SYOS.kkPaketleri === 'function') {
    try { storePaketler = SYOS.kkPaketleri(); } catch(e) {}
  }
  var sabit = [
    {id:'KD-26-001',tersane:'Sedef Tersanesi',projeNo:'NB1099',gemi:'MV Atlas',
     davetTarihi:'20.03.2026',kontrolTarihi:'25.03.2026',not:'Ahmet Bey',mail:'quality@sedef.com.tr',
     durum:'bekleyen',onay:null,
     spooller:[{id:'x1',spool:'S01',devre:'fw-bypass',agirlik:7.2},{id:'x2',spool:'S02',devre:'fw-bypass',agirlik:5.8}]}
  ];
  var storeIds = {};
  storePaketler.forEach(function(p){ storeIds[p.id] = true; });
  return storePaketler.concat(sabit.filter(function(p){ return !storeIds[p.id]; }));
}

function doldur() {
  var fT = document.getElementById('fT');
  var tersaneler = [];
  HAZIR.forEach(function(h){ if(tersaneler.indexOf(h.tersane)<0) tersaneler.push(h.tersane); });
  tersaneler.sort().forEach(function(t){
    var o = document.createElement('option');
    o.value = t; o.textContent = t; fT.appendChild(o);
  });
  fT.addEventListener('change', function() {
    var t = fT.value;
    var fP = document.getElementById('fP');
    fP.innerHTML = '<option value="">'+tv('kk_filter_proj','Tüm Projeler')+'</option>';
    var projs = [];
    HAZIR.forEach(function(h){ if(!t||h.tersane===t){ var k=h.projeNo+'|'+h.gemi; if(projs.indexOf(k)<0) projs.push(k); } });
    projs.sort().forEach(function(s){
      var parts=s.split('|');
      var o=document.createElement('option'); o.value=parts[0]; o.textContent=parts[0]+' - '+parts[1]; fP.appendChild(o);
    });
    filtrele();
  });
  var projSet = [];
  HAZIR.forEach(function(h){ var k=h.projeNo+'|'+h.gemi; if(projSet.indexOf(k)<0) projSet.push(k); });
  var fP = document.getElementById('fP');
  projSet.sort().forEach(function(s){
    var parts=s.split('|');
    var o=document.createElement('option'); o.value=parts[0]; o.textContent=parts[0]+' - '+parts[1]; fP.appendChild(o);
  });
}

function filtrele() {
  var t = document.getElementById('fT').value;
  var p = document.getElementById('fP').value;
  var a = document.getElementById('fA').value.toLowerCase().trim();
  renderHazir(HAZIR.filter(function(h){
    return (!t||h.tersane===t) && (!p||h.projeNo===p) &&
           (!a||h.devre.toLowerCase().indexOf(a)>=0||h.spool.toLowerCase().indexOf(a)>=0);
  }));
}

function filtreSifirla() {
  document.getElementById('fT').value = '';
  document.getElementById('fA').value = '';
  var fP = document.getElementById('fP');
  fP.innerHTML = '<option value="">'+tv('kk_filter_proj','Tüm Projeler')+'</option>';
  var projSet = [];
  HAZIR.forEach(function(h){ var k=h.projeNo+'|'+h.gemi; if(projSet.indexOf(k)<0) projSet.push(k); });
  projSet.sort().forEach(function(s){
    var parts=s.split('|');
    var o=document.createElement('option'); o.value=parts[0]; o.textContent=parts[0]+' - '+parts[1]; fP.appendChild(o);
  });
  filtrele();
}

// ── HAZIR LİSTE RENDER ───────────────────────────────────────
function renderHazir(liste) {
  var el = document.getElementById('hazirListe');
  if (!liste.length) { el.innerHTML = '<div class="bos">'+tv('kk_empty_spool','Gösterilecek spool yok')+'</div>'; return; }
  var G = {};
  liste.forEach(function(h) {
    var gk = h.tersane+'||'+h.projeNo;
    if (!G[gk]) G[gk] = {tersane:h.tersane,projeNo:h.projeNo,gemi:h.gemi,devs:{}};
    if (!G[gk].devs[h.devre]) G[gk].devs[h.devre] = [];
    G[gk].devs[h.devre].push(h);
  });
  var html = '';
  Object.keys(G).forEach(function(gk) {
    var g = G[gk];
    var all = [];
    Object.keys(g.devs).forEach(function(d){ all = all.concat(g.devs[d]); });
    var kg = all.reduce(function(a,s){ return a+s.agirlik; }, 0).toFixed(1);
    var nSec = all.filter(function(s){ return secHas(s.id); }).length;
    var ids = JSON.stringify(all.map(function(s){ return s.id; })).replace(/"/g,"'");
    html += '<div class="dgrup">';
    html += '<div class="dhead cl-ac" onclick="toggleGrup(this)">';
    html += '<div>';
    html += '<div class="dtitle">'+esc(g.tersane)+' &middot; <span style="color:var(--ac);">'+esc(g.projeNo)+'</span> <span style="font-weight:400;color:var(--txm);">'+esc(g.gemi)+'</span></div>';
    html += '<div class="dsub">'+all.length+' spool &middot; '+esc(kg)+' kg</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:10px;">';
    if(nSec>0) html += '<span class="b bb">'+esc(String(nSec))+tv('kk_secili',' seçili')+'</span>';
    html += '<label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:5px;font-size:14px;color:var(--txm);cursor:pointer;">';
    html += '<input type="checkbox" class="ck" '+(nSec===all.length&&all.length>0?'checked':'')+' onchange="grupSec(this,\''+ids+'\')">';
    html += ' '+tv('kk_tumu','Tümü')+'</label>';
    html += '<span style="color:var(--txd);font-size:14px;">&#9654;</span>';
    html += '</div></div>';
    html += '<div class="dbody shut">';
    Object.keys(g.devs).forEach(function(dev) {
      var spls = g.devs[dev];
      html += '<div style="border-bottom:1px solid var(--bor);">';
      html += '<div style="padding:8px 18px;background:var(--sur2);font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;">'+esc(dev)+'</div>';
      html += '<table class="st"><thead><tr><th style="width:32px;"></th><th>'+tv('kk_spool_col','Spool')+'</th><th style="text-align:right;">'+tv('kk_weight_col','Ağırlık')+'</th></tr></thead><tbody>';
      spls.forEach(function(s) {
        html += '<tr>';
        html += '<td><input type="checkbox" class="ck" '+(secHas(s.id)?'checked':'')+' onchange="spSec(\''+s.id+'\',this.checked)"></td>';
        html += '<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:700;color:var(--ac);">'+esc(s.spool)+'</td>';
        html += '<td style="text-align:right;color:var(--txm);">'+esc(String(s.agirlik))+' kg</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function toggleGrup(head) {
  var body = head.nextElementSibling;
  body.classList.toggle('shut');
  var arr = head.querySelector('span:last-child');
  if (arr) arr.innerHTML = body.classList.contains('shut') ? '&#9654;' : '&#9660;';
}

function grupSec(cb, idsStr) {
  var ids = JSON.parse(idsStr.replace(/'/g,'"'));
  ids.forEach(function(id){ cb.checked ? secAdd(id) : secDel(id); });
  guncelSecBar();
  filtrele();
}

function spSec(id, checked) {
  checked ? secAdd(id) : secDel(id);
  guncelSecBar();
}

function hepsiniSec(c) {
  HAZIR.forEach(function(h){ c ? secAdd(h.id) : secDel(h.id); });
  filtrele();
}

function secTemizle() {
  secClear();
  var ck = document.getElementById('ckAll');
  if (ck) ck.checked = false;
  guncelSecBar();
  filtrele();
}

function guncelSecBar() {
  var sl = HAZIR.filter(function(h){ return secHas(h.id); });
  var n = sl.length;
  var devSet = {};
  sl.forEach(function(h){ devSet[h.devre+h.projeNo]=true; });
  var kg = sl.reduce(function(a,h){ return a+h.agirlik; }, 0).toFixed(1);
  document.getElementById('secBar').className = 'secim-bar' + (n>0?' on':'');
  document.getElementById('secD').textContent = Object.keys(devSet).length;
  document.getElementById('secS').textContent = n;
  document.getElementById('secK').textContent = kg;
  document.getElementById('btnDavetUst').disabled = n === 0;
}

  var devSet = {};
  sl.forEach(function(h){ devSet[h.devre]=true; });
  var ozet = tv('kk_sec_spool','Spool')+': <strong style="color:var(--tx);">'+sl.length+'</strong> &nbsp;';
  ozet += tv('kk_davet_circuit','Devre:')+' <strong style="color:var(--tx);">'+esc(String(Object.keys(devSet).length))+'</strong> &nbsp;';
  ozet += tv('kk_davet_total','Toplam:')+' <strong style="color:var(--ac);">'+esc(kg)+' kg</strong>';
  document.getElementById('mOzet').innerHTML = ozet;
  var listHtml = sl.map(function(h){
    return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bor);font-size:14px;">'+
      '<span style="color:var(--txm);">'+esc(h.projeNo)+' / <span style="color:var(--ac);">'+esc(h.devre)+'</span> / <strong style="color:var(--tx);">'+esc(h.spool)+'</strong></span>'+
      '<span style="color:var(--txd);">'+esc(String(h.agirlik))+' kg</span></div>';
  }).join('');
  document.getElementById('mListe').innerHTML = listHtml;
  document.getElementById('dTarih').value = new Date().toISOString().split('T')[0];
  document.getElementById('dKontrol').value = '';
  document.getElementById('dNot').value = '';
  document.getElementById('dMail').value = '';
  document.getElementById('mDavet').style.display = 'flex';
}

  if (!tarih) { showToast(tv('kk_toast_davet_tarih','Davet tarihi zorunlu'),'error'); return; }
  var sl = HAZIR.filter(function(h){ return secHas(h.id); });
  var fmt = function(d){ return d ? new Date(d).toLocaleDateString('tr-TR') : '-'; };
  var no = 'KD-26-'+String(psayac).padStart(3,'0'); psayac++;
  var yeni = {
    id:no,
    tersane: sl[0]?sl[0].tersane:'-',
    projeNo: sl[0]?sl[0].projeNo:'-',
    gemi:    sl[0]?sl[0].gemi:'-',
    davetTarihi:  fmt(tarih),
    kontrolTarihi:fmt(document.getElementById('dKontrol').value),
    not:  document.getElementById('dNot').value.trim(),
    mail: document.getElementById('dMail').value.trim(),
    durum:'bekleyen', onay:null,
    spooller: sl.map(function(h){ return {id:h.id,spool:h.spool,devre:h.devre,agirlik:h.agirlik,durumOnay:null}; })
  };
  paketler.push(yeni);
  if (typeof SYOS !== 'undefined') {
    SYOS.kkPaketOlustur(sl.map(function(h){return h.id;}),
      yeni.tersane, yeni.projeNo, yeni.gemi,
      yeni.davetTarihi, yeni.kontrolTarihi, yeni.not, yeni.mail);
    var yeni2 = _buildHAZIR();
    HAZIR.length = 0;
    yeni2.forEach(function(h){ HAZIR.push(h); });
  }
  secClear();
  document.getElementById('mDavet').style.display = 'none';
  try{var _lg=JSON.parse(localStorage.getItem('ares_islemLog')||'[]');_lg.unshift({id:'L'+Date.now(),tarih:new Date().toLocaleString('tr-TR'),islem:'KK_DAVET_OLUSTUR',kaynak:no,aciklama:sl.length+' spool'});localStorage.setItem('ares_islemLog',JSON.stringify(_lg.slice(0,1000)));}catch(e){}
  filtrele(); renderBekle(); renderOnay(); guncelStatler();
  showToast(no+' '+tv('kk_toast_olusturuldu','numaralı davet paketi oluşturuldu'),'success');
  tabGit('bekleyen');
}

// ── BEKLEYEN / ONAYLANAN ─────────────────────────────────────
function renderBekle() {
  var el = document.getElementById('bekleListe');
  var bl = paketler.filter(function(p){ return p.durum==='bekleyen'; });
  el.innerHTML = bl.length ? bl.map(pkart).join('') : '<div class="bos">'+tv('kk_empty_bekle','Bekleyen davet paketi yok')+'</div>';
}

function renderOnay() {
  var el = document.getElementById('onayListe');
  var ol = paketler.filter(function(p){ return p.durum==='onaylandi'||p.durum==='reddedildi'; });
  el.innerHTML = ol.length ? ol.map(pkart).join('') : '<div class="bos">'+tv('kk_empty_onay','Henüz onaylanan paket yok')+'</div>';
}

function pkart(p) {
  var dm = {bekleyen:'<span class="b ba">'+tv('kk_durum_bekle','Tersane Bekleniyor')+'</span>',onaylandi:'<span class="b bg">'+tv('kk_durum_onay','Onaylandı')+'</span>',reddedildi:'<span class="b br">'+tv('kk_durum_ret','Ret / Düzeltme')+'</span>'};
  var kg = p.spooller.reduce(function(a,s){ return a+(s.agirlik||0); },0).toFixed(1);
  var h = '<div class="pkart"><div class="phead">';
  h += '<div>';
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;"><div class="pno">'+p.id+'</div>'+(dm[p.durum]||'')+'</div>';
  h += '<div style="font-size:14px;color:var(--txm);">'+esc(p.tersane)+' &middot; '+esc(p.projeNo)+' / '+esc(p.gemi)+'</div>';
  h += '<div style="font-size:14px;color:var(--txd);margin-top:4px;">'+tv('kk_card_invite','Davet:')+' <strong style="color:var(--tx);">'+esc(p.davetTarihi)+'</strong> &middot; '+tv('kk_card_control','Kontrol:')+' <strong style="color:var(--tx);">'+esc(p.kontrolTarihi)+'</strong> &middot; '+esc(String(p.spooller.length))+' spool &middot; '+esc(String(kg))+' kg'+(p.not?' &middot; '+esc(p.not):'')+'</div>';
  if (p.onay) h += '<div style="font-size:14px;margin-top:5px;color:'+(p.durum==='onaylandi'?'var(--gr)':'var(--re)')+';">'+(p.durum==='onaylandi'?'&check;':'&cross;')+' '+p.onay.kisi+' &mdash; '+p.onay.tarih+(p.onay.not?' &mdash; '+p.onay.not:'')+'</div>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;align-items:flex-start;">';
  h += '<button class="btn btn-g btn-sm" onclick="showToast(tv(\'kk_toast_sevkiyat\',\'PDF indiriliyor...\'),\'info\')">'+tv('kk_pdf_btn','PDF')+'</button>';
  if (p.durum==='bekleyen') h += '<button class="btn btn-p btn-sm" onclick="onayAc(\''+esc(p.id)+'\')">' + tv('kk_enter_approval','Onay Gir')+'</button>';
  if (p.durum==='onaylandi') h += '<button class="btn btn-ok btn-sm" onclick="showToast(tv(\'kk_toast_sevkiyat\',\'Sevkiyata eklendi\'),\'success\')">'+tv('kk_sevkiyata','Sevkiyata →')+'</button>';
  h += '</div></div>';
  h += '<div class="pbody"><div class="chips">';
  p.spooller.forEach(function(s){
    h += '<span class="chip '+(s.durumOnay==='onay'?'ok':s.durumOnay==='ret'?'no':'')+'">'+esc(s.spool)+' <span style="opacity:.5;font-size:14px;">/ '+esc(s.devre)+'</span></span>';
  });
  h += '</div></div></div>';
  return h;
}

// ── ONAY ─────────────────────────────────────────────────────
function onayAc(id) {
  document.getElementById('oPaketId').value = id;
  document.getElementById('oTarih').value = new Date().toISOString().split('T')[0];
  document.getElementById('oKisi').value = '';
  document.getElementById('oNot').value = '';
  document.getElementById('oRetNot').value = '';
  document.getElementById('retBlok').style.display = 'none';
  karar = '';
  document.getElementById('bOnay').style.outline = '';
  document.getElementById('bRet').style.outline = '';
  document.getElementById('mOnay').style.display = 'flex';
}

function kararSec(k) {
  karar = k;
  document.getElementById('bOnay').style.outline = k==='onay' ? '2px solid var(--gr)' : '';
  document.getElementById('bRet').style.outline  = k==='ret'  ? '2px solid var(--re)' : '';
  document.getElementById('retBlok').style.display = k==='ret' ? 'block' : 'none';
}

function onayKaydet() {
  var id    = document.getElementById('oPaketId').value;
  var tarih = document.getElementById('oTarih').value;
  var kisi  = document.getElementById('oKisi').value.trim();
  var not   = document.getElementById('oNot').value.trim();
  var ret   = document.getElementById('oRetNot').value.trim();
  if (!karar) { showToast(tv('kk_toast_karar','Karar seçin'),'error'); return; }
  if (!tarih) { showToast(tv('kk_toast_tarih','Tarih zorunlu'),'error'); return; }
  if (!kisi)  { showToast(tv('kk_toast_kisi','Kontrol eden zorunlu'),'error'); return; }
  if (karar==='ret'&&!ret) { showToast(tv('kk_toast_ret_neden','Ret nedeni girilmeli'),'error'); return; }
  var p = null;
  paketler.forEach(function(x){ if(x.id===id) p=x; });
  if (!p) return;
  p.durum = karar==='onay' ? 'onaylandi' : 'reddedildi';
  p.spooller.forEach(function(s){ s.durumOnay = karar; });
  var notFinal = karar==='ret' ? ret+(not?' / '+not:'') : not;
  p.onay = {karar:karar, tarih:new Date(tarih).toLocaleDateString('tr-TR'), kisi:kisi, not:notFinal};
  if (typeof SYOS !== 'undefined' && typeof SYOS.kkOnayKaydet === 'function') {
    try { SYOS.kkOnayKaydet(id, karar, new Date(tarih).toLocaleDateString('tr-TR'), kisi, notFinal); } catch(e) {}
  }
  document.getElementById('mOnay').style.display = 'none';
  try{var _lgo=JSON.parse(localStorage.getItem('ares_islemLog')||'[]');_lgo.unshift({id:'L'+Date.now(),tarih:new Date().toLocaleString('tr-TR'),islem:'KK_ONAY_KAYDET',kaynak:id,aciklama:karar});localStorage.setItem('ares_islemLog',JSON.stringify(_lgo.slice(0,1000)));}catch(e){}
  renderBekle(); renderOnay(); guncelStatler();
  showToast(karar==='onay' ? id+' '+tv('kk_toast_onaylandi','onaylandı — sevkiyata hazır!') : id+' '+tv('kk_toast_ret_sonuc','ret aldı'), karar==='onay'?'success':'error');
  if (karar==='onay') tabGit('onaylanan');
}

// ── STAT & TAB ───────────────────────────────────────────────
function guncelStatler() {
  document.getElementById('sH').textContent = HAZIR.length;
  var b=0, o=0;
  paketler.forEach(function(p){ if(p.durum==='bekleyen') b++; if(p.durum==='onaylandi') o++; });
  document.getElementById('sD').textContent = paketler.length;
  document.getElementById('sB').textContent = b;
  document.getElementById('sO').textContent = o;
  document.getElementById('tD').textContent = HAZIR.length;
  document.getElementById('tB').textContent = b;
  document.getElementById('tO').textContent = o;
}

function tabGit(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-tab')===tab);
  });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  var panel = document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1));
  if (panel) panel.classList.add('on');
}

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ tabGit(btn.getAttribute('data-tab')); });
});

// ── TOAST ────────────────────────────────────────────────────
var _tt;
function showToast(msg, type) {
  var old = document.getElementById('_toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.id = '_toast';
  t.className = 'toast t-'+({'success':'ok','error':'er'}[type]||'in');
  t.innerHTML = '<span>'+msg+'</span><button style="background:none;border:none;color:var(--txd);cursor:pointer;font-size:16px;margin-left:8px;" onclick="this.parentElement.remove()">&#x2715;</button>';
  document.body.appendChild(t);
  clearTimeout(_tt);
  _tt = setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}

// ── BAŞLAT ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  (async function() {
    // ── OPSİYONEL OTURUM KONTROLÜ (bu sayfa auth gerektirmez) ──
    try {
      var _supa = (typeof ARES !== 'undefined') ? ARES.supabase() : null;
      if (_supa) { await _supa.auth.getSession(); }
    } catch(e) {}
    doldur();
    filtrele();
    renderBekle();
    renderOnay();
    guncelStatler();
    _applyI18n(); // D-01: ilk açılış dil uygulaması
    document.documentElement.style.visibility = '';
  })();
});
</script>
