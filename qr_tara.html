<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Tara | AresPipe</title>
<script>(function(){var t=localStorage.getItem('ares_theme')||'dark';document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('ares_lang')||'tr';document.documentElement.setAttribute('lang',l);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="ares-store.js"></script>
<script src="ares-lang.js"></script>
<script src="ares-layout.js"></script>
<style>
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txd:#6b7a90;--txm:#94a3b8;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh;overflow:hidden;}

/* KAMERA ALANI */
.kamera-wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#canvas{display:none;}

/* TARAMA ÇERÇEVESİ */
.cerceve-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;pointer-events:none;}
.cerceve{position:absolute;inset:0;}
.cerceve::before,.cerceve::after{content:'';position:absolute;width:40px;height:40px;border-color:#fff;border-style:solid;}
.cerceve::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.cerceve::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.cerceve-alt::before{content:'';position:absolute;bottom:0;left:0;width:40px;height:40px;border-color:#fff;border-style:solid;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.cerceve-alt::after{content:'';position:absolute;bottom:0;right:0;width:40px;height:40px;border-color:#fff;border-style:solid;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
.tarama-cizgi{position:absolute;left:10px;right:10px;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent);animation:tarama 2s ease-in-out infinite;}
@keyframes tarama{0%{top:10px;opacity:1;}50%{opacity:1;}100%{top:210px;opacity:0;}}

/* BAŞLIK */
.header{position:absolute;top:0;left:0;right:0;padding:16px 20px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);display:flex;align-items:center;gap:12px;z-index:10;}
.header-geri{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.header-baslik{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;}

/* ALT BİLGİ */
.alt-bilgi{position:absolute;bottom:0;left:0;right:0;padding:24px 20px 40px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);text-align:center;z-index:10;}
.alt-yazi{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:16px;}
.alt-manuel{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:25px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;}
.alt-manuel:hover{background:rgba(255,255,255,.25);}

/* DURUM */
.durum{position:absolute;top:50%;left:50%;transform:translate(-50%, 70px);z-index:10;text-align:center;pointer-events:none;}
.durum-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:25px;font-size:14px;font-weight:700;backdrop-filter:blur(8px);}
.durum-tarama{background:rgba(45,142,255,.2);border:1px solid rgba(45,142,255,.5);color:#7ec8ff;}
.durum-bulundu{background:rgba(22,163,110,.2);border:1px solid rgba(22,163,110,.5);color:#4ade80;}
.durum-hata{background:rgba(229,62,62,.2);border:1px solid rgba(229,62,62,.5);color:#f87171;}
.durum-arama{background:rgba(217,119,6,.2);border:1px solid rgba(217,119,6,.5);color:#fbbf24;}

/* KAMERA YOK */
.kamera-yok{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;background:var(--bg);}
.kamera-yok-ikon{font-size:48px;}
.kamera-yok-yazi{font-size:16px;color:var(--txd);text-align:center;line-height:1.6;}

/* MANUEL GİRİŞ MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.modal-bg.ac{display:flex;}
.modal-kart{background:var(--sur);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;}
.modal-baslik{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--tx);margin-bottom:16px;}
.modal-input{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:18px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:2px;text-align:center;outline:none;}
.modal-input:focus{border-color:var(--ac);}
.modal-btn{width:100%;padding:14px;border-radius:12px;background:var(--ac);border:none;color:#fff;font-size:16px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;margin-top:12px;}
.modal-iptal{width:100%;padding:12px;border-radius:12px;background:transparent;border:1px solid var(--bor);color:var(--txd);font-size:14px;font-family:'Barlow',sans-serif;cursor:pointer;margin-top:8px;}
</style>
</head>
<body>

<div class="kamera-wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>

  <!-- Tarama çerçevesi -->
  <div class="cerceve-wrap">
    <div class="cerceve"></div>
    <div class="cerceve-alt"></div>
    <div class="tarama-cizgi"></div>
  </div>

  <!-- Başlık -->
  <div class="header">
    <button class="header-geri" onclick="history.back()">←</button>
    <span class="header-baslik">QR Tara</span>
  </div>

  <!-- Durum göstergesi -->
  <div class="durum" id="durumEl">
    <div class="durum-badge durum-tarama" id="durumBadge">
      <span>⬡</span> <span id="durumYazi">Kodu çerçeveye hizala</span>
    </div>
  </div>

  <!-- Alt bilgi -->
  <div class="alt-bilgi">
    <div class="alt-yazi">Spool QR kodunu çerçevenin içine alın</div>
    <button class="alt-manuel" onclick="manuelAc()">
      ⌨ Manuel Giriş
    </button>
  </div>

  <!-- Kamera yoksa -->
  <div class="kamera-yok" id="kameraYok" style="display:none;">
    <div class="kamera-yok-ikon">📵</div>
    <div class="kamera-yok-yazi">Kamera erişimi sağlanamadı.<br>Manuel giriş kullanabilirsiniz.</div>
    <button class="alt-manuel" onclick="manuelAc()">⌨ Manuel Giriş</button>
  </div>
</div>

<!-- Manuel giriş modal -->
<div class="modal-bg" id="manuelModal">
  <div class="modal-kart">
    <div class="modal-baslik">Spool ID Gir</div>
    <input class="modal-input" id="manuelInput" type="text" placeholder="0135" maxlength="10"
      autocomplete="off" autocorrect="off" autocapitalize="characters"
      onkeydown="if(event.key==='Enter')manuelAra()">
    <button class="modal-btn" onclick="manuelAra()">Spool'u Bul →</button>
    <button class="modal-iptal" onclick="manuelKapat()">İptal</button>
  </div>
</div>

<script>
'use strict';

var _tarama = true;
var _bulunan = false;

// ── KAMERA ───────────────────────────────────────────────────────
var video = document.getElementById('video');
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');

async function kameraBaslat() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', function() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      taramaBaslat();
    });
  } catch(e) {
    document.getElementById('kameraYok').style.display = 'flex';
    video.style.display = 'none';
  }
}

// ── QR TARAMA DÖNGÜSÜ ────────────────────────────────────────────
function taramaBaslat() {
  requestAnimationFrame(taramaKare);
}

function taramaKare() {
  if (!_tarama) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });
    if (code && code.data) {
      qrBulundu(code.data.trim());
      return;
    }
  }
  requestAnimationFrame(taramaKare);
}

// ── QR BULUNDU ───────────────────────────────────────────────────
function qrBulundu(spoolId) {
  if (_bulunan) return;
  _bulunan = true;
  _tarama = false;

  durumGoster('arama', '🔍 ' + spoolId + ' aranıyor…');

  // Titreşim (mobil)
  if (navigator.vibrate) navigator.vibrate(100);

  spoolAra(spoolId);
}

async function spoolAra(spoolId) {
  var supa = ARES.supabase();
  if (!supa || ARES.mod !== 'supabase') {
    // Demo mod — direkt yönlendir
    gec('spool_detay.html?spoolId=' + encodeURIComponent(spoolId));
    return;
  }

  try {
    var res = await supa
      .from('spooller')
      .select('id, spool_id, spool_no, pipeline_no, devre_id')
      .eq('spool_id', spoolId)
      .eq('tenant_id', ARES.tenantId())
      .limit(1)
      .single();

    if (res.error || !res.data) {
      durumGoster('hata', '❌ Spool bulunamadı: ' + spoolId);
      setTimeout(function() { tekrarBaslat(); }, 2500);
      return;
    }

    durumGoster('bulundu', '✓ Bulundu — yönlendiriliyor…');
    setTimeout(function() {
      gec('spool_detay.html?id=' + res.data.id);
    }, 600);

  } catch(e) {
    durumGoster('hata', '❌ Bağlantı hatası');
    setTimeout(function() { tekrarBaslat(); }, 2500);
  }
}

function tekrarBaslat() {
  _bulunan = false;
  _tarama = true;
  durumGoster('tarama', 'Kodu çerçeveye hizala');
  taramaBaslat();
}

// ── MANUEL GİRİŞ ─────────────────────────────────────────────────
function manuelAc() {
  document.getElementById('manuelModal').classList.add('ac');
  setTimeout(function() { document.getElementById('manuelInput').focus(); }, 100);
}

function manuelKapat() {
  document.getElementById('manuelModal').classList.remove('ac');
  document.getElementById('manuelInput').value = '';
}

function manuelAra() {
  var val = document.getElementById('manuelInput').value.trim().toUpperCase();
  if (!val) return;
  manuelKapat();
  qrBulundu(val);
}

// ── YARDIMCI ─────────────────────────────────────────────────────
function durumGoster(tip, yazi) {
  var badge = document.getElementById('durumBadge');
  var yzEl = document.getElementById('durumYazi');
  badge.className = 'durum-badge durum-' + tip;
  yzEl.textContent = yazi;
}

function gec(url) {
  window.location.href = url;
}

// ── BAŞLAT ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  (async function() {
    try {
      var _b = 0;
      while (_b < 50) {
        var _s = ARES.supabase();
        if (_s) { var _ses = await _s.auth.getSession(); if (_ses.data && _ses.data.session) break; }
        await new Promise(function(r) { setTimeout(r, 100); });
        _b++;
      }
    } catch(e) {}
    kameraBaslat();
    document.documentElement.style.visibility = '';
    window._onLangChange = function() {};
  })();
});
</script>
</body>
</html>
